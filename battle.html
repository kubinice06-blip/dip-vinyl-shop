<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>dip 卡牌對戰 · BETA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black:#111; --gray:#888; --line:#ddd; --bg:#fff; --mono:'Space Mono',monospace;
    --hp:#111; --hp-bg:#eee; --dmg:#c11628; --gold:#b8860b;
    --silver-shine:linear-gradient(115deg,#9498a0 0%,#9498a0 34%,#c8ccd2 40%,#fff 47%,#fff 50%,#fff 53%,#c8ccd2 60%,#9498a0 66%,#9498a0 100%);
    --oil-shine:linear-gradient(115deg,#241b3a 0%,#241b3a 30%,#3a2a5d 38%,#2bb6a3 44%,#c84ad6 50%,#2b6fd6 56%,#3a2a5d 62%,#241b3a 70%,#241b3a 100%);
    --crimson-shine:linear-gradient(115deg,#4a0a13 0%,#4a0a13 36%,#7a1020 41%,#c11628 47%,#ff3048 50%,#c11628 53%,#7a1020 59%,#4a0a13 64%,#4a0a13 100%);
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; background:var(--bg); color:var(--black); font-family:var(--mono); font-size:11px; letter-spacing:0.04em; }
  @keyframes shimmer { 0%{background-position:200% 0;} 100%{background-position:0 0;} }
  @keyframes pop { 0%{transform:scale(0.6);opacity:0;} 60%{transform:scale(1.08);} 100%{transform:scale(1);opacity:1;} }
  @keyframes flash { 0%,100%{opacity:1;} 50%{opacity:0.25;} }
  @keyframes shake { 0%,100%{transform:translateX(0);} 20%{transform:translateX(-4px);} 40%{transform:translateX(4px);} 60%{transform:translateX(-3px);} 80%{transform:translateX(3px);} }

  .wrap { max-width:560px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; }
  .topbar { display:flex; align-items:center; justify-content:space-between; padding:12px 14px; border-bottom:1px solid var(--black); }
  .topbar .title { font-weight:700; letter-spacing:0.18em; text-transform:uppercase; }
  .topbar .beta { font-size:9px; color:var(--gray); border:1px solid var(--line); padding:2px 6px; letter-spacing:0.16em; }
  .btn { font-family:var(--mono); font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; background:none; border:1px solid var(--black); padding:6px 12px; cursor:pointer; color:var(--black); transition:all .15s; }
  .btn:hover { background:var(--black); color:#fff; }

  .side { padding:12px 14px; }
  .side.enemy { border-bottom:1px solid var(--line); }
  .nameplate { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
  .nameplate .who { font-weight:700; letter-spacing:0.1em; text-transform:uppercase; }
  .nameplate .meta { font-size:9px; color:var(--gray); letter-spacing:0.08em; }
  .hpbar { height:14px; background:var(--hp-bg); position:relative; overflow:hidden; }
  .hpbar > i { position:absolute; inset:0 auto 0 0; background:var(--hp); transition:width .5s cubic-bezier(.4,0,.2,1); }
  .hpbar > span { position:absolute; inset:0; display:flex; align-items:center; justify-content:flex-end; padding-right:6px; font-size:9px; font-weight:700; color:var(--gray); mix-blend-mode:difference; }
  .hpbar.dmg { animation:shake .4s; }

  .enemy-hand { display:flex; gap:4px; margin-top:8px; }
  .cardback { width:26px; height:36px; border:1px solid var(--black); background:repeating-linear-gradient(45deg,#fff,#fff 3px,#f0f0f0 3px,#f0f0f0 6px); }

  .arena { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:14px; gap:10px; min-height:230px; position:relative; }
  .slots { display:flex; gap:18px; align-items:stretch; justify-content:center; width:100%; }
  .slot { flex:1; max-width:170px; min-height:150px; border:1px dashed var(--line); display:flex; align-items:center; justify-content:center; padding:6px; }
  .slot.filled { border-style:solid; border-color:var(--black); }
  .vs { align-self:center; font-weight:700; font-size:13px; color:var(--gray); letter-spacing:0.1em; }

  .pcard { width:100%; animation:pop .3s; text-align:left; }
  .pcard .cover { height:0; }
  .pcard .alb { font-weight:700; line-height:1.35; margin-bottom:2px; }
  .pcard .art { color:var(--gray); font-size:9px; margin-bottom:7px; letter-spacing:0.06em; }
  .stats { display:flex; flex-direction:column; gap:3px; }
  .stat { display:flex; align-items:center; gap:6px; font-size:9px; }
  .stat .k { width:24px; color:var(--gray); }
  .stat .bars { display:flex; gap:2px; }
  .stat .bars i { width:9px; height:7px; background:var(--line); }
  .stat .bars i.on { background:var(--black); }
  .stat.act .k { color:var(--black); font-weight:700; }
  .stat.act .bars i.on { background:var(--gold); }
  .ace-tag { display:inline-block; font-size:8px; font-weight:700; letter-spacing:0.14em; padding:1px 6px; margin-bottom:6px; -webkit-background-clip:text; background-clip:text; color:transparent; background-size:200% 100%; animation:shimmer 7.8s linear infinite; border:1px solid currentColor; }
  .ace-hall { background-image:var(--silver-shine); } .ace-pearl { background-image:var(--oil-shine); } .ace-heresy { background-image:var(--crimson-shine); }
  .ace-border { position:relative; }
  .ace-border::after { content:''; position:absolute; inset:0; pointer-events:none; padding:2px; background-size:200% 100%; animation:shimmer 7.8s linear infinite; -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0); -webkit-mask-composite:xor; mask-composite:exclude; }
  .ace-border.ace-hall::after { background-image:var(--silver-shine); }
  .ace-border.ace-pearl::after { background-image:var(--oil-shine); }
  .ace-border.ace-heresy::after { background-image:var(--crimson-shine); }

  .callout { min-height:42px; text-align:center; display:flex; flex-direction:column; gap:3px; align-items:center; justify-content:center; }
  .callout .skill { font-weight:700; letter-spacing:0.14em; animation:pop .3s; }
  .callout .skill.syn { color:var(--gold); }
  .callout .skill.cnt { color:var(--dmg); }
  .callout .sub { font-size:9px; color:var(--gray); }
  .dmgnum { font-size:22px; font-weight:700; color:var(--dmg); animation:pop .3s; }

  .player-zone { border-top:1px solid var(--black); padding:10px 12px 16px; }
  .hint { text-align:center; font-size:9px; color:var(--gray); letter-spacing:0.08em; margin-bottom:8px; min-height:12px; }
  .hand { display:flex; gap:7px; overflow-x:auto; padding-bottom:4px; }
  .hand::-webkit-scrollbar { height:0; }
  .handcard { flex:0 0 112px; border:1px solid var(--line); background:#fff; padding:8px; cursor:pointer; text-align:left; font-family:var(--mono); transition:transform .12s,border-color .12s; position:relative; }
  .handcard:hover { border-color:var(--black); transform:translateY(-3px); }
  .handcard.sel { border-color:var(--black); border-width:2px; transform:translateY(-6px); }
  .handcard.dim { opacity:0.4; }
  .handcard .alb { font-weight:700; font-size:10px; line-height:1.25; margin-bottom:1px; height:25px; overflow:hidden; }
  .handcard .art { color:var(--gray); font-size:8px; margin-bottom:6px; height:10px; overflow:hidden; }
  .attrbtns { display:flex; gap:3px; margin-top:6px; }
  .attrbtn { flex:1; font-family:var(--mono); font-size:9px; font-weight:700; border:1px solid var(--line); background:#fff; padding:5px 0; cursor:pointer; transition:all .12s; }
  .attrbtn:hover { background:var(--black); color:#fff; border-color:var(--black); }
  .attrbtn b { display:block; font-size:11px; color:var(--gold); }
  .attrbtn:hover b { color:#fff; }

  .log { max-height:96px; overflow-y:auto; border-top:1px solid var(--line); margin-top:10px; padding-top:8px; font-size:9px; line-height:1.7; color:var(--gray); }
  .log .me { color:var(--black); }
  .log .hit { color:var(--dmg); font-weight:700; }

  .overlay { position:fixed; inset:0; background:rgba(255,255,255,0.96); display:none; flex-direction:column; align-items:center; justify-content:center; gap:16px; z-index:100; padding:24px; text-align:center; }
  .overlay.show { display:flex; animation:flash .5s; }
  .overlay h1 { font-size:30px; letter-spacing:0.2em; margin:0; }
  .overlay p { color:var(--gray); margin:0; letter-spacing:0.08em; }
  .chip-row { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; }
  .chip { font-size:8px; border:1px solid var(--line); padding:2px 7px; letter-spacing:0.1em; color:var(--gray); }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <span class="title">dip · 品味對戰</span>
    <span class="beta">BETA</span>
    <button class="btn" id="restart">新對局</button>
  </div>

  <div class="side enemy">
    <div class="nameplate">
      <span class="who">電腦 · 樂評魂</span>
      <span class="meta" id="eMeta">牌庫 — · 手牌 —</span>
    </div>
    <div class="hpbar" id="eHpbar"><i id="eHpfill"></i><span id="eHptxt"></span></div>
    <div class="enemy-hand" id="eHand"></div>
  </div>

  <div class="arena">
    <div class="slots">
      <div class="slot" id="eSlot"></div>
      <div class="vs">VS</div>
      <div class="slot" id="pSlot"></div>
    </div>
    <div class="callout" id="callout"></div>
  </div>

  <div class="player-zone">
    <div class="nameplate">
      <span class="who">你 · 黑膠玩家</span>
      <span class="meta" id="pMeta">牌庫 — · 連段 —</span>
    </div>
    <div class="hpbar" id="pHpbar"><i id="pHpfill"></i><span id="pHptxt"></span></div>
    <div class="hint" id="hint">選一張卡，再點一個主打屬性出招</div>
    <div class="hand" id="pHand"></div>
    <div class="log" id="log"></div>
  </div>
</div>

<div class="overlay" id="overlay">
  <h1 id="ovTitle"></h1>
  <p id="ovSub"></p>
  <button class="btn" id="ovBtn">再來一局</button>
</div>

<script>
"use strict";
// ===== v2 規則參數（對齊 CARD_GAME_DESIGN.md 第 8 節 BATTLE_CONFIG）=====
const CFG = {
  startHp:30, deckSize:20, startHand:5, drawPerTurn:1, handLimit:7,
  beats:{ obscurity:'classic', classic:'accessibility', accessibility:'obscurity' }, // key 剋 value
  breakBonus:4, minCounterDamage:1,
  chainNext:{ classic:'obscurity', obscurity:'accessibility', accessibility:'classic' }, // 相生，與 beats 反向
  chain2Bonus:2, chain3Bonus:5,
  ace:{ hall:{suppress:2}, pearl:{breakBonus:6}, heresy:{breakChain:true} },
  fatigueStart:1, fatigueStep:1,
};
const ATTRS = ['classic','obscurity','accessibility'];
const ATTR_ZH = { classic:'經典', obscurity:'冷門', accessibility:'入耳' };
const ACE_ZH = { hall:'殿堂', pearl:'遺珠', heresy:'異端' };
// 相剋技能名
const COUNTER_SKILL = { classic:'大眾共鳴', obscurity:'品味突襲', accessibility:'降維打擊' };
// 相生技能名（key = 上一屬性 → chainNext）
const SYN_SKILL = { classic:'品味拓荒', obscurity:'閾值突破', accessibility:'前衛收編' };

// ===== 範例卡池（對戰 stats 1–5；王牌單軸 7）=====
const POOL = [
  ['Radiohead','Kid A',5,2,4], ['The Velvet Underground','White Light/White Heat',4,4,5],
  ['Slint','Spiderland',3,4,4], ['My Bloody Valentine','Loveless',5,3,4],
  ['Talk Talk','Laughing Stock',3,4,4], ['Can','Tago Mago',4,4,4],
  ['Aphex Twin','Selected Ambient Works 85–92',4,3,3], ['Boards of Canada','Music Has the Right to Children',3,3,3],
  ['Fishmans','Long Season',2,5,3], ['Duster','Stratosphere',2,5,3],
  ['Codeine','Frigid Stars',2,5,3], ['Bark Psychosis','Hex',2,5,4],
  ['Broadcast','Tender Buttons',2,4,3], ['Stereolab','Emperor Tomato Ketchup',3,3,2],
  ['Nick Drake','Pink Moon',4,3,2], ['Big Star','Third/Sister Lovers',3,4,3],
  ['Scott Walker','Tilt',3,4,5], ['Swans','Soundtracks for the Blind',3,4,5],
  ['Low','Things We Lost in the Fire',3,3,2], ['Grouper','Ruins',2,4,3],
  ['Cocteau Twins','Treasure',3,3,2], ['Pixies','Surfer Rosa',4,2,2],
  ['Pavement','Slanted and Enchanted',4,3,3], ['Sonic Youth','Daydream Nation',4,3,3],
  ['Taylor Swift','1989',2,1,1], ['Ed Sheeran','÷',1,1,1],
].map(([artist,album,c,o,a])=>({artist,album,classic:c,obscurity:o,accessibility:a,ace:null}));
const ACES = [
  {artist:'Radiohead',album:'OK Computer',classic:7,obscurity:1,accessibility:1,ace:'hall'},
  {artist:'Midori Takada',album:'Through the Looking Glass',classic:1,obscurity:7,accessibility:1,ace:'pearl'},
  {artist:'Merzbow',album:'Pulse Demon',classic:1,obscurity:1,accessibility:7,ace:'heresy'},
];

// ===== 工具 =====
const rnd = n => Math.floor(Math.random()*n);
const shuffle = a => { a=a.slice(); for(let i=a.length-1;i>0;i--){const j=rnd(i+1);[a[i],a[j]]=[a[j],a[i]];} return a; };
const sleep = ms => new Promise(r=>setTimeout(r,ms));
let uid=0;
function buildDeck(){
  const regs = shuffle(POOL).slice(0,CFG.deckSize-1);
  const ace = ACES[rnd(ACES.length)];
  return shuffle([...regs,ace].map(c=>({...c,uid:++uid})));
}
function chainBonus(len){ return len>=3?CFG.chain3Bonus : len===2?CFG.chain2Bonus : 0; }

// ===== 遊戲狀態 =====
let G;
function newGame(){
  G = {
    p:{ hp:CFG.startHp, deck:buildDeck(), hand:[], last:null, chain:0, fatigue:0 },
    e:{ hp:CFG.startHp, deck:buildDeck(), hand:[], last:null, chain:0, fatigue:0 },
    busy:false, over:false, sel:null, logs:[],
  };
  for(let i=0;i<CFG.startHand;i++){ drawCard(G.p); drawCard(G.e); }
  pushLog('對局開始。先把對手品味聲望扣到 0。', 'me');
  render(); document.getElementById('overlay').classList.remove('show');
}
function drawCard(side){
  if(side.deck.length===0){ // 疲勞
    side.fatigue += 1;
    const dmg = CFG.fatigueStart + (side.fatigue-1)*CFG.fatigueStep;
    side.hp -= dmg;
    pushLog(`${side===G.p?'你':'電腦'} 牌庫見底 → 疲勞 -${dmg}`, 'hit');
    return null;
  }
  const c = side.deck.pop(); side.hand.push(c); return c;
}

// ===== 連段計算 =====
function computeChain(side, attr){
  if(side.last!==null && CFG.chainNext[side.last]===attr) side.chain += 1;
  else side.chain = 1;
  return { len:side.chain, bonus:chainBonus(side.chain) };
}

// ===== AI：普通難度（追自己連段 + 偏好高數值，含隨機）=====
function aiMove(){
  const hand = G.e.hand; let best=null;
  for(const card of hand){
    for(const attr of ATTRS){
      let s = card[attr];
      if(G.e.last!==null && CFG.chainNext[G.e.last]===attr) s += (G.e.chain>=2?5:2);
      if(card.ace==='hall') s += 1.5;          // 壓制價值
      s += Math.random()*1.6;
      if(!best || s>best.s) best={card,attr,s};
    }
  }
  return best;
}

// ===== 核心結算 =====
function resolve(pCard,pAttr,pBonus, eCard,eAttr,eBonus){
  let pF = pCard[pAttr]+pBonus, eF = eCard[eAttr]+eBonus;
  // 殿堂【眾望所歸】：對手最終 -2
  if(eCard.ace==='hall') pF = Math.max(0, pF-CFG.ace.hall.suppress);
  if(pCard.ace==='hall') eF = Math.max(0, eF-CFG.ace.hall.suppress);

  const pCounters = CFG.beats[pAttr]===eAttr;
  const eCounters = CFG.beats[eAttr]===pAttr;

  // 相剋（被剋方為王牌 → 霸權，取消破防，落入純數值比較）
  if(pCounters && !eCard.ace){
    const bonus = pCard.ace==='pearl'?CFG.ace.pearl.breakBonus:CFG.breakBonus;
    return { dmgTo:'e', dmg:Math.max(CFG.minCounterDamage,(pF+bonus)-eF), kind:'counter', by:'p', attr:pAttr, pF, eF };
  }
  if(eCounters && !pCard.ace){
    const bonus = eCard.ace==='pearl'?CFG.ace.pearl.breakBonus:CFG.breakBonus;
    return { dmgTo:'p', dmg:Math.max(CFG.minCounterDamage,(eF+bonus)-pF), kind:'counter', by:'e', attr:eAttr, pF, eF };
  }
  // 純數值（含霸權抵消、同屬性、無相剋）
  if(pF>eF) return { dmgTo:'e', dmg:pF-eF, kind:'value', pF, eF, hege:(pCounters||eCounters) };
  if(eF>pF) return { dmgTo:'p', dmg:eF-pF, kind:'value', pF, eF, hege:(pCounters||eCounters) };
  return { dmgTo:null, dmg:0, kind:'tie', pF, eF };
}

// ===== 出牌流程 =====
async function play(pCard, pAttr){
  if(G.busy||G.over) return;
  G.busy=true; G.sel=null;
  const ai = aiMove();
  const eCard=ai.card, eAttr=ai.attr;
  // 從手牌移除
  G.p.hand = G.p.hand.filter(c=>c.uid!==pCard.uid);
  G.e.hand = G.e.hand.filter(c=>c.uid!==eCard.uid);

  renderHandLocked();
  // 揭示
  document.getElementById('pSlot').innerHTML = cardHTML(pCard, pAttr, true);
  document.getElementById('pSlot').classList.add('filled');
  await sleep(280);
  document.getElementById('eSlot').innerHTML = cardHTML(eCard, eAttr, true);
  document.getElementById('eSlot').classList.add('filled');
  setMeta();
  await sleep(520);

  // 階段一前：異端【終極解構】先斷對手連鎖
  let pBreak=false, eBreak=false;
  if(pCard.ace==='heresy'){ G.e.chain=0; G.e.last=null; eBreak=true; callout(`<div class="skill cnt">異端【終極解構】</div><div class="sub">你斷掉了電腦的相生連鎖</div>`); await sleep(700); }
  if(eCard.ace==='heresy'){ G.p.chain=0; G.p.last=null; pBreak=true; callout(`<div class="skill cnt">異端【終極解構】</div><div class="sub">電腦斷掉了你的相生連鎖</div>`); await sleep(700); }

  // 階段一：相生
  const pc = computeChain(G.p, pAttr); if(pBreak){ pc.bonus=0; pc.len=0; G.p.chain=0; }
  const ec = computeChain(G.e, eAttr); if(eBreak){ ec.bonus=0; ec.len=0; G.e.chain=0; }
  const synMsgs=[];
  if(pc.bonus>0){ synMsgs.push(`<div class="skill syn">你 · ${SYN_SKILL[G.p.last]} ×${pc.len}連</div><div class="sub">宣告數值 +${pc.bonus}</div>`); }
  if(ec.bonus>0){ synMsgs.push(`<div class="skill syn">電腦 · ${SYN_SKILL[G.e.last]} ×${ec.len}連</div><div class="sub">宣告數值 +${ec.bonus}</div>`); }
  if(synMsgs.length){ callout(synMsgs.join('<hr style="border:none;border-top:1px solid #eee;width:60%;margin:4px 0">')); await sleep(820); }

  // 階段二：相剋 / 數值
  const r = resolve(pCard,pAttr,pc.bonus, eCard,eAttr,ec.bonus);
  let head='';
  if(r.kind==='counter'){
    const skill = COUNTER_SKILL[r.attr];
    const pearl = (r.by==='p'?pCard:eCard).ace==='pearl';
    head = `<div class="skill cnt">${r.by==='p'?'你':'電腦'} · ${skill}${pearl?'＋私盤特攻':''}</div><div class="sub">破防 +${pearl?CFG.ace.pearl.breakBonus:CFG.breakBonus} ｜ 面板 ${r.pF} vs ${r.eF}</div>`;
  } else if(r.kind==='tie'){
    head = `<div class="skill">平手</div><div class="sub">面板 ${r.pF} = ${r.eF}，無傷害</div>`;
  } else {
    head = `<div class="skill">${r.hege?'霸權抵消 · ':''}數值對拼</div><div class="sub">面板 ${r.pF} vs ${r.eF}</div>`;
  }
  callout(head + (r.dmg>0?`<div class="dmgnum">-${r.dmg}</div>`:''));

  // 套用傷害
  if(r.dmgTo==='e'){ G.e.hp-=r.dmg; flashHp('e'); pushLog(logLine(pCard,pAttr,eCard,eAttr,r), r.dmg>0?'hit':''); }
  else if(r.dmgTo==='p'){ G.p.hp-=r.dmg; flashHp('p'); pushLog(logLine(pCard,pAttr,eCard,eAttr,r), r.dmg>0?'hit':''); }
  else pushLog(logLine(pCard,pAttr,eCard,eAttr,r), '');
  renderHp();
  await sleep(900);

  // 更新連段記憶
  G.p.last = pBreak?null:pAttr; if(pBreak) G.p.chain=0;
  G.e.last = eBreak?null:eAttr; if(eBreak) G.e.chain=0;

  // 勝負
  if(G.p.hp<=0||G.e.hp<=0){ return endGame(); }

  // 抽牌 + 棄牌上限
  drawCard(G.p); drawCard(G.e);
  while(G.p.hand.length>CFG.handLimit) G.p.hand.shift();
  while(G.e.hand.length>CFG.handLimit) G.e.hand.shift();
  if(G.p.hp<=0||G.e.hp<=0){ return endGame(); }

  // 清場
  document.getElementById('pSlot').className='slot'; document.getElementById('pSlot').innerHTML='';
  document.getElementById('eSlot').className='slot'; document.getElementById('eSlot').innerHTML='';
  document.getElementById('callout').innerHTML='';
  G.busy=false;
  render();
}

function logLine(pCard,pAttr,eCard,eAttr,r){
  const p=`你 ${pCard.album.slice(0,14)}[${ATTR_ZH[pAttr]}]`;
  const e=`電腦 ${eCard.album.slice(0,14)}[${ATTR_ZH[eAttr]}]`;
  if(r.kind==='tie') return `${p} ╳ ${e} → 平手`;
  const tgt = r.dmgTo==='e'?'電腦':'你';
  return `${p} ╳ ${e} → ${tgt} -${r.dmg}`;
}

// ===== 渲染 =====
function statRow(card, attr, active){
  const v=card[attr]; const max = card.ace?7:5;
  let bars=''; for(let i=0;i<max;i++) bars+=`<i class="${i<v?'on':''}"></i>`;
  return `<div class="stat ${active?'act':''}"><span class="k">${ATTR_ZH[attr]}</span><span class="bars">${bars}</span></div>`;
}
function cardHTML(card, attr, big){
  const ace = card.ace?` ace-border ace-${card.ace}`:'';
  const tag = card.ace?`<span class="ace-tag ace-${card.ace}">${ACE_ZH[card.ace]}</span>`:'';
  return `<div class="pcard${ace}">${tag}<div class="alb">${card.album}</div><div class="art">${card.artist}</div>
    <div class="stats">${ATTRS.map(a=>statRow(card,a,a===attr)).join('')}</div></div>`;
}
function render(){ renderHp(); renderHand(); renderEnemyHand(); setMeta(); renderLog(); setHint(); }
function renderHp(){
  document.getElementById('pHpfill').style.width = Math.max(0,G.p.hp)/CFG.startHp*100+'%';
  document.getElementById('eHpfill').style.width = Math.max(0,G.e.hp)/CFG.startHp*100+'%';
  document.getElementById('pHptxt').textContent = Math.max(0,G.p.hp)+' / '+CFG.startHp;
  document.getElementById('eHptxt').textContent = Math.max(0,G.e.hp)+' / '+CFG.startHp;
}
function flashHp(side){ const el=document.getElementById(side==='p'?'pHpbar':'eHpbar'); el.classList.remove('dmg'); void el.offsetWidth; el.classList.add('dmg'); }
function renderEnemyHand(){ document.getElementById('eHand').innerHTML = G.e.hand.map(()=>`<div class="cardback"></div>`).join(''); }
function renderHand(){
  const el=document.getElementById('pHand');
  el.innerHTML = G.p.hand.map(c=>{
    const ace = c.ace?` ace-border ace-${c.ace}`:'';
    const tag = c.ace?`<span class="ace-tag ace-${c.ace}" style="margin-bottom:4px">${ACE_ZH[c.ace]}</span>`:'';
    const sel = G.sel&&G.sel.uid===c.uid;
    const attrs = sel?`<div class="attrbtns">${ATTRS.map(a=>`<button class="attrbtn" data-uid="${c.uid}" data-attr="${a}">${ATTR_ZH[a]}<b>${c[a]}</b></button>`).join('')}</div>`:'';
    return `<div class="handcard${ace}${sel?' sel':''}" data-uid="${c.uid}">${tag}<div class="alb">${c.album}</div><div class="art">${c.artist}</div>
      <div class="stats" style="font-size:8px">${ATTRS.map(a=>statRow(c,a,sel&&false)).join('')}</div>${attrs}</div>`;
  }).join('');
  el.querySelectorAll('.handcard').forEach(h=>h.addEventListener('click',e=>{
    if(e.target.closest('.attrbtn')) return;
    if(G.busy) return;
    const uid=+h.dataset.uid; G.sel = G.sel&&G.sel.uid===uid?null:G.p.hand.find(c=>c.uid===uid);
    renderHand(); setHint();
  }));
  el.querySelectorAll('.attrbtn').forEach(b=>b.addEventListener('click',()=>{
    if(G.busy) return;
    const c=G.p.hand.find(x=>x.uid===+b.dataset.uid);
    if(c) play(c, b.dataset.attr);
  }));
}
function renderHandLocked(){ G.sel=null; renderHand(); document.getElementById('hint').textContent='結算中…'; }
function setHint(){
  const h=document.getElementById('hint');
  if(G.sel) h.textContent=`${G.sel.album} — 選一個主打屬性發動`;
  else { const nx = G.p.last!==null?`（接 ${ATTR_ZH[CFG.chainNext[G.p.last]]} 可續連段）`:''; h.textContent='選一張卡，再點一個主打屬性出招 '+nx; }
}
function setMeta(){
  document.getElementById('eMeta').textContent=`牌庫 ${G.e.deck.length} · 手牌 ${G.e.hand.length}`;
  const chainTxt = G.p.last!==null && G.p.chain>=1 ? `${ATTR_ZH[G.p.last]}×${G.p.chain}` : '無';
  document.getElementById('pMeta').textContent=`牌庫 ${G.p.deck.length} · 連段 ${chainTxt}`;
}
function pushLog(t,cls){ G.logs.unshift({t,cls}); if(G.logs.length>30)G.logs.pop(); renderLog(); }
function renderLog(){ document.getElementById('log').innerHTML=G.logs.map(l=>`<div class="${l.cls}">${l.t}</div>`).join(''); }
function callout(html){ const c=document.getElementById('callout'); c.innerHTML=html; }

function endGame(){
  G.over=true; G.busy=false;
  const win = G.e.hp<=0 && G.p.hp>0 ? true : (G.p.hp<=0 && G.e.hp>0 ? false : (G.e.hp<=0));
  const ov=document.getElementById('overlay');
  document.getElementById('ovTitle').textContent = win?'品味勝出':'聲望歸零';
  document.getElementById('ovSub').textContent = win?'你的鄙視鏈贏了這一局。':'這次被電腦的品味壓制了。';
  renderHp();
  setTimeout(()=>ov.classList.add('show'), 700);
}

document.getElementById('restart').addEventListener('click', newGame);
document.getElementById('ovBtn').addEventListener('click', newGame);
newGame();
</script>
</body>
</html>
