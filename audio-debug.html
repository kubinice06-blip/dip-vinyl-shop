<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>dip · 試聽診斷</title>
<style>
  :root{--bg:#111;--fg:#eee;--dim:#888;--ok:#4ade80;--bad:#f87171;--warn:#fbbf24;--line:#333}
  *{box-sizing:border-box}
  body{margin:0;padding:14px;background:var(--bg);color:var(--fg);font:13px/1.6 -apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif}
  h1{font-size:15px;margin:0 0 4px}
  .sub{color:var(--dim);font-size:11px;margin-bottom:12px}
  button{display:block;width:100%;padding:15px;margin:0 0 9px;font-size:15px;font-weight:700;
    background:#1e40af;color:#fff;border:0;border-radius:9px;-webkit-appearance:none}
  button.alt{background:#374151}
  button:disabled{opacity:.4}
  #log{margin-top:12px;border-top:1px solid var(--line);padding-top:10px;
    font:11px/1.55 ui-monospace,Menlo,monospace;white-space:pre-wrap;word-break:break-all}
  .row{padding:2px 0;border-bottom:1px solid #1c1c1c}
  .t{color:#60a5fa}.ok{color:var(--ok)}.bad{color:var(--bad)}.warn{color:var(--warn)}.dim{color:var(--dim)}
  .verdict{margin-top:12px;padding:11px;border-radius:9px;background:#1c1c1c;font-size:12px;line-height:1.7}
</style>
</head>
<body>
<h1>dip 試聽診斷</h1>
<div class="sub">請用 iPhone 開啟。依序按 ⓪ → ① → ② → ③ → ④，每個都等它跑完再按下一個，並記住<b>每一次自己有沒有聽到聲音</b>。全部跑完把整頁截圖給我。</div>

<button id="b0" class="alt">⓪ 先點一下（模擬進大廳／選對手那次觸碰）</button>
<button id="b1">① 第一次播放（模擬第一次點開簡介）</button>
<button id="b2" class="alt" disabled>② 再播一次（模擬關掉重開）</button>
<button id="b3" class="alt" disabled>③ 對照 A：手勢當下立刻播（已解碼）</button>
<button id="b4" class="alt" disabled>④ 對照 B：同一份音，但刻意等 3 秒才播</button>

<div id="verdict" class="verdict dim">尚未執行。</div>
<div id="log"></div>

<script>
(() => {
  const MAP_URL = 'data/apple-audio-runtime-v1.json';
  const BASE_GAIN = 0.5, FADE_MS = 1500;
  const logEl = document.getElementById('log'), verdictEl = document.getElementById('verdict');
  let t0 = 0;
  const now = () => (t0 ? Math.round(performance.now() - t0) : 0);

  function log(msg, cls) {
    const d = document.createElement('div');
    d.className = 'row';
    d.innerHTML = `<span class="t">${String(now()).padStart(5)}ms</span> <span class="${cls || ''}">${msg}</span>`;
    logEl.appendChild(d);
  }
  function verdict(html, cls) { verdictEl.className = 'verdict ' + (cls || ''); verdictEl.innerHTML = html; }

  // ── 與 dip-player.js 相同形狀的最小重現 ──────────────────────────────
  let ctx = null, gain = null, analyser = null, keepAlive = null, silentUrl = '';
  let decodedBuffer = null, previewUrl = '';

  function silentWav() {
    if (silentUrl) return silentUrl;
    const n = 2000, b = new Uint8Array(44 + n), v = new DataView(b.buffer);
    const w = (o, s) => { for (let i = 0; i < s.length; i++) b[o + i] = s.charCodeAt(i); };
    w(0, 'RIFF'); v.setUint32(4, 36 + n, true); w(8, 'WAVE'); w(12, 'fmt ');
    v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
    v.setUint32(24, 8000, true); v.setUint32(28, 8000, true); v.setUint16(32, 1, true); v.setUint16(34, 8, true);
    w(36, 'data'); v.setUint32(40, n, true); b.fill(128, 44);
    silentUrl = URL.createObjectURL(new Blob([b], { type: 'audio/wav' }));
    return silentUrl;
  }

  // 必須在手勢內同步呼叫（和正式版的 unlock() 同樣時機）
  function unlockInGesture() {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) { log('這個瀏覽器沒有 AudioContext', 'bad'); return false; }
    if (!ctx) {
      ctx = new Ctx();
      gain = ctx.createGain(); gain.gain.value = 0;
      analyser = ctx.createAnalyser(); analyser.fftSize = 2048;
      gain.connect(analyser); analyser.connect(ctx.destination);
      log(`建立 AudioContext：state=<b>${ctx.state}</b> sampleRate=${ctx.sampleRate}`, 'dim');
    }
    if (ctx.state !== 'running') ctx.resume && ctx.resume().catch(() => {});
    // 靜音 1-sample buffer（正式版用來真正解鎖 Web Audio 輸出）
    try {
      const s = ctx.createBufferSource();
      s.buffer = ctx.createBuffer(1, 1, ctx.sampleRate || 44100);
      s.connect(gain); s.start(0);
      log('已送出靜音 1-sample buffer（解鎖 Web Audio）', 'dim');
    } catch (e) { log('靜音 buffer 失敗：' + e.message, 'bad'); }
    // 靜音 keep-alive <audio>
    if (!keepAlive) {
      keepAlive = document.createElement('audio');
      keepAlive.setAttribute('playsinline', ''); keepAlive.preload = 'auto';
      keepAlive.style.cssText = 'position:fixed;left:-9999px;width:1px;height:1px';
      document.body.appendChild(keepAlive);
    }
    if (keepAlive.paused) {
      keepAlive.loop = true; keepAlive.src = silentWav(); keepAlive.currentTime = 0;
      const p = keepAlive.play();
      if (p && p.then) p.then(
        () => log('keep-alive &lt;audio&gt;.play() <b>成功</b>', 'ok'),
        (e) => log(`keep-alive &lt;audio&gt;.play() <b>被拒絕</b>：${e.name}`, 'bad'));
    }
    return true;
  }

  async function pickPreviewUrl() {
    if (previewUrl) return previewUrl;
    const r = await fetch(MAP_URL, { cache: 'force-cache' });
    const d = await r.json();
    const keys = Object.keys(d.entries || {});
    const hit = d.entries[keys[Math.floor(Math.random() * keys.length)]];
    previewUrl = hit[2];
    log(`選到音源（storefront=${hit[0]}）：${previewUrl.slice(0, 62)}…`, 'dim');
    return previewUrl;
  }

  // 量測「圖形實際有沒有產生訊號」——這是關鍵：
  // 有訊號卻聽不到 = iOS 輸出/session 問題；沒訊號 = 圖形或 buffer 問題。
  function measureOutput(ms) {
    return new Promise(resolve => {
      const buf = new Float32Array(analyser.fftSize);
      let peak = 0, samples = 0;
      const iv = setInterval(() => {
        if (analyser.getFloatTimeDomainData) analyser.getFloatTimeDomainData(buf);
        for (let i = 0; i < buf.length; i++) { const a = Math.abs(buf[i]); if (a > peak) peak = a; }
        samples++;
      }, 100);
      setTimeout(() => { clearInterval(iv); resolve({ peak, samples }); }, ms);
    });
  }

  function bufferPeak(b) {
    let peak = 0;
    const ch = b.getChannelData(0);
    const step = Math.max(1, Math.floor(ch.length / 20000));
    for (let i = 0; i < ch.length; i += step) { const a = Math.abs(ch[i]); if (a > peak) peak = a; }
    return peak;
  }

  function fade(to, ms) {
    const n = ctx.currentTime, g = gain.gain;
    const from = g.value;
    g.cancelScheduledValues(n); g.setValueAtTime(from, n);
    g.linearRampToValueAtTime(to, n + ms / 1000);
  }

  async function startAndMeasure(label) {
    log(`起播前：ctx.state=<b>${ctx.state}</b> currentTime=${ctx.currentTime.toFixed(3)}`, ctx.state === 'running' ? 'dim' : 'bad');
    if (ctx.state !== 'running') { await (ctx.resume ? ctx.resume() : null); log(`resume 後：state=<b>${ctx.state}</b>`, ctx.state === 'running' ? 'ok' : 'bad'); }

    const ctBefore = ctx.currentTime;
    const src = ctx.createBufferSource();
    src.buffer = decodedBuffer; src.connect(gain);
    let ended = false; src.onended = () => { ended = true; };

    gain.gain.cancelScheduledValues(ctx.currentTime);
    gain.gain.setValueAtTime(0, ctx.currentTime);
    src.start(0);
    fade(BASE_GAIN, FADE_MS);
    log(`已呼叫 source.start(0)（${label}）`, 'dim');

    const out = await measureOutput(2500);
    const ctAfter = ctx.currentTime;
    const advanced = ctAfter - ctBefore;

    log(`ctx 時鐘前進：<b>${advanced.toFixed(2)}s</b>（應該約 2.5s）`, advanced > 2 ? 'ok' : 'bad');
    log(`gain 現值：<b>${gain.gain.value.toFixed(3)}</b>（應該約 0.5）`, gain.gain.value > 0.4 ? 'ok' : 'bad');
    log(`圖形實際輸出峰值：<b>${out.peak.toFixed(4)}</b>（${out.samples} 次取樣）`, out.peak > 0.001 ? 'ok' : 'bad');
    log(`keep-alive &lt;audio&gt; paused=${keepAlive ? keepAlive.paused : 'n/a'}`, 'dim');

    try { src.stop(0); } catch (e) {}
    return { advanced, peak: out.peak, gain: gain.gain.value, ended };
  }

  async function run(which) {
    t0 = performance.now();
    verdict('執行中…', 'dim');
    const title = which === 'first' ? '① 第一次播放' : which === 'cached' ? '② 再播一次（快取路徑）'
      : which === 'delayed' ? '④ 已快取但等 3 秒才播' : '③ 手勢當下立刻播';
    log(`───── ${title} ─────`, 'warn');
    if (!ctx) log(`UA：${navigator.userAgent}`, 'dim');
    unlockInGesture();

    if (which === 'first' || !decodedBuffer) {
      const url = await pickPreviewUrl();
      const tf = performance.now();
      let bytes = null;
      try {
        const res = await fetch(url, { mode: 'cors', cache: 'force-cache' });
        log(`音檔 fetch：status=${res.status} ok=${res.ok}（${Math.round(performance.now() - tf)}ms）`, res.ok ? 'ok' : 'bad');
        if (!res.ok) { verdict('❌ 音檔下載失敗，問題在網路層，與 iOS 音訊無關。', 'bad'); return; }
        bytes = await res.arrayBuffer();
        log(`音檔位元組：${bytes.byteLength}`, 'dim');
      } catch (e) {
        log(`音檔 fetch <b>丟出例外</b>：${e.name} ${e.message}`, 'bad');
        verdict('❌ 音檔下載被擋（很可能是 CORS）。這就是第一次沒聲音的原因，跟 audio session 無關。', 'bad');
        return;
      }
      const td = performance.now();
      try {
        decodedBuffer = await new Promise((res, rej) => {
          const r = ctx.decodeAudioData(bytes, res, rej);
          if (r && r.then) r.then(res, rej);
        });
      } catch (e) {
        log(`decodeAudioData <b>失敗</b>：${e && e.message}`, 'bad');
        verdict('❌ 解碼失敗。第一次沒聲音是解碼問題，不是 session 問題。', 'bad');
        return;
      }
      log(`解碼成功（${Math.round(performance.now() - td)}ms）：長度 ${decodedBuffer.duration.toFixed(2)}s，`
        + `${decodedBuffer.numberOfChannels}ch @${decodedBuffer.sampleRate}Hz`, 'ok');
      const bp = bufferPeak(decodedBuffer);
      log(`解碼後音訊峰值：<b>${bp.toFixed(4)}</b>（0 = 解出來是無聲的）`, bp > 0.01 ? 'ok' : 'bad');
      if (bp <= 0.01) { verdict('❌ 解碼出來的音訊本身就是無聲的。問題在音檔／解碼，不在播放。', 'bad'); return; }
    } else {
      log('沿用上一次已解碼的 buffer（模擬第二次開啟的快取路徑）', 'dim');
    }

    let label = which === 'immediate' ? '手勢當下立刻播' : '等下載解碼之後才播';
    if (which === 'delayed') {
      log('刻意空等 3 秒（不做任何事）後才起播…', 'warn');
      await new Promise(r => setTimeout(r, 3000));
      label = '離手勢 3 秒後才播';
    }
    const r = await startAndMeasure(label);

    ['b2', 'b3', 'b4'].forEach(id => { document.getElementById(id).disabled = false; });

    if (r.peak > 0.001 && r.advanced > 2) {
      verdict('✅ <b>圖形確實有輸出訊號、時鐘也正常前進</b>。<br>'
        + '如果你這次<b>有</b>聽到聲音 → 這條路徑正常。<br>'
        + '如果你這次<b>沒</b>聽到聲音 → 訊號有產生但被 iOS 擋在輸出端（靜音鍵／音量／其他 App 佔用音訊），'
        + '屬於系統層路由問題，不是程式邏輯問題。', 'ok');
    } else if (r.advanced <= 2) {
      verdict('❌ <b>AudioContext 時鐘沒有前進</b> —— context 根本沒在算圖。'
        + '這就是第一次沒聲音的真正原因：起播時 context 並未真的 running。', 'bad');
    } else {
      verdict('❌ <b>圖形沒有產生任何訊號</b>（時鐘正常但峰值為 0）。'
        + 'buffer 有聲音、gain 有拉起來卻量不到輸出 → 問題在 source/gain 的連接或起播時機。', 'bad');
    }
  }

  // ⓪ 只解鎖、不播——讓 AudioContext 在「更早的另一次觸碰」建立，和正式版一致
  document.getElementById('b0').addEventListener('click', () => {
    t0 = performance.now(); logEl.innerHTML = '';
    log('───── ⓪ 解鎖 ─────', 'warn');
    log(`UA：${navigator.userAgent}`, 'dim');
    unlockInGesture();
    log('解鎖完成。現在按 ①。', 'warn');
    verdict('已解鎖，AudioContext 在這一次觸碰建立（與正式版相同）。接著按 ①。', 'dim');
    document.getElementById('b1').disabled = false;
  });
  document.getElementById('b1').addEventListener('click', () => { decodedBuffer = null; previewUrl = ''; run('first'); });
  document.getElementById('b2').addEventListener('click', () => run('cached'));
  document.getElementById('b3').addEventListener('click', () => run('immediate'));
  document.getElementById('b4').addEventListener('click', () => run('delayed'));
})();
</script>
</body>
</html>
