  async function buildGpCanvas(result) {
    const W = 1080, H = 1920, PAD = 72, COVER_SIZE = 900;
    const COVER_X = (W - COVER_SIZE) / 2, COVER_Y = 260;
    const TEXT_Y = COVER_Y + COVER_SIZE + 60;
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, W, H);
    ctx.textBaseline = 'middle'; ctx.textAlign = 'center';
    ctx.fillStyle = '#111111'; ctx.font = '700 42px "Space Mono", monospace';
    ctx.fillText('類型挑片', W / 2, 90);
    ctx.fillStyle = '#999999'; ctx.font = '400 30px "Space Mono", monospace';
    ctx.fillText('挖出屬於你的那張', W / 2, 136);
    ctx.textAlign = 'left';
    ctx.strokeStyle = '#dddddd'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(PAD, 168); ctx.lineTo(W - PAD, 168); ctx.stroke();
    ctx.fillStyle = '#f0f0f0'; ctx.fillRect(COVER_X, COVER_Y, COVER_SIZE, COVER_SIZE);
    if (result._coverUrl) {
      try {
        const img = new Image(); img.crossOrigin = 'anonymous';
        await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = result._coverUrl; });
        ctx.save(); ctx.beginPath(); ctx.rect(COVER_X, COVER_Y, COVER_SIZE, COVER_SIZE); ctx.clip();
        const aspect = img.naturalWidth / img.naturalHeight;
        let dw = COVER_SIZE, dh = COVER_SIZE / aspect;
        if (dh < COVER_SIZE) { dh = COVER_SIZE; dw = COVER_SIZE * aspect; }
        ctx.drawImage(img, COVER_X + (COVER_SIZE - dw) / 2, COVER_Y + (COVER_SIZE - dh) / 2, dw, dh);
        ctx.restore();
      } catch(e) {
        ctx.font = '120px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillStyle = '#cccccc'; ctx.fillText('♪', W / 2, COVER_Y + COVER_SIZE / 2);
      }
    }
    ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
    let y = TEXT_Y;
    ctx.fillStyle = '#888888'; ctx.font = '400 38px "Space Mono", monospace';
    ctx.fillText(result.artist || '', PAD, y); y += 60;
    let albumSz = 54; ctx.font = `700 ${albumSz}px "Space Mono", monospace`;
    while (ctx.measureText(result.album || '').width > W - PAD * 2 && albumSz > 32) { albumSz -= 2; ctx.font = `700 ${albumSz}px "Space Mono", monospace`; }
    const albumLH = albumSz + 16;
    const albumLines = wrapText(ctx, result.album || '', PAD, y + albumSz, W - PAD * 2, albumLH);
    y += albumLines * albumLH + 40;
    const reasonText = (result.reason || '').slice(0, 200);
    const BOX_PAD = 40, LH_R = 46;
    ctx.font = '400 30px "Space Mono", monospace';
    const boxH = measureLines(ctx, reasonText, W - PAD * 2 - BOX_PAD * 2) * LH_R + BOX_PAD * 2;
    ctx.strokeStyle = '#cccccc'; ctx.lineWidth = 2; ctx.strokeRect(PAD, y, W - PAD * 2, boxH);
    ctx.fillStyle = '#444444'; ctx.textBaseline = 'top';
    wrapText(ctx, reasonText, PAD + BOX_PAD, y + BOX_PAD, W - PAD * 2 - BOX_PAD * 2, LH_R);
    ctx.textBaseline = 'alphabetic'; y += boxH + 60;
    ctx.strokeStyle = '#dddddd'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(PAD, H - 100); ctx.lineTo(W - PAD, H - 100); ctx.stroke();
    ctx.fillStyle = '#555555'; ctx.font = '400 22px "Space Mono", monospace';
    ctx.textAlign = 'center'; ctx.fillText('dipvinyl.tw', W / 2, H - 52);
    return canvas;
  }

  const RARITY_COLOR = { hall: '#9aa0a8', pearl: '#7a5cc0', heresy: '#c41e3a', legendary: '#e0851c', epic: '#7a3fb0', uncommon: '#2faf4f', rare: '#3a7bd5', common: '#999999' };

  // 卡牌分享圖（比照 buildGpCanvas，加上稀有度與三維星星）
  async function buildCardCanvas(card, desc) {
    const W = 1080, H = 1920, PAD = 72, COVER_SIZE = 760;
    const COVER_X = (W - COVER_SIZE) / 2, COVER_Y = 250;
    const tier = card.rarity?.tier || 'common';
    const tColor = RARITY_COLOR[tier];
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    // 三張頂點卡的掃光漸層（與 CSS 變數一致）：殿堂銀 / 流亡油彩 / 異端血光
    const silverGrad = (x0, y0, x1, y1) => {
      const g = ctx.createLinearGradient(x0, y0, x1, y1);
      g.addColorStop(0, '#8a8e96'); g.addColorStop(0.25, '#c8ccd2'); g.addColorStop(0.5, '#ffffff');
      g.addColorStop(0.75, '#c8ccd2'); g.addColorStop(1, '#8a8e96');
      return g;
    };
    const oilGrad = (x0, y0, x1, y1) => {
      const g = ctx.createLinearGradient(x0, y0, x1, y1);
      g.addColorStop(0, '#3a2a5d'); g.addColorStop(0.28, '#2bb6a3'); g.addColorStop(0.5, '#c84ad6');
      g.addColorStop(0.72, '#2b6fd6'); g.addColorStop(1, '#3a2a5d');
      return g;
    };
    const crimsonGrad = (x0, y0, x1, y1) => {
      const g = ctx.createLinearGradient(x0, y0, x1, y1);
      g.addColorStop(0, '#7a1020'); g.addColorStop(0.5, '#ff3048'); g.addColorStop(1, '#7a1020');
      return g;
    };
    const specialGrad = tier === 'hall' ? silverGrad : tier === 'pearl' ? oilGrad : tier === 'heresy' ? crimsonGrad : null;
    const isSpecial = !!specialGrad;
    const specialDim = SPECIAL_TIERS[tier]?.dim || null; // 'classic'|'obscurity'|'accessibility'
    ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, W, H);
    ctx.textBaseline = 'middle'; ctx.textAlign = 'center';
    // 頭部：稀有度
    ctx.fillStyle = isSpecial ? specialGrad(W / 2 - 140, 64, W / 2 + 140, 120) : tColor;
    ctx.font = '700 50px "Space Mono", monospace';
    ctx.fillText(card.rarity?.label || '收藏', W / 2, 92);
    ctx.strokeStyle = '#dddddd'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(PAD, 176); ctx.lineTo(W - PAD, 176); ctx.stroke();
    // 封面
    ctx.fillStyle = '#f0f0f0'; ctx.fillRect(COVER_X, COVER_Y, COVER_SIZE, COVER_SIZE);
    if (card.coverUrl) {
      try {
        const img = new Image(); img.crossOrigin = 'anonymous';
        await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = card.coverUrl; });
        ctx.save(); ctx.beginPath(); ctx.rect(COVER_X, COVER_Y, COVER_SIZE, COVER_SIZE); ctx.clip();
        const aspect = img.naturalWidth / img.naturalHeight;
        let dw = COVER_SIZE, dh = COVER_SIZE / aspect;
        if (dh < COVER_SIZE) { dh = COVER_SIZE; dw = COVER_SIZE * aspect; }
        ctx.drawImage(img, COVER_X + (COVER_SIZE - dw) / 2, COVER_Y + (COVER_SIZE - dh) / 2, dw, dh);
        ctx.restore();
      } catch (e) {}
    }
    // 稀有度外框
    ctx.strokeStyle = isSpecial ? specialGrad(COVER_X, COVER_Y, COVER_X + COVER_SIZE, COVER_Y + COVER_SIZE) : tColor;
    ctx.lineWidth = (isSpecial || tier === 'legendary') ? 10 : tier === 'epic' ? 7 : tier === 'rare' ? 4 : 2;
    ctx.strokeRect(COVER_X, COVER_Y, COVER_SIZE, COVER_SIZE);

    // 藝人 / 專輯
    let y = COVER_Y + COVER_SIZE + 56;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#888888'; ctx.font = '400 32px "Space Mono", monospace';
    ctx.fillText(_fitText(ctx, card.artist || '', W - PAD * 2, '400 32px "Space Mono", monospace'), W / 2, y); y += 56;
    let albumSz = 50; ctx.font = `700 ${albumSz}px "Space Mono", monospace`;
    while (ctx.measureText(card.album || '').width > W - PAD * 2 && albumSz > 30) { albumSz -= 2; ctx.font = `700 ${albumSz}px "Space Mono", monospace`; }
    ctx.fillStyle = '#111111';
    ctx.fillText(_fitText(ctx, card.album || '', W - PAD * 2, `700 ${albumSz}px "Space Mono", monospace`), W / 2, y); y += 64;

    // 三維星星（左對齊：標籤固定欄寬、各列星星左緣對齊，整塊置中；殿堂經典 7 顆）
    const rows = [['冷門度', 'obscurity', card.ratings?.obscurity], ['經典度', 'classic', card.ratings?.classic], ['硬蕊度', 'accessibility', card.ratings?.accessibility]];
    ctx.font = '400 30px "Space Mono", monospace';
    const labelColW = Math.max(...rows.map(([lab]) => ctx.measureText(lab).width)) + 40;
    ctx.font = '400 36px "Space Mono", monospace';
    const blockX = (W - (labelColW + ctx.measureText('★★★★★★★').width)) / 2;
    const starsX = blockX + labelColW;
    ctx.textAlign = 'left';
    rows.forEach(([lab, dim, val]) => {
      const isSpecialRow = isSpecial && dim === specialDim;
      const total = isSpecialRow ? 7 : 5;
      const n = isSpecialRow ? 7 : Math.max(0, Math.min(5, Math.round(Number(val) || 0)));
      ctx.fillStyle = '#999999'; ctx.font = '400 30px "Space Mono", monospace'; ctx.fillText(lab, blockX, y);
      ctx.font = '400 36px "Space Mono", monospace';
      const filled = '★'.repeat(n);
      ctx.fillStyle = isSpecialRow ? specialGrad(starsX, y - 24, starsX + ctx.measureText('★'.repeat(total)).width, y + 24) : '#111111';
      ctx.fillText(filled, starsX, y);
      const fw = ctx.measureText(filled).width;
      ctx.fillStyle = '#cccccc'; ctx.fillText('★'.repeat(total - n), starsX + fw, y);
      y += 56;
    });
    y += 18;

    // 介紹框
    const reasonText = (desc || '').slice(0, 200);
    if (reasonText) {
      const BOX_PAD = 38, LH_R = 44;
      ctx.textAlign = 'left'; ctx.textBaseline = 'top';
      ctx.font = '400 29px "Space Mono", monospace';
      const boxH = measureLines(ctx, reasonText, W - PAD * 2 - BOX_PAD * 2) * LH_R + BOX_PAD * 2;
      ctx.strokeStyle = '#cccccc'; ctx.lineWidth = 2; ctx.strokeRect(PAD, y, W - PAD * 2, boxH);
      ctx.fillStyle = '#444444';
      wrapText(ctx, reasonText, PAD + BOX_PAD, y + BOX_PAD, W - PAD * 2 - BOX_PAD * 2, LH_R);
      ctx.textBaseline = 'middle';
    }

    ctx.strokeStyle = '#dddddd'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(PAD, H - 100); ctx.lineTo(W - PAD, H - 100); ctx.stroke();
    ctx.fillStyle = '#555555'; ctx.font = '400 22px "Space Mono", monospace';
    ctx.textAlign = 'center'; ctx.fillText('dipvinyl.tw', W / 2, H - 52);
    return canvas;
  }

  // 單行截斷到指定寬度，超過加省略號
  function _fitText(ctx, text, maxW, font) {
    ctx.font = font;
    if (ctx.measureText(text).width <= maxW) return text;
    let t = text;
    while (t.length > 1 && ctx.measureText(t + '…').width > maxW) t = t.slice(0, -1);
    return t + '…';
  }

  async function shareCard(cardId) {
    const card = _collCache.find(c => c.cardId === cardId);
    if (!card) return;
    const descEl = document.getElementById('cdDesc');
    let desc = descEl ? descEl.textContent.trim() : '';
    if (desc === '載入介紹…' || desc === '（暫無介紹）') desc = '';
    const btn = document.querySelector('[data-cd-share]');
    if (btn) { btn.disabled = true; btn.textContent = '製作圖片…'; }
    try {
      const canvas = await buildCardCanvas(card, desc);
      const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.9));
      const file = new File([blob], 'dip-card.jpg', { type: 'image/jpeg' });
      const shareUrlStr = 'https://dipvinyl.tw';
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: `${card.artist} — ${card.album}`, text: '我在 dip 唱片櫃抽到這張 →', url: shareUrlStr });
      } else {
        // 後備：下載圖片
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'dip-card.jpg'; a.click();
        showShareToast && showShareToast('已下載卡片圖');
      }
    } catch (e) {
      if (e?.name !== 'AbortError') { console.warn('[card] share failed', e); showShareToast && showShareToast('分享失敗'); }
    } finally {
      if (btn) { btn.disabled = false; btn.textContent = '✈ 分享卡片'; }
    }
  }

  // Hash-based routing — runs once on page load
  (function bootstrapView() {
    const hash = window.location.hash.slice(1);
    const path = window.location.pathname.replace(/^\//, '').replace(/\/$/, '');
    const target = hash || path;

    // 首頁 hub 卡片（網站與 App 共用）
    document.querySelectorAll('#homeHub .homehub-card').forEach((card) => {
      card.addEventListener('click', () => setActiveTab(card.dataset.go));
    });

    // 遊戲畫面「返回首頁」
    document.addEventListener('click', (e) => {
      if (e.target.closest('[data-hub-back]')) setActiveTab('home');
    });

    if (window.__APP_MODE__) {
      // App 模式：改頂欄標題、隱藏 Tawk 客服泡泡
      const logo = document.querySelector('.topbar-logo');
      if (logo) logo.textContent = 'dip 選歌';
      window.Tawk_API = window.Tawk_API || {};
      window.Tawk_API.onLoad = function () { try { window.Tawk_API.hideWidget(); } catch (e) {} };
      try { if (window.Tawk_API.hideWidget) window.Tawk_API.hideWidget(); } catch (e) {}
    }

    // 有效路由：直接導向，否則一律落在「今天聽什麼？」首頁
    const valid = window.__APP_MODE__
      ? ['home', 'quiz', 'genre', 'random', 'history', 'collection']
      : ['home', 'used', 'new', 'quiz', 'genre', 'random', 'history', 'archive', 'collection'];
    setActiveTab(valid.includes(target) ? target : 'home');
  })();

  // 註冊 service worker（離線後備 + 靜態快取；線上內容仍即時更新）
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    });
  }
</script>
