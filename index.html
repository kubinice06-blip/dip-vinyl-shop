<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>dip vinyl shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --black: #111; --gray: #888; --line: #ddd; --bg: #fff; --mono: 'Space Mono', monospace; }
    body { background: var(--bg); color: var(--black); font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em; }

    .topbar {
      border-bottom: 1px solid var(--line); padding: 0 20px; height: 40px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; background: #fff; z-index: 50;
    }
    .topbar-logo { font-size: 12px; font-weight: 700; letter-spacing: 0.12em; }
    .topbar-right { color: var(--gray); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; }

    .search-bar {
      border-bottom: 1px solid var(--line); padding: 0 20px; height: 36px;
      display: flex; align-items: center; gap: 10px;
    }
    .search-bar label { font-size: 10px; color: var(--gray); letter-spacing: 0.1em; text-transform: uppercase; white-space: nowrap; }
    .search-bar input { border: none; outline: none; font-family: var(--mono); font-size: 11px; color: var(--black); width: 100%; background: transparent; }
    .search-bar input::placeholder { color: var(--gray); }

    .main-tabs { border-bottom: 1px solid var(--line); display: flex; }
    .main-tab { background: none; border: none; border-bottom: 3px solid transparent; padding: 0 28px; height: 48px; font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gray); cursor: pointer; transition: all 0.15s; }
    .main-tab:hover { color: var(--black); }
    .main-tab.active { color: var(--black); border-bottom-color: var(--black); }
    .archive-card { border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); cursor: pointer; text-decoration: none; color: var(--black); display: block; }
    .archive-thumb { position: relative; aspect-ratio: 16/9; overflow: hidden; background: #f0f0f0; }
    .archive-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.35s; }
    .archive-card:hover .archive-thumb img { transform: scale(1.04); }
    .archive-play { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0); transition: background 0.2s; }
    .archive-card:hover .archive-play { background: rgba(0,0,0,0.35); }
    .archive-play svg { opacity: 0; transition: opacity 0.2s; }
    .archive-card:hover .archive-play svg { opacity: 1; }
    .genre-bar {
      border-bottom: 1px solid var(--line); padding: 0 20px; height: 36px;
      display: flex; align-items: center; overflow-x: auto; scrollbar-width: none; gap: 0;
    }
    .genre-bar::-webkit-scrollbar { display: none; }
    .genre-btn {
      background: none; border: none; border-right: 1px solid var(--line);
      padding: 0 16px; height: 36px; font-family: var(--mono);
      font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--gray); cursor: pointer; white-space: nowrap; flex-shrink: 0;
      transition: color 0.15s;
    }
    .genre-btn:first-child { padding-left: 0; }
    .genre-btn:hover { color: var(--black); }
    .genre-btn.active { color: var(--black); font-weight: 700; }
    .card-genre { font-size: 10px; color: var(--gray); margin-bottom: 6px; }

    .sort-select {
      background: none; border: none; border-left: 1px solid var(--line);
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--gray); cursor: pointer;
      padding: 0 16px; height: 28px; outline: none;
    }
    .sort-select:hover { color: var(--black); }

    .count-bar {
      border-bottom: 1px solid var(--line); padding: 0 20px; height: 28px;
      display: flex; align-items: center;
      color: var(--gray); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
    }

    .grid { display: grid; grid-template-columns: repeat(4, 1fr); }
    @media (max-width: 900px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 560px) { .grid { grid-template-columns: repeat(2, 1fr); } }

    .card { border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); cursor: pointer; }
    .card-img-wrap { position: relative; aspect-ratio: 1; overflow: hidden; background: #f0f0f0; }
    .card-img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.35s ease; }
    .card:hover .card-img { transform: scale(1.04); }
    .card-img-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 36px; color: #ccc; }
    .card-img-wrap::after {
      content: 'VIEW'; position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(17,17,17,0.82); color: #fff;
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; text-align: center; padding: 9px;
      transform: translateY(100%); transition: transform 0.2s ease;
    }
    .card:hover .card-img-wrap::after { transform: translateY(0); }

    .card-info { padding: 10px 12px 12px; border-top: 1px solid var(--line); }
    .card-name {
      font-size: 11px; font-weight: 700; line-height: 1.4; margin-bottom: 8px;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-bottom { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 4px; }
    .card-price { font-size: 11px; font-weight: 700; }
    .card-artist { font-size: 10px; color: var(--gray); margin-bottom: 4px; }
    .card-no-price { font-size: 10px; color: var(--gray); }
    .card-genre { font-size: 10px; color: var(--gray); margin-bottom: 6px; }

    .state-msg { grid-column: 1 / -1; padding: 80px 20px; text-align: center; color: var(--gray); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; }
    .spinner { width: 18px; height: 18px; border: 1px solid var(--line); border-top-color: var(--black); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .modal-bg { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.97); z-index: 200; overflow-y: auto; }
    .modal-bg.open { display: block; }
    .modal { max-width: 800px; margin: 0 auto; border-left: 1px solid var(--line); border-right: 1px solid var(--line); min-height: 100vh; }
    .modal-topbar {
      border-bottom: 1px solid var(--line); padding: 0 20px; height: 40px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; background: rgba(255,255,255,0.97);
    }
    .modal-topbar span { font-size: 10px; color: var(--gray); letter-spacing: 0.08em; text-transform: uppercase; }
    .modal-close-btn {
      background: none; border: 1px solid var(--line); font-family: var(--mono);
      font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 4px 12px; cursor: pointer; color: var(--black); transition: all 0.15s;
    }
    .modal-close-btn:hover { background: var(--black); color: #fff; border-color: var(--black); }
    .modal-body { display: grid; grid-template-columns: 1fr 1fr; }
    @media (max-width: 560px) { .modal-body { grid-template-columns: 1fr; } }
    .modal-img-wrap { aspect-ratio: 1; background: #f0f0f0; border-right: 1px solid var(--line); overflow: hidden; }
    .modal-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .carousel { position: relative; width: 100%; height: 100%; }
    .carousel-imgs { width: 100%; height: 100%; position: relative; overflow: hidden; }
    .carousel-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.3s; }
    .carousel-img.active { opacity: 1; }
    .carousel-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: #fff; border: none; font-size: 16px; width: 32px; height: 48px; cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center; }
    .carousel-btn.prev { left: 0; }
    .carousel-btn.next { right: 0; }
    .carousel-dots { position: absolute; bottom: 8px; left: 0; right: 0; display: flex; justify-content: center; gap: 6px; }
    .carousel-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.5); cursor: pointer; border: none; }
    .carousel-dot.active { background: #fff; }
    .modal-img-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 60px; color: #ccc; }
    .modal-detail { padding: 20px; display: flex; flex-direction: column; }
    .modal-price { font-size: 22px; font-weight: 700; padding-bottom: 16px; border-bottom: 1px solid var(--line); }
    .modal-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid var(--line); gap: 12px; }
    .modal-row-label { font-size: 10px; color: var(--gray); letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap; flex-shrink: 0; }
    .modal-row-value { font-size: 11px; font-weight: 700; text-align: right; line-height: 1.5; }
    .modal-note { margin-top: 20px; font-size: 10px; color: var(--gray); line-height: 1.9; }

    /* 音樂試聽 */
    .modal-music { border-top: 1px solid var(--line); padding: 16px 20px; }
    .modal-music-label { font-size: 10px; color: var(--gray); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
    .modal-music-label svg { flex-shrink: 0; }
    .modal-music-platforms { margin-left: auto; display: flex; gap: 6px; }
    .music-platform-btn { display: inline-flex; align-items: center; gap: 4px; font-family: var(--mono); font-size: 9px; letter-spacing: 0.05em; color: var(--gray); text-decoration: none; border: 1px solid var(--line); padding: 3px 8px; transition: all 0.15s; white-space: nowrap; }
    .music-platform-btn:hover { color: var(--black); border-color: var(--black); }
    .modal-music iframe { display: block; border: none; width: 100%; }
    .modal-music-search { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
    .music-search-btn { background: none; border: 1px solid var(--line); font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em; padding: 5px 12px; cursor: pointer; color: var(--gray); text-decoration: none; display: inline-block; transition: all 0.15s; }
    .music-search-btn:hover { border-color: var(--black); color: var(--black); }

    /* 購物車 */
    .cart-btn { position: fixed; bottom: 140px; right: 24px; background: var(--black); color: #fff; border: none; font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 0.1em; padding: 12px 18px; cursor: pointer; z-index: 150; display: flex; align-items: center; gap: 8px; transition: opacity 0.2s; }
    .cart-btn:hover { opacity: 0.8; }
    .cart-count { background: #fff; color: var(--black); font-size: 10px; font-weight: 700; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .cart-panel { position: fixed; inset: 0; z-index: 300; display: none; }
    .cart-panel.open { display: flex; }
    .cart-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); }
    .cart-drawer { position: absolute; right: 0; top: 0; bottom: 0; width: 420px; max-width: 100vw; background: #fff; display: flex; flex-direction: column; }
    @media (max-width: 560px) { .cart-drawer { width: 100vw; } }
    .cart-header { border-bottom: 1px solid var(--line); padding: 0 20px; height: 48px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .cart-header h2 { font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
    .cart-close { background: none; border: 1px solid var(--line); font-family: var(--mono); font-size: 10px; padding: 4px 12px; cursor: pointer; letter-spacing: 0.1em; text-transform: uppercase; }
    .cart-close:hover { background: var(--black); color: #fff; border-color: var(--black); }
    .cart-items { flex: 1; overflow-y: auto; }
    .cart-item { display: flex; gap: 12px; padding: 12px 20px; border-bottom: 1px solid var(--line); align-items: center; }
    .cart-item-img { width: 56px; height: 56px; object-fit: cover; background: var(--line); flex-shrink: 0; }
    .cart-item-info { flex: 1; min-width: 0; }
    .cart-item-name { font-size: 11px; font-weight: 700; line-height: 1.4; margin-bottom: 4px; }
    .cart-item-price { font-size: 11px; color: var(--gray); }
    .cart-item-remove { background: none; border: none; color: var(--gray); font-size: 16px; cursor: pointer; flex-shrink: 0; }
    .cart-item-remove:hover { color: var(--black); }
    .cart-empty { padding: 60px 20px; text-align: center; color: var(--gray); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; }
    .cart-footer { border-top: 1px solid var(--line); padding: 16px 20px; flex-shrink: 0; }
    .cart-total { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
    .cart-total-label { font-size: 10px; color: var(--gray); letter-spacing: 0.08em; text-transform: uppercase; }
    .cart-total-price { font-size: 18px; font-weight: 700; }
    .btn-checkout { width: 100%; background: var(--black); color: #fff; border: none; font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; padding: 14px; cursor: pointer; transition: opacity 0.2s; }
    .btn-checkout:hover { opacity: 0.8; }
    .btn-checkout:disabled { opacity: 0.35; cursor: not-allowed; }

    /* 結帳 modal */
    .checkout-modal { position: fixed; inset: 0; z-index: 400; display: none; align-items: center; justify-content: center; padding: 20px; background: rgba(0,0,0,0.7); }
    .checkout-modal.open { display: flex; }
    .checkout-box { background: #fff; width: 100%; max-width: 480px; }
    .checkout-box-header { border-bottom: 1px solid var(--line); padding: 0 20px; height: 48px; display: flex; align-items: center; justify-content: space-between; }
    .checkout-box-header h2 { font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
    .checkout-box-body { padding: 20px; }
    .checkout-field { margin-bottom: 12px; }
    .checkout-field label { display: block; font-size: 10px; color: var(--gray); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
    .checkout-field input, .checkout-field textarea { width: 100%; border: 1px solid var(--line); padding: 9px 10px; font-family: var(--mono); font-size: 11px; outline: none; }
    .checkout-field input:focus, .checkout-field textarea:focus { border-color: var(--black); }
    .checkout-summary { background: var(--bg); padding: 12px; margin-bottom: 16px; font-size: 10px; line-height: 2; border: 1px solid var(--line); max-height: 160px; overflow-y: auto; }
    .checkout-success { padding: 40px 20px; text-align: center; display: none; }
    .checkout-success h3 { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
    .checkout-success p { font-size: 11px; color: var(--gray); line-height: 1.8; }

    /* NEW 標籤 */
    .card-new-badge {
      position: absolute; bottom: 0; right: 0;
      background: #e8383d; color: #fff;
      font-family: var(--mono); font-size: 9px; font-weight: 700;
      letter-spacing: 0.1em; padding: 3px 7px;
      text-transform: uppercase; line-height: 1;
    }

    /* 首版 + pressing 標籤 */
    .card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; }
    .card-tag-item { font-family: var(--mono); font-size: 9px; letter-spacing: 0.08em; border: 1px solid var(--black); padding: 1px 5px; text-transform: uppercase; }
    .card-tag-first { background: var(--black); color: #fff; }

    footer { border-top: 1px solid var(--line); padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
    footer .f-logo { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; }
    footer p { font-size: 10px; color: var(--gray); }
  </style>
</head>
<body>

<header class="topbar">
  <div class="topbar-logo">dip vinyl shop</div>
  <div class="topbar-right" style="display:flex;align-items:center;gap:16px;">
    <a href="https://www.instagram.com/dip.vinyl/" target="_blank" style="color:var(--black);display:flex;align-items:center;" title="Instagram">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
      </svg>
    </a>
    <span style="font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--gray);">黑膠唱片</span>
  </div>
</header>

<div class="main-tabs" id="mainTabs">
  <button class="main-tab active" data-tab="used">Used</button>
  <button class="main-tab" data-tab="new">New</button>
  <button class="main-tab" data-tab="archive">Digital Archive</button>
</div>
<div class="search-bar">
  <label>Search —</label>
  <input type="text" id="searchInput" placeholder="唱片名稱…">
</div>

<div id="filterSection"><div class="genre-bar" id="genreBar">
  <button class="genre-btn active" data-genre="all">All</button>
</div>

</div><div class="count-bar">
  <span id="countLabel">Loading…</span>
  <select class="sort-select" id="sortSelect">
    <option value="date-desc">上架日期新→舊</option>
    <option value="date-asc">上架日期舊→新</option>
    <option value="price-desc">價格高→低</option>
    <option value="price-asc">價格低→高</option>
    <option value="default">預設</option>
  </select>
</div>

<main class="grid" id="grid">
  <div class="state-msg"><div class="spinner"></div>Loading</div>
</main>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-topbar">
      <span>Vinyl Shop — Detail</span>
      <button class="modal-close-btn" id="modalCloseBtn">✕ Close</button>
    </div>
    <div class="modal-body">
      <div class="modal-img-wrap" id="modalImg"></div>
      <div class="modal-detail" id="modalDetail"></div>
    </div>
    <div id="modalMusic"></div>
  </div>
</div>

<!-- 購物車按鈕 -->
<button class="cart-btn" id="cartBtn" style="display:none;">
  <span>CART</span>
  <span class="cart-count" id="cartCount">0</span>
</button>

<!-- 購物車側欄 -->
<div class="cart-panel" id="cartPanel">
  <div class="cart-overlay" id="cartOverlay"></div>
  <div class="cart-drawer">
    <div class="cart-header">
      <h2>Cart</h2>
      <button class="cart-close" id="cartClose">✕ Close</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer">
      <div class="cart-total">
        <span class="cart-total-label">Total</span>
        <span class="cart-total-price" id="cartTotal">NT$ 0</span>
      </div>
      <button class="btn-checkout" id="btnCheckout">結帳 Checkout</button>
    </div>
  </div>
</div>

<!-- 結帳 modal -->
<div class="checkout-modal" id="checkoutModal">
  <div class="checkout-box">
    <div class="checkout-box-header">
      <h2>Checkout</h2>
      <button class="cart-close" id="checkoutClose">✕</button>
    </div>
    <div class="checkout-box-body" id="checkoutBody">
      <div class="checkout-summary" id="checkoutSummary"></div>
      <div class="checkout-field">
        <label>姓名 Name *</label>
        <input type="text" id="buyerName" placeholder="Your name">
      </div>
      <div class="checkout-field">
        <label>Email *</label>
        <input type="email" id="buyerEmail" placeholder="your@email.com">
      </div>
      <div class="checkout-field">
        <label>電話 Phone</label>
        <input type="text" id="buyerPhone" placeholder="0912-345-678">
      </div>
      <div class="checkout-field">
        <label>備註 Note</label>
        <textarea id="buyerNote" rows="2" placeholder="任何備註…"></textarea>
      </div>
      <button class="btn-checkout" id="btnSubmitOrder">送出訂單</button>
      <div class="msg" id="orderMsg" style="margin-top:10px;"></div>
    </div>
    <div class="checkout-success" id="checkoutSuccess">
      <h3>✓ 訂單已送出！</h3>
      <p>我們會盡快與你聯繫確認訂單。<br>We will contact you shortly.</p>
    </div>
  </div>
</div>

<footer>
  <div class="f-logo">dip vinyl shop</div>
  <p>© 2026</p>
</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyBpR5XKKHwT_eQoShtBPtFNRXz4ymzPWQg",
    authDomain: "price-manager-e8846.firebaseapp.com",
    projectId: "price-manager-e8846",
    storageBucket: "price-manager-e8846.firebasestorage.app",
    messagingSenderId: "570133498387",
    appId: "1:570133498387:web:8835b8d2373797e91d0de6"
  });

  const db = getFirestore(app);
  let all = [], searchQ = '', activeGenre = 'all';

  async function load() {
    try {
      const q = query(collection(db, 'items'), where('status', '==', '庫存'));
      const snap = await getDocs(q);

      all = snap.docs
        .map(d => ({ id: d.id, ...d.data() }))
        .filter(p => !p.group || p.group === '' || p.group === '一般庫存');

      if (all.length === 0) {
        document.getElementById('countLabel').textContent = '目前沒有在架商品';
        document.getElementById('grid').innerHTML = `<div class="state-msg">目前沒有在架商品。</div>`;
        return;
      }

      buildGenreBar();

  function buildGenreBar() {
    const bar = document.getElementById('genreBar');
    const genreSet = new Set();
    all.forEach(p => {
      if (Array.isArray(p.genre)) p.genre.forEach(g => genreSet.add(g));
      else if (p.genre) genreSet.add(p.genre);
    });
    const genres = [...genreSet].sort();
    genres.forEach(g => {
      const btn = document.createElement('button');
      btn.className = 'genre-btn';
      btn.dataset.genre = g;
      btn.textContent = g;
      bar.appendChild(btn);
    });
    bar.addEventListener('click', e => {
      const btn = e.target.closest('.genre-btn');
      if (!btn) return;
      activeGenre = btn.dataset.genre;
      bar.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });

  // ── 音樂試聽 ──
  function toEmbedUrl(url) {
    if (!url) return null;
    // Spotify
    const sp = url.match(/open\.spotify\.com\/(track|album|playlist|artist)\/([a-zA-Z0-9]+)/);
    if (sp) return `https://open.spotify.com/embed/${sp[1]}/${sp[2]}?utm_source=generator`;
    // YouTube / YouTube Music
    const yt = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|music\.youtube\.com\/watch\?v=)([a-zA-Z0-9_-]{11})/);
    if (yt) return `https://www.youtube.com/embed/${yt[1]}`;
    // Apple Music
    const am = url.match(/music\.apple\.com\/([^?#]+)/);
    if (am) return `https://embed.music.apple.com/${am[1]}`;
    // 若已是 embed URL 則直接回傳
    if (/open\.spotify\.com\/embed|youtube\.com\/embed|embed\.music\.apple\.com/.test(url)) return url;
    return null;
  }

  function buildEmbed(embedUrl) {
    const isSpotify = embedUrl.includes('spotify.com/embed');
    const isAM = embedUrl.includes('embed.music.apple.com');
    const h = isSpotify ? 352 : isAM ? 450 : 200;
    if (isAM) {
      // Apple 官方格式：allow 加 * 手機才能取得權限；不加 loading=lazy（modal 動態插入時手機會略過不載）
      return `<iframe allow="autoplay *; encrypted-media *; fullscreen *; clipboard-write" frameborder="0" height="${h}" style="width:100%;overflow:hidden;" sandbox="allow-forms allow-popups allow-same-origin allow-scripts allow-top-navigation-by-user-activation" src="${embedUrl}"></iframe>`;
    }
    if (isSpotify) {
      return `<iframe style="border-radius:12px;" src="${embedUrl}" width="100%" height="${h}" frameborder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" allowfullscreen></iframe>`;
    }
    return `<iframe src="${embedUrl}" width="100%" height="${h}" frameborder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" allowfullscreen></iframe>`;
  }

    const label = `<div class="modal-music-label">

  document.getElementById('modalCloseBtn').addEventListener('click', closeModal);

  // 主標籤切換

  // archive
  let archives = [];
  async function loadArchives() {
    document.getElementById('countLabel').textContent = 'Loading...';
    document.getElementById('grid').innerHTML = '<div class="state-msg"><div class="spinner"></div>Loading</div>';
    try {
      const snap = await getDocs(collection(db, 'archives'));
      archives = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => (a.sortOrder||999)-(b.sortOrder||999));
      renderArchives();

      document.getElementById('grid').innerHTML = '<div class="state-msg">⚠ ' + e.message + '</div>';

  function getYouTubeId(url) {
    const m = (url||'').match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);
    return m ? m[1] : null;
  }

  // 判斷是否顯示 NEW 標籤
  function isNewItem(p) {
    if (p.showNewBadge === true) return true;
    if (p.showNewBadge === false) return false;
    if (!p.createdAt) return false;
    const diff = (new Date() - new Date(p.createdAt)) / (1000 * 60 * 60 * 24);
    return diff <= 7;
  }

  // 排序
  let activeSortOrder = 'date-desc';
  document.getElementById('sortSelect').addEventListener('change', e => {
    activeSortOrder = e.target.value;
    render();
  });

  function sortItems(list) {
    if (activeSortOrder === 'price-desc') {
      return [...list].sort((a, b) => (Number(b.customPrice)||Number(b.basePrice)||0) - (Number(a.customPrice)||Number(a.basePrice)||0));
    } else if (activeSortOrder === 'price-asc') {
      return [...list].sort((a, b) => (Number(a.customPrice)||Number(a.basePrice)||0) - (Number(b.customPrice)||Number(b.basePrice)||0));
    } else if (activeSortOrder === 'date-asc') {
      return [...list].sort((a, b) => new Date(a.createdAt||0) - new Date(b.createdAt||0));
    } else {
      // date-desc 和 default 都照上架日期新→舊
      return [...list].sort((a, b) => new Date(b.createdAt||0) - new Date(a.createdAt||0));
    }
  }

  function renderArchives() {
    document.getElementById('countLabel').textContent = archives.length + ' items';
    if (!archives.length) { document.getElementById('grid').innerHTML = '<div class="state-msg">目前沒有 Digital Archive。</div>'; return; }
    document.getElementById('grid').innerHTML = archives.map(a => {
      const vid = getYouTubeId(a.youtubeUrl);
      const thumb = vid ? 'https://img.youtube.com/vi/' + vid + '/mqdefault.jpg' : '';
      return '<a class="archive-card" href="' + (a.youtubeUrl||'#') + '" target="_blank" rel="noopener">' +
        '<div class="archive-thumb">' + (thumb ? '<img src="' + thumb + '" alt="">' : '') +

        '<div style="font-size:10px;color:var(--gray);margin-bottom:8px;">' + (a.artist||'') + '</div></div></a>';
    }).join('');
  }

  // render 加 itemType 篩選
  const _origRender = render;
  render = function() {
    if (activeTab === 'archive') return;
    const origFilter = all.filter.bind(all);
    const filtered = all.filter(p => {
      const matchTab = activeTab === 'new' ? p.itemType === 'New' : (p.itemType === 'Used' || !p.itemType);
      return matchTab;
    });
    const tempAll = all;
    // 暫時替換 all 讓原本的 render 只看到篩選後的
    all = filtered;
    _origRender();
    all = tempAll;
  };

  // ── 購物車 ──
  let cart = [];

  function updateCartUI() {
    const count = cart.length;
    document.getElementById('cartCount').textContent = count;
    document.getElementById('cartBtn').style.display = count > 0 ? 'flex' : 'none';
    renderCartItems();
    const total = cart.reduce((s, p) => s + (Number(p.customPrice) || Number(p.basePrice) || 0), 0);
    document.getElementById('cartTotal').textContent = 'NT$ ' + total.toLocaleString();
  }

  function renderCartItems() {
    const el = document.getElementById('cartItems');
    if (!cart.length) { el.innerHTML = '<div class="cart-empty">購物車是空的</div>'; return; }
    el.innerHTML = cart.map((p, idx) => {
      const price = Number(p.customPrice) || Number(p.basePrice) || 0;
      const img = p.imageUrl || (Array.isArray(p.imageUrls) && p.imageUrls[0]) || '';
      return '<div class="cart-item">' +
        (img ? '<img class="cart-item-img" src="' + img + '">' : '<div class="cart-item-img"></div>') +
        '<div class="cart-item-info"><div class="cart-item-name">' + (p.name || '') + '</div>' +
        '<div class="cart-item-price">NT$ ' + price.toLocaleString() + '</div></div>' +
        '<button class="cart-item-remove" data-idx="' + idx + '">×</button></div>';
    }).join('');
    el.querySelectorAll('.cart-item-remove').forEach(btn => {
      btn.addEventListener('click', () => {
        cart.splice(parseInt(btn.dataset.idx), 1);
        updateCartUI();
      });
    });
  }

  window.addToCart = function addToCart(id) {
    const p = all.find(x => x.id === id);
    if (!p) return;
    if (cart.find(x => x.id === id)) { alert('此商品已在購物車中'); return; }
    cart.push(p);
    updateCartUI();
    document.getElementById('cartPanel').classList.add('open');

  document.getElementById('cartClose').addEventListener('click', () => document.getElementById('cartPanel').classList.remove('open'));
  document.getElementById('cartOverlay').addEventListener('click', () => document.getElementById('cartPanel').classList.remove('open'));

  // 結帳
  document.getElementById('btnCheckout').addEventListener('click', () => {

    document.getElementById('cartPanel').classList.remove('open');

  document.getElementById('checkoutClose').addEventListener('click', () => document.getElementById('checkoutModal').classList.remove('open'));

  // 送出訂單
  document.getElementById('btnSubmitOrder').addEventListener('click', async () => {
    const name = document.getElementById('buyerName').value.trim();
    const email = document.getElementById('buyerEmail').value.trim();
    if (!name || !email) { document.getElementById('orderMsg').className = 'msg error show'; document.getElementById('orderMsg').textContent = '請填入姓名和 Email'; return; }

    const btn = document.getElementById('btnSubmitOrder');
    btn.disabled = true;
    btn.textContent = '送出中…';

    const total = cart.reduce((s, p) => s + (Number(p.customPrice) || Number(p.basePrice) || 0), 0);
    const itemList = cart.map(p => {
      const price = Number(p.customPrice) || Number(p.basePrice) || 0;
      return (p.name || '') + ' — NT$ ' + price.toLocaleString();
    }).join('\n');

    try {
      const res = await fetch('https://formspree.io/f/xykoglre', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({
          _subject: 'dip vinyl shop — 新訂單 from ' + name,
          姓名: name,
          Email: email,
          電話: document.getElementById('buyerPhone').value.trim() || '未填',
          備註: document.getElementById('buyerNote').value.trim() || '無',
          訂單明細: itemList,
          總金額: 'NT$ ' + total.toLocaleString(),
        })
      });
      if (res.ok) {
        document.getElementById('checkoutBody').style.display = 'none';
        document.getElementById('checkoutSuccess').style.display = 'block';
        cart = [];
        updateCartUI();
      } else {
        throw new Error('送出失敗');
      }
    } catch(e) {
