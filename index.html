<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>dip vinyl shop</title>
  <!-- PWA：選歌 App -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#111111">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="dip 選歌">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <script>
    // 盡早判定 App 模式（?app=1 或已安裝為獨立 App），避免商店 UI 閃一下。
    // 一旦進過 App 模式就記住，之後從主畫面開啟（無 query）也維持。
    (function () {
      try {
        var params = new URLSearchParams(location.search);
        var standalone = window.matchMedia('(display-mode: standalone)').matches
          || window.navigator.standalone === true;
        if (params.get('app') === '1') localStorage.setItem('dipAppMode', '1');
        if (params.get('app') === '0') localStorage.removeItem('dipAppMode');
        var isApp = params.get('app') === '1' || standalone || localStorage.getItem('dipAppMode') === '1';
        window.__APP_MODE__ = isApp;
        if (isApp) document.documentElement.classList.add('app-mode');
      } catch (e) {}
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --black: #111; --gray: #888; --line: #ddd; --bg: #fff; --mono: 'Space Mono', monospace;
      --silver-shine: linear-gradient(115deg,#9498a0 0%,#9498a0 34%,#c8ccd2 40%,#ffffff 47%,#ffffff 50%,#ffffff 53%,#c8ccd2 60%,#9498a0 66%,#9498a0 100%);
      /* 流亡（極冷門7星）：暗黑油彩——近黑底滲出紫/青綠/洋紅虹光 */
      --oil-shine: linear-gradient(115deg,#241b3a 0%,#241b3a 30%,#3a2a5d 38%,#2bb6a3 44%,#c84ad6 50%,#2b6fd6 56%,#3a2a5d 62%,#241b3a 70%,#241b3a 100%);
      /* 異端（極難入耳7星）：暗赤血光 */
      --crimson-shine: linear-gradient(115deg,#4a0a13 0%,#4a0a13 36%,#7a1020 41%,#c11628 47%,#ff3048 50%,#c11628 53%,#7a1020 59%,#4a0a13 64%,#4a0a13 100%); }
    body { background: var(--bg); color: var(--black); font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em; }

    .logo-hero {
      background: #111; width: 100%;
      display: flex; align-items: center; justify-content: center;
      padding: 24px 20px;
      border-bottom: 1px solid #222;
      opacity: 0; transition: opacity 0.25s;
    }
    .logo-hero-img {
      height: 120px; width: auto; display: block;
    }
    @media (max-width: 560px) {
      .logo-hero-img { height: 80px; }
    }

    .topbar {
      border-bottom: 1px solid var(--line); padding: 0 20px; height: 40px;
      display: flex; align-items: center; justify-content: space-between;
      background: #fff; z-index: 50;
    }
    .topbar-logo { font-size: 12px; font-weight: 700; letter-spacing: 0.12em; }
    .topbar-right { color: var(--gray); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; }

    .search-bar {
      border-bottom: 1px solid var(--line); padding: 0 20px; height: 36px;
      display: flex; align-items: center; gap: 10px;
    }
    .search-bar label { font-size: 10px; color: var(--gray); letter-spacing: 0.1em; text-transform: uppercase; white-space: nowrap; }
    .search-bar input { border: none; outline: none; font-family: var(--mono); font-size: 11px; color: var(--black); width: 100%; background: transparent; }
    .search-bar input::placeholder { color: var(--gray); }

    .main-tabs { border-bottom: 1px solid var(--line); display: flex; overflow-x: auto; scrollbar-width: none; }
    .main-tabs::-webkit-scrollbar { display: none; }
    .main-tab { background: none; border: none; border-bottom: 3px solid transparent; padding: 0 28px; height: 48px; font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gray); cursor: pointer; transition: all 0.15s; white-space: nowrap; flex-shrink: 0; }
    .main-tab:hover { color: var(--black); }
    .main-tab.active { color: var(--black); border-bottom-color: var(--black); }
    .archive-card { border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); cursor: pointer; text-decoration: none; color: var(--black); display: block; }
    .archive-thumb { position: relative; aspect-ratio: 16/9; overflow: hidden; background: #f0f0f0; }
    .archive-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.35s; }
    .archive-card:hover .archive-thumb img { transform: scale(1.04); }
    .archive-play { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0); transition: background 0.2s; }
    .archive-card:hover .archive-play { background: rgba(0,0,0,0.35); }
    .archive-play svg { opacity: 0; transition: opacity 0.2s; }
    .archive-card:hover .archive-play svg { opacity: 1; }
    .genre-bar {
      border-bottom: 1px solid var(--line); padding: 0 20px; height: 36px;
      display: flex; align-items: center; overflow-x: auto; scrollbar-width: none; gap: 0;
    }
    .genre-bar::-webkit-scrollbar { display: none; }
    .genre-btn {
      background: none; border: none; border-right: 1px solid var(--line);
      padding: 0 16px; height: 36px; font-family: var(--mono);
      font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--gray); cursor: pointer; white-space: nowrap; flex-shrink: 0;
      transition: color 0.15s;
    }
    .genre-btn:first-child { padding-left: 0; }
    .genre-btn:hover { color: var(--black); }
    .genre-btn.active { color: var(--black); font-weight: 700; }
    .card-genre { font-size: 10px; color: var(--gray); margin-bottom: 6px; }

    .sort-select {
      background: none; border: none; border-left: 1px solid var(--line);
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--gray); cursor: pointer;
      padding: 0 16px; height: 28px; outline: none;
    }
    .sort-select:hover { color: var(--black); }

    .count-bar {
      border-bottom: 1px solid var(--line); padding: 0 20px; height: 28px;
      display: flex; align-items: center;
      color: var(--gray); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
    }

    .grid { display: grid; grid-template-columns: repeat(4, 1fr); }
    @media (max-width: 900px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 560px) { .grid { grid-template-columns: repeat(2, 1fr); } }

    .card { border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); cursor: pointer; }
    .card-img-wrap { position: relative; aspect-ratio: 1; overflow: hidden; background: #f0f0f0; }
    .card-img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.35s ease; }
    .card:hover .card-img { transform: scale(1.04); }
    .card-img-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 36px; color: #ccc; }
    .card-img-wrap::after {
      content: 'VIEW'; position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(17,17,17,0.82); color: #fff;
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; text-align: center; padding: 9px;
      transform: translateY(100%); transition: transform 0.2s ease;
    }
    .card:hover .card-img-wrap::after { transform: translateY(0); }

    .card-info { padding: 10px 12px 12px; border-top: 1px solid var(--line); }
    .card-name {
      font-size: 11px; font-weight: 700; line-height: 1.4; margin-bottom: 8px;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-bottom { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 4px; }
    .card-price { font-size: 11px; font-weight: 700; }
    .card-artist { font-size: 10px; color: var(--gray); margin-bottom: 4px; }
    .card-no-price { font-size: 10px; color: var(--gray); }
    .card-genre { font-size: 10px; color: var(--gray); margin-bottom: 6px; }

    .state-msg { grid-column: 1 / -1; padding: 80px 20px; text-align: center; color: var(--gray); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; }
    .spinner { width: 18px; height: 18px; border: 1px solid var(--line); border-top-color: var(--black); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .modal-bg { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.97); z-index: 260; overflow-y: auto; }
    .modal-bg.open { display: block; }
    .modal { max-width: 800px; margin: 0 auto; border-left: 1px solid var(--line); border-right: 1px solid var(--line); min-height: 100vh; }
    .modal-topbar {
      border-bottom: 1px solid var(--line); padding: 0 20px; height: 40px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; background: rgba(255,255,255,0.97);
    }
    .modal-topbar span { font-size: 10px; color: var(--gray); letter-spacing: 0.08em; text-transform: uppercase; }
    .modal-close-btn {
      background: none; border: 1px solid var(--line); font-family: var(--mono);
      font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 4px 12px; cursor: pointer; color: var(--black); transition: all 0.15s;
    }
    .modal-close-btn:hover { background: var(--black); color: #fff; border-color: var(--black); }
    .modal-share-btn { background: none; border: none; cursor: pointer; padding: 4px 6px; color: var(--gray); display: flex; align-items: center; transition: color 0.15s; }
    .modal-share-btn:hover { color: var(--black); }
    .modal-share-btn svg { width: 15px; height: 15px; }
    .modal-topbar-left { display: flex; align-items: center; gap: 6px; }
    .modal-body { display: grid; grid-template-columns: 1fr 1fr; }
    @media (max-width: 560px) { .modal-body { grid-template-columns: 1fr; } }
    .modal-img-wrap { aspect-ratio: 1; background: #f0f0f0; border-right: 1px solid var(--line); overflow: hidden; }
    .modal-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .carousel { position: relative; width: 100%; height: 100%; }
    .carousel-imgs { width: 100%; height: 100%; position: relative; overflow: hidden; }
    .carousel-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.3s; }
    .carousel-img.active { opacity: 1; }
    .carousel-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: #fff; border: none; font-size: 16px; width: 32px; height: 48px; cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center; }
    .carousel-btn.prev { left: 0; }
    .carousel-btn.next { right: 0; }
    .carousel-dots { position: absolute; bottom: 8px; left: 0; right: 0; display: flex; justify-content: center; gap: 6px; }
    .carousel-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.5); cursor: pointer; border: none; }
    .carousel-dot.active { background: #fff; }
    .modal-img-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 60px; color: #ccc; }
    .modal-detail { padding: 20px; display: flex; flex-direction: column; }
    .modal-price { font-size: 22px; font-weight: 700; padding-bottom: 16px; border-bottom: 1px solid var(--line); }
    .modal-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid var(--line); gap: 12px; }
    .modal-row-label { font-size: 10px; color: var(--gray); letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap; flex-shrink: 0; }
    .modal-row-value { font-size: 11px; font-weight: 700; text-align: right; line-height: 1.5; }
    .modal-note { margin-top: 20px; font-size: 10px; color: var(--gray); line-height: 1.9; }

    /* 音樂試聽 */
    .modal-music { border-top: 1px solid var(--line); padding: 16px 20px; }
    .modal-music-label { font-size: 10px; color: var(--gray); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
    .modal-music-label svg { flex-shrink: 0; }
    .modal-music-platforms { margin-left: auto; display: flex; gap: 6px; }
    .music-platform-btn { display: inline-flex; align-items: center; gap: 4px; font-family: var(--mono); font-size: 9px; letter-spacing: 0.05em; color: var(--gray); text-decoration: none; border: 1px solid var(--line); padding: 3px 8px; transition: all 0.15s; white-space: nowrap; }
    .music-platform-btn:hover { color: var(--black); border-color: var(--black); }
    .modal-music iframe { display: block; border: none; width: 100%; }
    .modal-music-search { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
    .music-search-btn { background: none; border: 1px solid var(--line); font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em; padding: 5px 12px; cursor: pointer; color: var(--gray); text-decoration: none; display: inline-block; transition: all 0.15s; }
    .music-search-btn:hover { border-color: var(--black); color: var(--black); }

    /* 購物車 */
    .cart-btn { position: fixed; bottom: 140px; right: 24px; background: var(--black); color: #fff; border: none; font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 0.1em; padding: 12px 18px; cursor: pointer; z-index: 150; display: flex; align-items: center; gap: 8px; transition: opacity 0.2s; }
    .cart-btn:hover { opacity: 0.8; }
    .cart-count { background: #fff; color: var(--black); font-size: 10px; font-weight: 700; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .cart-panel { position: fixed; inset: 0; z-index: 300; display: none; }
    .cart-panel.open { display: flex; }
    .cart-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); }
    .cart-drawer { position: absolute; right: 0; top: 0; bottom: 0; width: 420px; max-width: 100vw; background: #fff; display: flex; flex-direction: column; }
    @media (max-width: 560px) { .cart-drawer { width: 100vw; } }
    .cart-header { border-bottom: 1px solid var(--line); padding: 0 20px; height: 48px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .cart-header h2 { font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
    .cart-close { background: none; border: 1px solid var(--line); font-family: var(--mono); font-size: 10px; padding: 4px 12px; cursor: pointer; letter-spacing: 0.1em; text-transform: uppercase; }
    .cart-close:hover { background: var(--black); color: #fff; border-color: var(--black); }
    .cart-items { flex: 1; overflow-y: auto; }
    .cart-item { display: flex; gap: 12px; padding: 12px 20px; border-bottom: 1px solid var(--line); align-items: center; }
    .cart-item-img { width: 56px; height: 56px; object-fit: cover; background: var(--line); flex-shrink: 0; }
    .cart-item-info { flex: 1; min-width: 0; }
    .cart-item-name { font-size: 11px; font-weight: 700; line-height: 1.4; margin-bottom: 4px; }
    .cart-item-price { font-size: 11px; color: var(--gray); }
    .cart-item-remove { background: none; border: none; color: var(--gray); font-size: 16px; cursor: pointer; flex-shrink: 0; }
    .cart-item-remove:hover { color: var(--black); }
    .cart-empty { padding: 60px 20px; text-align: center; color: var(--gray); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; }
    .cart-footer { border-top: 1px solid var(--line); padding: 16px 20px; flex-shrink: 0; }
    .cart-total { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
    .cart-total-label { font-size: 10px; color: var(--gray); letter-spacing: 0.08em; text-transform: uppercase; }
    .cart-total-price { font-size: 18px; font-weight: 700; }
    .btn-checkout { width: 100%; background: var(--black); color: #fff; border: none; font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; padding: 14px; cursor: pointer; transition: opacity 0.2s; }
    .btn-checkout:hover { opacity: 0.8; }
    .btn-checkout:disabled { opacity: 0.35; cursor: not-allowed; }

    /* 結帳 modal */
    .checkout-modal { position: fixed; inset: 0; z-index: 400; display: none; align-items: center; justify-content: center; padding: 20px; background: rgba(0,0,0,0.7); }
    .checkout-modal.open { display: flex; }
    .checkout-box { background: #fff; width: 100%; max-width: 480px; }
    .checkout-box-header { border-bottom: 1px solid var(--line); padding: 0 20px; height: 48px; display: flex; align-items: center; justify-content: space-between; }
    .checkout-box-header h2 { font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
    .checkout-box-body { padding: 20px; }
    .checkout-field { margin-bottom: 12px; }
    .checkout-field label { display: block; font-size: 10px; color: var(--gray); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
    .checkout-field input, .checkout-field textarea { width: 100%; border: 1px solid var(--line); padding: 9px 10px; font-family: var(--mono); font-size: 11px; outline: none; }
    .checkout-field input:focus, .checkout-field textarea:focus { border-color: var(--black); }
    .checkout-summary { background: var(--bg); padding: 12px; margin-bottom: 16px; font-size: 10px; line-height: 2; border: 1px solid var(--line); max-height: 160px; overflow-y: auto; }
    .checkout-success { padding: 40px 20px; text-align: center; display: none; }
    .checkout-success h3 { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
    .checkout-success p { font-size: 11px; color: var(--gray); line-height: 1.8; }

    /* NEW 標籤 */
    .card-new-badge {
      position: absolute; bottom: 0; right: 0;
      background: #e8383d; color: #fff;
      font-family: var(--mono); font-size: 9px; font-weight: 700;
      letter-spacing: 0.1em; padding: 3px 7px;
      text-transform: uppercase; line-height: 1;
    }

    /* 首版 + pressing 標籤 */
    .card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; }
    .card-tag-item { font-family: var(--mono); font-size: 9px; letter-spacing: 0.08em; border: 1px solid var(--black); padding: 1px 5px; text-transform: uppercase; }
    .card-tag-first { background: var(--black); color: #fff; }

    footer { border-top: 1px solid var(--line); padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
    footer .f-logo { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; }
    footer p { font-size: 10px; color: var(--gray); }

    /* 心理測驗 */
    .quiz-modal { display: none; }
    .quiz-modal.open { display: block; }
    .quiz-inner { max-width: 560px; margin: 0 auto; border-left: 1px solid var(--line); border-right: 1px solid var(--line); min-height: 60vh; }
    .quiz-topbar { border-bottom: 1px solid var(--line); padding: 0 20px; height: 40px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: rgba(255,255,255,0.98); z-index: 10; }
    .quiz-progress { padding: 16px 20px; border-bottom: 1px solid var(--line); }
    .quiz-progress-track { height: 1px; background: var(--line); margin-bottom: 8px; }
    .quiz-progress-fill { height: 1px; background: var(--black); transition: width 0.3s; }
    .quiz-progress-label { font-size: 10px; color: var(--gray); letter-spacing: 0.08em; text-transform: uppercase; }
    .quiz-q-area { padding: 32px 20px 20px; }
    .quiz-question { font-size: 14px; font-weight: 700; line-height: 1.7; margin-bottom: 28px; }
    .quiz-options { display: flex; flex-direction: column; gap: 10px; }
    .quiz-option { background: none; border: 1px solid var(--line); font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em; padding: 14px 16px; cursor: pointer; text-align: left; transition: all 0.15s; color: var(--black); line-height: 1.5; width: 100%; }
    .quiz-option:hover { border-color: var(--black); }
    .quiz-option.selected { background: var(--black); color: #fff; border-color: var(--black); }
    .quiz-nav { padding: 20px; display: flex; gap: 10px; border-top: 1px solid var(--line); }
    .quiz-nav-btn { flex: 1; background: none; border: 1px solid var(--line); font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 12px; cursor: pointer; color: var(--black); transition: all 0.15s; }
    .quiz-nav-btn:hover:not(:disabled) { border-color: var(--black); }
    .quiz-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .quiz-nav-btn.primary { background: var(--black); color: #fff; border-color: var(--black); }
    .quiz-nav-btn.primary:hover { opacity: 0.8; }
    .quiz-loading { padding: 80px 20px; text-align: center; }
    .quiz-loading .spinner { margin: 0 auto 16px; }
    .quiz-loading-text { font-size: 10px; color: var(--gray); letter-spacing: 0.12em; text-transform: uppercase; }
    .quiz-result { padding: 32px 20px; }
    .quiz-result-label { font-size: 10px; color: var(--gray); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 16px; }
    .quiz-result-cover { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; margin-bottom: 20px; border: 1px solid var(--line); cursor: pointer; }
    .quiz-result-artist { font-size: 14px; color: var(--gray); margin-bottom: 6px; letter-spacing: 0.06em; }

<script src="dip-player.js?v=9"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, doc, getDoc, setDoc, deleteDoc, query, where, addDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const app = initializeApp({
    apiKey: "AIzaSyBpR5XKKHwT_eQoShtBPtFNRXz4ymzPWQg",
    authDomain: "price-manager-e8846.firebaseapp.com",
    projectId: "price-manager-e8846",
    storageBucket: "price-manager-e8846.firebasestorage.app",
    messagingSenderId: "570133498387",
    appId: "1:570133498387:web:8835b8d2373797e91d0de6"
  });

  const db = getFirestore(app);
  let all = [], searchQ = '', activeGenre = 'all';

  // ───────── 會員 + 卡牌收藏 ─────────
  const auth = getAuth(app);
  const googleProvider = new GoogleAuthProvider();
  let currentUser = null;
  let authReady = false; // Firebase 首次回報登入狀態前為 false

  onAuthStateChanged(auth, (user) => {
    currentUser = user;
    authReady = true;
    if (user) upsertUserProfile(user);
    updateAuthUI();
    // 若正在看唱片櫃，登入狀態改變時重畫（唱片櫃不是 main-tab，故用 currentView 判斷，
    // 才能在直接重新整理唱片櫃頁、Firebase 稍後才回復登入狀態時補上重畫）
    if (currentView === 'collection') {
      renderCollection();
    }
  });

  // 把會員基本資料寫進 users/{uid}，供後台「會員管理」用；fire-and-forget
  // createdAt 只在第一次建立時寫入，之後每次登入只更新 lastSeenAt
  async function upsertUserProfile(user) {
    if (!user) return;
    try {
      const uref = doc(db, 'users', user.uid);
      const snap = await getDoc(uref);
      const base = {
        uid: user.uid,
        email: user.email || '',
        displayName: user.displayName || '',
        photoURL: user.photoURL || '',
        lastSeenAt: Date.now()
      };
      if (!snap.exists()) base.createdAt = Date.now();
      await setDoc(uref, base, { merge: true });
    } catch (e) { /* fire-and-forget */ }
  }

  function updateAuthUI() {
    const el = document.getElementById('authStatus');
    if (!el) return;
    if (currentUser) {
      const name = currentUser.displayName || '會員';
      el.innerHTML = `<span class="auth-name" title="${currentUser.email || ''}">${name}</span>` +
        `<button class="auth-btn" id="signOutBtn">登出</button>`;
      el.querySelector('#signOutBtn').addEventListener('click', () => signOut(auth));
    } else {
      el.innerHTML = `<button class="auth-btn" id="signInBtn">註冊 / 登入</button>`;
      el.querySelector('#signInBtn').addEventListener('click', signInWithGoogle);
    }
  }

  async function signInWithGoogle() {
    try {
      await signInWithPopup(auth, googleProvider);
      showShareToast && showShareToast('登入成功 ✓');
    } catch (e) {
      console.warn('[auth] sign-in failed', e?.code || e);
      if (e?.code !== 'auth/popup-closed-by-user' && e?.code !== 'auth/cancelled-popup-request') {
        showShareToast && showShareToast('登入失敗，請再試一次');
      }
    }
  }

  // 卡片 ID：與 Worker /album-rating 的 key 同規則
  function cardIdOf(artist, album) {
    return ((artist || '') + '|' + (album || '')).toLowerCase().replace(/\//g, '-').trim();
  }

  // 抽到即記錄到全站卡牌目錄（供後台校正用）；不需登入、fire-and-forget
  // 注意：這要獨立於 addCardToCollection，否則未登入/未收藏的玩家抽的卡不會進目錄
  function recordDrawnCard(card) {
    if (!card) return;
    try {
      const id = cardIdOf(card.artist, card.album);
      if (!id || id === '|') return;
      const desc = (card.desc || card.reason || '').trim();
      const hasDesc = desc && desc !== '輸入中…' && desc !== '輸入中...';
      setDoc(doc(db, 'card_catalog', id), {
        cardId: id, artist: card.artist || '', album: card.album || '',
        coverUrl: card._coverUrl || card.coverUrl || '',
        ...(hasDesc ? { desc } : {}),
        updatedAt: Date.now()
      }, { merge: true }).catch(() => {});
    } catch (e) {}
  }

  const MUSIC_MAP_GENRES = ['jazz','rock','electronic','soul','hiphop','folk','classical','world','pop','blues'];
  const validMapGenres = (genres) => [...new Set((genres || []).filter(g => MUSIC_MAP_GENRES.includes(g)))];
  async function findMapGenres(card, savedGenres) {
    const known = validMapGenres(savedGenres);
    if (known.length) return known;
    try {
      const res = await fetch(`${WORKER_URL}/album-genres?artist=${encodeURIComponent(card.artist || '')}&album=${encodeURIComponent(card.album || '')}`);
      return res.ok ? validMapGenres((await res.json()).genres) : [];
    } catch (e) { return []; }
  }
  async function addMusicMapCredit(genres) {
    if (!currentUser) return false;
    const tags = validMapGenres(genres);
    // 不在收卡時改 version：舊 v1 必須保持不健康，進地圖頁才會完整重建為 v2。
    const value = { musicMap: { albums: increment(1), untagged: increment(tags.length ? 0 : 1), updatedAt: Date.now() } };
    const mergeFields = ['musicMap.albums', 'musicMap.untagged', 'musicMap.updatedAt', ...tags.map(id => `musicMap.credits.${id}`)];
    if (tags.length) value.musicMap.credits = Object.fromEntries(tags.map(id => [id, increment(1)]));
    try {
      await setDoc(doc(db, 'users', currentUser.uid), value, { mergeFields });
      return true;
    } catch (e) {
      console.warn('[music-map] credit save failed', e);
      return false;
    }
  }

  // 收進唱片櫃（已收藏則張數 +1）
  async function addCardToCollection(card) {
    if (!currentUser) return 'need-login';
    const id = cardIdOf(card.artist, card.album);
    if (!id || id === '|') return false;
    // 記錄到全站卡牌目錄（供後台校正用），fire-and-forget
    recordDrawnCard(card);
    const ref = doc(db, 'collections', currentUser.uid, 'cards', id);
    try {
      const snap = await getDoc(ref);
      if (snap.exists()) {
        // 已擁有：張數 +1。若這次帶著特殊旗標而舊卡沒有 → 一併升格（特殊抽卡落在已擁有的卡時別把旗標吞掉）
        const cur = snap.data();
        const upgrade = {};
        if (card.hall && !cur.hall) upgrade.hall = true;
        if (card.pearl && !cur.pearl) upgrade.pearl = true;
        if (card.heresy && !cur.heresy) upgrade.heresy = true;

        if (mapGenres.length && !validMapGenres(cur.mapGenres).length) upgrade.mapGenres = mapGenres;
        await setDoc(ref, { count: (cur.count || 1) + 1, lastObtainedAt: Date.now(), ...upgrade }, { merge: true });
        await addMusicMapCredit(mapGenres);
        return 'dup';
      }
      const mapGenres = await findMapGenres(card);
      await setDoc(ref, {
        cardId: id,
        artist: card.artist || '',
        album: card.album || '',
        coverUrl: card._coverUrl || card.coverUrl || '',

  // 寬鬆正規化：去掉冠詞、括號內的 remaster/anniversary 後綴與標點，讓不同寫法都能對上
  const _neoNorm = (s) => (s || '').toLowerCase()
    .replace(/\([^)]*\)|\[[^\]]*\]/g, ' ')          // 去括號內後綴
    .replace(/\s[-–—:]\s.*$/, ' ')                   // 去「 - Remaster」「: Deluxe」這類破折號後綴
    .replace(/[^a-z0-9]+/g, ' ')
    .replace(/\b\d{1,4}(st|nd|rd|th)?\b/g, ' ')      // 去年份、50th 之類
    .replace(/\b(remaster|remastered|anniversary|deluxe|expanded|edition|reissue|mono|stereo|version|the|a|an)\b/g, ' ')
    .replace(/\s+/g, ' ').trim();
  const NEOCLASSIC_MAP = {};
  NEOCLASSIC_LIST.forEach(x => { NEOCLASSIC_MAP[_neoNorm(x.artist) + '|' + _neoNorm(x.album)] = x; });
  function neoclassicOf(card) {

  }

  const SPECIAL_TIERS = {

  const ULTRA_OBSCURE_MAX_LISTENERS = 300;

  // 稀有度：冷門度降權版。卡池幾乎全是冷門盤、obscurity 近乎常數（多半 4–5），

  // 冷門度只在「極冷門(=5)」時 +1 加成。score 範圍 2–11。門檻為 config，可再調。
  // 順位（高→低）：殿堂(銀,無數值) > 傳奇 > 史詩 > 獨特 > 稀有 > 普通
  function rarityFromRatings(r) {
    if (!r || !r.obscurity) return null;
    const classic = Number(r.classic) || 0;
    const accessibility = Number(r.accessibility) || 0;
    const obscurity = Number(r.obscurity) || 0;
    const score = classic + accessibility + (obscurity >= 5 ? 1 : 0);
    if (score >= 10) return { tier: 'legendary', label: '傳奇', sum: score };
    if (score >= 8)  return { tier: 'epic', label: '史詩', sum: score };
    if (score >= 6)  return { tier: 'uncommon', label: '獨特', sum: score };
    if (score >= 4)  return { tier: 'rare', label: '稀有', sum: score };
    return { tier: 'common', label: '普通', sum: score };
  }

      }
      if (!verified) throw new Error('一時抽不到合適的卡，回唱片櫃再點一次');

      const flags = { _hall: tier === 'hall', _pearl: tier === 'pearl', _heresy: tier === 'heresy' };
      await showGpResult({
        artist: verified.rec.artist, album: verified.rec.album, reason: '',
        _coverUrl: verified.sr.imageUrl, _spotifyUrl: verified.sr.spotifyUrl, _streaming: true, ...flags,
      });
      // 禮物：自動收進唱片櫃，並移除「收進唱片櫃」鍵避免重複加
      await addCardToCollection({
        artist: verified.rec.artist, album: verified.rec.album,
        _coverUrl: verified.sr.imageUrl, reelUrl: reelUrlFor(verified.rec.artist, verified.rec.album),
        ...(tier === 'hall' ? { hall: true } : {}),
        ...(tier === 'pearl' ? { pearl: true } : {}),
        ...(tier === 'heresy' ? { heresy: true } : {}),
      });
      const collectBtn = document.querySelector('#genreContent [data-collect]');
      if (collectBtn) { const note = document.createElement('div'); note.className = 'quiz-result-label'; note.style.marginTop = '6px'; note.textContent = '✓ 已自動收進唱片櫃'; collectBtn.replaceWith(note); }
      const reasonEl = document.querySelector('#genreContent .quiz-result-reason');
      const reason = await getRandomReason(verified.rec.artist, verified.rec.album, reasonEl);
      if (lastGpResult) lastGpResult.reason = reason;
      saveToHistory({ type: 'genre', artist: verified.rec.artist, album: verified.rec.album, reason, coverUrl: verified.sr.imageUrl }).catch(() => {});
      return true;
    } catch (e) {
      gc.innerHTML = `<div class="quiz-error" style="padding:40px 20px;">⚠ ${e.message}<br><br><button class="welcome-hall-btn" data-back-to-collection>回我的唱片櫃</button></div>`;
      return false;
    }
  }

  async function claimSpecialDraw(index) {
    if (_specialDrawBusy) return;
    if (!currentUser) { signInWithGoogle(); return; }
    const ticket = specialDraws[index];
    if (!ticket) return;
    _specialDrawBusy = true;
    document.querySelectorAll('[data-special-draw]').forEach(b => { b.disabled = true; });
    let ok = false;
    try { ok = await drawSpecialCard(ticket.tier); } catch (e) { console.warn('[specialDraws] draw error', e); }
    if (ok) {
      // 消耗票券：重讀 → 移除一張同 tier+grantedAt → 寫回
      try {
        const uref = doc(db, 'users', currentUser.uid);
        const us = await getDoc(uref);
        let arr = (us.exists() && Array.isArray(us.data().specialDraws)) ? us.data().specialDraws.slice() : [];
        let rm = arr.findIndex(t => t.tier === ticket.tier && t.grantedAt === ticket.grantedAt);
        if (rm < 0) rm = arr.findIndex(t => t.tier === ticket.tier);
        if (rm >= 0) arr.splice(rm, 1);
        await setDoc(uref, { specialDraws: arr }, { merge: true });
        specialDraws = arr;
      } catch (e) { console.warn('[specialDraws] consume failed', e); }
    }
    _specialDrawBusy = false;
  }

  // 委派：點「開啟我的殿堂卡」／特殊抽卡券／抽卡失敗後回唱片櫃
  document.addEventListener('click', (e) => {
    if (e.target.closest('#claimWelcomeHall')) claimWelcomeHall();
    const sd = e.target.closest('[data-special-draw]');
    if (sd) claimSpecialDraw(Number(sd.dataset.specialDraw));
    if (e.target.closest('[data-back-to-collection]')) setActiveTab('collection');
  });

  async function renderCollection() {
    const el = document.getElementById('collectionContent');
    if (!el) return;
    // auth 尚未就緒：先顯示載入動畫，避免閃一下登入畫面（Firebase 回復登入狀態後會再重畫）
    if (!authReady) {
      el.innerHTML = `<div class="quiz-loading"><div class="spinner"></div><div class="quiz-loading-text">載入中…</div></div>`;
      return;
    }
    if (!currentUser) {
      el.innerHTML = `<div class="collect-empty">
        <div class="quiz-question" style="margin-bottom:10px;">登入後即可收藏卡牌</div>
        <div class="collect-empty-sub">用 Google 一鍵註冊，你抽到的專輯卡會存進雲端唱片櫃，換手機也在。</div>
        <button class="auth-btn-lg" id="collSignIn">註冊 / 登入</button>
      </div>`;
      el.querySelector('#collSignIn').addEventListener('click', signInWithGoogle);
      return;
    }
    el.innerHTML = `<div class="quiz-loading"><div class="spinner"></div><div class="quiz-loading-text">載入唱片櫃…</div></div>`;
    if (!quizReels.length) await loadQuizData(); // reel 卡詳情要對回 IG 貼文連結
    await loadWelcomeHallState();
    await loadSpecialDraws();
    const cards = await getMyCollection();
    if (!cards.length) {
      el.innerHTML = welcomeBannerHtml() + specialDrawBannerHtml() + `<div class="collect-empty">
        <div class="quiz-question" style="margin-bottom:10px;">唱片櫃還是空的</div>
        <div class="collect-empty-sub">去「直接來一張」或「類型挑片」抽幾張，按「收進唱片櫃」就會出現在這裡。</div>
      </div>`;
      return;
    }
    // 取每張卡的評分（算稀有度＋詳情星星用，KV 快取很快）＋人工校正
    _collCache = await Promise.all(cards.map(async (c) => {
      let ratings = null;
      try {
        const res = await fetch(`${WORKER_URL}/album-rating?artist=${encodeURIComponent(c.artist)}&album=${encodeURIComponent(c.album)}`);
        if (res.ok) ratings = await res.json();
      } catch (e) {}
      const ov = await getAlbumOverride(c.cardId);
      if (ov) {
        ratings = ratings || {};
        if (ov.obscurity) ratings.obscurity = ov.obscurity;
        if (ov.classic) ratings.classic = ov.classic;
        if (ov.accessibility) ratings.accessibility = ov.accessibility;
      }
      const neo = neoclassicOf(c);
      // 頂點級別優先序：後台校正 tier > 卡片旗標 > 神作名單
      const ovTier = (ov && ov.tier && SPECIAL_TIERS[ov.tier]) ? ov.tier : null;
      const apex = ovTier || specialTierOf(c) || (neo && SPECIAL_TIERS[neo.tier] ? neo.tier : null);
      const rarity = apex
        ? { tier: apex, label: SPECIAL_TIERS[apex].label, sum: null }
        : (rarityOverrideOf(c) || rarityFromRatings(ratings));
      // 舊卡沒存封面：即時抓 Spotify 補上，並寫回 Firestore（之後就永久有）
      let coverUrl = c.coverUrl || '';
      if (!coverUrl && c.artist) {
        try {
          const res = await fetch(`${WORKER_URL}/spotify-search?artist=${encodeURIComponent(c.artist)}&album=${encodeURIComponent(c.album)}`);
          if (res.ok) coverUrl = (await res.json()).imageUrl || '';
        } catch (e) {}
        if (coverUrl) {
          setDoc(doc(db, 'collections', currentUser.uid, 'cards', c.cardId), { coverUrl }, { merge: true }).catch(() => {});
        }
      }
      return { ...c, coverUrl, ratings, rarity, descOverride: ov?.desc || neo?.desc || null };
    }));
    drawCollection();
  }

  function _collCardHtml(c) {
    const tier = c.rarity?.tier || 'common';
    const label = c.rarity?.label || '？';
    const cardId = escapeCollectionHtml(c.cardId), artist = escapeCollectionHtml(c.artist), album = escapeCollectionHtml(c.album);
    const cover = c.coverUrl ? `<img src="${escapeCollectionHtml(c.coverUrl)}" alt="" loading="lazy">` : `<div class="cc-nocover">♪</div>`;
    return `<article class="collect-card rarity-${tier}${currentRecordId === c.cardId ? ' active' : ''}" data-card-id="${cardId}" role="button" tabindex="0" aria-label="播放 ${artist}《${album}》">
      <div class="cc-thumb">${cover}${c.count > 1 ? `<span class="cc-count">×${Number(c.count) || 0}</span>` : ''}<button class="cc-info" type="button" data-card-info="${cardId}" aria-label="查看 ${artist}《${album}》詳情">ⓘ</button></div>
      <div class="cc-rarity">${escapeCollectionHtml(label)}</div>
      <div class="cc-artist">${artist}</div>
      <div class="cc-album">${album}</div>
    </article>`;
  }

  function turntableHtml() {
    const label = currentRecord?.coverUrl ? `style="background-image:url('${escapeCollectionHtml(currentRecord.coverUrl.replace(/'/g, '%27'))}')"` : '';
    return `<section class="turntable-panel" aria-label="像素唱盤機"><div class="turntable-stage"><div class="turntable-deck"><div class="turntable-platter" style="transform:rotate(${turntableAngle}deg)"><div class="turntable-label" ${label}></div></div><button class="turntable-arm" data-turntable-stop aria-label="收回唱臂並停止播放"></button></div></div><div class="turntable-tracklist" data-turntable-tracks hidden></div><div id="dipPlayerMount" aria-hidden="true"></div></section>`;
  }

  function stepTurntable(time) {
    const platter = document.querySelector('#collectionContent .turntable-platter');
    const dt = turntableLastTime ? Math.min((time - turntableLastTime) / 1000, .05) : 0;
    turntableLastTime = time;
    const desired = time >= turntableSpinReadyAt ? turntableTarget : 0;
    const acceleration = desired > turntableVelocity ? 180 : 150;
    const change = Math.sign(desired - turntableVelocity) * Math.min(Math.abs(desired - turntableVelocity), acceleration * dt);
    turntableVelocity += change;
    turntableAngle = (turntableAngle + turntableVelocity * dt) % 360;
    if (platter) platter.style.transform = `rotate(${turntableAngle}deg)`;
    if (Math.abs(turntableVelocity) > .05 || desired > 0 || time < turntableSpinReadyAt) turntableFrame = requestAnimationFrame(stepTurntable);
    else { turntableVelocity = 0; turntableFrame = 0; turntableLastTime = 0; }
  }

  function runTurntable() {
    if (!turntableFrame) turntableFrame = requestAnimationFrame(stepTurntable);
  }

  function updateTurntableState(playerState) {
    const wasPlaying = lastPlayerState.status === 'playing';
    lastPlayerState = playerState;
    const panel = document.querySelector('#collectionContent .turntable-panel');
    if (!panel) return;
    const keepSpinning = playerState.status === 'loading' && wasPlaying;
    const isPlaying = playerState.status === 'playing' || keepSpinning;
    panel.classList.toggle('playing', isPlaying);
    panel.classList.toggle('loading', playerState.status === 'loading');
    panel.classList.toggle('error', playerState.status === 'error');
    if (playerState.status === 'playing') {
      if (turntableTarget === 0) turntableSpinReadyAt = performance.now() + 500;
      turntableTarget = 180;
    } else if (!keepSpinning) {
      turntableTarget = 0;
      turntableSpinReadyAt = 0;
    }
    if (playerState.status === 'error') {
      currentRecordId = '';
      currentRecord = null;
      document.querySelectorAll('.collect-card.active').forEach(card => card.classList.remove('active'));
    }
    drawTurntableTracklist(panel, playerState);
    runTurntable();
  }

  function drawTurntableTracklist(panel, playerState) {
    const listEl = panel.querySelector('[data-turntable-tracks]');
    if (!listEl) return;
    const tracks = Array.isArray(playerState.tracks) ? playerState.tracks : [];
    if (!tracks.length) { listEl.hidden = true; listEl.innerHTML = ''; return; }
    listEl.hidden = false;
    listEl.innerHTML = tracks.map((track, index) =>
      `<button class="tt-track${track.id === playerState.trackId ? ' on' : ''}" type="button" data-preview-track="${escapeCollectionHtml(track.id)}"><span class="tt-num">${String(index + 1).padStart(2, '0')}</span><span class="tt-name">${escapeCollectionHtml(track.trackName || '')}</span></button>`
    ).join('') + (playerState.storeUrl ? `<a class="tt-source" href="${escapeCollectionHtml(playerState.storeUrl)}" target="_blank" rel="noopener">Apple Music 試聽 ↗</a>` : '');
  }

  function ensureCollectionPlayer(el) {
    const mountPoint = el.querySelector('#dipPlayerMount');
    if (!mountPoint || !window.DipPlayer) return;
    window.DipPlayer.mount(mountPoint, { hidden:true });
    if (!playerSubscribed) { playerSubscribed = true; window.DipPlayer.onStateChange(updateTurntableState); }
    else updateTurntableState(lastPlayerState);
  }

  function animateRecordToTurntable(source, coverUrl) {
    const platter = document.querySelector('#collectionContent .turntable-platter');
    if (!source || !platter) return;
    const from = source.getBoundingClientRect(), to = platter.getBoundingClientRect(), flight = document.createElement('div');
    flight.className = 'record-flight';
    Object.assign(flight.style, { left:`${from.left}px`, top:`${from.top}px`, width:`${from.width}px`, height:`${Math.min(from.width,from.height)}px`, backgroundImage:coverUrl?`url("${coverUrl.replace(/"/g,'%22')}")`:'none' });
    document.body.appendChild(flight);
    requestAnimationFrame(() => Object.assign(flight.style, { left:`${to.left+to.width/2-32}px`, top:`${to.top+to.height/2-32}px`, width:'64px', height:'64px', borderRadius:'50%', transform:'rotate(360deg)', opacity:'.15' }));
    setTimeout(() => flight.remove(), 700);
  }

  function playCollectionRecord(card, source) {
    if (!card || !window.DipPlayer) return;
    window.DipPlayer.unlock?.();
    const switching = lastPlayerState.status === 'playing';
    currentRecordId = card.cardId;
    currentRecord = card;
    document.querySelectorAll('.collect-card').forEach(item => item.classList.toggle('active', item.dataset.cardId === card.cardId));
    const panel = document.querySelector('#collectionContent .turntable-panel'), label = panel?.querySelector('.turntable-label');
    if (label) label.style.backgroundImage = card.coverUrl ? `url("${card.coverUrl.replace(/"/g,'%22')}")` : '';
    if (switching && panel) { panel.classList.remove('switching'); void panel.offsetWidth; panel.classList.add('switching'); setTimeout(() => panel.classList.remove('switching'), 620); }
    animateRecordToTurntable(source, card.coverUrl);
    void window.DipPlayer.playAlbum({ artist: card.artist, album: card.album, prefer:'itunes' }).then(ok => {
      if (ok) return;
      // 失敗代碼幫店主回報真機到底卡在哪一層（S1 封鎖／S3 查無／S5 音檔錯誤…）。
      const code = lastPlayerState.code ? `（代碼 ${lastPlayerState.code}）` : '';
      showShareToast && showShareToast(`這張唱片暫時找不到 30 秒試聽${code}`);
    });
  }

  async function prefetchCollection(records) {
    const token = ++collectionPrefetchToken;
    for (let start = 0; start < records.length && token === collectionPrefetchToken; start += 4) {
      await Promise.allSettled(records.slice(start, start + 4).map(card => window.DipPlayer?.prefetch({ artist:card.artist, album:card.album, spotify:false, youtube:false, itunes:true })));
      if (start + 4 < records.length) await new Promise(resolve => setTimeout(resolve, 80));
    }
  }

  function drawCollection() {
    const el = document.getElementById('collectionContent');
    if (!el) return;
    const rated = _collCache.filter(card => collGenre === 'all' || (collGenre === 'untagged' ? !validMapGenres(card.mapGenres).length : validMapGenres(card.mapGenres).includes(collGenre)));
    if (collSort === 'rarity') rated.sort((a, b) => (RARITY_ORDER[b.rarity?.tier] || 0) - (RARITY_ORDER[a.rarity?.tier] || 0) || (b.obtainedAt || 0) - (a.obtainedAt || 0));
    else if (collSort === 'new') rated.sort((a, b) => (b.obtainedAt || 0) - (a.obtainedAt || 0));
    else if (collSort === 'artist') rated.sort((a, b) => (a.artist || '').localeCompare(b.artist || ''));

    const chips = [{id:'all',name:'全部'},...MUSIC_MAP_GENRES.map(id=>({id,name:MUSIC_MAP_GENRE_NAMES[id]})),{id:'untagged',name:'未分類'}].map(item=>`<button class="collect-genre-chip${collGenre===item.id?' on':''}" data-coll-genre="${item.id}">${item.name}</button>`).join('');
    const head = welcomeBannerHtml() + specialDrawBannerHtml() + `<div class="collect-header"><span class="collect-title">我的唱片櫃</span><span class="collect-count">${rated.length} / ${_collCache.length} 款</span></div>
      <div class="collect-controls">
        <select class="collect-sort" id="collSort">
          <option value="rarity"${collSort === 'rarity' ? ' selected' : ''}>稀有度 高→低</option>
          <option value="new"${collSort === 'new' ? ' selected' : ''}>最新收藏</option>
          <option value="artist"${collSort === 'artist' ? ' selected' : ''}>藝人 A→Z</option>
        </select>
        <button class="collect-group-btn${collGroup ? ' on' : ''}" id="collGroup">${collGroup ? '✓ 依稀有度分組' : '依稀有度分組'}</button>
      </div><div class="collect-genre-chips">${chips}</div>`;

    let body;
    if (collGroup) {
      const tiers = ['hall', 'pearl', 'heresy', 'legendary', 'epic', 'uncommon', 'rare', 'common'];
      const labels = { hall: '殿堂', pearl: '流亡', heresy: '異端', legendary: '傳奇', epic: '史詩', uncommon: '獨特', rare: '稀有', common: '普通' };
      body = tiers.map(t => {
        const items = rated.filter(c => (c.rarity?.tier || 'common') === t);
        if (!items.length) return '';
        return `<div class="collect-group-label rarity-${t}">${labels[t]}　${items.length}</div><div class="collect-grid">${items.map(_collCardHtml).join('')}</div>`;
      }).join('');
    } else {
      body = `<div class="collect-grid">${rated.map(_collCardHtml).join('')}</div>`;
    }
    el.innerHTML = head + turntableHtml() + body;
    el.querySelector('#collSort')?.addEventListener('change', (e) => { collSort = e.target.value; drawCollection(); });
    el.querySelector('#collGroup')?.addEventListener('click', () => { collGroup = !collGroup; drawCollection(); });
    el.querySelectorAll('[data-coll-genre]').forEach(button => button.addEventListener('click', () => { collGenre = button.dataset.collGenre; drawCollection(); }));
    ensureCollectionPlayer(el);
    // Apple Search API 約限 20 calls/min；只預抓首屏，禁止對整個大收藏全量掃描。
    void prefetchCollection(rated.slice(0, 4));
  }

  // 用 artist + album 對回 quizReels（reel 的 album = title）
  function reelFor(artist, album) {
    return quizReels.find(r => (r.artist || '') === (artist || '') && (r.title || '') === (album || '')) || null;
  }
  function reelUrlFor(artist, album) {
    return reelFor(artist, album)?.url || '';
  }

  // 卡片詳情：介紹 + 星星 + 聆聽連結
  async function openCardDetail(cardId) {
    const c = _collCache.find(x => x.cardId === cardId);
    if (!c) return;
    const ov = document.getElementById('cardDetailOverlay');
    const body = ov.querySelector('.cd-body');
    const tier = c.rarity?.tier || 'common';
    body.innerHTML = `
      <button class="cd-close" data-cd-close>✕</button>
      <div class="cd-rarity rarity-${tier}">${c.rarity?.label || '？'}${c.count > 1 ? `　×${c.count}` : ''}</div>
      ${c.coverUrl ? `<img class="cd-cover" src="${c.coverUrl}" alt="">` : ''}
      <div class="cd-artist">${c.artist || ''}</div>
      <div class="cd-album">${c.album || ''}</div>
      <div class="cd-stars">${c.ratings ? albumRatingsHtml(c.ratings, SPECIAL_TIERS[tier] ? tier : false) : ''}</div>
      <div class="cd-desc" id="cdDesc">載入介紹…</div>
      ${(() => { const ru = c.reelUrl || reelUrlFor(c.artist, c.album); return ru ? `<a class="cd-reel-btn" href="${ru}" target="_blank" rel="noopener">📷 看 Instagram 貼文 →</a>` : ''; })()}
      <div class="cd-streaming" id="cdStreaming"></div>
      <button class="cd-share" data-cd-share="${c.cardId}">✈ 分享卡片</button>
      <button class="cd-delete" data-cd-delete="${c.cardId}">從唱片櫃刪除這張</button>
    `;
    ov.classList.add('open');
    document.body.style.overflow = 'hidden';
    // 介紹一律用事實型專輯簡介（/album-desc，與類型挑片同一套「唱片行熟客」生成邏輯、server 端快取）；
    // 後台手動校正 descOverride 優先。不再讀抽卡當下存的 desc——這樣新舊卡、心情選歌與類型挑片全統一，
    // 也讓舊卡（曾存到心理測驗式描述的）自動改顯示專輯簡介。
    const _reel = reelFor(c.artist, c.album);
    if (c.descOverride) {
      document.getElementById('cdDesc').textContent = c.descOverride;
    } else if (_reel && _reel.description && _reel.description.trim()) {
      // reel 卡：照 IG 貼文內文（店家自己寫的，與剛抽到時一致），不走 /album-desc
      document.getElementById('cdDesc').textContent = _reel.description.trim();
    } else {
      fetch(`${WORKER_URL}/album-desc?artist=${encodeURIComponent(c.artist)}&album=${encodeURIComponent(c.album)}`)
        .then(r => r.ok ? r.json() : {})
        .then(d => { const el = document.getElementById('cdDesc'); if (el) el.textContent = d.desc || '（暫無介紹）'; })
        .catch(() => { const el = document.getElementById('cdDesc'); if (el) el.textContent = '（暫無介紹）'; });
    }
    // 聆聽連結（取 Spotify 直連，其餘搜尋連結保證可點）
    fetch(`${WORKER_URL}/spotify-search?artist=${encodeURIComponent(c.artist)}&album=${encodeURIComponent(c.album)}`)
      .then(r => r.ok ? r.json() : {})
      .then(sr => { const el = document.getElementById('cdStreaming'); if (el) { el.innerHTML = streamingBtnsHtml(c.artist, c.album, sr.spotifyUrl); resolveBandcampBtn(c.artist, c.album, el); } })
      .catch(() => { const el = document.getElementById('cdStreaming'); if (el) { el.innerHTML = streamingBtnsHtml(c.artist, c.album); resolveBandcampBtn(c.artist, c.album, el); } });
  }

  function closeCardDetail() {
    const ov = document.getElementById('cardDetailOverlay');
    if (ov) ov.classList.remove('open');
    document.body.style.overflow = '';
  }

  async function deleteCard(cardId) {
    if (!currentUser) return;
    if (!confirm('確定要從唱片櫃刪除這張卡嗎？')) return;
    try {
      await deleteDoc(doc(db, 'collections', currentUser.uid, 'cards', cardId));
      _collCache = _collCache.filter(c => c.cardId !== cardId);
      closeCardDetail();
      drawCollection();
      showShareToast && showShareToast('已刪除');
    } catch (e) {
      console.warn('[collection] delete failed', e);
      showShareToast && showShareToast('刪除失敗');
    }
  }

  // 唱片櫃互動（委派）：點卡片看詳情、關閉、刪除
  document.addEventListener('click', (e) => {
    if (e.target.closest('[data-turntable-stop]')) { currentRecordId=''; currentRecord=null; window.DipPlayer?.stop(); document.querySelectorAll('.collect-card.active').forEach(card=>card.classList.remove('active')); return; }
    const trackBtn = e.target.closest('[data-preview-track]');
    if (trackBtn) { window.DipPlayer?.unlock?.(); void window.DipPlayer?.playTrack?.(trackBtn.dataset.previewTrack); return; }
    const info = e.target.closest('[data-card-info]');
    if (info) { openCardDetail(info.dataset.cardInfo); return; }
    const card = e.target.closest('.collect-card[data-card-id]');

  async function load() {
    try {
      const q = query(collection(db, 'items'), where('status', '==', '庫存'));
      const snap = await getDocs(q);

      all = snap.docs
        .map(d => ({ id: d.id, ...d.data() }))
        .filter(p => (!p.group || p.group === '' || p.group === '一般庫存') && p.published !== false);

      if (all.length === 0) {
        document.getElementById('countLabel').textContent = '目前沒有在架商品';
        document.getElementById('grid').innerHTML = `<div class="state-msg">目前沒有在架商品。</div>`;
        return;
      }

      buildGenreBar();
      render();
    } catch (e) {
      document.getElementById('grid').innerHTML = `<div class="state-msg">⚠ 錯誤：${e.message}</div>`;
    }
  }

  function buildGenreBar() {
    const bar = document.getElementById('genreBar');
    const genreSet = new Set();
    all.forEach(p => {
      if (Array.isArray(p.genre)) p.genre.forEach(g => genreSet.add(g));
      else if (p.genre) genreSet.add(p.genre);
    });
    const genres = [...genreSet].sort();
    genres.forEach(g => {
      const btn = document.createElement('button');
      btn.className = 'genre-btn';
      btn.dataset.genre = g;
      btn.textContent = g;
      bar.appendChild(btn);
    });
    bar.addEventListener('click', e => {
      const btn = e.target.closest('.genre-btn');
      if (!btn) return;
      activeGenre = btn.dataset.genre;
      bar.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  }

  // ── 音樂試聽 ──
  function toEmbedUrl(url) {
    if (!url) return null;
    // Spotify
    const sp = url.match(/open\.spotify\.com\/(track|album|playlist|artist)\/([a-zA-Z0-9]+)/);
    if (sp) return `https://open.spotify.com/embed/${sp[1]}/${sp[2]}?utm_source=generator`;
    // YouTube / YouTube Music
    const yt = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|music\.youtube\.com\/watch\?v=)([a-zA-Z0-9_-]{11})/);
    if (yt) return `https://www.youtube.com/embed/${yt[1]}`;
    // Apple Music
    const am = url.match(/music\.apple\.com\/([^?#]+)/);
    if (am) return `https://embed.music.apple.com/${am[1]}`;
    // 若已是 embed URL 則直接回傳
    if (/open\.spotify\.com\/embed|youtube\.com\/embed|embed\.music\.apple\.com/.test(url)) return url;
    return null;
  }

  function buildEmbed(embedUrl) {
    const isSpotify = embedUrl.includes('spotify.com/embed');
    const isAM = embedUrl.includes('embed.music.apple.com');
    const h = isSpotify ? 352 : isAM ? 450 : 200;
    if (isAM) {
      // Apple 官方格式：allow 加 * 手機才能取得權限；不加 loading=lazy（modal 動態插入時手機會略過不載）
      return `<iframe allow="autoplay *; encrypted-media *; fullscreen *; clipboard-write" frameborder="0" height="${h}" style="width:100%;overflow:hidden;" sandbox="allow-forms allow-popups allow-same-origin allow-scripts allow-top-navigation-by-user-activation" src="${embedUrl}"></iframe>`;
    }
    if (isSpotify) {
      return `<iframe style="border-radius:12px;" src="${embedUrl}" width="100%" height="${h}" frameborder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" allowfullscreen></iframe>`;
    }
    return `<iframe src="${embedUrl}" width="100%" height="${h}" frameborder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" allowfullscreen></iframe>`;
  }

  // 主標籤切換 —— 所有分頁（含心情選歌 / 類型挑片 / 我的紀錄）統一走這個函式
  let activeTab = 'used';
  let currentView = 'home'; // 目前所在分頁（含非 main-tab 的唱片櫃／紀錄等）

  function setActiveTab(tab) {
    // 卡牌對戰為獨立頁面，直接導向
    if (tab === 'pvp') { location.href = 'pvp.html'; return; }
    if (tab === 'music-map') { location.href = 'music-map.html'; return; }
    if (tab === 'battle') { location.href = 'battle.html'; return; }
    if (tab === 'roguelike') { location.href = 'roguelike.html'; return; }
    currentView = tab;
    // tab 高亮
    document.querySelectorAll('.main-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    document.body.style.overflow = '';
    // 先收起所有內嵌面板
    ['quizModal', 'genreModal', 'historyModal', 'collectionModal'].forEach(id => document.getElementById(id).classList.remove('open'));

    // 「今天聽什麼？」首頁 hub
    const homeHub = document.getElementById('homeHub');
    if (homeHub) homeHub.classList.toggle('show', tab === 'home');
    if (tab === 'home') {
      // 隱藏所有商店 UI，只留首頁 hub
      ['filterSection', 'grid'].forEach(id => { const el = document.getElementById(id); if (el) el.style.display = 'none'; });
      const sb = document.querySelector('.search-bar'); if (sb) sb.style.display = 'none';
      const cb = document.querySelector('.count-bar'); if (cb) cb.style.display = 'none';
      history.replaceState(null, '', location.pathname + location.search);
      return;
    }

    const filterSection = document.getElementById('filterSection');
    const searchBar = document.querySelector('.search-bar');
    const countBar = document.querySelector('.count-bar');
    const grid = document.getElementById('grid');
    const isShop = tab === 'used' || tab === 'new' || tab === 'archive';
    const showFilter = tab === 'used' || tab === 'new';
    if (filterSection) filterSection.style.display = showFilter ? '' : 'none';
    if (searchBar) searchBar.style.display = showFilter ? '' : 'none';
    if (countBar) countBar.style.display = isShop ? '' : 'none';
    if (grid) grid.style.display = isShop ? '' : 'none';

    history.replaceState(null, '', '#' + tab);

    if (tab === 'quiz') {
      document.getElementById('quizModal').classList.add('open');
      (quizQs.length ? Promise.resolve() : loadQuizData()).then(() => startQuiz());
      return;
    }
    if (tab === 'genre') {
      document.getElementById('genreModal').classList.add('open');
      (quizReels.length ? Promise.resolve() : loadQuizData()).then(() => startGenrePick());
      return;
    }
    if (tab === 'random') {
      // 直接來一首：沿用類型挑片結果 UI，但不選類型、不選歌手
      document.getElementById('genreModal').classList.add('open');
      (quizReels.length ? Promise.resolve() : loadQuizData()).then(() => startRandomPick());
      return;
    }
    if (tab === 'history') {
      document.getElementById('historyModal').classList.add('open');
      renderHistorySection(document.getElementById('historyContent'));
      return;
    }
    if (tab === 'collection') {
      document.getElementById('collectionModal').classList.add('open');
      renderCollection();
      return;
    }

    // 商店分頁 used / new / archive
    activeTab = tab;
    if (tab === 'archive') {
      loadArchives();

      activeGenre = 'all';
      document.querySelectorAll('.genre-btn').forEach(b => b.classList.toggle('active', b.dataset.genre === 'all'));
      render();
    }
  }

    if (!p.createdAt) return false;
    const diff = (new Date() - new Date(p.createdAt)) / (1000 * 60 * 60 * 24);

      return [...list].sort((a, b) => (Number(b.customPrice)||Number(b.basePrice)||0) - (Number(a.customPrice)||Number(a.basePrice)||0));

      return [...list].sort((a, b) => (Number(a.customPrice)||Number(a.basePrice)||0) - (Number(b.customPrice)||Number(b.basePrice)||0));
    } else if (activeSortOrder === 'date-asc') {
      return [...list].sort((a, b) => new Date(a.createdAt||0) - new Date(b.createdAt||0));
    } else {
      // date-desc 和 default 都照上架日期新→舊
      return [...list].sort((a, b) => new Date(b.createdAt||0) - new Date(a.createdAt||0));

  function _extractReasonWords(text) {
    // Stop-chars that shouldn't be inside a meaningful chunk (particles/punctuation/numbers/latin)
    const STOP = /[\s，。、！？⋯—：；「」『』\.\,\!\?\:\;0-9A-Za-z的了是在有也都和與但而為把被讓將這那一個不沒就很到去來你我他她它們或及以於從對由等如其此之所因則雖若當再更最太只已還又才會能可要想說看好像著過地得]/;
    const out = new Set();
    // Extract 2- and 3-char Chinese n-grams that contain no stop chars
    for (let n = 2; n <= 3; n++) {
      for (let i = 0; i <= text.length - n; i++) {
        const chunk = text.slice(i, i + n);
        if (!STOP.test(chunk)) out.add(chunk);
      }
    }
    return [...out];
  }
  function _saveReasonWords(text) {
    _extractReasonWords(text).forEach(w => seenReasonWords.add(w));

  function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
    const lines = [];
    let cur = '';
    for (const ch of text) {
      const test = cur + ch;
      if (ctx.measureText(test).width > maxWidth && cur) { lines.push(cur); cur = ch; }
      else cur = test;
    }
    if (cur) lines.push(cur);
    lines.forEach((l, i) => ctx.fillText(l, x, y + i * lineHeight));
    return lines.length;
  }

  function measureLines(ctx, text, maxWidth) {
    let n = 1, cur = '';
    for (const ch of text) {
      const test = cur + ch;
      if (ctx.measureText(test).width > maxWidth && cur) { n++; cur = ch; }
      else cur = test;
    }
    return n;
  }

  async function buildResultCanvas(result) {
    // 9:16 Instagram Stories format
    const W = 1080, H = 1920, SCALE = 1;
    const PAD = 72, COVER_SIZE = 900;
    const COVER_X = (W - COVER_SIZE) / 2, COVER_Y = 260;
    const TEXT_Y = COVER_Y + COVER_SIZE + 60;

    const canvas = document.createElement('canvas');
    canvas.width = W * SCALE; canvas.height = H * SCALE;
    const ctx = canvas.getContext('2d');
    ctx.scale(SCALE, SCALE);

    // White background
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, W, H);

    // Top branding
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#111111';
    ctx.font = '700 42px "Space Mono", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('心情選歌', W / 2, 90);
    ctx.fillStyle = '#999999';
    ctx.font = '400 30px "Space Mono", monospace';
    ctx.fillText('找到你的那張', W / 2, 136);
    ctx.textAlign = 'left';

    // Thin top divider
    ctx.strokeStyle = '#dddddd'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(PAD, 168); ctx.lineTo(W - PAD, 168); ctx.stroke();

    // Album cover
    ctx.fillStyle = '#f0f0f0';
    ctx.fillRect(COVER_X, COVER_Y, COVER_SIZE, COVER_SIZE);
    if (result._coverUrl) {
      try {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = result._coverUrl; });
        ctx.save();
        ctx.beginPath(); ctx.rect(COVER_X, COVER_Y, COVER_SIZE, COVER_SIZE); ctx.clip();
        const aspect = img.naturalWidth / img.naturalHeight;
        let dw = COVER_SIZE, dh = COVER_SIZE / aspect;
        if (dh < COVER_SIZE) { dh = COVER_SIZE; dw = COVER_SIZE * aspect; }
        const dx = COVER_X + (COVER_SIZE - dw) / 2, dy = COVER_Y + (COVER_SIZE - dh) / 2;
        ctx.drawImage(img, dx, dy, dw, dh);
        ctx.restore();
      } catch(e) {
        ctx.font = '120px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillStyle = '#cccccc'; ctx.fillText('♪', W / 2, COVER_Y + COVER_SIZE / 2);
      }
    } else {
      ctx.font = '120px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = '#cccccc'; ctx.fillText('♪', W / 2, COVER_Y + COVER_SIZE / 2);
    }
    ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';

    let y = TEXT_Y;

    // Artist
    ctx.fillStyle = '#888888';
    ctx.font = '400 38px "Space Mono", monospace';
    ctx.fillText(result.artist || '', PAD, y);
    y += 60;

    // Album title (auto-shrink)
    let albumSz = 54;
    ctx.font = `700 ${albumSz}px "Space Mono", monospace`;
    while (ctx.measureText(result.album || '').width > W - PAD * 2 && albumSz > 32) {
      albumSz -= 2; ctx.font = `700 ${albumSz}px "Space Mono", monospace`;
    }
    const albumLH = albumSz + 16;
    const albumLines = wrapText(ctx, result.album || '', PAD, y + albumSz, W - PAD * 2, albumLH);
    y += albumLines * albumLH + 40;

    // Reason text in bordered box
    const reasonText = (result.reason || '').slice(0, 200);
    const BOX_PAD = 40, LH_R = 46;
    ctx.font = '400 30px "Space Mono", monospace';
    const reasonLineCount = measureLines(ctx, reasonText, W - PAD * 2 - BOX_PAD * 2);
    const boxH = reasonLineCount * LH_R + BOX_PAD * 2;
    ctx.strokeStyle = '#cccccc'; ctx.lineWidth = 2;
    ctx.strokeRect(PAD, y, W - PAD * 2, boxH);
    ctx.fillStyle = '#444444';
    ctx.textBaseline = 'top';
    wrapText(ctx, reasonText, PAD + BOX_PAD, y + BOX_PAD, W - PAD * 2 - BOX_PAD * 2, LH_R);
    ctx.textBaseline = 'alphabetic';
    y += boxH + 60;

    // Bottom divider + URL
    ctx.strokeStyle = '#dddddd'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(PAD, H - 100); ctx.lineTo(W - PAD, H - 100); ctx.stroke();
    ctx.fillStyle = '#555555';
    ctx.font = '400 22px "Space Mono", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('dipvinyl.tw/quiz', W / 2, H - 52);
    ctx.textAlign = 'left';

    return canvas;
  }

  // Spotify result cache (localStorage) — avoids repeated API calls for same album
  const SPOTIFY_CACHE_KEY = 'dip_spotify_cache_v4'; // v4：worker 加跨語言比對後重抓（日韓中文專輯改由 Spotify 命中）
  const SPOTIFY_CACHE_MAX = 300;
  function _spotifyCacheKey(artist, album) {
    return (artist + '||' + album).toLowerCase().trim();
  }
  function _spotifyCacheGet(key) {
    try {
      const s = localStorage.getItem(SPOTIFY_CACHE_KEY);
      if (!s) return null;
      const cache = JSON.parse(s);
      return cache[key] || null;
    } catch(e) { return null; }
  }
  function _spotifyCacheSet(key, val) {
    try {
      const s = localStorage.getItem(SPOTIFY_CACHE_KEY);
      const cache = s ? JSON.parse(s) : {};
      cache[key] = val;
      const keys = Object.keys(cache);
      if (keys.length > SPOTIFY_CACHE_MAX) {
        // drop oldest half
        keys.slice(0, keys.length - SPOTIFY_CACHE_MAX / 2).forEach(k => delete cache[k]);
      }
      localStorage.setItem(SPOTIFY_CACHE_KEY, JSON.stringify(cache));
    } catch(e) {}
  }

  // 封面查詢：走 Worker 的 /spotify-search（伺服器端 Spotify API，CORS 正確、附 24h 快取）
  // 改用此法是因為手機瀏覽器直接打 iTunes 常因跨來源/ITP/逾時而失敗，導致沒封面、Apple Music 不能按
  async function fetchSpotifyCover(artist, album) {
    const cacheKey = _spotifyCacheKey(artist, album);
    const cached = _spotifyCacheGet(cacheKey);
    if (cached) { console.log('[cover] local cache hit', artist, '-', album); return cached; }

    const ctrl = new AbortController();
    const tid = setTimeout(() => ctrl.abort(), 8000);
    try {
      const res = await fetch(
        `${WORKER_URL}/spotify-search?artist=${encodeURIComponent(artist)}&album=${encodeURIComponent(album)}`,
        { signal: ctrl.signal }
      );
      clearTimeout(tid);
      const result = res.ok ? (await res.json()) : {};
      console.log('[cover]', result.imageUrl ? '✓' : '✗', artist, '-', album);
      if (result.imageUrl) { _spotifyCacheSet(cacheKey, result); return result; }
      // Spotify 沒有 → 回頭問 Bandcamp（冷門／獨立發行常只在這裡有）
      const bc = await fetchBandcampCover(artist, album);
      if (bc.imageUrl || bc.bandcampUrl) {
        const merged = { ...result, imageUrl: bc.imageUrl || null, bandcampUrl: bc.bandcampUrl || null };
        if (merged.imageUrl) _spotifyCacheSet(cacheKey, merged);
        return merged;
      }
      // Bandcamp 也沒有 → 確認 YT Music 有官方專輯頁（無封面，但證明專輯真實存在＋給直連）
      const yt = await fetchYtAlbumVerify(artist, album);
      if (yt.url) return { ...result, ytUrl: yt.url };
      return result;
    } catch(e) {
      clearTimeout(tid);
      console.warn('[cover] exception:', e);
      return {};
    }
  }

  function streamingBtnsHtml(artist, album, spotifyUrl, bandcampUrl, ytUrl) {

    const bandcampBtn = bandcampUrl

  // （streamingBtnsHtml 在 bandcampUrl 未知時會先給灰色 placeholder，這裡才去問 Bandcamp。）
  async function resolveBandcampBtn(artist, album, containerEl) {
    if (!containerEl) return;
    const btn = containerEl.querySelector('.streaming-btn[data-platform="bandcamp"]');
    if (!btn || btn.hasAttribute('href')) return; // 已是直連就不用查
    try {
      const bc = await fetchBandcampCover(artist, album);

  // 專輯三維評分（預設五顆星；殿堂經典度用 7 顆）
  function ratingStars(n, total = 5) {
    n = Math.max(0, Math.min(total, Math.round(Number(n) || 0)));
    let s = '';
    for (let i = 1; i <= total; i++) s += `<span class="${i <= n ? 'on' : 'off'}">★</span>`;
    return s;
  }
  // special：'hall'|'pearl'|'heresy'|false。對應數值軸固定 7 顆星＋專屬掃光色，其餘照原本。
  //（相容舊呼叫：傳 true 視同 'hall'）
  function albumRatingsHtml(r, special = false) {
    if (special === true) special = 'hall';
    const sp = special && SPECIAL_TIERS[special] ? SPECIAL_TIERS[special] : null;
    const row = (label, n, total = 5, cls = '') => `<div class="rating-row"><span class="rating-label">${label}</span><span class="rating-stars${cls ? ' ' + cls : ''}">${ratingStars(n, total)}</span></div>`;
    const dimRow = (label, dim, value) => (sp && sp.dim === dim)
      ? row(label, 7, 7, sp.ratingCls)
      : row(label, value);
    return `<div class="album-ratings">${dimRow('冷門度', 'obscurity', r.obscurity)}${dimRow('經典度', 'classic', r.classic)}${dimRow('硬蕊度', 'accessibility', r.accessibility)}</div>`;
  }

  const HISTORY_KEY = 'dip_history';

  async function compressCoverToBase64(url) {
    try {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = url; });
      const SIZE = 160;
      const canvas = document.createElement('canvas');
      canvas.width = SIZE; canvas.height = SIZE;
      const ctx = canvas.getContext('2d');
      const aspect = img.naturalWidth / img.naturalHeight;
      let dw = SIZE, dh = SIZE / aspect;
      if (dh < SIZE) { dh = SIZE; dw = SIZE * aspect; }
      ctx.drawImage(img, (SIZE - dw) / 2, (SIZE - dh) / 2, dw, dh);
      return canvas.toDataURL('image/jpeg', 0.75);
    } catch(e) { return null; }
  }

  async function saveToHistory({ type, artist, album, reason, coverUrl }) {
    const history = loadHistory();
    if (history[0]?.artist === artist && history[0]?.album === album) return;
    const coverData = coverUrl ? await compressCoverToBase64(coverUrl) : null;
    const record = {
      id: Date.now().toString(),
      type, artist, album, reason: reason || '', coverData,
      date: new Date().toLocaleDateString('zh-Hant', { month: 'numeric', day: 'numeric' }),
    };
    history.unshift(record);
    if (history.length > HISTORY_MAX) history.length = HISTORY_MAX;
    try { localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); } catch(e) {}
  }

  function loadHistory() {
    try { const s = localStorage.getItem(HISTORY_KEY); return s ? JSON.parse(s) : []; }
    catch(e) { return []; }
  }

  function clearHistory() {
    try { localStorage.removeItem(HISTORY_KEY); } catch(e) {}

  function renderHistorySection(containerEl) {
    containerEl.querySelectorAll('.history-section').forEach(el => el.remove());
    const history = loadHistory();
    const section = document.createElement('div');
    section.className = 'history-section';
    section.innerHTML = `
      <div class="history-section-header">
        <span class="history-section-title">我的紀錄</span>
        ${history.length ? `<button class="history-clear-btn">清除紀錄</button>` : ''}
      </div>
      <div class="history-list">
        ${history.length === 0
          ? `<div class="history-empty">尚無紀錄。</div>`
          : history.map(r => `
            <div class="history-item">
              <div class="history-item-row">
                ${r.coverData
                  ? `<img class="history-thumb" src="${r.coverData}" alt="">`
                  : `<div class="history-thumb-placeholder">♪</div>`}
                <div class="history-item-info">
                  <div class="history-item-meta">
                    <span class="history-item-badge">${r.type === 'genre' ? 'Genre' : 'Quiz'}</span>
                    <span class="history-item-date">${r.date}</span>
                  </div>
                  <div class="history-item-artist">${r.artist || ''}</div>
                  <div class="history-item-album">${r.album || ''}</div>
                </div>
                <span class="history-item-toggle">▾</span>
              </div>
              <div class="history-item-detail">
                ${r.reason ? `<div class="history-item-reason">${r.reason}</div>` : ''}
                ${historyMusicLinks(r.artist, r.album)}
                <button class="quiz-collect-btn" style="margin-top:12px;" data-history-collect data-artist="${(r.artist || '').replace(/"/g, '&quot;')}" data-album="${(r.album || '').replace(/"/g, '&quot;')}">＋ 收進唱片櫃</button>
              </div>
            </div>
          `).join('')}
      </div>
    `;
    section.querySelector('.history-clear-btn')?.addEventListener('click', () => {
      clearHistory();
      renderHistorySection(containerEl);
    });
    // 點擊紀錄列展開／收合介紹與音樂連結
    section.querySelectorAll('.history-item-row').forEach(row => {
      row.addEventListener('click', () => row.closest('.history-item').classList.toggle('expanded'));
    });
    containerEl.appendChild(section);
  }

      const promptHeresy = `你是一位黑膠唱片店的前衛樂狂熱者。這次只推「極度難入耳、挑戰聽覺極限」的怪盤——${gpIsRandom ? '橫跨任何曲風' : `屬於 ${genreInfo.label} 領域中最前衛難啃的那一端`}：噪音(noise)、自由即興、自由爵士的 skronk、musique concrète、harsh/實驗電子、無調性、結構崩解那種（Merzbow、Captain Beefheart《Trout Mask Replica》、Lou Reed《Metal Machine Music》、Yoko Ono、Albert Ayler 那種等級）。
${seenList}- 重點是「第一次聽會皺眉、難以入耳、需要門檻」，不是單純小眾好聽
- 只推薦你 100% 確定真實存在、能在 Spotify 找到的作品，名稱完全正確、一律用原文
- 推薦 ${N} 張不同藝人的難入耳怪盤，依「最難入耳」由高到低排序

直接輸出 JSON 陣列，第一個字元就是 [，禁止任何前言：
[{"artist":"藝人名稱","album":"專輯名稱"}]`;

      let verified = null;
      const retryNote = failedAlbums.length
        ? `\n以下封面都找不到，請整批換成別的（不同藝人、不同專輯）：\n${failedAlbums.join('\n')}\n`
        : '';
      const usePrompt = (classicMode ? promptClassic : (obscureMode ? promptObscure : (heresyMode ? promptHeresy : (popularMode ? promptPopular : (gpIsRandom ? promptRandom : (gpMode === 'fast' ? promptFastBatch : promptDeep)))))) + retryNote;

      const resp = await fetch(`${WORKER_URL}/claude`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: [{ role: 'user', content: usePrompt }] }),
      });
      const apiData = await resp.json();
      logApiUsage('claude', apiData.usage?.total_tokens);
      if (apiData.apiError) {
        if (/overload|529/i.test(apiData.apiError)) {
          overloadCount++;
          if (overloadCount >= 3) {
            document.getElementById('genreContent').innerHTML =
              `<div class="quiz-error" style="padding:40px 20px;">目前人數過多，請稍後再試<br><br><button data-gp-action="retry" style="padding:8px 20px;cursor:pointer;font-family:var(--mono);">晚點再來</button></div>`;
            return;
          }
          document.getElementById('genreContent').innerHTML =
            `<div class="quiz-loading"><div class="spinner"></div><div class="quiz-loading-text">目前人數過多，排隊中…</div></div>`;
          await new Promise(r => setTimeout(r, 3000));
          continue;
        }
        const isRateLimit = /429|rate.?limit|quota/i.test(apiData.apiError);
        throw new Error(isRateLimit ? '今天的算力已用完，明天再來挑戰吧 ✦' : apiData.apiError);
      }

      const text = apiData.content?.[0]?.text || '';
      console.log('[gp] batch raw:', text.slice(0, 200));
      let recs = [];
      const arrMatch = text.match(/\[[\s\S]*\]/);
      if (arrMatch) { try { recs = JSON.parse(arrMatch[0]); } catch(e) { console.warn('[gp] array parse failed', e); } }
      if (!Array.isArray(recs) || !recs.length) {
        const objs = text.match(/\{[^{}]*"artist"[^{}]*"album"[^{}]*\}/g) || [];
        recs = objs.map(o => { try { return JSON.parse(o); } catch(e) { return null; } }).filter(Boolean);
      }
      recs = (recs || []).filter(r => r && r.artist && r.album)
        .filter(r => !gpSeenAlbums.has(`${r.artist}||${r.album}`.toLowerCase()));
      console.log('[gp] batch candidates:', recs.map(r => `${r.artist} — ${r.album}`));

      if (!recs.length) {
        batchAttempt++;
        if (batchAttempt < 2) continue;
        throw new Error('找不到合適的推薦，請再試一次');
      }

      // 一次拿到多張候選，封面並行驗證；依信心排序挑第一張有封面的
      const checked = await Promise.all(
        recs.map(r => fetchSpotifyCover(r.artist, r.album)
          .then(sr => ({ rec: r, spotifyResult: sr || {} }))
          .catch(() => ({ rec: r, spotifyResult: {} })))
      );
      verified = checked.find(c => c.spotifyResult && c.spotifyResult.imageUrl) || null;
      console.log('[gp] cover hit:', verified ? `${verified.rec.artist} — ${verified.rec.album}` : 'none');

      if (!verified) {
        failedAlbums.push(...recs.map(r => `${r.artist} — ${r.album}`));
        batchAttempt++;
        if (batchAttempt < 2) continue;
        console.warn('[gp] all batch covers failed, showing first without cover');
        verified = { rec: recs[0], spotifyResult: { imageUrl: null, spotifyUrl: null } };
      }
      // 極冷門模式：用真實聽眾數驗證，夠冷（< 門檻）才升格「流亡」
      let isPearl = false;
      if (obscureMode) {
        const lis = await fetchAlbumListeners(verified.rec.artist, verified.rec.album);
        isPearl = (lis !== null && lis < ULTRA_OBSCURE_MAX_LISTENERS);
        console.log('[gp] obscure listeners:', lis, '→ pearl:', isPearl);
      }
      await showGpResult({
        artist: verified.rec.artist, album: verified.rec.album, reason: '',
        _coverUrl: verified.spotifyResult.imageUrl, _spotifyUrl: verified.spotifyResult.spotifyUrl, _streaming: true,
        _hall: classicMode, _pearl: isPearl, _heresy: heresyMode,
      });
      const reasonEl = document.querySelector('#genreContent .quiz-result-reason');
      const reason = gpIsRandom
        ? await getRandomReason(verified.rec.artist, verified.rec.album, reasonEl)
        : await getGpReason(verified.rec.artist, verified.rec.album, gpGenre, gpArtists, reasonEl);
      lastGpResult.reason = reason;
      recordDrawnCard(lastGpResult);
      if (reason) _saveReasonWords(reason);
      saveToHistory({ type: 'genre', artist: verified.rec.artist, album: verified.rec.album, reason, coverUrl: verified.spotifyResult.imageUrl })
        .then(() => renderHistorySection(document.getElementById('genreContent')));
      return;
    } catch(e) {
      document.getElementById('genreContent').innerHTML =
        `<div class="quiz-error" style="padding:40px 20px;">⚠ ${e.message}<br><br><button data-gp-action="retry" style="padding:8px 20px;cursor:pointer;font-family:var(--mono);">再試一次</button></div>`;
      return;
    }
    } // end while
  }

  async function shareGpResult() {
