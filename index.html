<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>dip vinyl shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --black: #111; --gray: #888; --line: #ddd; --bg: #fff; --mono: 'Space Mono', monospace; }
    body { background: var(--bg); color: var(--black); font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em; }

    .topbar {
      border-bottom: 1px solid var(--line); padding: 0 20px; height: 40px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; background: #fff; z-index: 50;
    }
    .topbar-logo { font-size: 12px; font-weight: 700; letter-spacing: 0.12em; }
    .topbar-right { color: var(--gray); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; }

    .search-bar {
      border-bottom: 1px solid var(--line); padding: 0 20px; height: 36px;
      display: flex; align-items: center; gap: 10px;
    }
    .search-bar label { font-size: 10px; color: var(--gray); letter-spacing: 0.1em; text-transform: uppercase; white-space: nowrap; }
    .search-bar input { border: none; outline: none; font-family: var(--mono); font-size: 11px; color: var(--black); width: 100%; background: transparent; }
    .search-bar input::placeholder { color: var(--gray); }

    .main-tabs { border-bottom: 1px solid var(--line); display: flex; }
    .main-tab { background: none; border: none; border-bottom: 3px solid transparent; padding: 0 28px; height: 48px; font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gray); cursor: pointer; transition: all 0.15s; }
    .main-tab:hover { color: var(--black); }
    .main-tab.active { color: var(--black); border-bottom-color: var(--black); }
    .archive-card { border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); cursor: pointer; text-decoration: none; color: var(--black); display: block; }
    .archive-thumb { position: relative; aspect-ratio: 16/9; overflow: hidden; background: #f0f0f0; }
    .archive-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.35s; }
    .archive-card:hover .archive-thumb img { transform: scale(1.04); }
    .archive-play { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0); transition: background 0.2s; }
    .archive-card:hover .archive-play { background: rgba(0,0,0,0.35); }
    .archive-play svg { opacity: 0; transition: opacity 0.2s; }
    .archive-card:hover .archive-play svg { opacity: 1; }
    .genre-bar {
      border-bottom: 1px solid var(--line); padding: 0 20px; height: 36px;
      display: flex; align-items: center; overflow-x: auto; scrollbar-width: none; gap: 0;
    }
    .genre-bar::-webkit-scrollbar { display: none; }
    .genre-btn {
      background: none; border: none; border-right: 1px solid var(--line);
      padding: 0 16px; height: 36px; font-family: var(--mono);
      font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--gray); cursor: pointer; white-space: nowrap; flex-shrink: 0;
      transition: color 0.15s;
    }
    .genre-btn:first-child { padding-left: 0; }
    .genre-btn:hover { color: var(--black); }
    .genre-btn.active { color: var(--black); font-weight: 700; }
    .card-genre { font-size: 10px; color: var(--gray); margin-bottom: 6px; }

    .sort-select {
      background: none; border: none; border-left: 1px solid var(--line);
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--gray); cursor: pointer;
      padding: 0 16px; height: 28px; outline: none;
    }
    .sort-select:hover { color: var(--black); }

    .count-bar {
      border-bottom: 1px solid var(--line); padding: 0 20px; height: 28px;
      display: flex; align-items: center;
      color: var(--gray); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
    }

    .grid { display: grid; grid-template-columns: repeat(4, 1fr); }
    @media (max-width: 900px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 560px) { .grid { grid-template-columns: repeat(2, 1fr); } }

    .card { border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); cursor: pointer; }
    .card-img-wrap { position: relative; aspect-ratio: 1; overflow: hidden; background: #f0f0f0; }
    .card-img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.35s ease; }
    .card:hover .card-img { transform: scale(1.04); }
    .card-img-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 36px; color: #ccc; }
    .card-img-wrap::after {
      content: 'VIEW'; position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(17,17,17,0.82); color: #fff;
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; text-align: center; padding: 9px;
      transform: translateY(100%); transition: transform 0.2s ease;
    }
    .card:hover .card-img-wrap::after { transform: translateY(0); }

    .card-info { padding: 10px 12px 12px; border-top: 1px solid var(--line); }
    .card-name {
      font-size: 11px; font-weight: 700; line-height: 1.4; margin-bottom: 8px;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-bottom { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 4px; }
    .card-price { font-size: 11px; font-weight: 700; }
    .card-artist { font-size: 10px; color: var(--gray); margin-bottom: 4px; }
    .card-no-price { font-size: 10px; color: var(--gray); }
    .card-genre { font-size: 10px; color: var(--gray); margin-bottom: 6px; }

    .state-msg { grid-column: 1 / -1; padding: 80px 20px; text-align: center; color: var(--gray); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; }
    .spinner { width: 18px; height: 18px; border: 1px solid var(--line); border-top-color: var(--black); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .modal-bg { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.97); z-index: 260; overflow-y: auto; }
    .modal-bg.open { display: block; }
    .modal { max-width: 800px; margin: 0 auto; border-left: 1px solid var(--line); border-right: 1px solid var(--line); min-height: 100vh; }
    .modal-topbar {
      border-bottom: 1px solid var(--line); padding: 0 20px; height: 40px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; background: rgba(255,255,255,0.97);
    }
    .modal-topbar span { font-size: 10px; color: var(--gray); letter-spacing: 0.08em; text-transform: uppercase; }
    .modal-close-btn {
      background: none; border: 1px solid var(--line); font-family: var(--mono);
      font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 4px 12px; cursor: pointer; color: var(--black); transition: all 0.15s;
    }
    .modal-close-btn:hover { background: var(--black); color: #fff; border-color: var(--black); }
    .modal-body { display: grid; grid-template-columns: 1fr 1fr; }
    @media (max-width: 560px) { .modal-body { grid-template-columns: 1fr; } }
    .modal-img-wrap { aspect-ratio: 1; background: #f0f0f0; border-right: 1px solid var(--line); overflow: hidden; }
    .modal-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .carousel { position: relative; width: 100%; height: 100%; }
    .carousel-imgs { width: 100%; height: 100%; position: relative; overflow: hidden; }
    .carousel-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.3s; }
    .carousel-img.active { opacity: 1; }
    .carousel-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: #fff; border: none; font-size: 16px; width: 32px; height: 48px; cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center; }
    .carousel-btn.prev { left: 0; }
    .carousel-btn.next { right: 0; }
    .carousel-dots { position: absolute; bottom: 8px; left: 0; right: 0; display: flex; justify-content: center; gap: 6px; }
    .carousel-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.5); cursor: pointer; border: none; }
    .carousel-dot.active { background: #fff; }
    .modal-img-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 60px; color: #ccc; }
    .modal-detail { padding: 20px; display: flex; flex-direction: column; }
    .modal-price { font-size: 22px; font-weight: 700; padding-bottom: 16px; border-bottom: 1px solid var(--line); }
    .modal-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid var(--line); gap: 12px; }
    .modal-row-label { font-size: 10px; color: var(--gray); letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap; flex-shrink: 0; }
    .modal-row-value { font-size: 11px; font-weight: 700; text-align: right; line-height: 1.5; }
    .modal-note { margin-top: 20px; font-size: 10px; color: var(--gray); line-height: 1.9; }

    /* 音樂試聽 */
    .modal-music { border-top: 1px solid var(--line); padding: 16px 20px; }
    .modal-music-label { font-size: 10px; color: var(--gray); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
    .modal-music-label svg { flex-shrink: 0; }
    .modal-music-platforms { margin-left: auto; display: flex; gap: 6px; }
    .music-platform-btn { display: inline-flex; align-items: center; gap: 4px; font-family: var(--mono); font-size: 9px; letter-spacing: 0.05em; color: var(--gray); text-decoration: none; border: 1px solid var(--line); padding: 3px 8px; transition: all 0.15s; white-space: nowrap; }
    .music-platform-btn:hover { color: var(--black); border-color: var(--black); }
    .modal-music iframe { display: block; border: none; width: 100%; }
    .modal-music-search { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
    .music-search-btn { background: none; border: 1px solid var(--line); font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em; padding: 5px 12px; cursor: pointer; color: var(--gray); text-decoration: none; display: inline-block; transition: all 0.15s; }
    .music-search-btn:hover { border-color: var(--black); color: var(--black); }

    /* 購物車 */
    .cart-btn { position: fixed; bottom: 140px; right: 24px; background: var(--black); color: #fff; border: none; font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 0.1em; padding: 12px 18px; cursor: pointer; z-index: 150; display: flex; align-items: center; gap: 8px; transition: opacity 0.2s; }
    .cart-btn:hover { opacity: 0.8; }
    .cart-count { background: #fff; color: var(--black); font-size: 10px; font-weight: 700; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .cart-panel { position: fixed; inset: 0; z-index: 300; display: none; }
    .cart-panel.open { display: flex; }
    .cart-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); }
    .cart-drawer { position: absolute; right: 0; top: 0; bottom: 0; width: 420px; max-width: 100vw; background: #fff; display: flex; flex-direction: column; }
    @media (max-width: 560px) { .cart-drawer { width: 100vw; } }
    .cart-header { border-bottom: 1px solid var(--line); padding: 0 20px; height: 48px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .cart-header h2 { font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
    .cart-close { background: none; border: 1px solid var(--line); font-family: var(--mono); font-size: 10px; padding: 4px 12px; cursor: pointer; letter-spacing: 0.1em; text-transform: uppercase; }
    .cart-close:hover { background: var(--black); color: #fff; border-color: var(--black); }
    .cart-items { flex: 1; overflow-y: auto; }
    .cart-item { display: flex; gap: 12px; padding: 12px 20px; border-bottom: 1px solid var(--line); align-items: center; }
    .cart-item-img { width: 56px; height: 56px; object-fit: cover; background: var(--line); flex-shrink: 0; }
    .cart-item-info { flex: 1; min-width: 0; }
    .cart-item-name { font-size: 11px; font-weight: 700; line-height: 1.4; margin-bottom: 4px; }
    .cart-item-price { font-size: 11px; color: var(--gray); }
    .cart-item-remove { background: none; border: none; color: var(--gray); font-size: 16px; cursor: pointer; flex-shrink: 0; }
    .cart-item-remove:hover { color: var(--black); }
    .cart-empty { padding: 60px 20px; text-align: center; color: var(--gray); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; }
    .cart-footer { border-top: 1px solid var(--line); padding: 16px 20px; flex-shrink: 0; }
    .cart-total { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
    .cart-total-label { font-size: 10px; color: var(--gray); letter-spacing: 0.08em; text-transform: uppercase; }
    .cart-total-price { font-size: 18px; font-weight: 700; }
    .btn-checkout { width: 100%; background: var(--black); color: #fff; border: none; font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; padding: 14px; cursor: pointer; transition: opacity 0.2s; }
    .btn-checkout:hover { opacity: 0.8; }
    .btn-checkout:disabled { opacity: 0.35; cursor: not-allowed; }

    /* 結帳 modal */
    .checkout-modal { position: fixed; inset: 0; z-index: 400; display: none; align-items: center; justify-content: center; padding: 20px; background: rgba(0,0,0,0.7); }
    .checkout-modal.open { display: flex; }
    .checkout-box { background: #fff; width: 100%; max-width: 480px; }
    .checkout-box-header { border-bottom: 1px solid var(--line); padding: 0 20px; height: 48px; display: flex; align-items: center; justify-content: space-between; }
    .checkout-box-header h2 { font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
    .checkout-box-body { padding: 20px; }
    .checkout-field { margin-bottom: 12px; }
    .checkout-field label { display: block; font-size: 10px; color: var(--gray); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
    .checkout-field input, .checkout-field textarea { width: 100%; border: 1px solid var(--line); padding: 9px 10px; font-family: var(--mono); font-size: 11px; outline: none; }
    .checkout-field input:focus, .checkout-field textarea:focus { border-color: var(--black); }
    .checkout-summary { background: var(--bg); padding: 12px; margin-bottom: 16px; font-size: 10px; line-height: 2; border: 1px solid var(--line); max-height: 160px; overflow-y: auto; }
    .checkout-success { padding: 40px 20px; text-align: center; display: none; }
    .checkout-success h3 { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
    .checkout-success p { font-size: 11px; color: var(--gray); line-height: 1.8; }

    /* NEW 標籤 */
    .card-new-badge {
      position: absolute; bottom: 0; right: 0;
      background: #e8383d; color: #fff;
      font-family: var(--mono); font-size: 9px; font-weight: 700;
      letter-spacing: 0.1em; padding: 3px 7px;
      text-transform: uppercase; line-height: 1;
    }

    /* 首版 + pressing 標籤 */
    .card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; }
    .card-tag-item { font-family: var(--mono); font-size: 9px; letter-spacing: 0.08em; border: 1px solid var(--black); padding: 1px 5px; text-transform: uppercase; }
    .card-tag-first { background: var(--black); color: #fff; }

    footer { border-top: 1px solid var(--line); padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
    footer .f-logo { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; }
    footer p { font-size: 10px; color: var(--gray); }

    /* 心理測驗 */
    .quiz-modal { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.98); z-index: 250; overflow-y: auto; }
    .quiz-modal.open { display: block; }
    .quiz-inner { max-width: 560px; margin: 0 auto; border-left: 1px solid var(--line); border-right: 1px solid var(--line); min-height: 100vh; }
    .quiz-topbar { border-bottom: 1px solid var(--line); padding: 0 20px; height: 40px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: rgba(255,255,255,0.98); z-index: 10; }
    .quiz-progress { padding: 16px 20px; border-bottom: 1px solid var(--line); }
    .quiz-progress-track { height: 1px; background: var(--line); margin-bottom: 8px; }
    .quiz-progress-fill { height: 1px; background: var(--black); transition: width 0.3s; }
    .quiz-progress-label { font-size: 10px; color: var(--gray); letter-spacing: 0.08em; text-transform: uppercase; }
    .quiz-q-area { padding: 32px 20px 20px; }
    .quiz-question { font-size: 14px; font-weight: 700; line-height: 1.7; margin-bottom: 28px; }
    .quiz-options { display: flex; flex-direction: column; gap: 10px; }
    .quiz-option { background: none; border: 1px solid var(--line); font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em; padding: 14px 16px; cursor: pointer; text-align: left; transition: all 0.15s; color: var(--black); line-height: 1.5; width: 100%; }
    .quiz-option:hover { border-color: var(--black); }
    .quiz-option.selected { background: var(--black); color: #fff; border-color: var(--black); }
    .quiz-nav { padding: 20px; display: flex; gap: 10px; border-top: 1px solid var(--line); }
    .quiz-nav-btn { flex: 1; background: none; border: 1px solid var(--line); font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 12px; cursor: pointer; color: var(--black); transition: all 0.15s; }
    .quiz-nav-btn:hover:not(:disabled) { border-color: var(--black); }
    .quiz-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .quiz-nav-btn.primary { background: var(--black); color: #fff; border-color: var(--black); }
    .quiz-nav-btn.primary:hover { opacity: 0.8; }
    .quiz-loading { padding: 80px 20px; text-align: center; }
    .quiz-loading .spinner { margin: 0 auto 16px; }
    .quiz-loading-text { font-size: 10px; color: var(--gray); letter-spacing: 0.12em; text-transform: uppercase; }
    .quiz-result { padding: 32px 20px; }
    .quiz-result-label { font-size: 10px; color: var(--gray); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 16px; }
    .quiz-result-cover { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; margin-bottom: 20px; border: 1px solid var(--line); cursor: pointer; }
    .quiz-result-artist { font-size: 10px; color: var(--gray); margin-bottom: 6px; letter-spacing: 0.06em; }
    .quiz-result-album { font-size: 15px; font-weight: 700; line-height: 1.5; margin-bottom: 16px; }
    .quiz-result-reason { font-size: 11px; line-height: 1.9; padding: 16px; border: 1px solid var(--line); margin-bottom: 20px; }
    .quiz-result-cta { display: block; text-align: center; padding: 12px; border: 1px solid var(--black); font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--black); text-decoration: none; margin-bottom: 12px; transition: all 0.15s; cursor: pointer; background: none; width: 100%; }
    .quiz-result-cta:hover { background: var(--black); color: #fff; }
    .quiz-retry-btn { width: 100%; background: none; border: 1px solid var(--line); font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 12px; cursor: pointer; color: var(--gray); transition: all 0.15s; }
    .quiz-retry-btn:hover { border-color: var(--black); color: var(--black); }
    .quiz-share-btn { width: 100%; background: var(--black); color: #fff; border: none; font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 12px; cursor: pointer; margin-bottom: 12px; transition: opacity 0.15s; }
    .quiz-share-btn:hover { opacity: 0.75; }
    .quiz-result-cover-link { display: block; }
    .quiz-stock-row { margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--line); }
    .quiz-stock-row-label { font-size: 9px; color: var(--gray); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 12px; }
    .quiz-stock-thumbs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .quiz-stock-thumb { cursor: pointer; }
    .quiz-stock-thumb img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; border: 1px solid var(--line); transition: opacity 0.15s; }
    .quiz-stock-thumb:hover img { opacity: 0.7; }
    .quiz-stock-thumb-name { font-size: 8px; color: var(--gray); margin-top: 4px; letter-spacing: 0.04em; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  </style>
</head>
<body>

<header class="topbar">
  <div class="topbar-logo">dip vinyl shop</div>
  <div class="topbar-right" style="display:flex;align-items:center;gap:16px;">
    <a href="https://www.instagram.com/dip.vinyl/" target="_blank" style="color:var(--black);display:flex;align-items:center;" title="Instagram">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
      </svg>
    </a>
    <span style="font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--gray);">黑膠唱片</span>
  </div>
</header>

<div class="main-tabs" id="mainTabs">
  <button class="main-tab active" data-tab="used">Used</button>
  <button class="main-tab" data-tab="new">New</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyBpR5XKKHwT_eQoShtBPtFNRXz4ymzPWQg",
    authDomain: "price-manager-e8846.firebaseapp.com",
    projectId: "price-manager-e8846",
    storageBucket: "price-manager-e8846.firebasestorage.app",
    messagingSenderId: "570133498387",
    appId: "1:570133498387:web:8835b8d2373797e91d0de6"
  });

  const db = getFirestore(app);
  let all = [], searchQ = '', activeGenre = 'all';

  async function load() {
    try {
      const q = query(collection(db, 'items'), where('status', '==', '庫存'));
      const snap = await getDocs(q);

      all = snap.docs
        .map(d => ({ id: d.id, ...d.data() }))
        .filter(p => !p.group || p.group === '' || p.group === '一般庫存');

      if (all.length === 0) {
        document.getElementById('countLabel').textContent = '目前沒有在架商品';
        document.getElementById('grid').innerHTML = `<div class="state-msg">目前沒有在架商品。</div>`;
        return;
      }

      buildGenreBar();
      render();
    } catch (e) {
      document.getElementById('grid').innerHTML = `<div class="state-msg">⚠ 錯誤：${e.message}</div>`;
    }
  }

  function buildGenreBar() {
    const bar = document.getElementById('genreBar');
    const genreSet = new Set();
    all.forEach(p => {
      if (Array.isArray(p.genre)) p.genre.forEach(g => genreSet.add(g));
      else if (p.genre) genreSet.add(p.genre);
    });
    const genres = [...genreSet].sort();
    genres.forEach(g => {
      const btn = document.createElement('button');
      btn.className = 'genre-btn';
      btn.dataset.genre = g;
      btn.textContent = g;
      bar.appendChild(btn);
    });
    bar.addEventListener('click', e => {
      const btn = e.target.closest('.genre-btn');
      if (!btn) return;
      activeGenre = btn.dataset.genre;
      bar.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  }

  document.getElementById('searchInput').addEventListener('input', e => {
    searchQ = e.target.value.toLowerCase();
    render();
  });

  function formatPrice(p) {
    const custom = Number(p.customPrice);
    if (custom && custom > 0) return `NT$ ${custom.toLocaleString()}`;
    const base = Number(p.basePrice);
    if (base && base > 0) return `${p.baseCurrency || 'JPY'} ${base.toLocaleString()}`;
    return null;
  }

  function render() {
    const list = all.filter(p => {
      const matchSearch = !searchQ || (p.name||'').toLowerCase().includes(searchQ);
      const matchGenre = activeGenre === 'all' || (
        Array.isArray(p.genre) ? p.genre.includes(activeGenre) : p.genre === activeGenre
      );
      return matchSearch && matchGenre;
    });
    const sorted = sortItems(list);
    document.getElementById('countLabel').textContent = `${sorted.length} items in stock`;

    if (!sorted.length) {
      document.getElementById('grid').innerHTML = `<div class="state-msg">No results found.</div>`;
      return;
    }

    document.getElementById('grid').innerHTML = sorted.map(p => {
      const price = formatPrice(p);
      return `
        <div class="card" data-id="${p.id}">
          <div class="card-img-wrap">
            ${p.imageUrl
              ? `<img class="card-img" src="${p.imageUrl}" alt="${p.name||''}" loading="lazy">`
              : `<div class="card-img-placeholder">○</div>`}
          ${isNewItem(p) ? '<div class="card-new-badge">New</div>' : ''}
          </div>
          <div class="card-info">
            <div class="card-name">${p.name || 'Unknown Title'}</div>
            ${p.artist ? `<div class="card-artist">${p.artist}</div>` : ''}
            ${(p.edition === '首版' || p.pressing) ? `<div class="card-tags">
              ${p.edition === '首版' ? '<span class="card-tag-item card-tag-first">First Press</span>' : ''}
              ${p.edition === '見本盤' ? '<span class="card-tag-item card-tag-first">見本盤</span>' : ''}
              ${p.pressing ? '<span class="card-tag-item">' + p.pressing + '</span>' : ''}
            </div>` : ''}
            ${p.genre ? `<div class="card-genre">${Array.isArray(p.genre) ? p.genre.join(' · ') : p.genre}</div>` : ''}
            <div class="card-bottom">
              ${price
                ? `<div class="card-price">${price}</div>`
                : `<div class="card-no-price">洽詢</div>`}
              ${price ? `<button class="cart-add-btn" data-id="${p.id}" onclick="event.stopPropagation();addToCart('${p.id}')" style="background:none;border:1px solid var(--line);font-family:var(--mono);font-size:9px;letter-spacing:0.1em;padding:2px 8px;cursor:pointer;text-transform:uppercase;margin-left:auto;">+ Cart</button>` : ''}
            </div>
          </div>
        </div>
      `;
    }).join('');

    document.getElementById('grid').querySelectorAll('.card').forEach(card => {
      card.addEventListener('click', () => openModal(card.dataset.id));
    });
  }

  function openModal(id) {
    const p = all.find(x => x.id === id);
    if (!p) return;
    const price = formatPrice(p);

    const imgs = Array.isArray(p.imageUrls) && p.imageUrls.length > 0
      ? p.imageUrls
      : (p.imageUrl ? [p.imageUrl] : []);

    if (imgs.length === 0) {
      document.getElementById('modalImg').innerHTML = `<div class="modal-img-placeholder">○</div>`;
    } else if (imgs.length === 1) {
      document.getElementById('modalImg').innerHTML = `<img class="modal-img" src="${imgs[0]}" alt="">`;
    } else {
      let cur = 0;
      const render = () => {
        document.querySelectorAll('.carousel-img').forEach((el, i) => el.classList.toggle('active', i === cur));
        document.querySelectorAll('.carousel-dot').forEach((el, i) => el.classList.toggle('active', i === cur));
      };
      document.getElementById('modalImg').innerHTML = `
        <div class="carousel">
          <div class="carousel-imgs">
            ${imgs.map((u, i) => `<img class="carousel-img ${i===0?'active':''}" src="${u}" alt="">`).join('')}
          </div>
          <button class="carousel-btn prev">‹</button>
          <button class="carousel-btn next">›</button>
          <div class="carousel-dots">
            ${imgs.map((_, i) => `<button class="carousel-dot ${i===0?'active':''}"></button>`).join('')}
          </div>
        </div>`;
      document.querySelector('.carousel-btn.prev').addEventListener('click', () => { cur = (cur - 1 + imgs.length) % imgs.length; render(); });
      document.querySelector('.carousel-btn.next').addEventListener('click', () => { cur = (cur + 1) % imgs.length; render(); });
      document.querySelectorAll('.carousel-dot').forEach((dot, i) => dot.addEventListener('click', () => { cur = i; render(); }));
    }

    const rows = [
      ['Title',     p.name      || '—'],
      ['Artist',    p.artist    || null],
      ['Year',      p.year      || null],
      ['Condition', p.condition || null],
      ['Pressing',  p.pressing  || null],
      ['Edition',   p.edition   || null],
      ['Genre',     p.genre ? (Array.isArray(p.genre) ? p.genre.join(', ') : p.genre) : null],
    ].filter(([, v]) => v);

    document.getElementById('modalDetail').innerHTML = `
      <div class="modal-price">${price || '洽詢'}</div>
      ${rows.map(([label, val]) => `
        <div class="modal-row">
          <span class="modal-row-label">${label}</span>
          <span class="modal-row-value">${val}</span>
        </div>
      `).join('')}
      ${p.description ? '<div class="modal-row"><span class="modal-row-label">Description</span><span class="modal-row-value" style="text-align:left;white-space:pre-line;">' + p.description + '</span></div>' : ''}
      ${price ? `<button onclick="addToCart('${p.id}');document.getElementById('modalBg').classList.remove('open');document.body.style.overflow='';" style="width:100%;margin-top:12px;background:var(--black);color:#fff;border:none;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:14px;cursor:pointer;">+ Add to Cart</button>` : ''}
      <div class="modal-note" style="margin-top:12px;">如有購買意願，請聯絡我們。<br>Contact us to purchase this item.</div>
    `;

    renderMusicSection(p);
    document.getElementById('modalBg').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  // ── 音樂試聽 ──
  function toEmbedUrl(url) {
    if (!url) return null;
    // Spotify
    const sp = url.match(/open\.spotify\.com\/(track|album|playlist|artist)\/([a-zA-Z0-9]+)/);
    if (sp) return `https://open.spotify.com/embed/${sp[1]}/${sp[2]}?utm_source=generator`;
    // YouTube / YouTube Music
    const yt = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|music\.youtube\.com\/watch\?v=)([a-zA-Z0-9_-]{11})/);
    if (yt) return `https://www.youtube.com/embed/${yt[1]}`;
    // Apple Music
    const am = url.match(/music\.apple\.com\/([^?#]+)/);
    if (am) return `https://embed.music.apple.com/${am[1]}`;
    // 若已是 embed URL 則直接回傳
    if (/open\.spotify\.com\/embed|youtube\.com\/embed|embed\.music\.apple\.com/.test(url)) return url;
    return null;
  }

  function buildEmbed(embedUrl) {
    const isSpotify = embedUrl.includes('spotify.com/embed');
    const isAM = embedUrl.includes('embed.music.apple.com');
    const h = isSpotify ? 352 : isAM ? 450 : 200;
    if (isAM) {
      // Apple 官方格式：allow 加 * 手機才能取得權限；不加 loading=lazy（modal 動態插入時手機會略過不載）
      return `<iframe allow="autoplay *; encrypted-media *; fullscreen *; clipboard-write" frameborder="0" height="${h}" style="width:100%;overflow:hidden;" sandbox="allow-forms allow-popups allow-same-origin allow-scripts allow-top-navigation-by-user-activation" src="${embedUrl}"></iframe>`;
    }
    if (isSpotify) {
      return `<iframe style="border-radius:12px;" src="${embedUrl}" width="100%" height="${h}" frameborder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" allowfullscreen></iframe>`;
    }
    return `<iframe src="${embedUrl}" width="100%" height="${h}" frameborder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" allowfullscreen></iframe>`;
  }

  // 前台只讀 Firestore 存的 musicEmbedUrl，不做 live API 搜尋
  // （搜尋在後台執行並存入，確保手機/電腦行為一致）
  function renderMusicSection(p) {
    const musicEl = document.getElementById('modalMusic');
    if (!musicEl) return;
    const query = encodeURIComponent([(p.artist || ''), (p.name || '')].filter(Boolean).join(' '));

    const platformBtns = query ? `<div class="modal-music-platforms">
      <a class="music-platform-btn" href="https://open.spotify.com/search/${query}" target="_blank" rel="noopener">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
        Spotify
      </a>
      <a class="music-platform-btn" href="https://music.youtube.com/search?q=${query}" target="_blank" rel="noopener">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.376 0 0 5.376 0 12s5.376 12 12 12 12-5.376 12-12S18.624 0 12 0zm4.596 13.332l-6.84 3.276A1.5 1.5 0 0 1 7.5 15.276V8.724a1.5 1.5 0 0 1 2.256-1.332l6.84 3.276a1.5 1.5 0 0 1 0 2.664z"/></svg>
        YT Music
      </a>
      <a class="music-platform-btn" href="https://music.apple.com/search?term=${query}" target="_blank" rel="noopener">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M23.994 6.124a9.23 9.23 0 0 0-.24-2.19c-.317-1.31-1.062-2.31-2.18-3.043a5.022 5.022 0 0 0-1.865-.737c-.695-.144-1.4-.155-2.12-.155H6.41c-.72 0-1.425.01-2.12.155a5.022 5.022 0 0 0-1.865.737C1.308 1.624.563 2.624.246 3.934a9.23 9.23 0 0 0-.24 2.19C-.006 6.9 0 7.68 0 8.46v7.08c0 .78-.006 1.56.006 2.336a9.23 9.23 0 0 0 .24 2.19c.317 1.31 1.062 2.31 2.18 3.043a5.022 5.022 0 0 0 1.865.737c.695.144 1.4.155 2.12.155h11.19c.72 0 1.425-.01 2.12-.155a5.022 5.022 0 0 0 1.865-.737c1.118-.734 1.863-1.734 2.18-3.044a9.23 9.23 0 0 0 .24-2.19C24 17.1 24 16.32 24 15.54V8.46c0-.78.006-1.56-.006-2.336zm-6.466 3.01l-5.25 7.98a.84.84 0 0 1-.702.38.84.84 0 0 1-.702-.38l-2.34-3.558a.84.84 0 0 1 .234-1.164.84.84 0 0 1 1.164.234l1.644 2.496 4.548-6.912a.84.84 0 0 1 1.164-.234.84.84 0 0 1 .24 1.158z"/></svg>
        Apple Music
      </a>
    </div>` : '';

    const label = `<div class="modal-music-label">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10,8 16,12 10,16"/></svg>
      試聽 Listen
      ${platformBtns}
    </div>`;

    const embedUrl = toEmbedUrl(p.musicEmbedUrl);
    if (embedUrl) {
      musicEl.innerHTML = `<div class="modal-music">${label}${buildEmbed(embedUrl)}</div>`;
    } else if (query) {
      musicEl.innerHTML = `<div class="modal-music">${label}</div>`;
    }
  }

  document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
  document.getElementById('modalBg').addEventListener('click', e => {
    if (e.target === document.getElementById('modalBg')) closeModal();
  });

  function closeModal() {
    document.getElementById('modalBg').classList.remove('open');
    if (!document.getElementById('quizModal').classList.contains('open')) {
      document.body.style.overflow = '';
    }
    document.getElementById('modalMusic').innerHTML = '';
  }

  // 主標籤切換
  let activeTab = 'used';
  let prevTab = 'used';
  document.getElementById('mainTabs').addEventListener('click', async e => {
    const btn = e.target.closest('.main-tab');
    if (!btn) return;
    const tab = btn.dataset.tab;

    if (tab === 'quiz') {
      history.replaceState(null, '', '#quiz');
      document.getElementById('quizModal').classList.add('open');
      document.body.style.overflow = 'hidden';
      if (!quizQs.length) await loadQuizData();
      startQuiz();
      return;
    }

    activeTab = tab;
    prevTab = tab;
    history.replaceState(null, '', '#' + tab);
    document.querySelectorAll('.main-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filterSection = document.getElementById('filterSection');
    const searchBar = document.querySelector('.search-bar');
    if (activeTab === 'archive') {
      if (filterSection) filterSection.style.display = 'none';
      searchBar.style.display = 'none';
      loadArchives();
    } else {
      if (filterSection) filterSection.style.display = '';
      searchBar.style.display = '';
      activeGenre = 'all';
      document.querySelectorAll('.genre-btn').forEach(b => b.classList.toggle('active', b.dataset.genre === 'all'));
      render();
    }
  });

  // archive
  let archives = [];
  async function loadArchives() {
    document.getElementById('countLabel').textContent = 'Loading...';
    document.getElementById('grid').innerHTML = '<div class="state-msg"><div class="spinner"></div>Loading</div>';
    try {
      const snap = await getDocs(collection(db, 'archives'));
      archives = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => (a.sortOrder||999)-(b.sortOrder||999));
      renderArchives();
    } catch(e) {
      document.getElementById('grid').innerHTML = '<div class="state-msg">⚠ ' + e.message + '</div>';
    }
  }

  function getYouTubeId(url) {
    const m = (url||'').match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);
    return m ? m[1] : null;
  }

  // 判斷是否顯示 NEW 標籤
  function isNewItem(p) {
    if (p.showNewBadge === true) return true;
    if (p.showNewBadge === false) return false;
    if (!p.createdAt) return false;
    const diff = (new Date() - new Date(p.createdAt)) / (1000 * 60 * 60 * 24);
    return diff <= 7;
  }

  // 排序
  let activeSortOrder = 'date-desc';
  document.getElementById('sortSelect').addEventListener('change', e => {
    activeSortOrder = e.target.value;
    render();
  });

  function sortItems(list) {
    if (activeSortOrder === 'price-desc') {
      return [...list].sort((a, b) => (Number(b.customPrice)||Number(b.basePrice)||0) - (Number(a.customPrice)||Number(a.basePrice)||0));
    } else if (activeSortOrder === 'price-asc') {
      return [...list].sort((a, b) => (Number(a.customPrice)||Number(a.basePrice)||0) - (Number(b.customPrice)||Number(b.basePrice)||0));
    } else if (activeSortOrder === 'date-asc') {
      return [...list].sort((a, b) => new Date(a.createdAt||0) - new Date(b.createdAt||0));
    } else {
      // date-desc 和 default 都照上架日期新→舊
      return [...list].sort((a, b) => new Date(b.createdAt||0) - new Date(a.createdAt||0));
    }
  }

  function renderArchives() {

  async function getAiReason(artist, album, qaText) {
    const prompt = `你是黑膠唱片店的選片顧問。用戶回答了5道心理測驗：\n${qaText}\n\n你決定推薦：${artist} — ${album}\n\n請用2-3句繁體中文說明，為什麼這張專輯符合你現在的狀態。語氣像朋友，不要像機器。只回傳說明文字，不要包含任何 JSON 或格式符號。`;
    try {
      const resp = await fetch(`${WORKER_URL}/claude`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: [{ role: 'user', content: prompt }] }),

  async function submitQuiz() {
    document.getElementById('quizContent').innerHTML =
      `<div class="quiz-loading"><div class="spinner"></div><div class="quiz-loading-text">分析中…</div></div>`;

    const qaText = quizSelected.map(q => {
      const idx = quizAnswers[q.id];
      return `Q: ${q.question}\nA: ${idx !== undefined ? q.options[idx] : '未回答'}`;
    }).join('\n\n');

    try {
      const rand = Math.random();
      const stockPool = all.filter(p => {
        const imgs = Array.isArray(p.imageUrls) && p.imageUrls.length ? p.imageUrls : (p.imageUrl ? [p.imageUrl] : []);
        return imgs[0] && p.artist;
      });

      // 35% stock, 25% reel, 40% global AI
      if (rand < 0.35 && stockPool.length) {
        const pick = stockPool[Math.floor(Math.random() * stockPool.length)];
        const reason = await getAiReason(pick.artist, pick.name || pick.album || '', qaText);
        await showQuizResult({ type: 'stock', id: pick.id, artist: pick.artist, album: pick.name || '', reason });
        return;
      }

      if (rand < 0.60 && quizReels.length) {
        const pick = quizReels[Math.floor(Math.random() * quizReels.length)];
        const reason = await getAiReason(pick.artist, pick.title || '', qaText);
        await showQuizResult({ type: 'reel', id: pick.id, artist: pick.artist, album: pick.title || '', reason });
        return;
      }

      // Global AI recommendation
      const prompt = `你是一位黑膠唱片店的選片顧問，品味獨特，擅長發掘冷門但有深度的音樂。

用戶回答了5道心理測驗：
${qaText}

請先判斷用戶此刻的情緒狀態（例如：憂鬱、平靜、充能、焦慮、懷舊、迷惘等），再依據大量聆聽數據的規律，推薦最適合這種情緒下聆聽的專輯。

推薦原則：
- 優先選擇冷門但有品味、有深度的作品，避免太主流或人人都知道的暢銷專輯
- 可以是任何年代、任何風格
- 選擇真正值得被更多人認識的作品

請用以下 JSON 格式回傳，只回傳 JSON，不要包含其他文字或 markdown：
{"artist":"藝人名稱","album":"專輯名稱","reason":"2-3句繁體中文，說明為什麼這張專輯符合你現在的狀態，語氣像朋友"}`;

      const resp = await fetch(`${WORKER_URL}/claude`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: [{ role: 'user', content: prompt }] }),
      });
      const data = await resp.json();
      if (data.apiError) throw new Error(data.apiError);
      const text = data.content?.[0]?.text || '';
      const jsonMatch = text.match(/\{[\s\S]*\}/);
      if (!jsonMatch) throw new Error('AI 回傳格式錯誤，請再試一次');
      const rec = JSON.parse(jsonMatch[0]);
      if (!rec.artist || !rec.album) throw new Error('AI 回傳缺少資訊，請再試一次');

      await showQuizResult({ type: 'global', artist: rec.artist, album: rec.album, reason: rec.reason });
    } catch(e) {
      document.getElementById('quizContent').innerHTML =
        `<div class="quiz-error">⚠ ${e.message}<br><br><button data-quiz-action="retry" style="padding:8px 20px;cursor:pointer;">再試一次</button></div>`;
    }
  }

  function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
    const lines = [];
    let cur = '';
    for (const ch of text) {
      const test = cur + ch;
      if (ctx.measureText(test).width > maxWidth && cur) {
        lines.push(cur);
        cur = ch;
      } else {
        cur = test;
      }
    }
    if (cur) lines.push(cur);
    lines.forEach((l, i) => ctx.fillText(l, x, y + i * lineHeight));
    return lines.length;
  }

  async function buildResultCanvas(result) {
    const W = 600, PAD = 40;
    const HEADER = 64, COVER_H = W; // square cover = full width
    const INFO = 340, H = HEADER + COVER_H + INFO;
    const SCALE = 2; // retina
    const canvas = document.createElement('canvas');
    canvas.width = W * SCALE; canvas.height = H * SCALE;
    const ctx = canvas.getContext('2d');
    ctx.scale(SCALE, SCALE);

    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, W, H);

    // Header
    ctx.fillStyle = '#111111';
    ctx.fillRect(0, 0, W, HEADER);
    ctx.fillStyle = '#ffffff';
    ctx.font = '700 14px "Space Mono", monospace';
    ctx.textBaseline = 'middle';
    ctx.fillText('DIP VINYL SHOP', PAD, HEADER / 2);
    ctx.fillStyle = '#666666';
    ctx.font = '400 11px "Space Mono", monospace';
    ctx.textAlign = 'right';
    ctx.fillText('VINYL MATCH', W - PAD, HEADER / 2);
    ctx.textAlign = 'left';

    // Cover — square, center-cropped
    ctx.fillStyle = '#e8e8e8';
    ctx.fillRect(0, HEADER, W, COVER_H);

    if (result._coverUrl) {
      try {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = result._coverUrl; });
        const aspect = img.naturalWidth / img.naturalHeight;
        let dw = W, dh = W / aspect;
        if (dh < COVER_H) { dh = COVER_H; dw = COVER_H * aspect; }
        const dx = (W - dw) / 2, dy = HEADER + (COVER_H - dh) / 2;
        ctx.save();
        ctx.beginPath(); ctx.rect(0, HEADER, W, COVER_H); ctx.clip();
        ctx.drawImage(img, dx, dy, dw, dh);
        ctx.restore();
      } catch(e) {
        ctx.fillStyle = '#bbbbbb';
        ctx.font = '72px sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('♪', W / 2, HEADER + COVER_H / 2);
        ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
      }
    } else {
      ctx.fillStyle = '#bbbbbb';
      ctx.font = '72px sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('♪', W / 2, HEADER + COVER_H / 2);
      ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
    }

    // Separator
    ctx.strokeStyle = '#dddddd';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, HEADER + COVER_H); ctx.lineTo(W, HEADER + COVER_H); ctx.stroke();

    ctx.textBaseline = 'alphabetic';
    let y = HEADER + COVER_H + 38;

    // Label
    ctx.fillStyle = '#999999';
    ctx.font = '400 12px "Space Mono", monospace';
    ctx.fillText('為你推薦', PAD, y);
    y += 34;

    // Artist
    ctx.fillStyle = '#777777';
    ctx.font = '400 17px "Space Mono", monospace';
    ctx.fillText(result.artist || '', PAD, y);
    y += 38;

    // Album title — auto-shrink if too wide
    ctx.fillStyle = '#111111';
    let albumSz = 24;
    ctx.font = `700 ${albumSz}px "Space Mono", monospace`;
    while (ctx.measureText(result.album || '').width > W - PAD * 2 && albumSz > 16) {
      albumSz -= 2;
      ctx.font = `700 ${albumSz}px "Space Mono", monospace`;
    }
    const albumLines = wrapText(ctx, result.album || '', PAD, y, W - PAD * 2, albumSz + 10);
    y += albumLines * (albumSz + 10) + 18;

    // Thin rule
    ctx.strokeStyle = '#eeeeee';
    ctx.beginPath(); ctx.moveTo(PAD, y); ctx.lineTo(W - PAD, y); ctx.stroke();
    y += 26;

    // Reason
    ctx.fillStyle = '#444444';
    ctx.font = '400 14px "Space Mono", monospace';
    wrapText(ctx, (result.reason || '').slice(0, 150), PAD, y, W - PAD * 2, 26);

    // URL
    ctx.fillStyle = '#bbbbbb';
    ctx.font = '400 11px "Space Mono", monospace';
    ctx.textAlign = 'right';
    ctx.fillText('dip-vinyl-shop.pages.dev', W - PAD, H - 22);
    ctx.textAlign = 'left';

    return canvas;
  }

  async function shareQuizResult() {
    if (!lastQuizResult) return;
    const { artist, album, reason } = lastQuizResult;
    const shareUrl = window.location.href;

    const btn = document.querySelector('[data-quiz-action="share"]');
    if (btn) { btn.disabled = true; btn.textContent = '…'; }

    try {
      const canvas = await buildResultCanvas(lastQuizResult);
      const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
      const file = new File([blob], 'vinyl-match.png', { type: 'image/png' });

      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({
          title: `${artist} — ${album} | DIP Vinyl Shop`,
          text: '來選一首適合你的歌 →',
          url: shareUrl,
          files: [file],
        });
      } else if (navigator.share) {
        await navigator.share({
          title: `${artist} — ${album} | DIP Vinyl Shop`,
          text: `🎵 ${artist} — ${album}\n${reason || ''}\n\n來選一首適合你的歌 →`,
          url: shareUrl,
        });
      } else {
        await navigator.clipboard.writeText(`🎵 ${artist} — ${album}\n${reason || ''}\n${shareUrl}`);
        showShareToast('已複製 ✓');
      }
    } catch(e) {
      if (e.name !== 'AbortError') {
        try {
          await navigator.clipboard.writeText(`🎵 ${artist} — ${album}\n${shareUrl}`);
          showShareToast('已複製 ✓');
        } catch(e2) {}
      }
    } finally {
      if (btn) { btn.disabled = false; btn.textContent = '✈ 分享結果'; }
    }
  }

  async function fetchSpotifyCover(artist, album) {
    try {
      const tokenResp = await fetch(`${WORKER_URL}/spotify-token`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
      });
      if (!tokenResp.ok) return {};
      const { access_token } = await tokenResp.json();
      const q = encodeURIComponent(`${album} ${artist}`);
      const sr = await fetch(`https://api.spotify.com/v1/search?q=${q}&type=album&limit=1`, {
        headers: { Authorization: 'Bearer ' + access_token },
      });
      const sd = await sr.json();
      const items = sd.albums?.items;
      if (items?.length) {
        return {
          imageUrl: items[0].images?.[0]?.url || null,
          spotifyUrl: items[0].external_urls?.spotify || null,
        };
      }
    } catch(e) {}
    return {};
  }

  // Hash-based routing — runs once on page load
  (function navigateByHash() {
    const hash = window.location.hash.slice(1);
    if (!hash) return;
    if (hash === 'quiz') {
      document.getElementById('quizModal').classList.add('open');
      document.body.style.overflow = 'hidden';
      loadQuizData().then(() => startQuiz());
    } else {
      const btn = document.querySelector(`.main-tab[data-tab="${hash}"]`);
      if (btn) btn.click();
    }
  })();
</script>
