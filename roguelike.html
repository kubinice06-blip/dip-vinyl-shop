<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>dip 黑膠 · 無止盡品味試煉（beta）</title>
<style>
  :root{
    --bg:#0d0d10; --panel:#16161c; --line:#2a2a34; --ink:#e9e9ee; --dim:#9a9aa6;
    --hp:#e8e8ee; --dmg:#e0556a; --qi:#d8a838; --gold:#c79a3a;
    --atk:#e0556a; --def:#5aa0e0; --qir:#d8a838;
    --classic:#6fa8dc; --obscurity:#9b8cce; --accessibility:#cf6f6f;
    --win:#67c08a; --lose:#e0556a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    background:var(--bg); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Noto Sans TC",sans-serif;
    font-size:14px; line-height:1.5; overflow-x:hidden;
  }
  #app{max-width:520px;margin:0 auto;padding:12px 12px 32px;min-height:100%;}
  h1{font-size:17px;margin:0;letter-spacing:.02em;}
  .muted{color:var(--dim);font-size:12px;}
  .center{text-align:center;}
  button{font-family:inherit;cursor:pointer;border:none;}
  .btn{background:#23232c;color:var(--ink);border:1px solid var(--line);border-radius:10px;padding:10px 14px;font-size:14px;font-weight:600;transition:.12s;}
  .btn:hover{background:#2e2e3a;}
  .btn.primary{background:var(--gold);color:#1a1300;border-color:var(--gold);}
  .btn.primary:hover{filter:brightness(1.08);}
  .btn:disabled{opacity:.4;cursor:default;}

  /* topbar 樂歷 */
  .topbar{display:flex;align-items:center;gap:10px;padding:6px 2px 10px;border-bottom:1px solid var(--line);margin-bottom:12px;}
  .topbar .lv{font-weight:800;color:var(--gold);font-size:13px;white-space:nowrap;}
  .xpbar{flex:1;height:7px;background:#23232c;border-radius:4px;overflow:hidden;}
  .xpbar i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),#f0d27a);width:0;transition:width .5s;}
  .topbar .best{font-size:11px;color:var(--dim);white-space:nowrap;}

  /* class select */
  .cls{border:1px solid var(--line);background:var(--panel);border-radius:14px;padding:14px;margin:10px 0;transition:.12s;}
  .cls:hover{border-color:var(--gold);}
  .cls h3{margin:0 0 4px;font-size:16px;}
  .cls .tag{font-size:11px;color:var(--dim);}
  .statline{display:flex;gap:12px;margin:8px 0;font-size:12px;}
  .statline b{font-weight:800;}
  .s-atk{color:var(--atk);} .s-def{color:var(--def);} .s-qir{color:var(--qir);}

  /* card */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;}
  .card{border:1px solid var(--line);background:var(--panel);border-radius:12px;padding:10px;position:relative;transition:.12s;overflow:hidden;}
  .card.sel{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold) inset;}
  .card.clk{cursor:pointer;}
  .card.clk:hover{border-color:#5a5a68;}
  .card.ace{border-color:var(--gold);background:linear-gradient(160deg,#1d1a12,#16161c);}
  .card .al{font-weight:700;font-size:12.5px;line-height:1.25;margin-bottom:2px;}
  .card .ar{font-size:10.5px;color:var(--dim);margin-bottom:6px;}
  .card .stats{display:flex;flex-direction:column;gap:2px;}
  .card .st{display:flex;align-items:center;gap:5px;font-size:10px;}
  .card .st .lab{width:26px;color:var(--dim);}
  .pips{display:flex;gap:2px;}
  .pip{width:7px;height:7px;border-radius:2px;background:#33333e;}
  .pip.on.classic{background:var(--classic);}
  .pip.on.obscurity{background:var(--obscurity);}
  .pip.on.accessibility{background:var(--accessibility);}
  .acebadge{position:absolute;top:6px;right:6px;font-size:9px;font-weight:800;color:var(--gold);border:1px solid var(--gold);border-radius:6px;padding:1px 5px;}
  .junk{opacity:.78;}
  .junk .al{color:var(--dim);}

  /* battle */
  .fighter{border:1px solid var(--line);background:var(--panel);border-radius:12px;padding:10px 12px;margin-bottom:8px;}
  .fighter .who{display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:700;}
  .hpwrap{height:14px;background:#23232c;border-radius:7px;overflow:hidden;margin:6px 0 4px;position:relative;}
  .hpwrap i{display:block;height:100%;background:var(--hp);transition:width .4s;}
  .hpwrap.e i{background:var(--dmg);}
  .hpnum{position:absolute;right:6px;top:0;font-size:10px;line-height:14px;color:#111;font-weight:800;mix-blend-mode:difference;filter:invert(1);}
  .qirow{display:flex;align-items:center;gap:4px;font-size:11px;}
  .qibar{display:flex;gap:3px;}
  .qp{width:12px;height:8px;border-radius:2px;background:#33333e;}
  .qp.on{background:var(--qi);}
  .ministats{display:flex;gap:10px;font-size:10px;margin-top:4px;}

  .tell{background:#1b1822;border:1px dashed #4a3f5e;border-radius:10px;padding:8px 10px;margin:8px 0;font-size:12px;color:#c9b8e0;text-align:center;min-height:20px;}
  .slotrow{display:flex;gap:8px;margin:8px 0;}
  .slot{flex:1;min-height:64px;border:1px dashed var(--line);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--dim);padding:8px;text-align:center;}
  .slot.filled{border-style:solid;}
  .slot.win{border-color:var(--win);} .slot.lose{border-color:var(--lose);}

  .log{background:#101015;border:1px solid var(--line);border-radius:10px;padding:8px 10px;height:96px;overflow-y:auto;font-size:11.5px;margin:8px 0;}
  .log div{margin:2px 0;color:var(--dim);}
  .log .hit{color:var(--dmg);} .log .qi{color:var(--qi);} .log .good{color:var(--win);}

  .hand{display:flex;gap:7px;overflow-x:auto;padding:4px 0 8px;}
  .hand .card{min-width:118px;flex:0 0 auto;}
  .attrbtns{display:flex;gap:6px;margin-top:8px;}
  .attrbtns .ab{flex:1;border-radius:9px;padding:8px 4px;font-size:12px;font-weight:700;border:1px solid var(--line);background:#20202a;color:var(--ink);}
  .ab.classic{border-color:var(--classic);} .ab.obscurity{border-color:var(--obscurity);} .ab.accessibility{border-color:var(--accessibility);}
  .ab.ult{background:var(--qi);color:#1a1300;border-color:var(--qi);}
  .callout{text-align:center;font-weight:800;min-height:22px;margin:4px 0;}
  .callout .dmg{color:var(--dmg);}

  .death{text-align:center;padding:24px 10px;}
  .death .big{font-size:40px;font-weight:800;color:var(--gold);}
  .pickbox{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:12px 0;}
  .row{display:flex;gap:8px;align-items:center;}
  .sp{height:8px;}
  .pill{display:inline-block;font-size:10px;border:1px solid var(--line);border-radius:20px;padding:2px 8px;color:var(--dim);}
  .hidden{display:none;}
</style>
</head>
<body>
<div id="app"></div>

<script>
'use strict';
/* =========================================================================
   dip 黑膠 · 無止盡品味試煉 — Roguelike beta (P0)
   沿用 battle.html 的品味氣勢制（相剋/相生/氣勢/品味輾壓/王牌被動），
   外加：流派、角色三圍（攻/防/氣勢率，暫名）、無限賽局、樂歷(XP/等級)。
   純前端、範例卡池當卡冊、localStorage 存樂歷。
   ========================================================================= */

// ---------- 戰鬥規則（與 CARD_GAME_DESIGN §8 / battle.html 一致；roguelike override）----------
const CFG = {
  startHp:12,            // roguelike 快打：HP 大幅調低 → 3~4 招分勝負
  startHand:5, drawPerTurn:1, handLimit:7,
  beats:{ obscurity:'classic', classic:'accessibility', accessibility:'obscurity' }, // key 剋 value
  chainNext:{ classic:'obscurity', obscurity:'accessibility', accessibility:'classic' }, // 相生（與 beats 反向）
  qiMax:6,
  qiCounter:3, qiCounterLoser:1, qiValue:1, qiValueLoser:0, qiTie:1,
  qiChain2:1, qiChain3:2, qiChainCap:4,
  valueDmg:1, ultimate:6,
  attrFx:{ classic:1, obscurity:1, accessibility:1 },
  ace:{ hall:{enemyQi:2}, pearl:{counterQiBonus:1}, heresy:{zeroEnemyQi:true} },
};
const ATTRS = ['classic','obscurity','accessibility'];
const ATTR_ZH = { classic:'經典', obscurity:'冷門', accessibility:'入耳' };
const ATTR_FX_ZH = { classic:'守 +1聲望', obscurity:'挖 +1氣勢', accessibility:'攻 削對手氣勢' };
const ACE_ZH = { hall:'殿堂', pearl:'流亡', heresy:'異端' };
const COUNTER_SKILL = { classic:'大眾共鳴', obscurity:'品味突襲', accessibility:'降維打擊' };
const SYN_SKILL = { classic:'品味拓荒', obscurity:'閾值突破', accessibility:'前衛收編' };
const COUNTER_OF = {}; for(const k of ATTRS) COUNTER_OF[CFG.beats[k]] = k; // 能剋掉 k 的屬性
const TELL_FLAVOR = {
  classic:['像要搬出經典名盤','一副「這張你總聽過吧」的篤定','翻出公認神專的架勢'],
  obscurity:['露出考古挖盤的眼神','嘴角藏著「你沒聽過吧」的得意','一臉要掏出絕版冷門'],
  accessibility:['散發前衛實驗的氣息','露出「越難懂越屌」的眼神','擺出解構一切的姿態']
};

// ---------- 可調數值（後台可覆寫）----------
let RXP = { base:6, perDepth:2, needBase:8, needPerLevel:4 };          // 局內經驗：勝利給 base+depth*perDepth；升級門檻 needBase+(lv-1)*needPerLevel
let MXP = { perDepth:15, perStreak:8, recordBonus:30, perLevel:100 };  // 樂歷(結算)：depth*perDepth+streak*perStreak(+破紀錄)；每 perLevel 升一級

// ---------- 範例卡池（沿用 battle.html；對戰 stats 1–5、王牌單軸 7）----------
const POOL = [
  ['Radiohead','Kid A',5,2,4],['The Velvet Underground','White Light/White Heat',4,4,5],
  ['Slint','Spiderland',3,4,4],['My Bloody Valentine','Loveless',5,3,4],
  ['Talk Talk','Laughing Stock',3,4,4],['Can','Tago Mago',4,4,4],
  ['Aphex Twin','Selected Ambient Works 85–92',4,3,3],['Boards of Canada','Music Has the Right to Children',3,3,3],
  ['Fishmans','Long Season',2,5,3],['Duster','Stratosphere',2,5,3],
  ['Codeine','Frigid Stars',2,5,3],['Bark Psychosis','Hex',2,5,4],
  ['Broadcast','Tender Buttons',2,4,3],['Stereolab','Emperor Tomato Ketchup',3,3,2],
  ['Nick Drake','Pink Moon',4,3,2],['Big Star','Third/Sister Lovers',3,4,3],
  ['Scott Walker','Tilt',3,4,5],['Swans','Soundtracks for the Blind',3,4,5],
  ['Low','Things We Lost in the Fire',3,3,2],['Grouper','Ruins',2,4,3],
  ['Cocteau Twins','Treasure',3,3,2],['Pixies','Surfer Rosa',4,2,2],
  ['Pavement','Slanted and Enchanted',4,3,3],['Sonic Youth','Daydream Nation',4,3,3],
  ['David Bowie','Low',4,3,3],['Brian Eno','Another Green World',4,4,3],
  ['Joy Division','Unknown Pleasures',4,3,3],['Television','Marquee Moon',4,3,2],
  ['Wire','Pink Flag',3,4,3],['Neu!','Neu!',3,4,3],
  ['Kraftwerk','Trans-Europe Express',4,3,2],['Portishead','Dummy',4,2,2],
  ['Massive Attack','Mezzanine',4,3,3],['Burial','Untrue',3,4,4],
  ['DJ Shadow','Endtroducing.....',4,3,3],['J Dilla','Donuts',4,3,3],
  ['Madvillain','Madvillainy',4,3,3],['A Tribe Called Quest','The Low End Theory',4,2,2],
  ['Sufjan Stevens','Illinois',3,2,2],['Bon Iver','For Emma, Forever Ago',3,2,1],
  ['Beach House','Teen Dream',3,2,2],['Mazzy Star','So Tonight That I Might See',3,3,2],
  ['Tim Hecker','Ravedeath, 1972',2,4,4],['Flying Lotus','Cosmogramma',3,3,3],
  ['Four Tet','Rounds',3,3,3],['Autechre','Tri Repetae',2,5,5],
  ['Boredoms','Vision Creation Newsun',2,5,4],['Fela Kuti','Zombie',3,4,3],
  ['Taylor Swift','1989',2,1,1],['Ed Sheeran','÷',1,1,1],
].map(([artist,album,c,o,a])=>({artist,album,classic:c,obscurity:o,accessibility:a,ace:null}));
const ACES = [
  {artist:'Radiohead',album:'OK Computer',classic:7,obscurity:1,accessibility:1,ace:'hall'},
  {artist:'Midori Takada',album:'Through the Looking Glass',classic:1,obscurity:7,accessibility:1,ace:'pearl'},
  {artist:'Merzbow',album:'Pulse Demon',classic:1,obscurity:1,accessibility:7,ace:'heresy'},
];

// ---------- 流派（給 run 級被動 + 三圍基礎；暫名）— 可被後台設定覆寫 ----------
let CLASSES = {
  guard: { name:'守舊派', tag:'〔守〕經典 · 高血線耐久', stats:{atk:1,def:3,qir:1}, maxHpBonus:5, qiPerTurn:0,
           desc:'起始聲望(HP)高、防禦厚，靠扛住對手慢慢磨。' },
  digger:{ name:'挖掘派', tag:'〔挖〕冷門 · 氣勢爆發', stats:{atk:1,def:1,qir:2}, maxHpBonus:0, qiPerTurn:1,
           desc:'每回合氣勢自動 +1、充能更快，更常放品味輾壓。' },
  heretic:{name:'異端派', tag:'〔攻〕入耳 · aggro 壓制', stats:{atk:3,def:1,qir:1}, maxHpBonus:0, qiPerTurn:0,
           desc:'攻擊高、傷害狠，打快攻速戰速決。' },
};
const STAT_ZH = { atk:'攻擊', def:'防禦', qir:'氣勢率' };
const STAT_NOTE = { atk:'打中時多扣血', def:'受擊減傷（最低仍扣1）', qir:'充氣勢更快→更常輾壓' };

// ---------- 樂歷（結算經驗 / 等級，localStorage 永久；升級給天賦＋抽專輯）----------
const META_KEY = 'dipRogueMeta_v2';
const keyOf = c => (c.artist+'|'+c.album).toLowerCase();
function loadMeta(){
  let m; try{ m = JSON.parse(localStorage.getItem(META_KEY)); }catch(e){}
  if(!m) m = { xp:0, talents:{atk:0,def:0,qir:0}, runsPlayed:0, bestDepth:0, bestStreak:0, collection:[] };
  m.talents = Object.assign({atk:0,def:0,qir:0}, m.talents||{});
  if(!Array.isArray(m.collection) || m.collection.length<8){
    // 新玩家：給 8 張起始收藏（之後靠樂歷升級「抽專輯」擴充）
    m.collection = m.collection || [];
    const owned = new Set(m.collection.map(keyOf));
    const bag = shuffle(POOL.slice());
    for(const c of bag){ if(m.collection.length>=8) break; if(!owned.has(keyOf(c))){ m.collection.push({artist:c.artist,album:c.album,classic:c.classic,obscurity:c.obscurity,accessibility:c.accessibility,ace:null}); owned.add(keyOf(c)); } }
  }
  return m;
}
function saveMeta(){ localStorage.setItem(META_KEY, JSON.stringify(META)); }
function levelOf(xp){ return Math.floor(xp/MXP.perLevel)+1; }
function spentTalents(){ return META.talents.atk+META.talents.def+META.talents.qir; }
function freeTalents(){ return (levelOf(META.xp)-1) - spentTalents(); } // 每升一級得 1 天賦點
// 抽專輯：抽一張收藏沒有的專輯（深層樂歷小機率出王牌）；回傳抽到的卡或 null
function drawAlbum(){
  const owned = new Set(META.collection.map(keyOf));
  const wantAce = levelOf(META.xp)>=4 && Math.random()<0.18;
  const src = wantAce ? ACES.concat(POOL) : POOL.concat(ACES);
  const bag = shuffle(src.slice());
  for(const c of bag){ const card={artist:c.artist,album:c.album,classic:c.classic,obscurity:c.obscurity,accessibility:c.accessibility,ace:c.ace||null};
    if(!owned.has(keyOf(card))){ META.collection.push(card); return card; } }
  return null; // 全收集滿
}

// ---------- helpers ----------
const rnd = n => Math.floor(Math.random()*n);
const pick = a => a[rnd(a.length)];
const sleep = ms => new Promise(r=>setTimeout(r,ms));
const clampQi = v => Math.max(0, Math.min(CFG.qiMax, v));
let _uid=0; const newUid=()=>++_uid;
function copyCard(c){ return Object.assign({}, c, {uid:newUid()}); }
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=rnd(i+1); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function starsHTML(c){
  return ATTRS.map(at=>{
    const n=c[at]; let pips='';
    for(let i=0;i<7;i++) pips+=`<span class="pip ${i<n?'on '+at:''}"></span>`;
    return `<div class="st"><span class="lab">${ATTR_ZH[at]}</span><div class="pips">${pips}</div></div>`;
  }).join('');
}
function cardHTML(c, opts={}){
  const cls = ['card', c.ace?'ace':'', c.junk?'junk':'', opts.sel?'sel':'', opts.clk?'clk':''].filter(Boolean).join(' ');
  const ace = c.ace?`<span class="acebadge">${ACE_ZH[c.ace]}</span>`:'';
  return `<div class="${cls}" ${opts.attr?`data-uid="${c.uid}"`:''}>
    ${ace}<div class="al">${c.album}</div><div class="ar">${c.artist}</div>
    <div class="stats">${starsHTML(c)}</div></div>`;
}

// =========================================================================
//  state
// =========================================================================
let META = loadMeta();   // 在 helpers(shuffle/POOL) 之後初始化
let RUN = null;   // 當前 run
let G = null;     // 當前單場戰鬥
const $app = document.getElementById('app');

function topbarHTML(){
  const lv=levelOf(META.xp), into=META.xp%MXP.perLevel;
  return `<div class="topbar">
    <span class="lv">樂歷 Lv.${lv} · ${into}/${MXP.perLevel}</span>
    <div class="xpbar"><i style="width:${into}%"></i></div>
    <span class="best">最深 ${META.bestDepth}・連勝 ${META.bestStreak}</span>
  </div>`;
}

// =========================================================================
//  畫面 1：選流派
// =========================================================================
function renderClassSelect(){
  const free=freeTalents();
  const talentNote = (spentTalents()>0||free>0)
    ? `<div class="muted" style="margin:6px 0 2px">樂歷天賦（永久三圍）：
        <span class="s-atk">攻+${META.talents.atk}</span> ·
        <span class="s-def">防+${META.talents.def}</span> ·
        <span class="s-qir">氣勢率+${META.talents.qir}</span>
        ${free>0?`<b style="color:var(--gold)"> · 有 ${free} 點未配</b>`:''}</div>`
    : '';
  const tBtns = free>0 ? `<div class="row" style="margin:6px 0 4px">
      <span class="muted">配點：</span>
      <button class="btn" onclick="spendTalent('atk')">攻 +1</button>
      <button class="btn" onclick="spendTalent('def')">防 +1</button>
      <button class="btn" onclick="spendTalent('qir')">氣勢率 +1</button>
    </div>` : '';
  $app.innerHTML = topbarHTML() + `
    <h1>無止盡品味試煉 <span class="pill">beta</span></h1>
    <div class="muted" style="margin:4px 0 10px">選流派 → 挑 3 張種子盤 → 一場接一場越打越強，撐到死。每趟結束累積<b style="color:var(--gold)">樂歷</b>升級。</div>
    ${talentNote}${tBtns}
    <div id="clsList"></div>`;
  const list=document.getElementById('clsList');
  list.innerHTML = Object.entries(CLASSES).map(([k,c])=>{
    const s=c.stats;
    return `<div class="cls">
      <h3>${c.name} <span class="tag">${c.tag}</span></h3>
      <div class="muted">${c.desc}</div>
      <div class="statline">
        <span class="s-atk">攻 <b>${s.atk}</b></span>
        <span class="s-def">防 <b>${s.def}</b></span>
        <span class="s-qir">氣勢率 <b>${s.qir}</b></span>
        <span class="muted">起始HP ${CFG.startHp+c.maxHpBonus}${c.qiPerTurn?` · 每回合氣勢+${c.qiPerTurn}`:''}</span>
      </div>
      <button class="btn primary" style="width:100%" onclick="chooseClass('${k}')">選 ${c.name}</button>
    </div>`;
  }).join('');
}
function spendTalent(stat){ if(freeTalents()<=0) return; META.talents[stat]++; saveMeta(); renderClassSelect(); }

function chooseClass(key){
  const c=CLASSES[key];
  RUN = {
    classKey:key,
    stats:{ atk:c.stats.atk+META.talents.atk, def:c.stats.def+META.talents.def, qir:c.stats.qir+META.talents.qir },
    baseMaxHp:CFG.startHp+c.maxHpBonus, qiPerTurn:c.qiPerTurn,
    // 局內特殊能力（吸血鬼倖存者式，整趟生效、run 結束洗掉）
    mods:{ maxHpAdd:0, extraDraw:0, counterQi:0, regen:0, ultDmg:0 },
    runLevel:1, runXp:0, lvlQueue:0,
    deck:[], depth:0, streak:0, relics:[],
    seedsPicked:[],
  };
  RUN.maxHp = RUN.baseMaxHp; RUN.hp = RUN.maxHp;
  renderSeedSelect();
}
function recomputeMaxHp(prevMax){
  RUN.maxHp = RUN.baseMaxHp + RUN.mods.maxHpAdd;
  // 提升上限時同步補等量的現有血
  const add = RUN.maxHp - (prevMax||RUN.maxHp);
  if(add>0) RUN.hp = Math.min(RUN.maxHp, RUN.hp + add);
}

// =========================================================================
//  畫面 2：挑 3 張種子（用範例卡池當卡冊）
// =========================================================================
function renderSeedSelect(){
  const c=CLASSES[RUN.classKey];
  // 卡冊 = 你的收藏圖鑑（靠樂歷升級「抽專輯」擴充）。王牌不可當種子。
  const shelf = META.collection.filter(c=>!c.ace);
  RUN._shelf = shelf;
  $app.innerHTML = topbarHTML() + `
    <h1>挑 3 張種子盤</h1>
    <div class="muted" style="margin:4px 0 8px">流派：<b>${c.name}</b>　從你的收藏挑 <b>3 張</b>當核心（共 ${shelf.length} 張；王牌不可當種子）。系統會補基礎雜牌湊成起始牌組。<br><span class="pill">樂歷升級可抽更多專輯進收藏</span></div>
    <div class="row" style="margin:6px 0">已選 <b id="seedCount">0</b>/3
      <button class="btn primary" id="seedGo" disabled style="margin-left:auto" onclick="startRun()">開始試煉 →</button></div>
    <div class="grid" id="shelf"></div>`;
  const wrap=document.getElementById('shelf');
  wrap.innerHTML = shelf.map((c,i)=>`<div onclick="toggleSeed(${i})" id="seed${i}">${cardHTML(c,{clk:true})}</div>`).join('');
  updateSeedUI();
}
function toggleSeed(i){
  const idx = RUN.seedsPicked.indexOf(i);
  if(idx>=0) RUN.seedsPicked.splice(idx,1);
  else { if(RUN.seedsPicked.length>=3) return; RUN.seedsPicked.push(i); }
  updateSeedUI();
}
function updateSeedUI(){
  document.getElementById('seedCount').textContent = RUN.seedsPicked.length;
  document.getElementById('seedGo').disabled = RUN.seedsPicked.length!==3;
  RUN._shelf.forEach((c,i)=>{
    const el=document.getElementById('seed'+i); if(!el) return;
    const card=el.querySelector('.card');
    card.classList.toggle('sel', RUN.seedsPicked.includes(i));
  });
}

// 基礎雜牌（低數值、可淘汰）
function makeJunk(){
  const names=['未整理的隨手盤','二手店湊數盤','打折區隨便抓','贈品附錄盤','收音機翻錄'];
  return names.map(n=>copyCard({
    artist:'雜訊', album:n,
    classic:1+rnd(2), obscurity:1+rnd(2), accessibility:1+rnd(2),
    ace:null, junk:true
  }));
}

function startRun(){
  if(RUN.seedsPicked.length!==3) return;
  const seeds = RUN.seedsPicked.map(i=>copyCard(RUN._shelf[i]));
  RUN.deck = seeds.concat(makeJunk());   // 3 種子 + 5 雜牌 = 8 張
  RUN.depth=0; RUN.streak=0; RUN.hp=RUN.maxHp;
  nextFight();
}

// =========================================================================
//  無限賽局：開下一場（敵人隨 depth 變強）
// =========================================================================
function enemyForDepth(d){
  // 難度：前段 easy、中段 normal、深層 hard
  const diff = d<3?'easy' : d<7?'normal' : 'hard';
  // 敵人三圍隨深度爬升（HP 只微升，避免拖慢快打）
  const stats = { atk:Math.floor(d/3), def:Math.floor(d/4), qir:Math.floor(d/5) };
  const hp = CFG.startHp + Math.floor(d/2);
  // 牌組：卡池隨機 ~10；深層摻王牌
  const deck=[]; const pool=shuffle(POOL.slice());
  for(let i=0;i<10;i++) deck.push(copyCard(pool[i%pool.length]));
  if(d>=5 && Math.random()<Math.min(.6,.15*(d-3))) deck.push(copyCard(pick(ACES)));
  shuffle(deck);
  const titles=['音樂小白','文青同好','社團學長','資深樂評','二手店老闆','地下廠牌主理人','傳說藏家','品味之神'];
  const who = titles[Math.min(titles.length-1, Math.floor(d/2))];
  const emoji = ['🎧','🧣','🎓','🎙️','💿','📀','🏆','👑'][Math.min(7,Math.floor(d/2))];
  return { who, emoji, diff, stats, hp, maxHp:hp, deck };
}

function nextFight(){
  RUN.depth++;            // 進入第 depth 場
  const E = enemyForDepth(RUN.depth);
  const pDeck = shuffle(RUN.deck.map(copyCard));
  G = {
    over:false, busy:false, turn:0,
    p:{ side:'p', hp:RUN.hp, maxHp:RUN.maxHp, qi:0, deck:pDeck, hand:[], last:null, chain:0, stats:RUN.stats },
    e:{ side:'e', hp:E.hp, maxHp:E.maxHp, qi:0, deck:shuffle(E.deck), hand:[], last:null, chain:0, stats:E.stats },
    E, diff:E.diff, pendingE:null, pCounteredTellLast:false, log:[],
  };
  for(let i=0;i<CFG.startHand;i++){ drawCard(G.e); }
  for(let i=0;i<CFG.startHand+RUN.mods.extraDraw;i++){ drawCard(G.p); }  // 起手多抽（能力）
  pushLog(`⚔️ 第 ${RUN.depth} 場 · 對手【${E.who}】（${E.diff==='easy'?'生手':E.diff==='normal'?'老練':'硬仗'}）`,'good');
  renderBattle();
  startTurn();
}

function drawCard(s){ if(s.deck.length) s.hand.push(s.deck.pop()); }
function pushLog(t,cls=''){ G.log.unshift({t,cls}); if(G.log.length>40)G.log.pop(); }

function computeChain(side, attr){
  if(side.last!==null && CFG.chainNext[side.last]===attr) side.chain+=1; else side.chain=1;
  let qi=0; if(side.chain>=CFG.qiChainCap) qi=0; else if(side.chain>=3) qi=CFG.qiChain3; else if(side.chain===2) qi=CFG.qiChain2;
  return { len:side.chain, qi };
}
function applyAttrEffect(side, attr){
  const me=G[side.side], foe=G[side.side==='p'?'e':'p'];
  if(attr==='classic') me.hp=Math.min(me.maxHp, me.hp+CFG.attrFx.classic);
  else if(attr==='obscurity') me.qi=clampQi(me.qi+CFG.attrFx.obscurity);
  else if(attr==='accessibility') foe.qi=clampQi(foe.qi-CFG.attrFx.accessibility);
}

// AI：暗定出招 + 露氣場提示（照剋會虛晃）
function aiPlan(){
  const diff=G.diff, hand=G.e.hand; let best=null;
  for(const card of hand){ for(const attr of ATTRS){
    let s=1; const chainHit=G.e.last!==null && CFG.chainNext[G.e.last]===attr;
    if(diff==='easy'){ s+=Math.random()*5; }
    else if(diff==='hard'){ if(chainHit)s+=2; s+=card[attr]*0.3;
      if(card.ace==='heresy')s+=(G.p.qi>=4?5:-1); if(card.ace==='hall')s+=(G.p.qi>=3?3:.2); if(card.ace==='pearl')s+=1.2; s+=Math.random()*1.5; }
    else { if(chainHit)s+=1; s+=card[attr]*0.15;
      if(card.ace==='heresy')s+=(G.p.qi>=5?3:.3); if(card.ace==='hall')s+=(G.p.qi>=4?1.5:.5); if(card.ace==='pearl')s+=.8; s+=Math.random()*4; }
    if(!best||s>best.s) best={card,attr,s};
  }}
  return best;
}

function startTurn(){
  if(G.over) return;
  G.turn++; G.busy=false;
  // 挖掘派 / 流派每回合氣勢
  if(RUN.qiPerTurn) G.p.qi=clampQi(G.p.qi+RUN.qiPerTurn);
  // 能力：每回合回血
  if(RUN.mods.regen && G.turn>1) G.p.hp=Math.min(G.p.maxHp, G.p.hp+RUN.mods.regen);
  // AI 暗定 + 虛晃
  const plan=aiPlan();
  let attr=plan.attr; const tell=plan.attr;
  if(G.pCounteredTellLast && !plan.card.ace){ attr = COUNTER_OF[COUNTER_OF[tell]]; } // 玩家上手照剋 → 虛晃反咬
  const eUlt = G.e.qi>=CFG.qiMax;
  G.pendingE = { card:plan.card, attr, tell, ult:eUlt };
  renderBattle();
}

// =========================================================================
//  畫面 3：戰鬥
// =========================================================================
function fighterHTML(s, label, emoji){
  const pct=Math.max(0,s.hp)/s.maxHp*100;
  const qi=[]; for(let i=0;i<CFG.qiMax;i++) qi.push(`<span class="qp ${i<s.qi?'on':''}"></span>`);
  const st=s.stats;
  return `<div class="fighter">
    <div class="who"><span>${emoji||''} ${label}</span><span class="muted">HP ${Math.max(0,s.hp)}/${s.maxHp}</span></div>
    <div class="hpwrap ${s.side==='e'?'e':''}"><i style="width:${pct}%"></i></div>
    <div class="qirow">氣勢 <div class="qibar">${qi.join('')}</div> ${s.qi>=CFG.qiMax?'<b style="color:var(--qi)">滿!</b>':''}</div>
    <div class="ministats"><span class="s-atk">攻${st.atk}</span><span class="s-def">防${st.def}</span><span class="s-qir">氣勢率${st.qir}</span></div>
  </div>`;
}
function renderBattle(){
  const pe=G.pendingE;
  const tellTxt = pe ? (pe.ult
      ? '⚡ 對手氣勢滿溢，殺氣騰騰（小心品味輾壓）'
      : `對手${pick(TELL_FLAVOR[pe.tell])}<span class="muted">（氣場偏 ${ATTR_ZH[pe.tell]}）</span>`)
    : '';
  const need=runXpNeed();
  $app.innerHTML = topbarHTML() + `
    <div class="row"><span class="pill">第 ${RUN.depth} 場</span><span class="pill">連勝 ${RUN.streak}</span><span class="pill">牌庫 ${G.p.deck.length}</span><span class="pill" style="color:var(--gold);border-color:var(--gold)">局內 Lv.${RUN.runLevel}</span></div>
    <div class="xpbar" style="margin:5px 0 2px"><i style="width:${Math.min(100,RUN.runXp/need*100)}%"></i></div>
    <div class="sp"></div>
    ${fighterHTML(G.e, G.E.who, G.E.emoji)}
    ${fighterHTML(G.p, '你', '🧑')}
    <div class="tell" id="tell">${tellTxt}</div>
    <div class="slotrow">
      <div class="slot" id="eSlot">對手暗牌</div>
      <div class="slot" id="pSlot">你的出牌</div>
    </div>
    <div class="callout" id="callout"></div>
    <div class="muted">你的手牌（點卡選擇）</div>
    <div class="hand" id="hand"></div>
    <div id="attrZone"></div>
    <div class="log" id="log">${G.log.map(l=>`<div class="${l.cls}">${l.t}</div>`).join('')}</div>`;
  renderHand();
}
let _sel=null;
function renderHand(){
  const h=document.getElementById('hand');
  h.innerHTML = G.p.hand.map(c=>`<div onclick="selectCard(${c.uid})">${cardHTML(c,{clk:true,attr:true,sel:_sel===c.uid})}</div>`).join('');
  renderAttrZone();
}
function selectCard(uid){ if(G.busy||G.over) return; _sel = (_sel===uid?null:uid); renderHand(); }
function renderAttrZone(){
  const z=document.getElementById('attrZone'); if(!z) return;
  const c=G.p.hand.find(x=>x.uid===_sel);
  if(!c){ z.innerHTML=`<div class="muted" style="margin-top:8px">先點一張手牌。</div>`; return; }
  const ultReady=G.p.qi>=CFG.qiMax;
  z.innerHTML = `<div class="muted" style="margin-top:8px">用【${c.album}】宣告主打屬性：</div>
    <div class="attrbtns">
      ${ATTRS.map(at=>`<button class="ab ${at}" onclick="play(${c.uid},'${at}')">${ATTR_ZH[at]} ${c[at]}★<br><span style="font-size:9px;opacity:.8">${ATTR_FX_ZH[at]}</span></button>`).join('')}
    </div>
    ${ultReady?`<div class="attrbtns"><button class="ab ult" style="flex:1" onclick="play(${c.uid},'__ult__')">⚡ 品味輾壓（無視屬性 −${CFG.ultimate+G.p.stats.atk}）</button></div>`:''}`;
}

function callout(html){ const el=document.getElementById('callout'); if(el) el.innerHTML=html; }

// 相剋/數值結算（沿用 resolveClash），再套三圍（攻/防/氣勢率）
function resolveClash(pCard,pAttr,eCard,eAttr){
  const pF=pCard[pAttr], eF=eCard[eAttr];
  let pC=CFG.beats[pAttr]===eAttr, eC=CFG.beats[eAttr]===pAttr;
  if(pC&&eCard.ace) pC=false;       // 霸權：被剋方王牌 → 取消相剋
  if(eC&&pCard.ace) eC=false;
  const r={ pdQi:0,edQi:0,dmgToP:0,dmgToE:0,kind:'tie',by:null,attr:null,pF,eF };
  if(pC){ r.pdQi+=CFG.qiCounter+(pCard.ace==='pearl'?CFG.ace.pearl.counterQiBonus:0); r.edQi+=CFG.qiCounterLoser; r.dmgToE+=pF; r.kind='counter'; r.by='p'; r.attr=pAttr; }
  else if(eC){ r.edQi+=CFG.qiCounter+(eCard.ace==='pearl'?CFG.ace.pearl.counterQiBonus:0); r.pdQi+=CFG.qiCounterLoser; r.dmgToP+=eF; r.kind='counter'; r.by='e'; r.attr=eAttr; }
  else { if(pF>eF){ r.pdQi+=CFG.qiValue; r.edQi+=CFG.qiValueLoser; r.dmgToE+=(pF-eF)*CFG.valueDmg; r.kind='value'; r.by='p'; }
    else if(eF>pF){ r.edQi+=CFG.qiValue; r.pdQi+=CFG.qiValueLoser; r.dmgToP+=(eF-pF)*CFG.valueDmg; r.kind='value'; r.by='e'; }
    else { r.pdQi+=CFG.qiTie; r.edQi+=CFG.qiTie; } }
  return r;
}
// 三圍：攻=造傷+atk；防=受傷-def(最低1)；氣勢率=當回合有充能則+qir(一次)
function applyAtk(dmg, atk){ return dmg>0 ? dmg+atk : 0; }
function applyDef(dmg, def){ return dmg>0 ? Math.max(1, dmg-def) : 0; }

async function play(uid, pAttr){
  if(G.busy||G.over||!G.pendingE) return;
  G.busy=true; _sel=null;
  const pCard=G.p.hand.find(c=>c.uid===uid); if(!pCard){ G.busy=false; return; }
  const pUlt=pAttr==='__ult__';
  const {card:eCard, attr:eAttr, tell, ult:eUlt}=G.pendingE;
  const feinted = !eUlt && eAttr!==tell;
  G.pCounteredTellLast = !pUlt && (pAttr===COUNTER_OF[tell]);
  // 移出手牌
  G.p.hand=G.p.hand.filter(c=>c.uid!==uid);

  document.getElementById('tell').innerHTML='';
  document.getElementById('pSlot').className='slot filled';
  document.getElementById('pSlot').innerHTML=cardHTML(pCard);
  document.getElementById('eSlot').className='slot filled';
  document.getElementById('eSlot').innerHTML=cardHTML(eCard);
  renderHand();
  if(feinted && G.pCounteredTellLast){ callout('<span class="dmg">對手虛晃一招！反咬你的相剋</span>'); pushLog('對手虛晃 → 反咬你的相剋','hit'); await sleep(650); }

  const st=G.p.stats, est=G.e.stats;

  if(pUlt || eUlt){
    // 品味輾壓回合
    const eUltBlocked = eUlt && !pUlt && pCard.ace;   // 七星回擊
    if(pUlt){ let d=applyDef(applyAtk(CFG.ultimate+RUN.mods.ultDmg,st.atk), est.def); G.e.hp-=d; G.p.qi=0; G.p.last=null; G.p.chain=0;
      callout(`<span class="dmg">你 · 品味輾壓 −${d}</span>`); pushLog(`你品味輾壓！對手 −${d}`,'hit'); }
    else G.p.last=pAttr;
    if(eUlt){
      if(eUltBlocked){ G.e.qi=0; G.e.last=null; G.e.chain=0; const star=Math.max(pCard.classic,pCard.obscurity,pCard.accessibility); const d=applyDef(applyAtk(star,st.atk),est.def); G.e.hp-=d;
        callout(`<span class="good">七星回擊！對手輾壓無效，反傷 −${d}</span>`); pushLog(`${ACE_ZH[pCard.ace]}王牌七星回擊 → 對手 −${d}`,'good'); }
      else { let d=applyDef(applyAtk(CFG.ultimate,est.atk), st.def); G.p.hp-=d; G.e.qi=0; G.e.last=null; G.e.chain=0;
        callout(`<span class="dmg">對手 · 品味輾壓 −${d}</span>`); pushLog(`對手品味輾壓！你 −${d}`,'hit'); }
    } else G.e.last=eAttr;
  } else {
    // 階段0 王牌即時被動
    if(pCard.ace==='heresy'){ if(G.e.qi>0)pushLog('異端【終極解構】→ 歸零對手氣勢','qi'); G.e.qi=0; }
    if(eCard.ace==='heresy'){ if(G.p.qi>0)pushLog('異端【終極解構】→ 歸零你的氣勢','qi'); G.p.qi=0; }
    if(pCard.ace==='hall'){ G.e.qi=clampQi(G.e.qi-CFG.ace.hall.enemyQi); pushLog('殿堂【眾望所歸】→ 對手氣勢 -2','qi'); }
    if(eCard.ace==='hall'){ G.p.qi=clampQi(G.p.qi-CFG.ace.hall.enemyQi); pushLog('殿堂【眾望所歸】→ 你的氣勢 -2','qi'); }
    // 階段1 相生連段
    const pc=computeChain(G.p,pAttr), ec=computeChain(G.e,eAttr);
    if(pc.qi>0) pushLog(`你 · ${SYN_SKILL[pAttr]} ×${pc.len}連 氣勢+${pc.qi}`,'qi');
    if(ec.qi>0) pushLog(`對手 · ${SYN_SKILL[eAttr]} ×${ec.len}連 氣勢+${ec.qi}`,'qi');
    // 階段2 相剋/數值
    const r=resolveClash(pCard,pAttr,eCard,eAttr);
    let pdQi=r.pdQi+pc.qi, edQi=r.edQi+ec.qi;
    if(pdQi>0) pdQi+=st.qir;     // 氣勢率
    if(edQi>0) edQi+=est.qir;
    if(r.kind==='counter' && r.by==='p') pdQi+=RUN.mods.counterQi;  // 能力：相剋多充氣勢
    G.p.qi=clampQi(G.p.qi+pdQi); G.e.qi=clampQi(G.e.qi+edQi);
    const dmgToE=applyDef(applyAtk(r.dmgToE,st.atk), est.def);
    const dmgToP=applyDef(applyAtk(r.dmgToP,est.atk), st.def);
    if(dmgToE) G.e.hp-=dmgToE;
    if(dmgToP) G.p.hp-=dmgToP;
    applyAttrEffect(G.p,pAttr); applyAttrEffect(G.e,eAttr);
    G.p.last=pAttr; G.e.last=eAttr;
    // 訊息
    if(r.kind==='counter'){
      const win=r.by==='p'?'你':'對手', d=r.by==='p'?dmgToE:dmgToP;
      callout(`<span class="dmg">${win} · ${COUNTER_SKILL[r.attr]} −${d}</span>`);
      pushLog(`${win}相剋【${COUNTER_SKILL[r.attr]}】命中 −${d}`,'hit');
    } else if(r.kind==='value'){
      const win=r.by==='p'?'你':'對手', d=r.by==='p'?dmgToE:dmgToP;
      callout(`<span class="dmg">${win}面板較高 −${d}</span>`);
      pushLog(`${win}純比星較高 −${d}`,'hit');
    } else { callout('平手 · 雙方氣勢+1'); pushLog('平手，雙方氣勢+1','qi'); }
  }

  // 結算畫面
  markResult(pCard,eCard);
  refreshFighters();
  await sleep(900);

  // 勝負
  if(G.e.hp<=0 && G.p.hp<=0){ G.p.hp>=G.e.hp ? winFight() : loseFight(); return; }
  if(G.e.hp<=0){ winFight(); return; }
  if(G.p.hp<=0){ loseFight(); return; }

  // 抽牌 + 棄牌 + 疲勞（牌庫空 → 受傷遞增；beta 簡化）
  drawCard(G.p); drawCard(G.e);
  while(G.p.hand.length>CFG.handLimit) G.p.hand.shift();
  while(G.e.hand.length>CFG.handLimit) G.e.hand.shift();
  if(G.p.hand.length===0 && G.e.hand.length===0){ // 雙方無牌 → 速判
    if(G.p.hp>=G.e.hp) winFight(); else loseFight(); return;
  }
  callout(''); startTurn();
}

function markResult(pCard,eCard){
  const ps=document.getElementById('pSlot'), es=document.getElementById('eSlot');
  if(!ps||!es) return;
  if(G.e.hp<G.p.hp){ ps.classList.add('win'); es.classList.add('lose'); }
  else if(G.p.hp<G.e.hp){ ps.classList.add('lose'); es.classList.add('win'); }
}
function refreshFighters(){
  // 重繪兩個 fighter 區（HP/氣勢/三圍）
  const cont=$app;
  const fighters=cont.querySelectorAll('.fighter');
  if(fighters.length>=2){
    fighters[0].outerHTML=fighterHTML(G.e,G.E.who,G.E.emoji);
    cont.querySelectorAll('.fighter')[1].outerHTML=fighterHTML(G.p,'你','🧑');
  }
  const log=document.getElementById('log'); if(log) log.innerHTML=G.log.map(l=>`<div class="${l.cls}">${l.t}</div>`).join('');
}

// =========================================================================
//  勝 → 獎勵；負 → 死亡結算
// =========================================================================
// ----- 局內經驗（吸血鬼倖存者式：戰中累積、升級選強化、整趟生效）-----
function runXpNeed(){ return RXP.needBase + (RUN.runLevel-1)*RXP.needPerLevel; }
// 升級 buff＝純資料（後台可增刪改）。target/key/amount 由 applyBuff 解讀：
//   target 'stat' → RUN.stats[key] (key: atk/def/qir)
//   target 'mod'  → RUN.mods[key]  (key: maxHpAdd/extraDraw/counterQi/regen/ultDmg)
//   target 'deck' → key: 'add'(撿盤) / 'cullWeakest'(丟最弱盤)
const DEFAULT_UPGRADES = [
  {id:'atk',  label:'⚔ 攻擊 +1',     desc:'打中時多扣 1 血',       target:'stat', key:'atk',       amount:1},
  {id:'def',  label:'🛡 防禦 +1',     desc:'受擊少扣 1 血',         target:'stat', key:'def',       amount:1},
  {id:'qir',  label:'🔥 氣勢率 +1',   desc:'充氣勢更快、更常輾壓',   target:'stat', key:'qir',       amount:1},
  {id:'hp',   label:'❤ 最大HP +3',   desc:'上限 +3 並回 3 血',     target:'mod',  key:'maxHpAdd',  amount:3},
  {id:'draw', label:'🎴 起手多抽 1',  desc:'每場起手手牌 +1',       target:'mod',  key:'extraDraw', amount:1},
  {id:'cqi',  label:'💢 相剋多充氣勢', desc:'相剋命中額外 +1 氣勢',   target:'mod',  key:'counterQi', amount:1},
  {id:'regen',label:'💗 每回合回血',   desc:'每回合自動回 1 血',     target:'mod',  key:'regen',     amount:1},
  {id:'ult',  label:'⚡ 品味輾壓 +2',  desc:'輾壓傷害 +2',          target:'mod',  key:'ultDmg',    amount:2},
  {id:'loot', label:'➕ 撿一張盤',     desc:'從收藏抽 1 張加入牌組',  target:'deck', key:'add',        amount:1},
  {id:'cull', label:'🗑 丟最弱盤',     desc:'移除牌組總星最低的一張', target:'deck', key:'cullWeakest',amount:1},
];
let UPGRADES = DEFAULT_UPGRADES;
function applyBuff(u){
  if(u.target==='stat'){ RUN.stats[u.key]=(RUN.stats[u.key]||0)+u.amount; }
  else if(u.target==='mod'){
    if(u.key==='maxHpAdd'){ const p=RUN.maxHp; RUN.mods.maxHpAdd+=u.amount; recomputeMaxHp(p); }
    else RUN.mods[u.key]=(RUN.mods[u.key]||0)+u.amount;
  } else if(u.target==='deck'){
    if(u.key==='add'){ for(let i=0;i<u.amount;i++) RUN.deck.push(copyCard(pick(META.collection))); }
    else if(u.key==='cullWeakest'){ for(let i=0;i<u.amount;i++){ if(RUN.deck.length>1){ let wi=0,wv=99; RUN.deck.forEach((c,j)=>{const v=c.classic+c.obscurity+c.accessibility; if(v<wv){wv=v;wi=j;}}); RUN.deck.splice(wi,1);} } }
  }
}

function winFight(){
  G.over=true; RUN.streak++;
  RUN.hp = Math.min(RUN.maxHp, Math.max(1,G.p.hp) + 3);   // 贏了小回血
  // 局內經驗累積（與結算樂歷分開算）
  const gain = RXP.base + RUN.depth*RXP.perDepth;
  RUN.runXp += gain; RUN._lastGain = gain;
  let lv=0; while(RUN.runXp >= runXpNeed()){ RUN.runXp -= runXpNeed(); RUN.runLevel++; lv++; }
  RUN.lvlQueue = lv;
  if(lv>0) renderLevelUp(); else renderWinContinue();
}
function loseFight(){ G.over=true; renderDeath(); }

let _lvlChoices=null;
function renderLevelUp(){
  _lvlChoices = shuffle(UPGRADES.slice()).slice(0,3);
  $app.innerHTML = topbarHTML() + `
    <h1 style="color:var(--gold)">⬆ 局內升級 Lv.${RUN.runLevel}</h1>
    <div class="muted" style="margin:2px 0 8px">選一個強化（整趟生效、死亡洗掉）${RUN.lvlQueue>1?`　還有 ${RUN.lvlQueue-1} 次`:''}</div>
    <div id="ups"></div>`;
  document.getElementById('ups').innerHTML = _lvlChoices.map((u,i)=>`
    <div class="cls" style="cursor:pointer" onclick="applyUpgrade(${i})">
      <h3 style="font-size:15px;margin:0">${u.label}</h3><div class="muted">${u.desc}</div>
    </div>`).join('');
}
function applyUpgrade(i){
  applyBuff(_lvlChoices[i]);
  RUN.lvlQueue--;
  if(RUN.lvlQueue>0) renderLevelUp(); else renderWinContinue();
}
function modsLine(){
  const m=RUN.mods, s=RUN.stats;
  let extra='';
  if(m.maxHpAdd) extra+=` HP+${m.maxHpAdd}`; if(m.extraDraw) extra+=` 抽+${m.extraDraw}`;
  if(m.counterQi) extra+=` 剋氣+${m.counterQi}`; if(m.regen) extra+=` 回血${m.regen}`; if(m.ultDmg) extra+=` 輾壓+${m.ultDmg}`;
  return `攻${s.atk} 防${s.def} 氣勢率${s.qir}${extra}`;
}
function renderWinContinue(){
  const need=runXpNeed();
  $app.innerHTML = topbarHTML() + `
    <h1 class="good" style="color:var(--win)">第 ${RUN.depth} 場 — 勝！</h1>
    <div class="muted" style="margin:2px 0 8px">連勝 ${RUN.streak}・回血至 HP ${RUN.hp}/${RUN.maxHp}・牌組 ${RUN.deck.length} 張</div>
    <div class="muted">局內 Lv.${RUN.runLevel}　經驗 +${RUN._lastGain}（${RUN.runXp}/${need}）</div>
    <div class="xpbar" style="margin:6px 0 12px"><i style="width:${Math.min(100,RUN.runXp/need*100)}%"></i></div>
    <div style="font-size:11px;color:var(--dim);margin-bottom:12px">能力：${modsLine()}</div>
    <button class="btn primary" style="width:100%" onclick="nextFight()">下一場 →</button>`;
}

function renderDeath(){
  // 樂歷結算經驗（與局內經驗分開算）：依 depth／連勝
  const recordBonus = RUN.depth>META.bestDepth ? MXP.recordBonus : 0;   // 破紀錄額外給
  const gained = RUN.depth*MXP.perDepth + RUN.streak*MXP.perStreak + recordBonus;
  const lvBefore=levelOf(META.xp);
  META.xp += gained;
  META.runsPlayed++;
  META.bestDepth=Math.max(META.bestDepth, RUN.depth);
  META.bestStreak=Math.max(META.bestStreak, RUN.streak);
  const lvAfter=levelOf(META.xp);
  const gainedLevels = lvAfter-lvBefore;
  // 每升一級樂歷 → 抽一張專輯進收藏（升級獎勵之一）
  const drawn=[]; for(let i=0;i<gainedLevels;i++){ const c=drawAlbum(); if(c) drawn.push(c); }
  saveMeta();
  const drawnHTML = drawn.length ? `
    <div class="sp"></div>
    <div style="color:var(--gold);font-weight:700">🎁 抽到 ${drawn.length} 張新專輯進收藏！</div>
    <div class="grid" style="margin:8px 0">${drawn.map(c=>cardHTML(c)).join('')}</div>` : '';
  $app.innerHTML = topbarHTML() + `
    <div class="death">
      <div class="muted">試煉終結</div>
      <div class="big">第 ${RUN.depth} 場</div>
      <div class="muted">連勝 ${RUN.streak}・流派 ${CLASSES[RUN.classKey].name}・局內 Lv.${RUN.runLevel}</div>
      <div class="sp"></div><div class="sp"></div>
      <div>獲得樂歷 <b style="color:var(--gold)">+${gained} XP</b>　<span class="muted">(結算另計，與局內經驗無關)</span></div>
      ${gainedLevels>0?`<div style="color:var(--gold);font-weight:800;margin-top:6px">⬆ 樂歷升級！Lv.${lvBefore} → Lv.${lvAfter}（得 ${gainedLevels} 天賦點，下局開始前可配）</div>`:''}
      <div class="muted" style="margin-top:4px">${META.bestDepth===RUN.depth&&RUN.depth>0?'🏆 新紀錄！':''}</div>
      ${drawnHTML}
      <div class="sp"></div>
      <div class="muted">收藏：${META.collection.length} 張專輯</div>
      <div class="sp"></div>
      <button class="btn primary" style="width:100%" onclick="renderClassSelect()">再來一趟 →</button>
    </div>`;
}

// 套用後台設定（部分覆寫，缺的用內建預設）
function applyConfig(cfg){
  if(!cfg) return;
  try{
    if(typeof cfg.startHp==='number') CFG.startHp=cfg.startHp;
    if(cfg.runXp) RXP=Object.assign({},RXP,cfg.runXp);
    if(cfg.metaXp) MXP=Object.assign({},MXP,cfg.metaXp);
    if(cfg.classes && typeof cfg.classes==='object') CLASSES=cfg.classes;
    if(Array.isArray(cfg.upgrades) && cfg.upgrades.length) UPGRADES=cfg.upgrades;
  }catch(e){ console.warn('套用後台設定失敗，改用預設', e); }
}
// 啟動：先等後台設定（最多等一下），再開遊戲
async function bootstrap(){
  $app.innerHTML = '<div class="center muted" style="padding:40px">載入設定中…</div>';
  let cfg=null;
  try{ cfg = await Promise.race([ window.__rogueCfg, new Promise(r=>setTimeout(()=>r(null),4000)) ]); }catch(e){}
  applyConfig(cfg);
  renderClassSelect();
}
bootstrap();
</script>
