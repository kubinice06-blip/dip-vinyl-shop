// =========================================================================
//  勝 → 獎勵；負 → 死亡結算
// =========================================================================
// ----- 局內經驗（吸血鬼倖存者式：戰中累積、升級選強化、整趟生效）-----
function runXpNeed(){ return RXP.needBase + (RUN.runLevel-1)*RXP.needPerLevel; }
// 升級 buff＝純資料（後台可增刪改）。target/key/amount 由 applyBuff 解讀：
//   target 'stat' → RUN.stats[key] (key: atk/def/qir)
//   target 'mod'  → RUN.mods[key]  (key: maxHpAdd/extraDraw/counterQi/regen/ultDmg)
//   target 'deck' → key: 'add'(撿盤) / 'cullWeakest'(丟最弱盤)
const DEFAULT_UPGRADES = [
  {id:'atk',  label:'⚔ 攻擊 +1',     desc:'打中時多扣 1 血',       target:'stat', key:'atk',       amount:1},
  {id:'def',  label:'🛡 防禦 +1',     desc:'受擊少扣 1 血',         target:'stat', key:'def',       amount:1},
  {id:'qir',  label:'🔥 氣勢率 +1',   desc:'充氣勢更快、更常輾壓',   target:'stat', key:'qir',       amount:1},
  {id:'hp',   label:'❤ 最大HP +3',   desc:'上限 +3 並回 3 血',     target:'mod',  key:'maxHpAdd',  amount:3},
  {id:'draw', label:'🎴 起手多抽 1',  desc:'每場起手手牌 +1',       target:'mod',  key:'extraDraw', amount:1},
  {id:'cqi',  label:'💢 相剋多充氣勢', desc:'相剋命中額外 +1 氣勢',   target:'mod',  key:'counterQi', amount:1},
  {id:'regen',label:'💗 每回合回血',   desc:'每回合自動回 1 血',     target:'mod',  key:'regen',     amount:1},
  {id:'ult',  label:'⚡ 品味輾壓 +2',  desc:'輾壓傷害 +2',          target:'mod',  key:'ultDmg',    amount:2},
  {id:'loot', label:'➕ 撿一張盤',     desc:'從收藏抽 1 張加入牌組',  target:'deck', key:'add',        amount:1},
  {id:'cull', label:'🗑 丟最弱盤',     desc:'移除牌組總星最低的一張', target:'deck', key:'cullWeakest',amount:1},
];
let UPGRADES = DEFAULT_UPGRADES;
function applyBuff(u){
  if(u.target==='stat'){ RUN.stats[u.key]=(RUN.stats[u.key]||0)+u.amount; }
  else if(u.target==='mod'){
    if(u.key==='maxHpAdd'){ const p=RUN.maxHp; RUN.mods.maxHpAdd+=u.amount; recomputeMaxHp(p); }
    else RUN.mods[u.key]=(RUN.mods[u.key]||0)+u.amount;
  } else if(u.target==='deck'){
    // 撿盤（deck/add）的實際加牌與揭曉改由 applyUpgrade → openLootReveal 處理（像局末抽盤一樣先看封面＋介紹）
    // 這裡保留純加牌邏輯當備援（若 applyBuff 被直接呼叫）
    if(u.key==='add'){ for(let i=0;i<u.amount;i++) RUN.deck.push(copyCard(pick(META.collection))); }
    else if(u.key==='cullWeakest'){ for(let i=0;i<u.amount;i++){ if(RUN.deck.length>1){ let wi=0,wv=99; RUN.deck.forEach((c,j)=>{const v=c.classic+c.obscurity+c.accessibility; if(v<wv){wv=v;wi=j;}}); RUN.deck.splice(wi,1);} } }
  }
}

function winFight(){
  G.over=true; RUN.streak++; RUN._drewThisWin=false;   // 每場勝利重置：可局末抽一張盤
  maybeTopUpDynPool();                                  // 邊打邊在背景補充動態卡池
  const heal = 3 + (hasUnlock('heal4')?1:0) + relicFx('winHeal');   // Lv.6 解鎖＋洗碟水
  RUN._wearEvents = applyWear();                        // 出戰發燒配件磨損（迴光一轉／報廢在此結算；耗損跨趟保留）
  // 現金：贏一場賺一筆（越深越好賺、藏家加碼）；只能在趟與趟之間花在保養
  const cashGain = fightCash(RUN.depth, !!(G.E&&G.E.boss));
  META.cash = cashOf() + cashGain; RUN.cashEarned = (RUN.cashEarned||0) + cashGain; RUN._cashGain = cashGain;
  saveMeta();
  RUN.hp = Math.min(RUN.maxHp, Math.max(1,G.p.hp) + heal);   // 贏了小回血
  // 局內經驗累積（與結算樂歷分開算）；樂評人專欄：經驗 +％
  const gain = Math.round((RXP.base + RUN.depth*RXP.perDepth) * (1 + relicFx('xpBoost')/100));
  RUN.runXp += gain; RUN._lastGain = gain;
  let lv=0; while(RUN.runXp >= runXpNeed()){ RUN.runXp -= runXpNeed(); RUN.runLevel++; lv++; }
  RUN.lvlQueue = lv;
  // 擊敗傳說藏家 → 發燒配件三選一（之後才接升級佇列）＋ 本場局末抽盤王牌率大增
  if(G.E && G.E.boss){ RUN._aceLuck=true; renderRelicChoice(); return; }
  if(lv>0) renderLevelUp(); else renderWinContinue();
}
function loseFight(){
  // 神秘見本盤：死亡時免死一次、回 5 HP（每趟一次；對手還活著才有得續）
  if(G.p.hp<=0 && G.e.hp>0 && relicFx('revive') && !RUN._revived){
    RUN._revived=true;
    G.p.hp=Math.min(RUN.maxHp,5); RUN.hp=G.p.hp;
    pushLog('🌟 神秘見本盤發出微光——免死回魂，HP 5！','good');
    callout('<span class="good">🌟 神秘見本盤 · 免死回魂</span>');
    drawCard(G.p); drawCard(G.e);
    if(G.p.hand.length>0 && G.e.hand.length>0){
      refreshFighters(); renderHand();
      setTimeout(()=>{ callout(''); startTurn(); }, 1000);
      return;
    }
  }
  G.over=true; renderDeath();
}

function doRepair(id, full){
  const w=metaWearOf(id); if(w<=0) return;
  const amt=full?w:Math.min(CASH.tuneStep,w);

  if(cashOf()<cost){ seedToast('💸 現金不足——多打幾場再來'); return; }

  if(!META.relicWear) META.relicWear={};

      現在離開這一趟<b>不會結算、也不會累積樂歷</b>。<br>本場進度（第 ${RUN.depth} 場・連勝 ${RUN.streak}）將直接放棄。</div>
    <button class="btn primary" style="width:100%;margin-bottom:8px" onclick="doQuit()">確定離開 → 主選單</button>
    <button class="btn" style="width:100%" onclick="closeQuit()">繼續遊戲</button>
  </div>`;
  mask.addEventListener('click', e=>{ if(e.target===mask) closeQuit(); });
  document.body.appendChild(mask);
}
function closeQuit(){ const m=document.getElementById('quitMask'); if(m) m.remove(); }
function doQuit(){ location.href='index.html'; }
function openCardInfo(card, opts){
  if(!card || document.getElementById('cardInfoMask') || document.getElementById('drawMask')) return;
  opts=opts||{};
  const aceTag = card.ace ? `<span class="acebadge">${ACE_ZH[card.ace]}</span>` : '';
  // 局末結算的「挑一張收藏」：從結算畫面點進來才有這顆鍵，整趟只能按一次
  const keepBtn = (opts.keepIdx!=null && RUN && !RUN._keptOne)
    ? `<button class="btn" style="width:100%;margin-bottom:8px;border-color:var(--gold);color:var(--gold)" onclick="keepRunCard(${opts.keepIdx})">★ 收進卡冊（本趟只能選一張）</button>` : '';
  const mask=document.createElement('div');
  mask.className='drawmask'; mask.id='cardInfoMask';
  mask.innerHTML=`<div class="drawcard">
    <div class="lab">卡片資訊</div>
    ${card.coverUrl
      ? `<img class="cov" src="${String(card.coverUrl).replace(/'/g,'%27')}" alt="">`
      : `<div class="cov noimg"><span>${card.album}</span></div>`}
    <div class="ar">${card.artist}</div>
    <div class="al">${card.album}</div>
    ${aceTag}
    <div class="stats">${starsHTML(card)}</div>
    <div class="intro wait" id="ciIntro">介紹載入中…</div>
    <a class="btn" id="ciStream" style="display:block;margin-bottom:8px;text-decoration:none" href="${streamSearchUrl(card)}" target="_blank" rel="noopener">▶ 串流聽這張</a>
    ${keepBtn}
    <button class="btn primary" style="width:100%" onclick="closeCardInfo()">關閉</button>
  </div>`;
  mask.addEventListener('click', e=>{ if(e.target===mask) closeCardInfo(); });
  document.body.appendChild(mask);
  if(!card.coverUrl) ensureCover(card).then(url=>{ const el=mask.querySelector('.cov'); if(url && el && el.tagName!=='IMG'){ el.outerHTML=`<img class="cov" src="${String(url).replace(/'/g,'%27')}" alt="">`; } });
  hookStreamLink('ciStream', card);
  loadAlbumDesc(card, document.getElementById('ciIntro'));
}

function renderDeath(){
  document.body.classList.remove('in-battle');
  // 樂歷結算經驗（與局內經驗分開算）：依 depth／連勝
  const prevBest = META.bestDepth;   // 先記舊紀錄 → 算「差一點」勾子
  const recordBonus = RUN.depth>META.bestDepth ? MXP.recordBonus : 0;   // 破紀錄額外給
  const gained = RUN.depth*MXP.perDepth + RUN.streak*MXP.perStreak + recordBonus;
  const recordCash = (RUN.depth>prevBest && RUN.depth>0) ? CASH.recordBonus : 0;   // 破紀錄現金獎金
  if(recordCash) META.cash = cashOf() + recordCash;
  const lvBefore=levelOf(META.xp);
  META.xp += gained;
  META.runsPlayed++;
  META.bestDepth=Math.max(META.bestDepth, RUN.depth);
  META.bestStreak=Math.max(META.bestStreak, RUN.streak);
  const lvAfter=levelOf(META.xp);
  const gainedLevels = lvAfter-lvBefore;
  // ── near-miss 勾子：差幾場破紀錄、差多少 XP 升級、下一級解鎖什麼 ──
  let recordLine='';
  if(RUN.depth>prevBest && RUN.depth>0) recordLine='🏆 <b style="color:var(--gold)">新紀錄！</b>';
  else if(RUN.depth===prevBest && RUN.depth>0) recordLine='😤 追平最佳紀錄——<b>再贏 1 場</b>就破！';
  else if(prevBest>0 && prevBest-RUN.depth<=3) recordLine=`😖 差 <b style="color:var(--dmg)">${prevBest-RUN.depth+1} 場</b>就破紀錄（最佳 ${prevBest}）`;
  const toNextLv = xpTotalForLevel(lvAfter+1)-META.xp;
  const nu = nextUnlock();
  const nextLine = `距樂歷 Lv.${lvAfter+1} 還差 <b style="color:var(--gold)">${toNextLv} XP</b>${nu?`・Lv.${nu.lv} 解鎖「${nu.label}」`:''}`;
  // 每升一級樂歷 → 抽一張專輯進收藏（升級獎勵之一）
  const drawn=[]; for(let i=0;i<gainedLevels;i++){ const c=drawAlbum(); if(c) drawn.push(c); }
  saveMeta();
  window._deathDrawn = drawn;
  const drawnHTML = drawn.length ? `
    <div class="sp"></div>
    <div style="color:var(--gold);font-weight:700">🎁 樂歷升級獎勵：抽到 ${drawn.length} 張新專輯進收藏！</div>
    <div class="muted" style="font-size:10px;margin-top:2px">每升 1 級樂歷抽 1 張・點專輯看封面與介紹</div>
    <div class="grid" style="margin:8px 0" id="deathDrawn">${drawn.map((c,i)=>`<div onclick="openCardInfo(window._deathDrawn[${i}])" style="cursor:pointer">${cardHTML(c,{clk:true,cover:true})}</div>`).join('')}</div>` : '';
  // 一路上局末抽到的盤：結算時挑「一張」永久收進卡冊
  const runDrawn = RUN.drawnCards||[];
  window._runDrawn = runDrawn;
  const runDrawnHTML = runDrawn.length ? `
    <div class="sp"></div>
    <div style="color:var(--gold);font-weight:700">🎴 本趟集到 ${runDrawn.length} 張盤（開局挑的＋一路抽到的）— 挑 1 張永久收進卡冊</div>
    <div class="muted" id="keepNote" style="font-size:10px;margin-top:2px">點專輯看介紹，再按「★ 收進卡冊」；只能選一張，其餘趟結束消失</div>
    <div class="grid" style="margin:8px 0" id="runDrawn">${runDrawn.map((c,i)=>`<div onclick="openCardInfo(window._runDrawn[${i}],{keepIdx:${i}})" style="cursor:pointer">${cardHTML(c,{clk:true,cover:true})}</div>`).join('')}</div>` : '';
  // 本場對手出過的牌（回顧）
  const foeHistHTML = (G&&G.eHist&&G.eHist.length) ? `
    <div class="sp"></div>
    <div class="muted" style="text-align:left">本場對手出過的牌（點小圖看介紹／聽歌）</div>
    ${histRowHTML(G.eHist,'dh')}` : '';
  const metCount = (RUN.drawnCards||[]).length + ((G&&G.eHist)?G.eHist.length:0);
  const relicNote = RUN.relics.length ? `・發燒配件 ${RUN.relics.length} 件` : '';
  $app.innerHTML = topbarHTML() + `
    <div class="death">
      <div style="margin-bottom:6px">${pixArtHTML(SPR.brokenrec, 44)}</div>
      <div class="muted">試煉終結</div>
      <div class="big">第 ${RUN.depth} 場</div>
      <div class="muted">連勝 ${RUN.streak}・流派 ${CLASSES[RUN.classKey].name}・局內 Lv.${RUN.runLevel}${relicNote}</div>
      <div style="margin-top:8px;min-height:16px">${recordLine}</div>
      <div class="sp"></div>
      <div>獲得樂歷 <b style="color:var(--gold)">+${gained} XP</b>　<span class="muted">(結算另計，與局內經驗無關)</span></div>
      <div style="margin-top:4px">💰 本趟收入 <b style="color:var(--gold)">$${RUN.cashEarned||0}</b>${recordCash?`＋破紀錄獎金 <b style="color:var(--gold)">$${recordCash}</b>`:''}　<span class="muted">存款 $${cashOf()}</span></div>
      ${(META.relicsSeen||[]).length?`<button class="btn" style="width:100%;margin-top:8px" onclick="openRelicDex()">🔧 保養發燒配件（耗損跨趟保留，現在花現金修）</button>`:''}
      ${gainedLevels>0?`<div style="color:var(--gold);font-weight:800;margin-top:6px">⬆ 樂歷升級！Lv.${lvBefore} → Lv.${lvAfter}（得 ${gainedLevels} 天賦點，下局開始前可配）</div>`:''}
      <div class="muted" style="margin-top:4px">${nextLine}</div>
      ${metCount>0?`<div class="muted" style="margin-top:2px">🎧 本趟路上遇見了 ${metCount} 張盤</div>`:''}
      ${runDrawnHTML}
      ${drawnHTML}
      ${foeHistHTML}
      <div class="sp"></div>
      <div class="muted">收藏：<span id="collCount">${META.collection.length}</span> 張專輯</div>
      ${(window.__rogueUser && window.__rogueUser()) ? '' : `
      <div id="deathLogin" style="border:1px dashed var(--gold);padding:10px 12px;margin-top:10px;font-size:11px;color:#7a5e12;line-height:1.7">
        ⚠ 尚未登入——樂歷等級與收藏只存在<b>這台裝置</b>。<br>
        <button class="btn" style="margin-top:6px" onclick="deathSignIn()">Google 登入 · 綁定帳號</button>
      </div>`}
      <div class="sp"></div>
      ${META.lastLoadout && CLASSES[META.lastLoadout.classKey] ? `
      <button class="btn primary" style="width:100%;border-color:var(--gold);background:var(--gold)" onclick="quickRestart()">⚡ 同流派再戰（${CLASSES[META.lastLoadout.classKey].name}・同批種子）</button>
      <div class="sp"></div>` : ''}
      <button class="btn ${META.lastLoadout?'':'primary'}" style="width:100%" onclick="renderClassSelect()">重新選流派 →</button>
      <div class="sp"></div>
      <button class="btn" style="width:100%" onclick="location.href='index.html'">← 回主選單</button>
    </div>`;
  // 抽到的專輯懶載入封面
  drawn.forEach((c,i)=>{ if(c.coverUrl) return; ensureCover(c).then(url=>{ if(!url) return;
    const wrap=document.getElementById('deathDrawn'); if(!wrap||!wrap.children[i]) return;
    const cov=wrap.children[i].querySelector('.cover'); if(cov){ cov.classList.remove('noimg'); cov.innerHTML=''; cov.style.backgroundImage=`url('${String(url).replace(/'/g,'%27')}')`; } }); });
  runDrawn.forEach((c,i)=>{ if(c.coverUrl) return; ensureCover(c).then(url=>{ if(!url) return;
    const wrap=document.getElementById('runDrawn'); if(!wrap||!wrap.children[i]) return;
    const cov=wrap.children[i].querySelector('.cover'); if(cov){ cov.classList.remove('noimg'); cov.innerHTML=''; cov.style.backgroundImage=`url('${String(url).replace(/'/g,'%27')}')`; } }); });
  if(G&&G.eHist) lazyHistCovers(G.eHist,'dh');
}

// 套用後台設定（部分覆寫，缺的用內建預設）
function applyConfig(cfg){
  if(!cfg) return;
  try{
    if(typeof cfg.startHp==='number') CFG.startHp=cfg.startHp;
    if(typeof cfg.pUltimate==='number') CFG.pUltimate=cfg.pUltimate;
    if(typeof cfg.hitQiDrain==='number') CFG.hitQiDrain=cfg.hitQiDrain;
    if(typeof cfg.hitQiDrainAcc==='number') CFG.hitQiDrainAcc=cfg.hitQiDrainAcc;
    if(cfg.runXp) RXP=Object.assign({},RXP,cfg.runXp);
    if(cfg.metaXp) MXP=Object.assign({},MXP,cfg.metaXp);
    if(cfg.classes && typeof cfg.classes==='object') CLASSES=cfg.classes;
    if(Array.isArray(cfg.upgrades) && cfg.upgrades.length) UPGRADES=cfg.upgrades;
    // 後台發燒配件：整組覆寫（fx 是 {效果鍵:數值}；icon 對得上內建像素圖示就用像素圖、否則當 emoji/文字顯示）
    if(Array.isArray(cfg.relics) && cfg.relics.length) RELICS=cfg.relics.filter(r=>r&&r.id&&r.name&&r.fx);
    // 發燒配件耗損系統：淺層覆寫（可調係數、階梯、關閉）
    if(cfg.wear && typeof cfg.wear==='object'){
      const w=cfg.wear;
      if(Array.isArray(w.grades) && w.grades.length) WEAR.grades=w.grades;
      if(w.cat && typeof w.cat==='object') WEAR.cat=Object.assign({},WEAR.cat,w.cat);
      if(w.tierMul && typeof w.tierMul==='object') WEAR.tierMul=Object.assign({},WEAR.tierMul,w.tierMul);
      ['enabled','slots','perFight','usedBump','swanAt','cleanerHeal','recycleHeal','powerBase','powerCap']
        .forEach(k=>{ if(w[k]!=null) WEAR[k]=w[k]; });
    }
    // 現金系統：淺層覆寫（roguelike.cash）
    if(cfg.cash && typeof cfg.cash==='object'){
      ['base','perDepth','bossBonus','recordBonus','repairT1','repairT2','tuneStep']
        .forEach(k=>{ if(typeof cfg.cash[k]==='number') CASH[k]=cfg.cash[k]; });
    }
  }catch(e){ console.warn('套用後台設定失敗，改用預設', e); }
}
// 啟動：先等後台設定（最多等一下），再開遊戲
async function bootstrap(){
  $app.innerHTML = '<div class="center muted" style="padding:40px">載入設定中…</div>';
  let cfg=null;
  // __rogueCfg 由 module 晚一步掛上 → 先輪詢等它出現再 race，否則後台設定永遠讀不到
  try{
    const t0=Date.now();
    while(!window.__rogueCfg && Date.now()-t0<3000) await new Promise(r=>setTimeout(r,80));
    if(window.__rogueCfg) cfg = await Promise.race([ window.__rogueCfg, new Promise(r=>setTimeout(()=>r(null),4000)) ]);
  }catch(e){}
  applyConfig(cfg);
  renderClassSelect();
  // 背景抓「全世界」真實專輯擴充卡池（不擋畫面；離線就跳過、用內建 POOL）
  fillDynamicPool(16);
  if(DYNAMIC_POOL.length < 60){ setTimeout(()=>fillDynamicPool(16), 4000); }
}
bootstrap();
</script>
