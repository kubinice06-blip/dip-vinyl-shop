<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>dip 黑膠 · 無止盡品味試煉（beta）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  /* 與 battle.html / 商店一致：白底黑字、Space Mono、細邊框、金(b8860b)＋紅(c11628) */
  :root{
    --black:#111; --gray:#888; --line:#ddd; --bg:#fff; --mono:'Space Mono',monospace;
    --ink:#111; --dim:#888;
    --hp:#111; --hp-bg:#eee; --dmg:#c11628; --gold:#b8860b; --qi:#b8860b;
    --atk:#c11628; --def:#1f5fae; --qir:#b8860b;
    --classic:#1f5fae; --obscurity:#6a3fa0; --accessibility:#c11628;
    --win:#2e7d52; --lose:#c11628;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    background:var(--bg); color:var(--black); font-family:var(--mono);
    font-size:12px; line-height:1.55; letter-spacing:0.03em; overflow-x:hidden;
  }
  #app{max-width:560px;margin:0 auto;padding:0 14px 36px;min-height:100%;position:relative;}
  h1{font-size:15px;margin:14px 0 2px;letter-spacing:0.12em;text-transform:uppercase;font-weight:700;}
  .muted{color:var(--gray);font-size:11px;}
  .center{text-align:center;}
  button{font-family:var(--mono);cursor:pointer;border:none;}
  .btn{background:#fff;color:var(--black);border:1px solid var(--black);border-radius:0;padding:9px 14px;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;transition:all .15s;}
  .btn:hover{background:var(--black);color:#fff;}
  .btn.primary{background:var(--black);color:#fff;}
  .btn.primary:hover{background:#000;}
  .btn:disabled{opacity:.35;cursor:default;}
  .btn:disabled:hover{background:#fff;color:var(--black);}

  /* topbar 樂歷 */
  .topbar{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--black);margin-bottom:12px;}
  .topbar .lv{font-weight:700;color:var(--gold);font-size:12px;letter-spacing:0.06em;white-space:nowrap;}
  .xpbar{flex:1;height:8px;background:var(--hp-bg);border:1px solid var(--line);overflow:hidden;}
  .xpbar i{display:block;height:100%;background:var(--gold);width:0;transition:width .5s;}
  .topbar .best{font-size:10px;color:var(--gray);letter-spacing:0.06em;white-space:nowrap;}

  /* class select */
  .cls{border:1px solid var(--line);background:#fff;border-radius:0;padding:14px;margin:10px 0;transition:border-color .15s;}
  .cls:hover{border-color:var(--black);}
  .cls h3{margin:0 0 4px;font-size:14px;letter-spacing:0.06em;}
  .cls .tag{font-size:10px;color:var(--gray);font-weight:400;letter-spacing:0.04em;}
  .statline{display:flex;gap:12px;margin:8px 0;font-size:11px;flex-wrap:wrap;}
  .statline b{font-weight:700;}
  .s-atk{color:var(--atk);} .s-def{color:var(--def);} .s-qir{color:var(--qir);}

  /* card */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(122px,1fr));gap:8px;}
  .card{border:1px solid var(--line);background:#fff;border-radius:0;padding:9px;position:relative;transition:border-color .12s;overflow:hidden;}
  .card.sel{border-color:var(--black);box-shadow:0 0 0 1px var(--black) inset;}
  .card.clk{cursor:pointer;}
  .card.clk:hover{border-color:var(--black);}
  .card.ace{border-color:var(--gold);}
  .card .al{font-weight:700;font-size:12px;line-height:1.25;margin-bottom:2px;}
  .card .ar{font-size:10px;color:var(--gray);margin-bottom:6px;}
  .card .stats{display:flex;flex-direction:column;gap:2px;}
  .card .st{display:flex;align-items:center;gap:5px;font-size:9px;}
  .card .st .lab{width:24px;color:var(--gray);}
  .pips{display:flex;gap:2px;}
  .pip{width:7px;height:7px;border-radius:0;background:#eee;border:1px solid #e0e0e0;}
  .pip.on.classic{background:var(--classic);border-color:var(--classic);}
  .pip.on.obscurity{background:var(--obscurity);border-color:var(--obscurity);}
  .pip.on.accessibility{background:var(--accessibility);border-color:var(--accessibility);}
  .acebadge{position:absolute;top:6px;right:6px;font-size:8px;font-weight:700;letter-spacing:0.08em;color:var(--gold);border:1px solid var(--gold);border-radius:0;padding:1px 5px;}
  .junk .al{color:var(--gray);}
  /* 選種子卡的封面縮圖 */
  .card .cover{width:100%;aspect-ratio:1;background-size:cover;background-position:center;border:1px solid var(--line);margin-bottom:6px;}
  .card .cover.noimg{display:flex;align-items:center;justify-content:center;padding:6px;text-align:center;background:repeating-linear-gradient(45deg,#fff,#fff 5px,#f3f3f3 5px,#f3f3f3 10px);}
  .card .cover.noimg span{font-size:10px;font-weight:700;color:#444;line-height:1.3;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}

  /* 選初始牌：選中浮起＋金框＋勾號（長按可看介紹，禁選字/選單） */
  #shelf > div{user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;}
  #shelf .card{transition:transform .18s,border-color .18s,box-shadow .18s;}
  #shelf .card.sel{transform:translateY(-6px) scale(1.05);border-color:var(--gold);box-shadow:0 0 0 1px var(--gold) inset,0 10px 22px rgba(0,0,0,.22);z-index:2;}
  #shelf .card.sel::before{content:'✓';position:absolute;top:6px;left:6px;width:18px;height:18px;background:var(--gold);color:#fff;font-weight:700;font-size:11px;line-height:18px;text-align:center;z-index:4;animation:pop .2s;}
  /* 底部固定選牌列：已選 n/5 ＋ 開始旅程，跟著視窗走 */
  .seedbar{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--black);z-index:50;box-shadow:0 -4px 14px rgba(0,0,0,.08);}
  .seedbar .inner{max-width:560px;margin:0 auto;display:flex;align-items:center;gap:10px;padding:10px 14px;}
  .seedbar .cnt{font-weight:700;font-size:12px;white-space:nowrap;}
  .seedbar .cnt b{color:var(--gold);font-size:14px;}
  .seedbar .dots{display:flex;gap:4px;}
  .seedbar .dots i{width:11px;height:11px;border:1px solid var(--line);background:#eee;transition:background .15s;}
  .seedbar .dots i.on{background:var(--gold);border-color:var(--gold);}
  .seedbar .btn{margin-left:auto;}

  /* battle */
  .fighter{border:1px solid var(--line);background:#fff;border-radius:0;padding:10px 12px;margin-bottom:8px;}
  .fighter .who{display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:700;letter-spacing:0.06em;}
  .hpwrap{height:14px;background:var(--hp-bg);border-radius:0;overflow:hidden;margin:6px 0 4px;position:relative;}
  .hpwrap i{display:block;height:100%;background:var(--hp);transition:width .4s;}
  .hpwrap.e i{background:var(--dmg);}
  .qirow{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--gray);letter-spacing:0.08em;}
  .qibar{display:flex;gap:3px;}
  .qp{width:13px;height:8px;border-radius:0;background:var(--hp-bg);border:1px solid var(--line);}
  .qp.on{background:var(--qi);border-color:var(--qi);}
  .ministats{display:flex;gap:10px;font-size:10px;margin-top:5px;}

  .tell{background:#faf7ee;border:1px dashed var(--gold);border-radius:0;padding:8px 10px;margin:8px 0;font-size:11px;color:#7a5e12;text-align:center;min-height:20px;}
  .slotrow{display:flex;gap:8px;margin:8px 0;}
  .slot{flex:1;min-height:60px;border:1px dashed var(--line);border-radius:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--gray);padding:8px;text-align:center;}
  .slot.filled{border-style:solid;border-color:var(--black);}
  .slot.win{border-color:var(--win);} .slot.lose{border-color:var(--lose);}

  .log{background:#fafafa;border:1px solid var(--line);border-radius:0;padding:8px 10px;height:92px;overflow-y:auto;font-size:10px;margin:8px 0;}
  .log div{margin:2px 0;color:var(--gray);}
  .log .hit{color:var(--dmg);} .log .qi{color:var(--qi);} .log .good{color:var(--win);}

  .hand{display:flex;gap:7px;overflow-x:auto;padding:4px 0 8px;}
  .hand .card{min-width:120px;flex:0 0 auto;}
  .attrbtns{display:flex;gap:6px;margin-top:8px;}
  .attrbtns .ab{flex:1;border-radius:0;padding:8px 4px;font-size:11px;font-weight:700;border:1px solid var(--line);background:#fff;color:var(--black);text-transform:none;letter-spacing:0;}
  .ab.classic{border-color:var(--classic);} .ab.obscurity{border-color:var(--obscurity);} .ab.accessibility{border-color:var(--accessibility);}
  .ab.ult{background:var(--gold);color:#fff;border-color:var(--gold);}
  .callout{text-align:center;font-weight:700;min-height:22px;margin:4px 0;letter-spacing:0.04em;}
  .callout .dmg{color:var(--dmg);} .callout .good{color:var(--win);}

  .death{text-align:center;padding:24px 10px;}
  .death .big{font-size:36px;font-weight:700;color:var(--gold);letter-spacing:0.04em;}
  .pickbox{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:12px 0;}
  .row{display:flex;gap:8px;align-items:center;}
  .sp{height:8px;}
  .pill{display:inline-block;font-size:9px;border:1px solid var(--line);border-radius:0;padding:2px 8px;color:var(--gray);letter-spacing:0.06em;}
  .hidden{display:none;}

  /* ===== 牌桌（與 battle.html 一模一樣：封面方塊、tilePop、相生相剋圈） ===== */
  @keyframes shimmer{0%{background-position:200% 0;}100%{background-position:0 0;}}
  @keyframes pop{0%{transform:scale(.6);opacity:0;}60%{transform:scale(1.08);}100%{transform:scale(1);opacity:1;}}
  @keyframes burst{0%{transform:translate(-50%,-50%) scale(.2);opacity:0;}55%{transform:translate(-50%,-50%) scale(1.14);opacity:1;}100%{transform:translate(-50%,-50%) scale(1);opacity:1;}}
  :root{ --silver-shine:linear-gradient(115deg,#9498a0 0%,#9498a0 34%,#c8ccd2 40%,#fff 47%,#fff 50%,#fff 53%,#c8ccd2 60%,#9498a0 66%,#9498a0 100%);
    --oil-shine:linear-gradient(115deg,#241b3a 0%,#241b3a 30%,#3a2a5d 38%,#2bb6a3 44%,#c84ad6 50%,#2b6fd6 56%,#3a2a5d 62%,#241b3a 70%,#241b3a 100%);
    --crimson-shine:linear-gradient(115deg,#4a0a13 0%,#4a0a13 36%,#7a1020 41%,#c11628 47%,#ff3048 50%,#c11628 53%,#7a1020 59%,#4a0a13 64%,#4a0a13 100%); }
  .side{padding:6px 0;}
  .side.enemy{border-bottom:1px solid var(--line);padding-bottom:8px;}
  .nameplate{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .nameplate .who{font-weight:700;letter-spacing:0.08em;font-size:12px;}
  .nameplate .meta{font-size:9px;color:var(--gray);letter-spacing:0.04em;}
  /* 三圍徽章（攻/防/勢）：上色加粗、數字放大，戰鬥中一眼可讀 */
  .nameplate .meta .s-atk,.nameplate .meta .s-def,.nameplate .meta .s-qir{font-weight:700;font-size:10px;}
  .nameplate .meta .s-atk b,.nameplate .meta .s-def b,.nameplate .meta .s-qir b{font-size:12px;}
  /* 我方三圍：獨立一列放在氣勢條下方，避免被下移的檯面卡蓋住 */
  .statrow{display:flex;gap:16px;justify-content:flex-end;margin-top:5px;}
  /* 我方名牌：你＋連段靠左並排，右側空出來給我方像素小人站 */
  .player-zone .nameplate{justify-content:flex-start;gap:10px;}
  .statrow .s-atk,.statrow .s-def,.statrow .s-qir{font-weight:700;font-size:11px;letter-spacing:0.04em;}
  .statrow .s-atk b,.statrow .s-def b,.statrow .s-qir b{font-size:13px;margin-left:1px;}
  .hpbar{height:14px;background:var(--hp-bg);position:relative;overflow:hidden;}
  .hpbar > i{position:absolute;inset:0 auto 0 0;background:var(--hp);transition:width .5s cubic-bezier(.4,0,.2,1);}
  .hpbar > span{position:absolute;inset:0;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;font-size:9px;font-weight:700;color:var(--gray);mix-blend-mode:difference;}
  .qiwrap{display:flex;align-items:center;gap:6px;margin-top:5px;}
  .qiwrap .qilab{font-size:8px;letter-spacing:0.14em;color:var(--qi);font-weight:700;white-space:nowrap;}
  .qibar2{display:flex;gap:3px;flex:1;}
  .qibar2 i{flex:1;height:7px;background:var(--hp-bg);border:1px solid var(--line);}
  .qibar2 i.on{background:var(--qi);border-color:var(--qi);}
  .qibar2.full{animation:qiglow .9s infinite;}
  @keyframes qiglow{0%,100%{box-shadow:0 0 0 0 rgba(184,134,11,0);}50%{box-shadow:0 0 8px 1px rgba(184,134,11,.7);}}
  /* 左側預留給絕對定位的對手與其唱片，提示框本身不再延伸進該區。 */
  .etell{display:flex;align-items:center;justify-content:flex-end;gap:8px;min-height:30px;margin:8px 0 0 72px;padding:6px 10px;border:1px dashed var(--gray);font-size:10px;color:var(--gray);letter-spacing:0.04em;text-align:right;}
  .etell:empty{border-color:transparent;}
  .etell b{color:var(--black);font-weight:700;}
  .arena{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0;}
  .slots{position:relative;display:flex;gap:18px;align-items:flex-start;justify-content:center;width:100%;}
  .slot{flex:1;max-width:170px;aspect-ratio:1/1;border:1px dashed var(--line);display:flex;align-items:center;justify-content:center;padding:0;position:relative;overflow:hidden;border-radius:0;min-height:0;color:var(--gray);font-size:10px;}
  .slot.filled{border-style:solid;border-color:var(--black);}
  #eSlot{transform:translateY(-9px);} #pSlot{transform:translateY(9px);}
  .slot.win{border-color:var(--win);} .slot.lose{border-color:var(--lose);}
  .slot.done{filter:grayscale(.35);opacity:.9;}            /* 上一手：留在檯面、稍微變灰 */
  .slot.clk{cursor:pointer;} .slot.clk:hover{border-color:var(--black);}
  .slot.win::after,.slot.lose::after{position:absolute;top:5px;right:5px;z-index:3;font-size:11px;font-weight:700;padding:2px 6px;color:#fff;}
  .slot.win::after{content:'勝';background:var(--black);} .slot.lose::after{content:'負';background:var(--dmg);}
  .vs{align-self:center;font-weight:700;font-size:13px;color:var(--gray);letter-spacing:0.1em;}
  .pcard{width:100%;height:100%;position:relative;animation:pop .3s;}
  .pcover{width:100%;height:100%;background-size:cover;background-position:center;}
  .pcover.ht-noimg,.ht-cover.ht-noimg{display:flex;align-items:center;justify-content:center;padding:8px;text-align:center;background:repeating-linear-gradient(45deg,#fff,#fff 5px,#f3f3f3 5px,#f3f3f3 10px);}
  .pcover.ht-noimg span,.ht-cover.ht-noimg span{font-size:11px;line-height:1.3;font-weight:700;color:#444;overflow:hidden;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;}
  .ht-ace{position:absolute;top:0;left:0;font-size:9px;font-weight:700;padding:2px 5px;color:#fff;z-index:2;}
  .ht-ace.hall{background:#9aa0a8;} .ht-ace.pearl{background:#5b4a8a;} .ht-ace.heresy{background:#a01020;}
  /* 檯面卡左下角：這一手出的牌型（屬性）角標 */
  .pattr{position:absolute;left:0;bottom:0;font-size:9px;font-weight:700;padding:2px 6px;color:#fff;z-index:2;background:var(--black);letter-spacing:0.04em;}
  .pattr.classic{background:var(--classic);} .pattr.obscurity{background:var(--obscurity);} .pattr.accessibility{background:var(--accessibility);} .pattr.ult{background:var(--gold);} .pattr.sac{background:#5a6b7a;}
  /* 出牌記錄列（對戰中回顧、局末結算回顧） */
  .histrow{display:flex;gap:6px;overflow-x:auto;padding:6px 0;}
  .histrow .htile{flex:none;width:56px;height:56px;border:1px solid var(--line);background-size:cover;background-position:center;cursor:pointer;position:relative;overflow:hidden;background-color:#fff;}
  .histrow .htile:hover{border-color:var(--black);}
  .histrow .htile.noimg{display:flex;align-items:center;justify-content:center;padding:2px;text-align:center;background-image:repeating-linear-gradient(45deg,#fff,#fff 4px,#f3f3f3 4px,#f3f3f3 8px);}
  .histrow .htile.noimg > span{font-size:7px;line-height:1.2;font-weight:700;color:#444;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;}
  .histrow .htile .hnum{position:absolute;left:0;top:0;background:rgba(0,0,0,.72);color:#fff;font-size:8px;padding:1px 4px;z-index:2;}
  .histrow .htile .hattr{position:absolute;left:0;bottom:0;color:#fff;font-size:8px;padding:1px 4px;z-index:2;background:var(--black);}
  .histrow .htile .hattr.classic{background:var(--classic);} .histrow .htile .hattr.obscurity{background:var(--obscurity);} .histrow .htile .hattr.accessibility{background:var(--accessibility);} .histrow .htile .hattr.ult{background:var(--gold);}
  .callout{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:25;width:max-content;max-width:90%;padding:9px 14px;background:rgba(255,255,255,.94);border:1px solid var(--black);box-shadow:0 6px 26px rgba(0,0,0,.3);text-align:center;pointer-events:none;font-weight:700;letter-spacing:0.04em;font-size:13px;}
  .callout:empty{display:none;} .callout.burst{animation:burst .42s cubic-bezier(.18,.9,.32,1.25);}
  .callout .dmg{color:var(--dmg);} .callout .good{color:var(--win);}
  .player-zone{padding:6px 0 4px;position:relative;}
  .cheat{display:flex;align-items:center;justify-content:center;gap:14px;margin:6px 0;position:relative;}
  /* 發燒配件欄：絕對定位貼在相剋圈左側，不佔流→相剋圈維持置中、攻防勢與「經」齊平不受影響 */
  .cheat-relics{position:absolute;left:0;top:50%;transform:translateY(-50%);z-index:3;}
  .relring{width:64px;flex:none;}
  .relring svg{width:100%;height:auto;overflow:visible;display:block;}
  .relring .node text{font-size:19px;font-weight:700;fill:var(--black);text-anchor:middle;}
  .relring .cap{display:flex;justify-content:center;gap:10px;font-size:8px;margin-top:2px;white-space:nowrap;}
  .relring .cap .k{color:var(--dmg);} .relring .cap .s{color:var(--qi);}
  .cheat .legend{font-size:8px;color:var(--gray);line-height:1.6;letter-spacing:0.04em;}
  .cheat .legend b{color:var(--dmg);} .cheat .legend em{color:var(--qi);font-style:normal;font-weight:700;}
  .hint{text-align:center;font-size:9px;color:var(--gray);letter-spacing:0.08em;margin:6px 0 8px;min-height:12px;}
  .htrow{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;align-items:center;}
  .htrow::-webkit-scrollbar{height:0;}
  .handtile{flex:none;width:116px;height:116px;border:1px solid var(--line);background:#fff;padding:0;cursor:pointer;position:relative;overflow:hidden;transition:transform .12s,border-color .12s;}
  .handtile:hover{border-color:var(--black);transform:translateY(-3px);}
  .handtile.sel{border-color:var(--black);border-width:2px;transform:translateY(-6px);box-shadow:0 4px 14px rgba(0,0,0,.18);}
  /* 一般卡五級稀有度外框（與卡冊/對戰同色：傳奇橘/史詩紫/獨特綠/稀有藍/普通灰）
     用 ::after 疊框——封面(.ht-cover/.pcover/.cover 100%)會蓋掉 inset 陰影，須畫在封面上層 */
  .r-legendary,.r-epic,.r-uncommon,.r-rare,.r-common{position:relative;}
  .r-legendary::after,.r-epic::after,.r-uncommon::after,.r-rare::after,.r-common::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:3;}
  .r-legendary::after{border:3px solid #e0851c;}
  .r-epic::after{border:2px solid #7a3fb0;}
  .r-uncommon::after{border:2px solid #2faf4f;}
  .r-rare::after{border:2px solid #3a7bd5;}
  .r-common::after{border:2px solid #c9c9c9;}
  /* 頂級卡掃光外框（同 battle.html） */
  .ace-border{position:relative;}
  .ace-border::after{content:'';position:absolute;inset:0;pointer-events:none;padding:2px;background-size:200% 100%;animation:shimmer 7.8s linear infinite;-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;}
  .ace-border.ace-hall::after{background-image:var(--silver-shine);}
  .ace-border.ace-pearl::after{background-image:var(--oil-shine);}
  .ace-border.ace-heresy::after{background-image:var(--crimson-shine);}
  /* 對手將要輾壓 → 手上王牌金框脈動＋「可反制」角標（七星回擊提示）
     用 ::before 畫在框內側——外側 box-shadow 會被 .htrow 的 overflow 裁掉 */
  .handtile.counter-ready::before{content:'';position:absolute;inset:0;z-index:4;pointer-events:none;border:2px solid var(--gold);animation:counterPulse 1s ease-in-out infinite;}
  @keyframes counterPulse{0%,100%{box-shadow:inset 0 0 4px rgba(184,134,11,.3);opacity:.55;}50%{box-shadow:inset 0 0 16px rgba(184,134,11,.85);opacity:1;}}
  .ht-counter{position:absolute;bottom:0;left:0;right:0;z-index:4;background:var(--gold);color:#fff;font-size:9px;font-weight:700;letter-spacing:0.08em;text-align:center;padding:2px 0;animation:counterPulse 1s ease-in-out infinite;}
  .ht-cover{width:100%;height:100%;background-size:cover;background-position:center;}
  .tilepop{position:fixed;left:0;top:0;width:154px;display:none;background:#fff;border:1px solid var(--black);padding:8px 9px;box-shadow:0 6px 18px rgba(0,0,0,.16);z-index:40;}
  .tilepop.show{display:block;animation:pop .18s;}
  .tilepop::after,.tilepop::before{content:'';position:absolute;top:100%;left:var(--arrow-x,77px);transform:translateX(-50%);border:7px solid transparent;}
  .tilepop::after{border-top-color:var(--black);} .tilepop::before{border-top-color:#fff;top:calc(100% - 1.4px);z-index:1;}
  .tp-alb{font-weight:700;font-size:12px;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
  .tp-art{font-size:9px;color:var(--gray);margin:2px 0 7px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
  .tp-acts{display:flex;gap:4px;flex-wrap:wrap;}
  .pp-act{flex:1;font-family:var(--mono);font-size:12px;font-weight:700;border:1px solid var(--black);background:#fff;padding:8px 0;cursor:pointer;line-height:1;color:var(--black);text-align:center;}
  .pp-act b{color:var(--gold);margin-right:1px;font-size:11px;}
  .pp-act:hover{background:var(--black);color:#fff;} .pp-act:hover b{color:#fff;}
  .pp-ult{flex:1 0 100%;margin-bottom:4px;color:#fff;border-color:#7a1020;background:var(--crimson-shine);background-size:200% 100%;animation:shimmer 7.8s linear infinite;}
  .pp-sac{flex:1 0 100%;margin-bottom:4px;color:#fff;border-color:#3f4d59;background:#5a6b7a;font-size:11px;letter-spacing:0.02em;}
  .pp-sac:hover{background:#3f4d59;color:#fff;}

  /* 戰鬥頂部藥丸列：單行不換行、塞不下就橫向滑（不再換行把手牌擠出畫面） */
  .battle-pills{flex-wrap:nowrap;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-top:8px;}
  .battle-pills::-webkit-scrollbar{display:none;}
  .battle-pills .pill{flex:none;white-space:nowrap;}

  /* 戰鬥畫面：與 battle.html 同——整屏不滾動、牌桌置中、手牌固定底部 */
  body.in-battle{overflow:hidden;}
  body.in-battle #app{height:100dvh;overflow:hidden;display:flex;flex-direction:column;padding:8px 14px 4px;}
  /* 牌桌高度只貼齊卡片本身（不再 flex:1 撐大）→ 我方面板緊接在卡片下方、不留大片空白；
     卡片維持原尺寸。畫面不夠高時整體往下溢出，交給 #app 的 overflow:hidden 收掉（底部 log 先被裁），
     卡片永遠不會被壓縮、也不會頂出去蓋住血條黑線。 */
  body.in-battle .arena{flex:0 0 auto;min-height:0;overflow:hidden;padding:16px 0 10px;}
  body.in-battle .player-zone{flex:none;}
  body.in-battle #app > .xpbar, body.in-battle #app > .row, body.in-battle #app > .side{flex:none;}
  body.in-battle .topbar{margin-bottom:6px;padding:6px 0;}
  /* 手機緊湊化：相剋圖放大易讀（圖例藏起、規則鈕在側），其餘垂直間距全面壓緊、
     檯面卡略縮 → 手牌與底部攻防紀錄(log)都完整進畫面，不再被裁 */
  @media (max-width:600px){
    .battle-pills{padding-top:6px;}
    /* 牌桌吃掉畫面剩餘高度（只長不縮）：卡位垂直置中往下挪、我方面板貼底，
       手牌下面不再留大縫；卡位不再上下錯位，虛線框四邊完整不被裁 */
    body.in-battle .arena{flex:1 0 auto;justify-content:center;padding:6px 0;}
    .slots{gap:12px;}
    .slot{max-width:164px;}
    .etell{min-height:24px;margin:6px 0 0 72px;padding:5px 8px;}
    .side{padding:4px 0;}
    .side.enemy{padding-bottom:6px;}
    .player-zone{padding:4px 0 2px;}
    /* 相剋圈縮小、整塊上提：讓頂點「經」跟右側「攻 防 勢」落在同一條水平線 */
    .cheat{gap:16px;margin:-24px 0 0;}
    .cheat .legend{display:none;}
    .relring{width:64px;}
    .hint{margin:2px 0 4px;}
    .htrow{padding-bottom:2px;}
    .handtile{width:74px;height:74px;}
    .log{height:44px;margin:6px 0 0;}
  }

  /* ===== 局末抽盤：與「直接來一張」同調的揭曉卡（封面＋介紹）===== */
  .drawmask{position:fixed;inset:0;background:rgba(255,255,255,.97);z-index:60;display:flex;align-items:flex-start;justify-content:center;padding:24px 16px;overflow-y:auto;animation:pop .22s;}
  .drawcard{max-width:360px;width:100%;text-align:center;margin:auto;}
  .drawcard .lab{font-size:10px;letter-spacing:0.2em;color:var(--gold);text-transform:uppercase;margin-bottom:12px;font-weight:700;}
  .drawcard .cov{width:100%;aspect-ratio:1;object-fit:cover;border:1px solid var(--black);display:block;margin-bottom:14px;}
  .drawcard .cov.noimg{display:flex;align-items:center;justify-content:center;font-weight:700;color:#444;padding:12px;font-size:15px;line-height:1.4;background:repeating-linear-gradient(45deg,#fff,#fff 6px,#f3f3f3 6px,#f3f3f3 12px);}
  .drawcard .ar{font-size:12px;color:var(--gray);letter-spacing:0.04em;}
  .drawcard .al{font-size:18px;font-weight:700;margin:2px 0 10px;letter-spacing:0.04em;line-height:1.3;}
  .drawcard .acebadge{position:static;display:inline-block;margin:0 0 10px;}
  .drawcard .stats{max-width:210px;margin:0 auto 14px;}
  .drawcard .intro{font-size:12px;line-height:1.95;text-align:left;border:1px solid var(--line);padding:14px;margin-bottom:16px;min-height:64px;color:#333;}
  .drawcard .intro.wait{color:var(--gray);}

  /* ===== 發燒配件（像素風圖示、戰鬥列、三選一） ===== */
  .pixicon{display:inline-block;vertical-align:middle;image-rendering:pixelated;}
  /* 橫向出戰發燒配件欄（戰鬥列左側＋勝利畫面）：白底細框方角、同 .pill 風格；像素圖＋4格耗損條 */
  .relicbar{display:inline-flex;gap:6px;align-items:center;background:#fff;border:1px solid var(--line);padding:3px 6px;flex:none;}
  .relicbar .rcell{display:flex;flex-direction:column;align-items:center;gap:2px;border:0;background:transparent;cursor:pointer;padding:0;}
  .relicbar .rcell .ric{position:relative;width:24px;height:24px;border:1px solid var(--line);background:#fafafa;display:flex;align-items:center;justify-content:center;}
  .relicbar .rcell:hover .ric{border-color:var(--gold);}
  .relicbar .rcell.warn .ric{border-color:var(--dmg);animation:relicPulse 1s ease-in-out infinite;}
  .relicbar .rcell.broke .ric{border-color:var(--line);}
  .relicbar .rcell.broke .ric .pixicon{filter:grayscale(1) opacity(.25);}
  .relicbar .rcell.broke .ric:after{content:"✕";position:absolute;color:var(--dmg);font-size:13px;font-weight:700;}
  .relicbar .wbar{display:flex;gap:2px;}
  .relicbar .wpip{width:5px;height:3px;}
  .relicbar .rempty{width:24px;height:24px;border:1px dashed var(--line);color:var(--gray);display:flex;align-items:center;justify-content:center;font-size:12px;}
  @keyframes relicPulse{0%,100%{box-shadow:0 0 0 0 rgba(193,22,40,0)}50%{box-shadow:0 0 0 2px rgba(193,22,40,.4)}}
  /* 耗損長條（詳情彈窗／整備面板） */
  .wbarwide{height:5px;background:#eee;overflow:hidden;}
  .wbarwide i{display:block;height:100%;}
  .relic-card{border:1px solid var(--line);background:#fff;padding:12px;margin:10px 0;cursor:pointer;display:flex;gap:12px;align-items:center;transition:border-color .15s,transform .15s;}
  .relic-card:hover{border-color:var(--gold);transform:translateY(-2px);}
  .relic-card .ric{flex:none;width:46px;height:46px;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;background:#fafafa;}
  .relic-card h3{margin:0 0 3px;font-size:13px;letter-spacing:0.05em;}
  .relic-list-row{display:flex;gap:10px;align-items:center;border-bottom:1px solid var(--line);padding:8px 0;text-align:left;}
  .relic-list-row .ric{flex:none;width:34px;height:34px;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;background:#fafafa;}

  /* ===== 像素小人（對手/我方頭像疊在牌桌角落，絕對定位不佔版面） ===== */
  .spr{position:absolute;z-index:2;pointer-events:none;line-height:0;}
  .spr svg{display:block;}
  .spr .sprin{animation:sprBob 1.15s steps(1,end) infinite;}
  .spr.p .sprin{animation-duration:1.4s;animation-delay:.3s;}
  @keyframes sprBob{0%,100%{transform:translateY(0);}50%{transform:translateY(-2px);}}
  .spr.e.atk{animation:sprAtkE .5s steps(3,end);}
  .spr.p.atk{animation:sprAtkP .5s steps(3,end);}
  @keyframes sprAtkE{0%{transform:translate(0,0);}35%{transform:translate(10px,12px);}70%{transform:translate(2px,3px);}100%{transform:translate(0,0);}}
  @keyframes sprAtkP{0%{transform:translate(0,0);}35%{transform:translate(-10px,-12px);}70%{transform:translate(-2px,-3px);}100%{transform:translate(0,0);}}
  .spr.hurt{animation:sprHurt .55s steps(2,end);}
  @keyframes sprHurt{0%,100%{transform:translateX(0);filter:none;}20%{transform:translateX(-4px);filter:sepia(1) saturate(9) hue-rotate(-38deg);}45%{transform:translateX(4px);}70%{transform:translateX(-2px);filter:sepia(1) saturate(9) hue-rotate(-38deg);}}
  .spr.warn{animation:sprWarn .9s steps(2,end) infinite;}
  @keyframes sprWarn{0%,100%{filter:drop-shadow(0 0 2px rgba(184,134,11,.5));}50%{filter:drop-shadow(0 0 7px rgba(184,134,11,1));}}
  .spr.charged{filter:drop-shadow(0 0 4px rgba(184,134,11,.85));}
  .spr.ko{animation:sprKo .7s steps(4,end) forwards;}
  @keyframes sprKo{0%{transform:rotate(0deg) translateY(0);opacity:1;}100%{transform:rotate(86deg) translateY(9px);opacity:.25;}}
  /* 出牌飛行卡：fixed 覆蓋層，動畫完就移除，不佔版面 */
  .flycard{position:fixed;z-index:30;pointer-events:none;border:1px solid var(--black);background:#fff;overflow:hidden;transform-origin:top left;transition:transform .3s cubic-bezier(.25,.8,.3,1);box-shadow:0 8px 22px rgba(0,0,0,.25);}
  .flycard>i{position:absolute;inset:0;background-size:cover;background-position:center;font-style:normal;}
  .flycard>i.noimg{display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#444;text-align:center;padding:4px;background:repeating-linear-gradient(45deg,#fff,#fff 4px,#f3f3f3 4px,#f3f3f3 8px);}
  /* 轉動的像素黑膠（勝利畫面等） */
  .pixicon.pixspin{animation:pixSpin 1.6s steps(8) infinite;vertical-align:-4px;}
  @keyframes pixSpin{100%{transform:rotate(360deg);}}

  /* ===== 傳說藏家開場（全屏蓋章式動畫＋震屏） ===== */
  @keyframes bossMaskIn{0%{opacity:0;}100%{opacity:1;}}
  @keyframes bossStamp{0%{transform:scale(3);opacity:0;}55%{transform:scale(.92);opacity:1;}75%{transform:scale(1.06);}100%{transform:scale(1);}}
  @keyframes bossLine{0%{transform:scaleX(0);}100%{transform:scaleX(1);}}
  @keyframes bossShake{0%,100%{transform:translate(0,0);}20%{transform:translate(-6px,2px);}40%{transform:translate(5px,-3px);}60%{transform:translate(-4px,-2px);}80%{transform:translate(3px,2px);}}
  @keyframes bossGlow{0%,100%{text-shadow:0 0 0 rgba(184,134,11,0);}50%{text-shadow:0 0 26px rgba(184,134,11,.75);}}
  .bossmask{position:fixed;inset:0;z-index:80;background:rgba(255,255,255,.97);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;animation:bossMaskIn .25s;}
  .bossmask.out{opacity:0;transition:opacity .45s;}
  .bossmask .bline{width:min(320px,70vw);height:2px;background:var(--gold);transform-origin:left;animation:bossLine .5s .15s both;}
  .bossmask .bline.r{transform-origin:right;}
  .bossmask .bemoji{font-size:64px;line-height:1;animation:bossStamp .6s .1s both cubic-bezier(.2,1.4,.4,1);}
  .bossmask .btitle{font-size:32px;font-weight:700;letter-spacing:.35em;text-indent:.35em;color:var(--black);animation:bossStamp .55s .35s both cubic-bezier(.2,1.4,.4,1),bossGlow 1.2s .9s infinite;}
  .bossmask .bsub{font-size:12px;color:var(--gold);letter-spacing:.14em;font-weight:700;animation:bossStamp .5s .62s both;}
  .bossmask .bdepth{font-size:10px;color:var(--gray);letter-spacing:.1em;animation:bossStamp .5s .78s both;}
  body.boss-shake #app{animation:bossShake .5s .55s;}

  /* 局末抽盤二選一（會員集點卡） */
  .drawtwo{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
  .drawtwo .opt{flex:1;min-width:150px;max-width:220px;border:1px solid var(--line);padding:10px;background:#fff;text-align:center;}
  .drawtwo .opt .cov2{width:100%;aspect-ratio:1;background-size:cover;background-position:center;border:1px solid var(--line);margin-bottom:8px;}
  .drawtwo .opt .cov2.noimg{display:flex;align-items:center;justify-content:center;padding:6px;background:repeating-linear-gradient(45deg,#fff,#fff 5px,#f3f3f3 5px,#f3f3f3 10px);font-weight:700;font-size:11px;color:#444;}
  .drawtwo .opt .al2{font-weight:700;font-size:12px;line-height:1.3;margin:2px 0;}
  .drawtwo .opt .ar2{font-size:10px;color:var(--gray);}
  .drawtwo .opt .intro2{font-size:10px;line-height:1.7;text-align:left;border:1px solid var(--line);padding:8px;margin:8px 0;min-height:48px;max-height:110px;overflow-y:auto;color:#333;}
</style>

<body>
<div id="app"></div>

<!-- 讀取後台設定（gameConfig/roguelike）。讀不到就用內建預設，離線仍可玩。 -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  window.__rogueCfg = (async () => {
    try {
      const app = initializeApp({
        apiKey:"AIzaSyBpR5XKKHwT_eQoShtBPtFNRXz4ymzPWQg",
        authDomain:"price-manager-e8846.firebaseapp.com",
        projectId:"price-manager-e8846",
        storageBucket:"price-manager-e8846.firebasestorage.app",
        messagingSenderId:"570133498387",
        appId:"1:570133498387:web:8835b8d2373797e91d0de6"
      });
      const db = getFirestore(app);
      // ---- 登入（Google）＋ 我的卡冊（與商店同源：collections/{uid}/cards）----
      const auth = getAuth(app);
      const provider = new GoogleAuthProvider();
      let _authResolve; window.__rogueAuthReady = new Promise(r=>_authResolve=r);
      onAuthStateChanged(auth, u => { if(_authResolve){ _authResolve(u); _authResolve=null; } });
      window.__rogueUser = () => auth.currentUser;
      window.__rogueSignIn = () => signInWithPopup(auth, provider);
      window.__getMyCollection = async () => {
        const u = auth.currentUser; if(!u) return [];
        try { const snap = await getDocs(collection(db,'collections',u.uid,'cards')); return snap.docs.map(d=>({cardId:d.id,...d.data()})); }
        catch(e){ return []; }
      };
      // 收進會員卡冊（與商店 index.html addCardToCollection 同 schema / 同 doc id 規則）
      window.__addToMyCollection = async (card) => {
        const u = auth.currentUser; if(!u) return 'need-login';
        const id = ((card.artist||'')+'|'+(card.album||'')).toLowerCase().replace(/\//g,'-').trim();
        if(!id || id==='|') return false;
        const ref = doc(db,'collections',u.uid,'cards',id);
        try {
          const snap = await getDoc(ref);
          if(snap.exists()){
            const cur = snap.data(); const up = {};
            if(card.ace==='hall' && !cur.hall) up.hall = true;
            if(card.ace==='pearl' && !cur.pearl) up.pearl = true;
            if(card.ace==='heresy' && !cur.heresy) up.heresy = true;
            await setDoc(ref,{ count:(cur.count||1)+1, lastObtainedAt:Date.now(), ...up },{merge:true});
            return 'dup';
          }
          await setDoc(ref,{
            cardId:id, artist:card.artist||'', album:card.album||'',
            coverUrl:card.coverUrl||'', desc:'', count:1, obtainedAt:Date.now(),
            ...(card.ace==='hall'?{hall:true}:{}), ...(card.ace==='pearl'?{pearl:true}:{}), ...(card.ace==='heresy'?{heresy:true}:{})
          });
          return 'new';
        } catch(e){ return false; }
      };
      // 樂歷雲端同步：存 users/{uid}.rogueMeta（規則本來就允許會員寫自己那筆，免改規則）
      window.__loadRogueMeta = async () => {
        const u = auth.currentUser; if(!u) return null;
        try { const s = await getDoc(doc(db,'users',u.uid)); return s.exists() ? (s.data().rogueMeta||null) : null; }
        catch(e){ return null; }
      };
      window.__saveRogueMeta = (m) => {
        const u = auth.currentUser; if(!u) return;
        try { setDoc(doc(db,'users',u.uid),{ rogueMeta:m, rogueMetaUpdatedAt:Date.now() },{merge:true}).catch(()=>{}); } catch(e){}
      };
      // 封面取得（與 battle.html 同一套：先讀全站卡牌目錄 card_catalog，再向 worker /spotify-search）
      const WORKER_URL='https://dip-vinyl-worker.kubinice06.workers.dev';
      window.__getCover = async (artist, album) => {
        const id = (artist+'|'+album).toLowerCase().replace(/\//g,'-').trim();
        try { const s=await getDoc(doc(db,'card_catalog',id)); const cu=s.exists()&&s.data().coverUrl; if(cu) return cu; } catch(e){}
        try {
          const res=await fetch(WORKER_URL+'/spotify-search?artist='+encodeURIComponent(artist)+'&album='+encodeURIComponent(album));
          const url=res.ok?((await res.json()).imageUrl||''):'';
          if(url){ try{ setDoc(doc(db,'card_catalog',id),{cardId:id,artist,album,coverUrl:url,updatedAt:Date.now()},{merge:true}).catch(()=>{}); }catch(e){} }
          return url;
        } catch(e){ return ''; }
      };
      // 專輯評分（與主選單卡冊同源）：worker /album-rating（KV 快取的 AI 評分）＋ album_overrides 人工校正
      window.__getAlbumRating = async (artist, album, cardId) => {
        let r = null;
        try {
          const res = await fetch(WORKER_URL+'/album-rating?artist='+encodeURIComponent(artist)+'&album='+encodeURIComponent(album));
          if(res.ok) r = await res.json();
        } catch(e){}
        if(cardId){
          try {
            const s = await getDoc(doc(db,'album_overrides',cardId));
            if(s.exists()){ const ov=s.data(); r=r||{};
              if(ov.classic) r.classic=ov.classic;
              if(ov.obscurity) r.obscurity=ov.obscurity;
              if(ov.accessibility) r.accessibility=ov.accessibility;
              if(ov.tier) r.tier=ov.tier;   // 後台設的頂點級別（hall/pearl/heresy）→ 王牌
            }
          } catch(e){}
        }
        return r;
      };
      // 後台入庫的頂級牌卡池（card_catalog 標 apex==true 的 300 張）：一次撈回 [{artist,album,tier}]
      window.__getApexTiers = async () => {
        try {
          const snap = await getDocs(query(collection(db,'card_catalog'), where('apex','==',true)));
          return snap.docs.map(d=>{ const x=d.data(); return { artist:x.artist||'', album:x.album||'', tier:x.tier||'' }; });
        } catch(e){ return []; }
      };
      const s = await getDoc(doc(db,'gameConfig','roguelike'));
      return s.exists() ? s.data() : null;
    } catch(e){ return null; }
  })();

function gradeOf(id){ return WEAR.grades[gradeIndex(wearOf(id))]; }
function gradeMul(id){ return WEAR.enabled ? gradeOf(id).mul : 1; }
function gradeName(r, w){ const gi=gradeIndex(w==null?wearOf(r.id):w); const nm=GRADE_NAMES[relicCat(r)]; return (nm&&nm[gi]) || WEAR.grades[gi].name; }
function isEquipped(id){ return !!(RUN&&RUN.equipped&&RUN.equipped.includes(id)); }
function equippedRelics(){ return (RUN&&RUN.equipped||[]).map(relicById).filter(Boolean); }

// 出戰中若在庫存但沒滿出戰欄 → 補位；相容舊存檔（無 equipped/relicWear 欄）
function ensureRelicState(autofill){
  if(!RUN) return;
  if(!RUN.relicWear) RUN.relicWear={};
  const legacy = !Array.isArray(RUN.equipped);   // 舊存檔沒有 equipped 欄 → 需首次補位
  if(legacy) RUN.equipped=[];
  RUN.equipped = RUN.equipped.filter(id=>RUN.relics.includes(id));
  for(const id of RUN.relics){ if(RUN.relicWear[id]==null) RUN.relicWear[id]=0; }
  // 自動補位只在 run 初始化或舊存檔遷移時做；平時（開整備面板／畫出戰欄）不補，
  // 否則玩家手動「卸下」會被立刻補回去（只閃一下、卸不掉）。
  if(autofill || legacy){
    for(const id of RUN.relics){ if(RUN.equipped.length>=wearSlots()) break; if(!isEquipped(id)) RUN.equipped.push(id); }
  }
}
// fx 強度（越強越脆）：整數效果取絕對值加總，百分比類（feintDown/xpBoost）算 1
function relicPower(r){ let p=0; const fx=r&&r.fx||{}; for(const k in fx){ p += (k==='feintDown'||k==='xpBoost')?1:Math.abs(fx[k]); } return Math.max(1,p); }
function wearPerFight(r, fired){
  const cat=WEAR.cat[relicCat(r)]||{mul:1};
  const tv=WEAR.tierMul[r.tier||1]||1;
  const pw=Math.min(WEAR.powerCap, 1+(relicPower(r)-1)*WEAR.powerBase);
  return (WEAR.perFight + (fired?WEAR.usedBump:0)) * cat.mul * tv * pw;
}
// 出戰發燒配件的 fx（乘品相係數；搖搖欲墜期迴光一轉翻倍；最低 1，報廢＝0）
function relicFx(key){
  let n=0; const swan=G&&G._swan;
  for(const r of equippedRelics()){
    const v=r.fx&&r.fx[key]; if(!v) continue;
    const m=gradeMul(r.id); if(m<=0) continue;
    let eff=Math.max(1, Math.ceil(v*m));
    if(swan && swan.has(r.id)) eff*=2;
    n+=eff;
  }
  return n;
}
// 出戰發燒配件提供的最大 HP 加成（隨品相下修 → 重量盤翹曲會掉血上限）
function relicMaxHp(){ let n=0; for(const r of equippedRelics()){ const v=r.fx&&r.fx.maxHp; if(!v) continue; const m=gradeMul(r.id); if(m>0) n+=Math.max(1,Math.ceil(v*m)); } return n; }

// ---------- 腳邊唱片堆：取手牌屬性主色，散放的封套＋黑膠（丟牌少一張、抽牌補回來） ----------
const STACK_POS=[[0,3],[3,0],[7,4],[10,1],[14,6]];
function stackCardCol(c, concealed){
  if(concealed) return 'e';           // 對手的手牌資訊必須隱藏：一律中性色，不洩漏屬性主色
  const attrs=['classic','obscurity','accessibility'];
  const top=attrs.reduce((best,a)=>(c[a]||0)>(c[best]||0)?a:best,attrs[0]);
  return {classic:'b',obscurity:'p',accessibility:'r'}[top]; // 與手牌三圍色一致：經典藍／冷門紫／硬蕊紅
}
function recStackRows(hand, concealed){
  const cards=(hand||[]).slice(-5), w=23, h=16;
  const px=Array.from({length:h},()=>Array(w).fill('.'));
  const put=(x,y,c)=>{ if(x>=0&&x<w&&y>=0&&y<h) px[y][x]=c; };
  cards.forEach((card,i)=>{
    const [x,y]=STACK_POS[i], col=stackCardCol(card,concealed);
    // 8×8 封套；每張略為錯開，露出的黑膠與中心標籤讓它讀起來像手牌縮影，而非整齊色條。
    for(let yy=0;yy<8;yy++) for(let xx=0;xx<8;xx++) put(x+xx,y+yy,(xx===0||xx===7||yy===0||yy===7)?'k':col);
    [[3,2],[4,2],[2,3],[3,3],[4,3],[5,3],[2,4],[3,4],[4,4],[5,4],[3,5],[4,5]].forEach(([xx,yy])=>put(x+xx,y+yy,'k'));
    [[3,3],[4,3],[3,4],[4,4]].forEach(([xx,yy])=>put(x+xx,y+yy,concealed?'d':(i%2?'y':'s')));
  });
  return px.map(row=>row.join(''));
}

function loadMeta(){

// 併兩份樂歷：以 xp 較高者為底（天賦跟著它），紀錄取最大值、收藏／待補綁卡聯集
function mergeMeta(a,b){
  if(!a) return b; if(!b) return a;
  const hi = (b.xp||0)>(a.xp||0) ? b : a, lo = hi===a ? b : a;
  const m = {
    xp:Math.max(a.xp||0,b.xp||0),
    talents:Object.assign({atk:0,def:0,qir:0}, hi.talents||{}),
    runsPlayed:Math.max(a.runsPlayed||0,b.runsPlayed||0),
    bestDepth:Math.max(a.bestDepth||0,b.bestDepth||0),
    bestStreak:Math.max(a.bestStreak||0,b.bestStreak||0),
    collection:(hi.collection||[]).slice(),
    pending:(hi.pending||[]).slice(),
    relicsSeen:[...new Set([...(a.relicsSeen||[]), ...(b.relicsSeen||[])])],   // 發燒配件圖鑑聯集
    cash:Math.max(a.cash||0, b.cash||0),   // 現金取較高者（同 xp 邏輯，避免換裝置歸零）
    // 耗損紀錄逐件併：取品相較好（耗損較低）者，玩家不吃虧
    relicWear:(()=>{ const w=Object.assign({}, a.relicWear||{}); const bw=b.relicWear||{}; for(const k in bw){ w[k]=(w[k]==null)?bw[k]:Math.min(w[k],bw[k]); } return w; })(),
    lastLoadout: hi.lastLoadout || lo.lastLoadout || null,   // 同流派再戰的上次配置
    curveResetV1:!!(a.curveResetV1||b.curveResetV1),   // 歸零旗標一旦設過就保留，避免合併後被重複歸零
  };
  const owned = new Set(m.collection.map(keyOf));
  for(const c of (lo.collection||[])) if(!owned.has(keyOf(c))){ m.collection.push(c); owned.add(keyOf(c)); }
  const pset = new Set(m.pending.map(keyOf));
  for(const c of (lo.pending||[])) if(!pset.has(keyOf(c))){ m.pending.push(c); pset.add(keyOf(c)); }
  return m;
}

// 樂歷升級曲線（三角遞增）：升到 lv+1 所需＝perLevel×lv（Lv1→2:100、Lv2→3:200、Lv3→4:300…越後越陡）
function xpNeedForLevel(lv){ return MXP.perLevel*lv; }              // 由 lv 升到 lv+1 需要的經驗
function xpTotalForLevel(lv){ return MXP.perLevel*(lv-1)*lv/2; }    // 到達第 lv 級的累計經驗（Lv1=0）
function levelOf(xp){
  xp = Math.max(0, xp||0);
  let lv = Math.floor((1 + Math.sqrt(1 + 8*xp/MXP.perLevel)) / 2); // 解 perLevel*lv*(lv-1)/2 <= xp
  if(lv < 1) lv = 1;
  while(xpTotalForLevel(lv+1) <= xp) lv++;                          // 浮點保險：往上補
  while(lv > 1 && xpTotalForLevel(lv) > xp) lv--;                   // 浮點保險：往下退
  return lv;
}
function spentTalents(){ return META.talents.atk+META.talents.def+META.talents.qir; }
function freeTalents(){ return (levelOf(META.xp)-1) - spentTalents(); } // 每升一級得 1 天賦點
// 抽專輯：抽一張收藏沒有的專輯（深層樂歷小機率出王牌）；回傳抽到的卡或 null
function drawAlbum(){
  const owned = new Set(META.collection.map(keyOf));
  const wantAce = levelOf(META.xp)>=4 && Math.random()<0.18;
  const src = wantAce ? ACES.concat(allPool()) : allPool().concat(ACES);
  const bag = shuffle(src.slice());
  for(const c of bag){ const card={artist:c.artist,album:c.album,classic:c.classic,obscurity:c.obscurity,accessibility:c.accessibility,ace:c.ace||null};
    if(!owned.has(keyOf(card))){ META.collection.push(card); return card; } }
  return null; // 全收集滿
}

function removeFromRunDeck(card){ const k=keyOf(card); const i=RUN.deck.findIndex(c=>keyOf(c)===k); if(i>=0) RUN.deck.splice(i,1); }
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=rnd(i+1); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function recomputeMaxHp(prevMax){
  RUN.maxHp = RUN.baseMaxHp + RUN.mods.maxHpAdd + relicMaxHp();
  // 提升上限時同步補等量的現有血；上限下修（發燒配件磨損/卸下）則夾住現有血
  const add = RUN.maxHp - (prevMax||RUN.maxHp);
  if(add>0) RUN.hp = Math.min(RUN.maxHp, RUN.hp + add);
  if(RUN.hp>RUN.maxHp) RUN.hp = RUN.maxHp;
}

// =========================================================================
//  畫面 2：挑 5 張專輯開始旅程
//   來源兩種：① 我的卡冊（登入才有；讀 Firestore collections/{uid}/cards）
//             ② 隨機發牌（不論冷熱好壞，整個卡池洗牌取一批；未登入也能玩）
// =========================================================================
// 由名稱雜湊穩定生成 1–5 三圍（卡冊裡 AI 推薦的冷盤沒有遊戲數值時用）
function hashStats(str){
  let h=0; for(let i=0;i<str.length;i++){ h=(h*31+str.charCodeAt(i))>>>0; }
  return { c:1+(h%5), o:1+((h>>>4)%5), a:1+((h>>>8)%5) };
}
// 把卡冊評分(1–5)夾到合法區間；取不到就用 fallback（hashStats/POOL 的值）
function clampStat(v, fallback){ v=Number(v); if(!v) return fallback; return Math.max(1,Math.min(5,Math.round(v))); }
// 卡冊資料 → 遊戲卡：王牌旗標→ace；POOL 既有→設計數值；其他→雜湊數值
function cardFromCollection(d){
  const artist=d.artist||'', album=d.album||'', coverUrl=d.coverUrl||'';
  const mk=(c,o,a,ace)=>({artist,album,coverUrl,classic:c,obscurity:o,accessibility:a,ace:ace||null});
  if(d.hall)   return mk(7,1,1,'hall');
  if(d.pearl)  return mk(1,7,1,'pearl');
  if(d.heresy) return mk(1,1,7,'heresy');
  const neoT=neoAceOf(artist,album);   // 殿堂神作清單：沒存旗標也視為王牌
  if(neoT){ const s=NEO_ACE_STATS[neoT]; return mk(s[0],s[1],s[2],neoT); }
  const key=keyOf({artist,album});
  const inPool = POOL.find(p=>keyOf(p)===key) || ACES.find(p=>keyOf(p)===key);
  if(inPool) return mk(inPool.classic,inPool.obscurity,inPool.accessibility,inPool.ace||null);
  const s=hashStats(key); return mk(s.c,s.o,s.a,null);
}
// 隨機發牌池：整個卡池洗牌取 18 張（冷門到主流、強到弱都有）；殿堂神作保留王牌身分
function buildRandomShelf(){ return shuffle(allPool().slice()).slice(0,18).map(c=>({...c})); }

async function renderSeedSelect(){
  document.body.classList.remove('in-battle');
  $app.innerHTML = topbarHTML() + `<div class="center muted" style="padding:40px">載入中…</div>`;
  // 等登入狀態回復（最多等 2.5s，離線/未登入照樣開始）
  // 注意 __rogueAuthReady 是 module 晚一步才掛上——先輪詢等它出現，否則 race(undefined) 直接落空、登入者被當訪客
  try{
    const t0=Date.now();
    while(!window.__rogueAuthReady && Date.now()-t0<2500) await new Promise(r=>setTimeout(r,80));
    if(window.__rogueAuthReady) await Promise.race([ window.__rogueAuthReady, new Promise(r=>setTimeout(r,2500)) ]);
  }catch(e){}
  // 等頂級牌卡池併入判定表（最多等 2.5s）→ 隨機發牌/卡冊種子才會正確顯示王牌
  try{ await Promise.race([ loadApexAces(), new Promise(r=>setTimeout(r,2500)) ]); }catch(e){}
  const user = window.__rogueUser ? window.__rogueUser() : null;
  RUN._loggedIn = !!user;
  if(!RUN._randomShelf) RUN._randomShelf = buildRandomShelf();
  // 載一次卡冊
  if(user && !RUN._collLoaded){
    let raw=[]; try{ raw = await window.__getMyCollection(); }catch(e){}
    // 三圍以卡冊為基準：跟主選單卡冊同源（/album-rating + album_overrides），取不到才退回 hashStats/POOL
    const cards = await Promise.all(raw.map(async d=>{
      const c = cardFromCollection(d);
      if(c.ace) return c;   // 王牌單軸 7，下面 filter 會排除，不用覆寫
      let r=null; try{ r = await window.__getAlbumRating(d.artist||'', d.album||'', d.cardId); }catch(e){}
      if(r && r.tier && NEO_ACE_STATS[r.tier]){
        // 後台校正設了頂點級別（album_overrides.tier）→ 直接升王牌
        const s=NEO_ACE_STATS[r.tier];
        c.ace=r.tier; c.classic=s[0]; c.obscurity=s[1]; c.accessibility=s[2];
      } else if(r){
        c.classic = clampStat(r.classic, c.classic);
        c.obscurity = clampStat(r.obscurity, c.obscurity);
        c.accessibility = clampStat(r.accessibility, c.accessibility);
      }
      return c;
    }));
    RUN._collShelf = cards;   // 頂級卡（王牌）也可當種子，但起始最多選 1 張（見 toggleSeed）
    RUN._collLoaded = true;
  }
  if(!RUN._source) RUN._source = (user && RUN._collShelf && RUN._collShelf.length>=5) ? 'collection' : 'random';
  paintSeedScreen();
}
function paintSeedScreen(){

    ${sourceRow}${emptyColl}
    <div class="grid" id="shelf"></div>
    <div style="height:64px"></div>
    <div class="seedbar"><div class="inner">
      <span class="cnt">已選 <b id="seedCount">0</b>/${SM}</span>
      <div class="dots" id="seedDots">${'<i></i>'.repeat(SM)}</div>

  const wrap=document.getElementById('shelf');
  wrap.innerHTML = shelf.map((c,i)=>`<div onclick="toggleSeed(${i})" id="seed${i}" data-ck="${keyOf(c).replace(/"/g,'&quot;')}">${cardHTML(c,{clk:true,cover:true})}</div>`).join('');
  shelf.forEach((c,i)=>{ const el=document.getElementById('seed'+i); if(el) attachSeedPress(el,i); });   // 長按看介紹

  // 切換來源後，舊 shelf 的回調可能晚到 → 用 data-ck 確認該格仍是同一張卡才寫入
  shelf.forEach((c,i)=>{ if(c.coverUrl) return; const ck=keyOf(c); ensureCover(c).then(url=>{ if(!url) return;

function seedToast(msg){

// 長按（450ms）初始牌 → 彈出專輯介紹＋串流連結；放開前移動視為滑動、取消
let _seedHeld=false, _seedTimer=null, _seedPt=null;
function attachSeedPress(el, i){
  el.addEventListener('pointerdown', e=>{
    _seedPt={x:e.clientX,y:e.clientY};
    clearTimeout(_seedTimer);
    _seedTimer=setTimeout(()=>{
      _seedHeld=true; setTimeout(()=>{ _seedHeld=false; }, 800);   // 放開時的誤點吞掉，之後自動復位
      const c=RUN&&RUN._shelf&&RUN._shelf[i]; if(c) openCardInfo(c);
    }, 450);
  });
  const cancel=()=>clearTimeout(_seedTimer);
  el.addEventListener('pointermove', e=>{ if(_seedPt && (Math.abs(e.clientX-_seedPt.x)>12 || Math.abs(e.clientY-_seedPt.y)>12)) cancel(); });
  el.addEventListener('pointerup', cancel);
  el.addEventListener('pointercancel', cancel);
  el.addEventListener('pointerleave', cancel);
  el.addEventListener('contextmenu', e=>e.preventDefault());
}
// 選牌以「卡」為單位（存卡片物件，key=artist|album），卡冊與隨機發牌兩個頁籤可混著選
function toggleSeed(i){
  if(_seedHeld){ _seedHeld=false; return; }   // 長按看介紹的那一下，別誤觸選牌
  const c=RUN._shelf[i], ck=keyOf(c);
  const idx = RUN.seedsPicked.findIndex(x=>keyOf(x)===ck);
  if(idx>=0){ RUN.seedsPicked.splice(idx,1); updateSeedUI(); return; }
  if(RUN.seedsPicked.length>=seedMax()) return;
  // 頂級卡（王牌）起始有上限（預設 1 張；樂歷 Lv.7 解鎖 2 張），過程中還會抽到
  const aceCap=aceSeedMax();
  if(c.ace && RUN.seedsPicked.filter(x=>x.ace).length>=aceCap){
    seedToast(`頂級卡起始最多選 ${aceCap} 張（過程中還會抽到）`); return;
  }
  RUN.seedsPicked.push(c);
  updateSeedUI();
}
function updateSeedUI(){
  const picked=new Set(RUN.seedsPicked.map(keyOf));
  const n=RUN.seedsPicked.length;
  document.getElementById('seedCount').textContent = n;
  document.getElementById('seedGo').disabled = n!==seedMax();
  const dots=document.getElementById('seedDots');
  if(dots) [...dots.children].forEach((d,j)=>d.classList.toggle('on', j<n));
  RUN._shelf.forEach((c,i)=>{
    const el=document.getElementById('seed'+i); if(!el) return;
    const card=el.querySelector('.card');
    card.classList.toggle('sel', picked.has(keyOf(c)));
  });
}

        <div style="flex:1"><h3>${r.name}${(r.tier||1)>1?' <span class="pill" style="color:var(--gold);border-color:var(--gold)">進階</span>':''} <span style="font-size:9px;color:${g.color}">${broke?'報廢 · 需保養':gradeName(r,w)+' · 耐久 '+duraOf(w)}</span></h3>
          <div class="wbarwide" style="margin:3px 0"><i style="width:${Math.min(100,w)}%;background:${g.color}"></i></div>
          <div class="muted">${r.desc}</div></div>
        <div style="display:flex;flex-direction:column;gap:6px;align-items:center;flex:none">
          <button class="pill" style="cursor:pointer;background:#fff" onclick="event.stopPropagation();openRelicCare('${r.id}')">🔧</button>
          <div class="lo-check" style="font-size:18px;width:22px;text-align:center"></div>
        </div>
      </div>`;}).join('')}</div>

    <div class="seedbar"><div class="inner">
      <span class="cnt">帶 <b id="loCount">0</b>/${cap}</span>

      <button class="btn primary" style="flex:none" onclick="confirmLoadout()">開始旅程 →</button>
    </div></div>`;
  updateLoadoutUI();
}
function toggleLoadoutRelic(id){
  const cap=wearSlots(); const i=_loadoutPick.indexOf(id);
  if(i>=0) _loadoutPick.splice(i,1);
  else {
    if(metaBroken(id)){ seedToast('💥 已報廢（耐久 0）——先花現金保養才能帶上場'); return; }
    if(_loadoutPick.length>=cap){ seedToast(`最多帶 ${cap} 件`); return; }
    _loadoutPick.push(id);
  }
  updateLoadoutUI();
}
function updateLoadoutUI(){
  const cnt=document.getElementById('loCount'); if(cnt) cnt.textContent=_loadoutPick.length;
  (META.relicsSeen||[]).forEach(id=>{
    const el=document.getElementById('lo_'+id); if(!el) return;
    const on=_loadoutPick.includes(id);
    el.style.borderColor=on?'var(--gold)':''; el.style.background=on?'#fffbe9':'';
    const ck=el.querySelector('.lo-check'); if(ck){ ck.textContent=on?'✓':''; ck.style.color='var(--gold)'; }
  });
}
function confirmLoadout(){
  // 把選的發燒配件灌進 run（耐久沿用跨趟紀錄），出戰欄＝選的（上限格數）
  RUN.relics=[]; RUN.equipped=[]; RUN.relicWear={};
  _loadoutPick.slice(0,wearSlots()).forEach(id=>{ if(relicById(id)) carryRelic(id); });
  startRun();
}
function startRun(){
  // 正常流程按鈕只在選滿 seedMax 時可按；「同流派再戰」允許沿用舊上限（如解鎖第 6 格前存的 5 張）
  if(RUN.seedsPicked.length<5 || RUN.seedsPicked.length>seedMax()) return;
  const seeds = RUN.seedsPicked.map(c=>copyCard(c));
  let junk = makeJunk();
  if(hasUnlock('junk4')) junk = junk.slice(0,4);   // Lv.4 解鎖：起始雜牌 -1
  RUN.deck = seeds.concat(junk);                   // 種子 + 雜牌 ≈ 9~11 張
  RUN.depth=0; RUN.streak=0; RUN.hp=RUN.maxHp;
  // Lv.10 解鎖：開局自帶 1 件隨機發燒配件
  if(hasUnlock('startRelic') && !RUN.relics.length){
    const pool=relicPool();
    if(pool.length){ const r=pick(pool); grantRelic(r.id); seedToast(`🎁 開局發燒配件：${r.name}`); }
  }
  // 記住這次的流派＋種子＋帶的發燒配件 → 死亡畫面可「同流派再戰」一鍵重開
  META.lastLoadout = { classKey:RUN.classKey, relics:(RUN.equipped||[]).slice(),
    seeds:RUN.seedsPicked.map(c=>({artist:c.artist,album:c.album,coverUrl:c.coverUrl||'',classic:c.classic,obscurity:c.obscurity,accessibility:c.accessibility,ace:c.ace||null})) };
  saveMeta();
  // 開局選的盤若尚未擁有（隨機發牌來的）→ 一併列入趟末「挑 1 張永久收藏」名單，
  // 和局末抽盤／遊戲中抽到的放在一起讓玩家挑
  const _owned = new Set(META.collection.map(keyOf).concat((RUN._collShelf||[]).map(keyOf)));
  RUN.drawnCards = RUN.seedsPicked.filter(c=>!_owned.has(keyOf(c)))
    .map(c=>({artist:c.artist,album:c.album,coverUrl:c.coverUrl||'',classic:c.classic,obscurity:c.obscurity,accessibility:c.accessibility,ace:c.ace||null,uid:newUid()}));
  nextFight();
}
// 取得發燒配件（掉落／禮物＝全新的一件，舊耗損紀錄一併換新）；出戰欄有空位就自動裝上
function grantRelic(id){
  if(RUN.relics.includes(id)) return;
  RUN.relics.push(id);
  if(!RUN.relicWear) RUN.relicWear={};
  RUN.relicWear[id]=0;   // 入手全新
  if(!META.relicWear) META.relicWear={};
  META.relicWear[id]=0;  // 跨趟紀錄同步換新（拿到同款＝換一件新的）
  // 圖鑑點亮：拿過一次永久記錄（跨趟；跟樂歷一起存本機＋雲端）
  if(!Array.isArray(META.relicsSeen)) META.relicsSeen=[];
  if(!META.relicsSeen.includes(id)) META.relicsSeen.push(id);
  saveMeta();
  if(!Array.isArray(RUN.equipped)) RUN.equipped=[];
  if(RUN.equipped.length < wearSlots()){ const p=RUN.maxHp; RUN.equipped.push(id); recomputeMaxHp(p); }
}
// 帶自己的舊件上場（開戰前選單／同流派再戰）：耐久沿用跨趟紀錄；報廢（耐久 0）帶不動
function carryRelic(id){
  if(!relicById(id) || RUN.relics.includes(id) || metaBroken(id)) return;
  RUN.relics.push(id);
  if(!RUN.relicWear) RUN.relicWear={};
  RUN.relicWear[id]=metaWearOf(id);
  if(!Array.isArray(RUN.equipped)) RUN.equipped=[];
  if(RUN.equipped.length < wearSlots()){ const p=RUN.maxHp; RUN.equipped.push(id); recomputeMaxHp(p); }
}
// 趟中耗損同步回樂歷（跨趟保留：黑膠器材的傷是真的傷）
function syncWearToMeta(){
  if(!RUN || !RUN.relicWear) return;
  if(!META.relicWear) META.relicWear={};
  for(const id of (RUN.relics||[])) META.relicWear[id]=Math.round(RUN.relicWear[id]||0);
}
// 換裝：裝上／卸下（含 maxHp 類重算）—— 整備面板用
function equipRelic(id){
  if(!RUN.relics.includes(id) || isEquipped(id) || RUN.equipped.length>=wearSlots()) return;
  const p=RUN.maxHp; RUN.equipped.push(id); recomputeMaxHp(p);
}
function unequipRelic(id){
  const i=RUN.equipped.indexOf(id); if(i<0) return;
  const p=RUN.maxHp; RUN.equipped.splice(i,1); recomputeMaxHp(p);
}
// （趟中免費保養已移除——保養改在趟與趟之間的配件選單花現金進行，見 openRelicCare/doRepair）
// 回收報廢發燒配件 → 移出庫存、換一點 HP
function recycleRelic(id){
  if(!RUN.relics.includes(id)) return;
  unequipRelic(id);
  RUN.relics=RUN.relics.filter(x=>x!==id);
  delete RUN.relicWear[id];
  RUN.hp=Math.min(RUN.maxHp, RUN.hp+WEAR.recycleHeal);
}
// 整新：一件回全新（藏家獎勵用；跨趟紀錄同步）
function restoreRelic(id){ if(RUN.relicWear) RUN.relicWear[id]=0; if(META.relicWear) META.relicWear[id]=0; saveMeta(); const p=RUN.maxHp; recomputeMaxHp(p); }
// 每場結算套用耗損（只有出戰的磨）→ 回傳品相跨階事件（升級提示用）
function applyWear(){
  if(!WEAR.enabled || !RUN.equipped) return [];
  const events=[]; const prevMax=RUN.maxHp;
  for(const id of RUN.equipped){
    const r=relicById(id); if(!r) continue;
    const before=gradeIndex(wearOf(id));
    const fired = !r.fx || Object.keys(r.fx).some(k=>G&&G._fired&&G._fired.has(k));
    RUN.relicWear[id]=Math.min(100, (RUN.relicWear[id]||0)+Math.round(wearPerFight(r,fired)));
    const after=gradeIndex(wearOf(id));
    if(after>before) events.push({r, to:after, broke:WEAR.grades[after].mul===0});
  }
  // 洗碟水在出戰 → 每場保養其他出戰發燒配件（清潔向 build 的核心）
  if(WEAR.cleanerHeal>0 && isEquipped('cleaner')){
    for(const id of RUN.equipped){ if(id!=='cleaner') RUN.relicWear[id]=Math.max(0,(RUN.relicWear[id]||0)-WEAR.cleanerHeal); }
  }
  syncWearToMeta();   // 耗損跨趟保留（saveMeta 由 winFight 統一呼叫）
  recomputeMaxHp(prevMax);
  return events;
}

// =========================================================================
//  無限賽局：開下一場（敵人隨 depth 變強）
// =========================================================================
function enemyForDepth(d){
  const boss = isBossDepth(d);                   // 每 5 場一位傳說藏家（里程碑強敵，打贏掉發燒配件）
  // 難度曲線：前 3 場是暖身（三圍近乎 0、牌從全池隨機抓），第 4 場起才進陡升段、第 5 場進 hard
  const diff = d<3?'easy' : d<5?'normal' : 'hard';
  const late = Math.max(0, d-3);                 // 陡升段深度：第 4 場開始計
  const stats = {
    atk: Math.round(late*0.75) + (boss?1:0),     // 第4場1 → 第5場2 → 第8場4；藏家 +1
    def: Math.round(late*0.45) + (boss?1:0),
    qir: (d>=3?1:0) + Math.floor(late*0.5) + (boss?1:0),
  };
  const hp = CFG.startHp + Math.floor((d-1)*1.2) + (boss?2:0);   // 血只微升（保持 3~4 招快打），難度靠三圍/AI
  let startQi = d<4 ? 0 : Math.min(3, Math.floor((d-2)/2));   // 第4場1 → 第6場2 → 第8場3
  if(boss) startQi = Math.max(startQi, 2);
  // 牌組：暖身期從整個卡池隨機抓（有強有弱）；第 4 場起改抽「強牌帶」並隨深度整體加值
  const buff = Math.floor(late/3);              // 第6場起敵牌主軸 +1、第9場 +2（上限 6）
  const ranked = allPool().slice().sort((a,b)=>
    (b.classic+b.obscurity+b.accessibility)-(a.classic+a.obscurity+a.accessibility));
  // 在「強牌帶」內隨機取樣（帶寬至少 120 張、隨深度放寬）：
  // 舊寫法固定切全池最強前 16 張，排序是確定性的 → 前期敵人永遠同一批卡；改成帶內抽樣後場場不同
  const bandN = Math.min(ranked.length, Math.max(120, (16 + d*3) * 8));
  const strongBag = d<4 ? shuffle(allPool().filter(c=>!c.ace)) : shuffle(ranked.slice(0, bandN));   // 暖身期不給敵人王牌
  const wildBag = shuffle(allPool().filter(c=>!c.ace));   // 與玩家同一個完整卡池（冷熱強弱都有）
  const deck=[];
  for(let i=0;i<11;i++){
    // 35% 機率改抽「玩家同款全卡池」：對手牌面更豐富、不會場場都是同一批狠牌
    const src = (d>=4 && Math.random()<0.35) ? wildBag : strongBag;
    const c=copyCard(src[i%src.length]);
    if(buff>0 && !c.ace){                       // 加在該卡最高的主軸上，讓敵牌更難纏（王牌 7 星不動）
      const mainAttr = ATTRS.reduce((m,a)=>c[a]>c[m]?a:m, 'classic');
      c[mainAttr]=Math.min(6, c[mainAttr]+buff);
    }
    deck.push(c);
  }
  if(boss) deck.push(copyCard(pick(ACES)));      // 藏家必帶王牌
  else if(d>=5 && Math.random()<Math.min(.6,.15*(d-4))) deck.push(copyCard(pick(ACES)));
  shuffle(deck);
  const titles=['音樂小白','文青同好','社團學長','資深樂評','二手店老闆','地下廠牌主理人','品味行家','品味之神'];
  const who = boss ? '傳說藏家' : titles[Math.min(titles.length-1, Math.floor(d/2))];
  const emoji = boss ? '🎩' : ['🎧','🧣','🎓','🎙️','💿','📀','🏆','👑'][Math.min(7,Math.floor(d/2))];
  return { who, emoji, diff, stats, hp, maxHp:hp, deck, startQi, boss };
}

function nextFight(){
  RUN.depth++;            // 進入第 depth 場
  ensureRelicState();     // 相容舊存檔＋補齊出戰欄
  const E = enemyForDepth(RUN.depth);
  // 起手保證抽到自己選的牌：非雜牌洗勻放牌庫上層、雜牌沉底——好牌抽完才輪到雜牌充數
  // （第 1 場起手 5 張＝玩家挑的 5 張種子；drawCard 用 pop() 從陣列尾端抽）
  const _good = shuffle(RUN.deck.filter(c=>!c.junk).map(copyCard));
  const _junk = shuffle(RUN.deck.filter(c=>c.junk).map(copyCard));
  const pDeck = _junk.concat(_good);
  G = {
    over:false, busy:false, turn:0,
    p:{ side:'p', hp:RUN.hp, maxHp:RUN.maxHp, qi:clampQi(relicFx('startQi')), deck:pDeck, hand:[], last:null, chain:0, stats:RUN.stats },   // 45 轉接環：開局氣勢
    e:{ side:'e', hp:E.hp, maxHp:E.maxHp, qi:E.startQi||0, deck:shuffle(E.deck), hand:[], last:null, chain:0, stats:E.stats },
    E, diff:E.diff, pendingE:null, pCounteredTellLast:false, log:[], sacUsed:false,   // sacUsed：割捨防禦每場限一次
    _dustUsed:false,      // 防塵套：每場首次受擊減半（每場重置）
    eHist:[], pHist:[],   // 本場雙方出過的牌（回顧用）
  };
  // 發燒配件耗損：本場觸發記錄＋迴光一轉（搖搖欲墜的出戰發燒配件 fx 翻倍）
  G._fired=new Set();
  G._swan=new Set((RUN.equipped||[]).filter(id=>WEAR.enabled && wearOf(id)>=WEAR.swanAt && gradeMul(id)>0));
  fireRelic('startQi','maxHp','extraDraw','winHeal','xpBoost','feintDown','drawTwo');
  for(let i=0;i<CFG.startHand;i++){ drawCard(G.e); }
  for(let i=0;i<CFG.startHand+RUN.mods.extraDraw+relicFx('extraDraw');i++){ drawCard(G.p); }  // 起手多抽（能力＋試聽站耳機）
  if(E.boss){ pushLog(`🎩 第 ${RUN.depth} 場 · 里程碑【傳說藏家】現身——打贏可獲發燒配件！`,'good'); bossIntro(); }
  else pushLog(`⚔️ 第 ${RUN.depth} 場 · 對手【${E.who}】（${E.diff==='easy'?'生手':E.diff==='normal'?'老練':'硬仗'}）`,'good');
  renderBattle();
  startTurn();
}

// 傳說藏家開場動畫：全屏蓋章＋金線＋震屏，約 2 秒自動收場（戰鬥已在底下備好）

];

function drawCard(s){ if(s.deck.length) s.hand.push(s.deck.pop()); }
function pushLog(t,cls=''){ G.log.unshift({t,cls}); if(G.log.length>40)G.log.pop(); }

function computeChain(side, attr){
  if(side.last!==null && CFG.chainNext[side.last]===attr) side.chain+=1; else side.chain=1;
  let qi=0; if(side.chain>=CFG.qiChainCap) qi=0; else if(side.chain>=3) qi=CFG.qiChain3; else if(side.chain===2) qi=CFG.qiChain2;
  return { len:side.chain, qi };
}
function applyAttrEffect(side, attr){
  // 出招當下的自身效果：經典回聲望、冷門充氣勢。（硬蕊的削氣勢改成「被硬蕊打中才削」，見 drainQiOnHit）
  const me=G[side.side];
  if(attr==='classic') me.hp=Math.min(me.maxHp, me.hp+CFG.attrFx.classic);
  else if(attr==='obscurity') me.qi=clampQi(me.qi+CFG.attrFx.obscurity);
}
// 被攻擊（吃到傷害）→ 該方氣勢下降；被【硬蕊】打中 -2，其餘 -1（敵我皆適用）
function drainQiOnHit(victimSide, atkAttr, dmg){
  if(dmg<=0) return;
  const v=G[victimSide]; if(v.qi<=0) return;
  const drop = atkAttr==='accessibility' ? CFG.hitQiDrainAcc : CFG.hitQiDrain;
  const real = Math.min(v.qi, drop);
  v.qi=clampQi(v.qi-drop);
  pushLog(`${victimSide==='p'?'你':'對手'}被${atkAttr==='accessibility'?'【硬蕊】':''}攻擊 → 氣勢 -${real}`,'qi');
}

// 隱形 DDA（同 battle.html 的 mercyLevel 思路，介面零洩漏）：
// 玩家血量劣勢越大，對手越「玩心大起」——讀心變鈍、少虛晃、輾壓留一手 → 留出反殺窗口。
// 玩家領先時完全不生效，不會出現可見的補償 buff。
function mercyLevel(){
  if(!G || G.over) return 0;
  const pR=Math.max(0,G.p.hp)/G.p.maxHp, eR=Math.max(0,G.e.hp)/G.e.maxHp;
  let m = Math.max(0, eR-pR)*1.3;      // 劣勢比例 → 鈍化強度
  if(G.p.hp<=3) m += .35;              // 瀕死再放寬：確保翻盤永遠有路
  return Math.min(1, m);
}

// 敵方輾壓基礎傷害隨深度爬：暖身 4 → 中段 5 → 第 5 場起才完整 6（前期不再一發半血蒸發）
function eUltBase(){ const d=RUN?RUN.depth:5; return CFG.ultimate - (d<3?2 : d<5?1 : 0); }

// AI：暗定出招 + 露氣場提示（照剋會虛晃）
function aiPlan(){
  const diff=G.diff, hand=G.e.hand; let best=null;
  const depth = RUN ? RUN.depth : 1;
  const mercy = diff==='easy' ? 0 : mercyLevel();   // 生手本來就隨機，不用再鈍
  // 讀心：玩家常「順著相生」接招（chainNext），對手就專挑能剋掉玩家預期出招的屬性
  const predicted = G.p.last!==null ? CFG.chainNext[G.p.last] : null;
  const wantCounter = predicted ? COUNTER_OF[predicted] : null;   // 能剋掉玩家預期招的屬性
  for(const card of hand){ for(const attr of ATTRS){
    let s=1; const chainHit=G.e.last!==null && CFG.chainNext[G.e.last]===attr;
    // 星數是主要依據（權重＞隨機噪音）：不再出現「手上有經典5卻打冷門1」的亂出
    if(diff==='easy'){ s+=card[attr]*0.45 + Math.random()*2.4; }
    else if(diff==='hard'){ if(chainHit)s+=2; s+=card[attr]*0.7;
      if(wantCounter && attr===wantCounter) s += (2.4 + Math.max(0,depth-4)*0.25) * (1 - mercy*0.7);   // 深層讀心越準；玩家劣勢時讀心鈍化
      if(card.ace==='heresy')s+=(G.p.qi>=4?5:-1); if(card.ace==='hall')s+=(G.p.qi>=3?3:.2); if(card.ace==='pearl')s+=1.2; s+=Math.random()*0.8; }
    else { if(chainHit)s+=1; s+=card[attr]*0.6;
      if(wantCounter && attr===wantCounter) s += 1.6 * (1 - mercy*0.7);
      if(card.ace==='heresy')s+=(G.p.qi>=5?3:.3); if(card.ace==='hall')s+=(G.p.qi>=4?1.5:.5); if(card.ace==='pearl')s+=.8; s+=Math.random()*1.4; }
    if(mercy>0) s += Math.random()*5*mercy;   // 大幅落後 → 對手評分摻噪音，出招像「玩心大起」的鈍
    if(!best||s>best.s) best={card,attr,s};
  }}
  return best;
}
// 虛晃改招後換牌用：手上該屬性星數最高的牌
function bestEnemyCardFor(attr){
  let b=null; for(const c of G.e.hand){ if(!b || (c[attr]||0)>(b[attr]||0)) b=c; }
  return b;
}

function startTurn(){
  if(G.over) return;
  G.turn++; G.busy=false;
  // 挖掘派 / 流派每回合氣勢
  if(RUN.qiPerTurn) G.p.qi=clampQi(G.p.qi+RUN.qiPerTurn);
  // 能力：每回合回血
  if(RUN.mods.regen && G.turn>1) G.p.hp=Math.min(G.p.maxHp, G.p.hp+RUN.mods.regen);
  // AI 暗定 + 虛晃（隨深度越來越會騙：氣場提示不再可以照剋）
  const plan=aiPlan();
  if(!plan){ (G.p.hp>=G.e.hp) ? winFight() : loseFight(); return; }   // 對手無牌可出 → 速判
  let attr=plan.attr, card=plan.card, vague=false; const tell=plan.attr;
  const d=RUN.depth, mercy=mercyLevel();
  const fd = Math.max(0, 1 - relicFx('feintDown')/100);   // 老闆的名片：對手虛晃機率打折
  if(G.diff!=='easy' && !plan.card.ace){
    // 玩家上手照剋 → 虛晃反咬（玩家大幅劣勢時偶爾放過，隱形 DDA）
    if(G.pCounteredTellLast && Math.random() >= mercy*0.7 && Math.random()<fd){ attr = COUNTER_OF[COUNTER_OF[tell]]; }
    else {
      // 主動虛晃：normal 一成五、hard 從第 5 場起隨深度爬到過半 → 照提示剋反而常吃虧
      // 虛晃＝故意出「剋掉玩家反制牌」的牌型：他說打硬蕊、你打經典想剋 → 他實出冷門反剋你的經典
      const feintP = (G.diff==='hard' ? Math.min(.55, .18 + Math.max(0,d-5)*.05) : .15) * (1 - mercy*0.8) * fd;
      if(Math.random()<feintP) attr = COUNTER_OF[COUNTER_OF[tell]];
    }
    // hard 深層：一定機率完全不露氣場（深不可測），玩家只能自己讀局
    if(G.diff==='hard' && Math.random() < Math.min(.5, .08 + Math.max(0,d-5)*.06) * (1 - mercy*0.6)) vague=true;
  }
  // 虛晃改了屬性 → 牌也要換成手上該屬性最強的（原本硬拿原牌打，才會出現「冷門1也照打」）
  if(attr!==plan.attr){ const alt=bestEnemyCardFor(attr); if(alt) card=alt; }
  let eUlt = G.e.qi>=CFG.qiMax;
  if(eUlt && Math.random() < mercy*0.65) eUlt=false;   // 玩家瀕死劣勢 → 對手「留一手」不急著輾壓，給反殺窗口
  G.pendingE = { card, attr, tell, ult:eUlt, vague };
  renderBattle();
}

// ----- 封面（與 battle.html 同源：worker /spotify-search ＋ card_catalog 快取）-----
const coverCache={};
async function ensureCover(card){
  if(!card || card.coverUrl) return card && card.coverUrl;
  const id=keyOf(card);
  if(id in coverCache){ card.coverUrl=coverCache[id]; return card.coverUrl; }
  let url=''; try{ if(window.__getCover) url = await window.__getCover(card.artist, card.album); }catch(e){}
  if(!url && !window.__getCover){
    // Firebase 模組沒起來（被擋/載入失敗）→ 封面直接打 worker，不讓整頁全變無圖佔位
    try{ const r=await fetch(DYN_WORKER+'/spotify-search?artist='+encodeURIComponent(card.artist)+'&album='+encodeURIComponent(card.album)); if(r.ok) url=(await r.json()).imageUrl||''; }catch(e){ return ''; }
  }
  coverCache[id]=url; card.coverUrl=url; return url;
}
function lazyCover(slotId, card, attr){
  if(!card || card.coverUrl) return;
  const s=document.getElementById(slotId); if(!s) return; s.dataset.cuid=card.uid;
  ensureCover(card).then(url=>{ if(url && s.dataset.cuid==card.uid && s.classList.contains('filled')) s.innerHTML=boardCardHTML(card, attr); });
}
// 檯面卡＝整張方形封面（與 battle.html .pcard/.pcover 一致）；attr = 這一手出的牌型角標
function boardCardHTML(card, attr){
  const aceTag=card.ace?`<span class="ht-ace ${card.ace}">${ACE_ZH[card.ace]}</span>`:'';
  const attrTag=attr ? (attr==='__ult__'
    ? `<span class="pattr ult">⚡輾壓</span>`
    : attr==='__sac__'
    ? `<span class="pattr sac">🛡割捨</span>`
    : `<span class="pattr ${attr}">${ATTR_ZH[attr]} ${card[attr]||''}</span>`) : '';
  const cover=card.coverUrl
    ? `<div class="pcover" style="background-image:url('${String(card.coverUrl).replace(/'/g,'%27')}')"></div>`
    : `<div class="pcover ht-noimg"><span>${card.album}</span></div>`;
  const ring=card.ace?` ace-border ace-${card.ace}`:(' '+rarityCls(card));
  return `<div class="pcard${ring.trim()?ring:''}">${cover}${aceTag}${attrTag}</div>`;
}

function streamSearchUrl(c){ return 'https://open.spotify.com/search/'+encodeURIComponent(c.artist+' '+c.album); }
async function ensureStreamUrl(c){

// 相剋/數值結算（沿用 resolveClash），再套三圍（攻/防/氣勢率）
function resolveClash(pCard,pAttr,eCard,eAttr){
  const pF=pCard[pAttr], eF=eCard[eAttr];
  let pC=CFG.beats[pAttr]===eAttr, eC=CFG.beats[eAttr]===pAttr;
  if(pC&&eCard.ace) pC=false;       // 霸權：被剋方王牌 → 取消相剋
  if(eC&&pCard.ace) eC=false;
  const r={ pdQi:0,edQi:0,dmgToP:0,dmgToE:0,kind:'tie',by:null,attr:null,pF,eF };
  if(pC){ r.pdQi+=CFG.qiCounter+(pCard.ace==='pearl'?CFG.ace.pearl.counterQiBonus*(relicFx('aceDouble')?2:1):0); r.edQi+=CFG.qiCounterLoser; r.dmgToE+=pF; r.kind='counter'; r.by='p'; r.attr=pAttr; }
  else if(eC){ r.edQi+=CFG.qiCounter+(eCard.ace==='pearl'?CFG.ace.pearl.counterQiBonus:0); r.pdQi+=CFG.qiCounterLoser; r.dmgToP+=eF; r.kind='counter'; r.by='e'; r.attr=eAttr; }
  else { if(pF>eF){ r.pdQi+=CFG.qiValue; r.edQi+=CFG.qiValueLoser; r.dmgToE+=(pF-eF)*CFG.valueDmg; r.kind='value'; r.by='p'; }
    else if(eF>pF){ r.edQi+=CFG.qiValue; r.pdQi+=CFG.qiValueLoser; r.dmgToP+=(eF-pF)*CFG.valueDmg; r.kind='value'; r.by='e'; }
    else { r.pdQi+=CFG.qiTie; r.edQi+=CFG.qiTie; } }
  return r;
}
// 三圍：攻=造傷+atk；防=受傷-def(最低1)；氣勢率=當回合有充能則+qir(一次)
function applyAtk(dmg, atk){ return dmg>0 ? dmg+atk : 0; }
function applyDef(dmg, def){ return dmg>0 ? Math.max(1, dmg-def) : 0; }
// 防塵套：每場第一次吃到的傷害減半（向下取整、最低 1）
function softenIncoming(d){
  if(d>0 && !G._dustUsed && relicFx('firstHitHalf')){
    G._dustUsed=true; fireRelic('firstHitHalf');
    const nd=Math.max(1, Math.floor(d/2));
    if(nd<d) pushLog(`🛡 防塵套：首次受擊 ${d} → ${nd}`,'good');
    return nd;
  }
  return d;
}

async function play(uid, pAttr){

  G.busy=true; _sel=null;
  const pCard=G.p.hand.find(c=>c.uid===uid); if(!pCard){ G.busy=false; return; }
  const pUlt=pAttr==='__ult__';
  const pSac=pAttr==='__sac__';        // 割捨防禦：犧牲此牌抵擋對手輾壓
  const {card:eCard, attr:eAttr, tell, ult:eUlt, vague}=G.pendingE;
  const feinted = !eUlt && !vague && eAttr!==tell;
  G.pCounteredTellLast = !pUlt && !pSac && !vague && (pAttr===COUNTER_OF[tell]);   // 氣場藏起來的回合不算「照剋」

  G.e.hand=G.e.hand.filter(c=>c.uid!==eCard.uid);

  const _tileEl=document.querySelector(`.handtile[data-uid="${uid}"]`);
  const _tileR=_tileEl?_tileEl.getBoundingClientRect():null;
  renderHand();
  updateStacks();   // 雙方各丟一張 → 腳邊唱片堆即時少一張（抽牌後由 mountSprites 補回）
  spriteFx('e','atk',520);
  await flyCards(_tileR, pCard, eCard);
  spriteFx('p','atk',520);
  const ps=document.getElementById('pSlot'), es=document.getElementById('eSlot');
  ps.className='slot filled'; ps.innerHTML=boardCardHTML(pCard,pAttrShow); lazyCover('pSlot',pCard,pAttrShow);
  es.className='slot filled'; es.innerHTML=boardCardHTML(eCard,eAttrShow); lazyCover('eSlot',eCard,eAttrShow);
  if(feinted && G.pCounteredTellLast){ callout('<span class="dmg">對手虛晃一招！反咬你的相剋</span>'); pushLog('對手虛晃 → 反咬你的相剋','hit'); await sleep(650); }

  const st=G.p.stats, est=G.e.stats;
  const pHp0=G.p.hp, eHp0=G.e.hp;   // 記回合前血量 → 勝負標記照「這一手誰掉血多」判，不看總血量

  if(pUlt || eUlt || pSac){
    // 品味輾壓回合（含七星回擊 / 割捨防禦）
    const eUltBlocked = eUlt && !pUlt && !pSac && pCard.ace;   // 七星回擊（王牌專屬：擋＋反傷＋不消耗）
    if(pUlt){ if(relicFx('ultDmg'))fireRelic('ultDmg'); let d=applyDef(applyAtk(CFG.pUltimate+RUN.mods.ultDmg+relicFx('ultDmg'),st.atk), est.def); G.e.hp-=d; G.p.qi=0; G.p.last=null; G.p.chain=0; drainQiOnHit('e',null,d);
      callout(`<span class="dmg">你 · 品味輾壓 −${d}</span>`); pushLog(`你品味輾壓！對手 −${d}`,'hit'); }
    else if(pSac){ G.p.last=null; G.p.chain=0; }   // 割捨＝防守，不算出招、不接連段
    else G.p.last=pAttr;
    if(eUlt){
      if(eUltBlocked){ G.e.qi=0; G.e.last=null; G.e.chain=0; const star=Math.max(pCard.classic,pCard.obscurity,pCard.accessibility); const d=applyDef(applyAtk(star,st.atk),est.def); G.e.hp-=d;
        callout(`<span class="good">七星回擊！對手輾壓無效，反傷 −${d}</span>`); pushLog(`${ACE_ZH[pCard.ace]}王牌七星回擊 → 對手 −${d}`,'good'); }
      else if(pSac){ // 割捨防禦：依犧牲牌最高星數抵傷（不反傷、不削氣），該牌本趟永久移除，每場一次
        const star=Math.max(pCard.classic,pCard.obscurity,pCard.accessibility);
        if(relicFx('ultGuard'))fireRelic('ultGuard');
        const raw=Math.max(1, applyDef(applyAtk(eUltBase(),est.atk), st.def) - relicFx('ultGuard'));   // 絕緣避震墊：被輾壓減傷
        const blocked=Math.min(star,raw), d=Math.max(0, raw-star);
        if(d>0){ G.p.hp-=d; }
        G.e.qi=0; G.e.last=null; G.e.chain=0;
        if(d>0) drainQiOnHit('p',null,d);
        removeFromRunDeck(pCard); G.sacUsed=true;
        callout(`<span class="good">🛡 割捨【${pCard.album}】· 擋 ${blocked}${d>0?` · 仍受 −${d}`:'（完全擋下）'}</span>`);
        pushLog(`割捨防禦：棄「${pCard.album}」抵 ${blocked} 傷${d>0?`，輾壓仍 −${d}`:'，完全擋下'}（此牌本趟永久移除）`, d>0?'hit':'good'); }
      else { if(relicFx('ultGuard'))fireRelic('ultGuard'); let d=Math.max(1, applyDef(applyAtk(eUltBase(),est.atk), st.def) - relicFx('ultGuard'));   // 絕緣避震墊
        d=softenIncoming(d);   // 防塵套：首次受擊減半
        G.p.hp-=d; G.e.qi=0; G.e.last=null; G.e.chain=0; drainQiOnHit('p',null,d);
        callout(`<span class="dmg">對手 · 品味輾壓 −${d}</span>`); pushLog(`對手品味輾壓！你 −${d}`,'hit'); }
    } else G.e.last=eAttr;
  } else {
    // 階段0 王牌即時被動（防靜電內套：我方王牌被動加倍）
    const aceDbl = relicFx('aceDouble') ? 2 : 1; if(aceDbl>1 && (pCard.ace||eCard.ace))fireRelic('aceDouble');
    if(pCard.ace==='heresy'){ if(G.e.qi>0)pushLog('異端【終極解構】→ 歸零對手氣勢','qi'); G.e.qi=0;
      if(aceDbl>1){ G.p.qi=clampQi(G.p.qi+2); pushLog('防靜電內套 → 解構回充自身氣勢 +2','qi'); } }
    if(eCard.ace==='heresy'){ if(G.p.qi>0)pushLog('異端【終極解構】→ 歸零你的氣勢','qi'); G.p.qi=0; }
    if(pCard.ace==='hall'){ const dq=CFG.ace.hall.enemyQi*aceDbl; G.e.qi=clampQi(G.e.qi-dq); pushLog(`殿堂【眾望所歸】→ 對手氣勢 -${dq}`,'qi'); }
    if(eCard.ace==='hall'){ G.p.qi=clampQi(G.p.qi-CFG.ace.hall.enemyQi); pushLog('殿堂【眾望所歸】→ 你的氣勢 -2','qi'); }
    // 絕版編號標：打出王牌 +1 氣勢
    if(pCard.ace && relicFx('aceQi')){ fireRelic('aceQi'); G.p.qi=clampQi(G.p.qi+relicFx('aceQi')); pushLog(`絕版編號標 → 王牌出場氣勢 +${relicFx('aceQi')}`,'qi'); }
    // 階段1 相生連段
    const pc=computeChain(G.p,pAttr), ec=computeChain(G.e,eAttr);
    if(pc.qi>0) pushLog(`你 · ${SYN_SKILL[pAttr]} ×${pc.len}連 氣勢+${pc.qi}`,'qi');
    if(ec.qi>0) pushLog(`對手 · ${SYN_SKILL[eAttr]} ×${ec.len}連 氣勢+${ec.qi}`,'qi');
    // 階段2 相剋/數值
    const r=resolveClash(pCard,pAttr,eCard,eAttr);
    if(r.kind==='value' && r.by==='p' && relicFx('valueDmg')){ fireRelic('valueDmg'); r.dmgToE += relicFx('valueDmg'); }   // 原版側標：比星勝 +傷
    let pdQi=r.pdQi+pc.qi, edQi=r.edQi+ec.qi;
    if(pc.qi>0 && relicFx('chainQi')){ fireRelic('chainQi'); pdQi += relicFx('chainQi'); }   // 首刻盤：相生連段額外充能
    if(pdQi>0) pdQi+=st.qir;     // 氣勢率
    if(edQi>0) edQi+=est.qir;
    if(r.kind==='counter' && r.by==='p'){ if(relicFx('counterQi'))fireRelic('counterQi'); pdQi+=RUN.mods.counterQi+relicFx('counterQi'); }  // 能力＋黑膠唱針：相剋多充氣勢
    G.p.qi=clampQi(G.p.qi+pdQi); G.e.qi=clampQi(G.e.qi+edQi);
    const dmgToE=applyDef(applyAtk(r.dmgToE,st.atk), est.def);
    let dmgToP=applyDef(applyAtk(r.dmgToP,est.atk), st.def);
    if(r.kind==='counter' && r.by==='e' && dmgToP>0 && relicFx('counterGuard')){ fireRelic('counterGuard'); dmgToP=Math.max(1, dmgToP-relicFx('counterGuard')); }   // 針壓計：被剋減傷
    dmgToP=softenIncoming(dmgToP);   // 防塵套：首次受擊減半
    if(dmgToE) G.e.hp-=dmgToE;
    if(dmgToP) G.p.hp-=dmgToP;
    drainQiOnHit('e', pAttr, dmgToE); drainQiOnHit('p', eAttr, dmgToP);   // 被攻擊 → 氣勢下降
    applyAttrEffect(G.p,pAttr); applyAttrEffect(G.e,eAttr);
    // 派系專長：打親和屬性的牌 → 觸發專屬 buff

      if(ab.qi){ G.p.qi=clampQi(G.p.qi+ab.qi); notes.push(`氣勢+${ab.qi}`); }
      if(wonRound && ab.foeQi){ G.e.qi=clampQi(G.e.qi-ab.foeQi); notes.push(`削對手氣勢${ab.foeQi}`); }
      if(wonRound && ab.dmg){ const d=applyDef(applyAtk(ab.dmg,st.atk),est.def); G.e.hp-=d; notes.push(`額外傷害−${d}`); }
      if(notes.length) pushLog(`★ ${CLASSES[RUN.classKey].name}專長（${ATTR_ZH[pAttr]}）：${notes.join('、')}`,'good');
    }
    G.p.last=pAttr; G.e.last=eAttr;
    // 訊息
    if(r.kind==='counter'){
      const win=r.by==='p'?'你':'對手', d=r.by==='p'?dmgToE:dmgToP;
      callout(`<span class="dmg">${win} · ${COUNTER_SKILL[r.attr]} −${d}</span>`);
      pushLog(`${win}相剋【${COUNTER_SKILL[r.attr]}】命中 −${d}`,'hit');
    } else if(r.kind==='value'){
      const win=r.by==='p'?'你':'對手', d=r.by==='p'?dmgToE:dmgToP;
      callout(`<span class="dmg">${win}面板較高 −${d}</span>`);
      pushLog(`${win}純比星較高 −${d}`,'hit');
    } else { callout('平手 · 雙方氣勢+1'); pushLog('平手，雙方氣勢+1','qi'); }
  }

  // 結算畫面（勝負標記照這一手的掉血差，不看總血量）
  markResult(pHp0,eHp0);
  if(G.p.hp<pHp0) spriteFx('p','hurt',600);
  if(G.e.hp<eHp0) spriteFx('e','hurt',600);
  // 記住這一手雙方的牌＋牌型＋勝負標記 → 下一回合仍留在檯面（同 battle.html）
  G.pShow=pCard; G.eShow=eCard; G.pShowAttr=pAttrShow; G.eShowAttr=eAttrShow;
  G.pHist.push({card:pCard, attr:pAttrShow}); G.eHist.push({card:eCard, attr:eAttrShow});
  const _psE=document.getElementById('pSlot'), _esE=document.getElementById('eSlot');
  G.pSlotCls=_psE?_psE.className:'slot filled'; G.eSlotCls=_esE?_esE.className:'slot filled';
  // 揭曉對手這一手實際出的牌型（原本打完就空著）
  const tellEl=document.getElementById('tell');
  if(tellEl) tellEl.innerHTML = eUlt
    ? '上一手：對手發動 <b>⚡品味輾壓</b>'
    : `上一手：對手出【<b>${ATTR_ZH[eAttr]}</b>】${eCard[eAttr]}★${feinted?'（虛晃！氣場是假的）':''}`;
  refreshFighters();
  await sleep(900);

  // 勝負（小人先倒地再切結算畫面）
  if(G.e.hp<=0 || G.p.hp<=0){
    if(G.e.hp<=0) spriteFx('e','ko');
    if(G.p.hp<=0) spriteFx('p','ko');
    await sleep(650);
  }
  if(G.e.hp<=0 && G.p.hp<=0){ G.p.hp>=G.e.hp ? winFight() : loseFight(); return; }
  if(G.e.hp<=0){ winFight(); return; }
  if(G.p.hp<=0){ loseFight(); return; }

  // 抽牌 + 棄牌 + 疲勞（牌庫空 → 受傷遞增；beta 簡化）
  drawCard(G.p); drawCard(G.e);
  while(G.p.hand.length>CFG.handLimit) G.p.hand.shift();
  while(G.e.hand.length>CFG.handLimit) G.e.hand.shift();
  if(G.p.hand.length===0 || G.e.hand.length===0){ // 任一方無牌可出 → 速判
    if(G.p.hp>=G.e.hp) winFight(); else loseFight(); return;
  }
  callout(''); startTurn();
}

function markResult(pHp0,eHp0){
  // 這一手誰掉血多誰輸（原本比「總血量」，領先時就算這手被打也會標「勝」，誤導）
  const ps=document.getElementById('pSlot'), es=document.getElementById('eSlot');
  if(!ps||!es) return;
  const pLoss=pHp0-G.p.hp, eLoss=eHp0-G.e.hp;
  if(eLoss>pLoss){ ps.classList.add('win'); es.classList.add('lose'); }
  else if(pLoss>eLoss){ ps.classList.add('lose'); es.classList.add('win'); }
}
function refreshSide(side){
  const s=G[side];
