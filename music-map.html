<!DOCTYPE html>
<html lang="zh-Hant"><head><meta charset="UTF-8"/><link rel="icon" type="image/png" href="/favicon.png"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/><title>音樂地圖 · dip</title><meta name="theme-color" content="#111111"><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"><style>*{box-sizing:border-box}body{margin:0;background:#fff;color:#111;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.04em}.topbar{height:40px;border-bottom:1px solid #ddd;display:flex;align-items:center;padding:0 20px}.topbar a{color:#111;text-decoration:none}main{max-width:760px;margin:auto;padding:34px 20px 48px}.eyebrow{font-size:9px;color:#888;letter-spacing:.14em;margin-bottom:10px}.title{font-size:22px;letter-spacing:.1em}.sub,#mapStatus{margin-top:12px;color:#888;line-height:1.8;max-width:580px}.login{border:1px solid #111;background:#111;color:#fff;font:inherit;padding:10px 14px;margin-top:18px;cursor:pointer}.hidden{display:none}.genre-shelf{margin-top:30px;border-top:1px solid #ddd;padding-top:20px;scroll-margin-top:16px}.genre-shelf-head{display:flex;justify-content:space-between;align-items:baseline;gap:12px;margin-bottom:14px}.genre-shelf-title{font-size:15px;font-weight:700;letter-spacing:.08em}.genre-shelf-meta{font-size:10px;color:#888}.genre-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:12px}.genre-card{position:relative;border:1px solid #ddd;background:#fff;padding:9px;min-width:0}.genre-cover{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:#f2f2f2}.genre-cover-empty{width:100%;aspect-ratio:1;display:grid;place-items:center;background:#f2f2f2;color:#bbb;font-size:28px}.genre-count{position:absolute;top:14px;right:14px;background:rgba(0,0,0,.8);color:#fff;padding:2px 6px;border-radius:10px;font-size:9px}.genre-rarity{font-size:8px;font-weight:700;letter-spacing:.12em;margin-top:8px}.genre-artist{font-size:9px;color:#888;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.genre-album{font-size:10px;font-weight:700;line-height:1.4;margin-top:2px}.genre-card.rarity-hall,.genre-card.rarity-legendary{box-shadow:inset 0 0 0 3px #c4c8cf}.genre-card.rarity-pearl{box-shadow:inset 0 0 0 3px #6a4ea0}.genre-card.rarity-heresy{box-shadow:inset 0 0 0 3px #a01020}.genre-card.rarity-legendary{box-shadow:inset 0 0 0 3px #e0851c}.genre-card.rarity-epic{box-shadow:inset 0 0 0 2px #7a3fb0}.genre-card.rarity-uncommon{box-shadow:inset 0 0 0 2px #2faf4f}.genre-card.rarity-rare{box-shadow:inset 0 0 0 2px #3a7bd5}.rarity-hall .genre-rarity{color:#777}.rarity-pearl .genre-rarity{color:#6a4ea0}.rarity-heresy .genre-rarity{color:#a01020}.rarity-legendary .genre-rarity{color:#d4791a}.rarity-epic .genre-rarity{color:#7a3fb0}.rarity-uncommon .genre-rarity{color:#259643}.rarity-rare .genre-rarity{color:#3a7bd5}.rarity-common .genre-rarity{color:#888}.genre-empty{padding:28px 0;color:#888;text-align:center;line-height:1.8}@media(max-width:520px){.genre-grid{grid-template-columns:1fr}.genre-card{display:grid;grid-template-columns:92px 1fr;gap:10px}.genre-card>div:last-child{min-width:0}.genre-cover,.genre-cover-empty{width:92px}.genre-count{left:76px;right:auto}.genre-rarity{margin-top:2px}}</style></head>
<body><div class="topbar"><a href="index.html">← 回到首頁</a></div><main><div class="eyebrow">MY COLLECTION</div><div class="title">我的音樂地圖</div><div class="sub">從你的唱片櫃分析建立的音樂地圖，蒐集越多地圖越大。</div><button id="loginButton" class="login hidden">登入以讀取我的地圖</button><div id="mapStatus">正在讀取你的唱片櫃資料…</div><div id="musicMapFull"></div><section id="genreShelf" class="genre-shelf hidden"><div class="genre-shelf-head"><div id="genreShelfTitle" class="genre-shelf-title"></div><div id="genreShelfMeta" class="genre-shelf-meta"></div></div><div id="genreGrid" class="genre-grid"></div></section></main><script src="music-map-widget.js?v=9"></script><script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getFirestore,collection,getDocs,doc,getDoc,setDoc,query,where}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import{getAuth,onAuthStateChanged,signInWithPopup,GoogleAuthProvider}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
const app=initializeApp({apiKey:'AIzaSyBpR5XKKHwT_eQoShtBPtFNRXz4ymzPWQg',authDomain:'price-manager-e8846.firebaseapp.com',projectId:'price-manager-e8846',storageBucket:'price-manager-e8846.firebasestorage.app',messagingSenderId:'570133498387',appId:'1:570133498387:web:8835b8d2373797e91d0de6'}),db=getFirestore(app),auth=getAuth(app),worker='https://dip-vinyl-worker.kubinice06.workers.dev';
const names={jazz:'Jazz',rock:'Rock',electronic:'Electronic',soul:'Soul & Funk',hiphop:'Hip-hop / R&B',folk:'Folk',classical:'Classical',world:'World Music',pop:'Pop',blues:'Blues'},rarityOrder={hall:8,pearl:7,heresy:6,legendary:5,epic:4,uncommon:3,rare:2,common:1},rarityNames={hall:'殿堂',pearl:'流亡',heresy:'異端',legendary:'傳奇',epic:'史詩',uncommon:'獨特',rare:'稀有',common:'普通'};
const map=DipMusicMap.mount(document.querySelector('#musicMapFull'),{onGenreSelect:showGenre}),status=document.querySelector('#mapStatus'),login=document.querySelector('#loginButton'),shelf=document.querySelector('#genreShelf'),shelfTitle=document.querySelector('#genreShelfTitle'),shelfMeta=document.querySelector('#genreShelfMeta'),grid=document.querySelector('#genreGrid'),ids=['jazz','rock','electronic','soul','hiphop','folk','classical','world','pop','blues'];
const valid=a=>[...new Set((a||[]).filter(x=>ids.includes(x)))];
const healthy=value=>value?.version===2&&value.albums!=null&&Number(value.albums)>=0&&value.untagged!=null&&Number(value.untagged)>=0&&ids.every(id=>Object.prototype.hasOwnProperty.call(value.credits||{},id))&&(Number(value.albums)===0||Number(value.untagged)>0||ids.some(id=>Number(value.credits[id])>0));
async function genres(card){try{const r=await fetch(`${worker}/album-genres?artist=${encodeURIComponent(card.artist||'')}&album=${encodeURIComponent(card.album||'')}`);return r.ok?valid((await r.json()).genres):[]}catch{return[]}}
const escapeHtml=value=>String(value??'').replace(/[&<>"']/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));
function rarityFromRatings(ratings){const classic=Number(ratings?.classic)||0,accessibility=Number(ratings?.accessibility)||0,obscurity=Number(ratings?.obscurity)||0,score=classic+accessibility+(obscurity>=5?1:0);return score>=10?'legendary':score>=8?'epic':score>=6?'uncommon':score>=4?'rare':'common'}
async function decorateCard(snap){const card={cardId:snap.id,...snap.data()};let tier=card.hall?'hall':card.pearl?'pearl':card.heresy?'heresy':card.rarity?.tier||null,coverUrl=card.coverUrl||card._coverUrl||'';try{const override=(await getDoc(doc(db,'album_overrides',card.cardId))).data();if(override?.tier&&rarityOrder[override.tier])tier=override.tier;if(!tier){const response=await fetch(`${worker}/album-rating?artist=${encodeURIComponent(card.artist||'')}&album=${encodeURIComponent(card.album||'')}`);const ratings=response.ok?await response.json():{};if(override){if(override.obscurity)ratings.obscurity=override.obscurity;if(override.classic)ratings.classic=override.classic;if(override.accessibility)ratings.accessibility=override.accessibility;}tier=(card.artist||'').toLowerCase().trim()==='dollar brand'?'epic':rarityFromRatings(ratings);}}catch{tier=tier||'common'}if(!coverUrl){try{const response=await fetch(`${worker}/spotify-search?artist=${encodeURIComponent(card.artist||'')}&album=${encodeURIComponent(card.album||'')}`);if(response.ok)coverUrl=(await response.json()).imageUrl||'';}catch{}if(coverUrl)setDoc(snap.ref,{coverUrl},{merge:true}).catch(()=>{});}return{...card,coverUrl,tier:tier||'common'};}
let shelfRequest=0;
async function showGenre(genre){const request=++shelfRequest;shelf.classList.remove('hidden');shelfTitle.textContent=`${names[genre]} 收藏`;shelfMeta.textContent='讀取中…';grid.innerHTML='<div class="genre-empty">正在整理這條路徑的唱片…</div>';shelf.scrollIntoView({behavior:'smooth',block:'start'});const user=auth.currentUser;if(!user){shelfMeta.textContent='尚未登入';grid.innerHTML='<div class="genre-empty">登入後即可查看這條路徑的收藏。</div>';return;}try{const snapshot=await getDocs(query(collection(db,'collections',user.uid,'cards'),where('mapGenres','array-contains',genre)));const cards=await Promise.all(snapshot.docs.map(decorateCard));if(request!==shelfRequest)return;cards.sort((a,b)=>(rarityOrder[b.tier]||0)-(rarityOrder[a.tier]||0)||Number(b.lastObtainedAt||b.obtainedAt||0)-Number(a.lastObtainedAt||a.obtainedAt||0));const total=cards.reduce((sum,card)=>sum+Math.max(1,Number(card.count)||1),0);shelfMeta.textContent=`${total} 張 · ${cards.length} 款`;grid.innerHTML=cards.length?cards.map(card=>{const count=Math.max(1,Number(card.count)||1),cover=card.coverUrl?`<img class="genre-cover" src="${escapeHtml(card.coverUrl)}" alt="" loading="lazy">`:'<div class="genre-cover-empty">♪</div>';return`<article class="genre-card rarity-${card.tier}">${cover}${count>1?`<span class="genre-count">×${count}</span>`:''}<div><div class="genre-rarity">${rarityNames[card.tier]||rarityNames.common}</div><div class="genre-artist">${escapeHtml(card.artist)}</div><div class="genre-album">${escapeHtml(card.album)}</div></div></article>`}).join(''):'<div class="genre-empty">這條路徑還沒有收藏。</div>';}catch(error){console.error(error);if(request!==shelfRequest)return;shelfMeta.textContent='讀取失敗';grid.innerHTML='<div class="genre-empty">暫時無法讀取，請稍後再試。</div>';}}
const sleep=ms=>new Promise(resolve=>setTimeout(resolve,ms));
async function build(user){status.textContent='正在從既有唱片櫃建立音樂地圖…';const cards=(await getDocs(collection(db,'collections',user.uid,'cards'))).docs;const credits=Object.fromEntries(ids.map(id=>[id,0]));let albums=0,untagged=0,done=0;for(let start=0;start<cards.length;start+=8){const batch=cards.slice(start,start+8);const results=await Promise.all(batch.map(async d=>{const card=d.data(),count=Math.max(1,Number(card.count)||1),previous=valid(card.mapGenres),tags=await genres(card);if(tags.join('|')!==previous.join('|'))await setDoc(d.ref,{mapGenres:tags},{merge:true});return{count,tags};}));results.forEach(({count,tags})=>{albums+=count;if(tags.length)tags.forEach(id=>credits[id]+=count);else untagged+=count;});done+=batch.length;status.textContent=`正在從既有唱片櫃建立音樂地圖… ${done}/${cards.length}`;if(done<cards.length)await sleep(200);}const value={version:2,albums,credits,untagged,updatedAt:Date.now()};await setDoc(doc(db,'users',user.uid),{musicMap:value},{merge:true});return value}
async function load(user){login.classList.add('hidden');status.textContent='正在讀取你的唱片櫃資料…';const profile=(await getDoc(doc(db,'users',user.uid))).data(),saved=profile?.musicMap,value=healthy(saved)?saved:await build(user);map.update(value);status.textContent=healthy(saved)?'已讀取你的唱片櫃地圖。':'偵測到地圖資料異常，已從唱片櫃重新建立。';}
login.onclick=()=>signInWithPopup(auth,new GoogleAuthProvider());onAuthStateChanged(auth,user=>{if(!user){map.update(DipMusicMap.empty(),'登入後才會顯示並永久保存你的收藏足跡。');status.textContent='登入後即可建立你的專屬地圖。';login.classList.remove('hidden');return;}load(user).catch(e=>{console.error(e);status.textContent='讀取資料時發生問題，請稍後重試。';});});
</script></body></html>
