<!DOCTYPE html>
<html lang="zh-Hant"><head><meta charset="UTF-8"/><link rel="icon" type="image/png" href="/favicon.png"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/><title>音樂地圖 · dip</title><meta name="theme-color" content="#111111"><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"><style>*{box-sizing:border-box}body{margin:0;background:#fff;color:#111;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.04em}.topbar{height:40px;border-bottom:1px solid #ddd;display:flex;align-items:center;padding:0 20px}.topbar a{color:#111;text-decoration:none}main{max-width:760px;margin:auto;padding:34px 20px 48px}.eyebrow{font-size:9px;color:#888;letter-spacing:.14em;margin-bottom:10px}.title{font-size:22px;letter-spacing:.1em}.sub,#mapStatus{margin-top:12px;color:#888;line-height:1.8;max-width:580px}.login{border:1px solid #111;background:#111;color:#fff;font:inherit;padding:10px 14px;margin-top:18px;cursor:pointer}.hidden{display:none}</style></head>
<body><div class="topbar"><a href="index.html">← 回到首頁</a></div><main><div class="eyebrow">MY COLLECTION</div><div class="title">我的音樂地圖</div><div class="sub">只由永久收進卡冊的專輯累積。首次開啟會把既有卡冊建立成你的地圖；爵士嘻哈等跨界專輯會同時計入兩個曲風。</div><button id="loginButton" class="login hidden">登入以讀取我的地圖</button><div id="mapStatus">正在讀取你的卡冊資料…</div><div id="musicMapFull"></div></main><script src="music-map-widget.js?v=3"></script><script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getFirestore,collection,getDocs,doc,getDoc,setDoc}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import{getAuth,onAuthStateChanged,signInWithPopup,GoogleAuthProvider}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
const app=initializeApp({apiKey:'AIzaSyBpR5XKKHwT_eQoShtBPtFNRXz4ymzPWQg',authDomain:'price-manager-e8846.firebaseapp.com',projectId:'price-manager-e8846',storageBucket:'price-manager-e8846.firebasestorage.app',messagingSenderId:'570133498387',appId:'1:570133498387:web:8835b8d2373797e91d0de6'}),db=getFirestore(app),auth=getAuth(app),worker='https://dip-vinyl-worker.kubinice06.workers.dev';
const map=DipMusicMap.mount(document.querySelector('#musicMapFull')),status=document.querySelector('#mapStatus'),login=document.querySelector('#loginButton'),ids=['jazz','rock','electronic','soul','hiphop','folk','classical','world'];
const valid=a=>[...new Set((a||[]).filter(x=>ids.includes(x)))];
async function genres(card){try{const r=await fetch(`${worker}/album-genres?artist=${encodeURIComponent(card.artist||'')}&album=${encodeURIComponent(card.album||'')}`);return r.ok?valid((await r.json()).genres):[]}catch{return[]}}
async function build(user){status.textContent='正在建立既有卡冊的音樂地圖…';const cards=(await getDocs(collection(db,'collections',user.uid,'cards'))).docs;const credits=Object.fromEntries(ids.map(id=>[id,0]));let albums=0,done=0;for(const d of cards){const card=d.data(),count=Math.max(1,Number(card.count)||1);let tags=valid(card.mapGenres);if(!tags.length){tags=await genres(card);if(tags.length)await setDoc(d.ref,{mapGenres:tags},{merge:true});}albums+=count;tags.forEach(id=>credits[id]+=count);done++;status.textContent=`正在建立既有卡冊的音樂地圖… ${done}/${cards.length}`;}const value={version:1,albums,credits,updatedAt:Date.now()};await setDoc(doc(db,'users',user.uid),{musicMap:value},{merge:true});return value}
async function load(user){login.classList.add('hidden');status.textContent='正在讀取你的卡冊資料…';const profile=(await getDoc(doc(db,'users',user.uid))).data(),value=profile?.musicMap?.version===1?profile.musicMap:await build(user);map.update(value);status.textContent='已與你的永久卡冊同步。';}
login.onclick=()=>signInWithPopup(auth,new GoogleAuthProvider());onAuthStateChanged(auth,user=>{if(!user){map.update(DipMusicMap.empty(),'登入後才會顯示並永久保存你的收藏足跡。');status.textContent='登入後即可建立你的專屬地圖。';login.classList.remove('hidden');return;}load(user).catch(e=>{console.error(e);status.textContent='讀取資料時發生問題，請稍後重試。';});});
</script></body></html>
