<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>品味生死鬥 · dip</title>
  <meta name="theme-color" content="#111111">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --black: #111; --gray: #888; --line: #ddd; --bg: #fff; --mono: 'Space Mono', monospace; }
    body { background: var(--bg); color: var(--black); font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em; min-height: 100dvh; display: flex; flex-direction: column; }
    .topbar { display: flex; align-items: center; border-bottom: 1px solid var(--line); padding: 0 20px; height: 40px; flex-shrink: 0; }
    .topbar a { color: var(--black); text-decoration: none; font-size: 11px; letter-spacing: 0.08em; }
    .topbar a:hover { color: var(--gray); }
    .hero { text-align: center; padding: 40px 20px 24px; }
    .hero-title { font-size: 20px; font-weight: 700; letter-spacing: 0.12em; }
    .hero-beta { display: inline-block; margin-left: 8px; font-size: 8px; font-weight: 700; letter-spacing: 0.16em; vertical-align: 4px; border: 1px solid currentColor; padding: 1px 5px; border-radius: 2px; animation: betaBlink 2.4s ease-in-out infinite; }
    @keyframes betaBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
    .hero-sub { margin-top: 12px; font-size: 10px; color: var(--gray); letter-spacing: 0.05em; line-height: 1.7; }
    .cards { display: flex; flex-direction: column; border-top: 1px solid var(--line); }
    .card {
      position: relative; border-bottom: 1px solid var(--line); padding: 32px 44px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 16px;
      background: #fff; transition: background 0.15s, color 0.15s; text-align: center; width: 100%;
      border-left: none; border-right: none; border-top: none; font-family: var(--mono); text-decoration: none; color: var(--black);
    }
    .card-name { font-size: 15px; font-weight: 700; letter-spacing: 0.08em; margin-bottom: 6px; }
    .card-desc { font-size: 10px; color: var(--gray); letter-spacing: 0.05em; line-height: 1.6; }
    .card-arrow { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); font-size: 18px; flex-shrink: 0; }
    .card:active { background: #111; color: #fff; }
    .card:active .card-desc { color: #bbb; }
    @media (hover: hover) {
      .card:hover { background: #111; color: #fff; }
      .card:hover .card-desc { color: #bbb; }
    }
    .card:focus-visible { outline: 2px solid var(--black); outline-offset: -3px; }

    /* ── 第一列：音樂地圖收合條，點開才展開完整地圖 ── */
    .maprow { position: relative; border-bottom: 1px solid var(--line); }
    .mapbar-toggle {
      width: 100%; display: flex; align-items: center; justify-content: center;
      padding: 12px 44px; min-height: 64px; background: none; border: 0;
      font-family: var(--mono); color: var(--black); text-align: center; cursor: pointer;
    }
    .mapbar-toggle:focus-visible { outline: 2px solid var(--black); outline-offset: -3px; }
    /* 縮圖貼著文字左側、箭頭釘在右側，兩者都脫離排版流，文字維持對齊整列正中央 */
    .mapbar-thumb { position: absolute; right: calc(100% + 12px); top: 50%; transform: translateY(-50%); width: 36px; height: 36px; }
    .mapbar-text { position: relative; min-width: 0; max-width: calc(100% - 56px); }
    .mapbar-title { display: block; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; }
    .mapbar-stat { display: block; margin-top: 4px; font-size: 9px; color: var(--gray); letter-spacing: 0.04em; line-height: 1.5; }
    .mapbar-chev { position: absolute; right: 20px; top: 32px; transform: translateY(-50%); font-size: 10px; color: var(--gray); transition: transform 0.2s; }
    .maprow.open .mapbar-chev { transform: translateY(-50%) rotate(180deg); }
    .mapbar-panel { display: none; }
    .maprow.open .mapbar-panel { display: block; }
    .map-entry { max-width: 720px; margin: 0 auto; padding: 0 20px 8px; }
    /* 標題與張數已在收合條上，面板內不重複 */
    .mapbar-panel .music-map-head { display: none; }
    .mapbar-panel .music-map { padding-top: 4px; }
  </style>
</head>
<body>
  <div class="topbar"><a href="index.html">↩ 回主頁</a></div>
  <div class="hero">
    <div class="hero-title">品味生死鬥<span class="hero-beta">BETA</span></div>
    <div class="hero-sub">用你手邊的專輯，一決高下。<br>選一種玩法開打。</div>
  </div>
  <div class="cards">
    <div class="maprow" id="mapRow">
      <button class="mapbar-toggle" id="mapToggle" type="button" aria-expanded="false" aria-controls="mapPanel">
        <span class="mapbar-text">
          <span class="mapbar-thumb" id="mapThumb"></span>
          <span class="mapbar-title">我的聆聽品味地圖</span>
          <span class="mapbar-stat" id="mapStat">讀取中…</span>
        </span>
        <span class="mapbar-chev">▼</span>
      </button>
      <div class="mapbar-panel" id="mapPanel"><div class="map-entry"><div id="pvpMusicMap"></div></div></div>
    </div>
    <a class="card" href="battle.html">
      <div>
        <div class="card-name">單場對決</div>
        <div class="card-desc">用你手邊的專輯，與音樂同好一決高下。</div>
      </div>
      <span class="card-arrow">→</span>
    </a>
    <a class="card" href="roguelike.html">
      <div>
        <div class="card-name">無盡品味試煉</div>
        <div class="card-desc">選流派、挑三張盤，一場接一場越打越強，撐到死。</div>
      </div>
      <span class="card-arrow">→</span>
    </a>
  </div>
  <script src="music-map-widget.js?v=13"></script>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
    import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    const app = initializeApp({ apiKey:'AIzaSyBpR5XKKHwT_eQoShtBPtFNRXz4ymzPWQg', authDomain:'price-manager-e8846.firebaseapp.com', projectId:'price-manager-e8846', storageBucket:'price-manager-e8846.firebasestorage.app', messagingSenderId:'570133498387', appId:'1:570133498387:web:8835b8d2373797e91d0de6' });
    const db = getFirestore(app), auth = getAuth(app);
    const map = DipMusicMap.mount(document.getElementById('pvpMusicMap'), { compact:true });

    const row = document.getElementById('mapRow'), toggle = document.getElementById('mapToggle');
    const KEY = 'dipPvpMapOpen';
    const setOpen = open => { row.classList.toggle('open', open); toggle.setAttribute('aria-expanded', String(open)); };
    setOpen(localStorage.getItem(KEY) === '1');
    toggle.addEventListener('click', () => { const open = !row.classList.contains('open'); setOpen(open); localStorage.setItem(KEY, open ? '1' : '0'); });

    // 收合條：一行「收藏 N 張 · 主路徑 X / Y」＋迷你雷達，完整地圖收在裡面
    function paint(data, note) {
      const s = DipMusicMap.summary(data);
      document.getElementById('mapThumb').innerHTML = DipMusicMap.thumb(data);
      // 張數與點數並列：兩者對不上時（曾發生 albums 掉隊）一眼就看得出來
      const head = `收藏 ${s.albums} 張 · ${s.points} 點`;
      document.getElementById('mapStat').textContent = note
        || (s.top.length ? `${head} · 主路徑 ${s.top.map(g => g.zh).join(' / ')}` : `${head} · 尚無路徑`);
    }

    onAuthStateChanged(auth, async user => {
      if (!user) { const e = DipMusicMap.empty(); paint(e, '登入後顯示你的永久收藏地圖'); return map.update(e, '登入後會在這裡顯示你的永久收藏地圖。'); }
      try {
        const profile = (await getDoc(doc(db, 'users', user.uid))).data();
        if (profile?.musicMap?.version === 2) { paint(profile.musicMap); map.update(profile.musicMap); }
        else { const e = DipMusicMap.empty(); paint(e, '請先到「我的音樂地圖」同步唱片櫃'); map.update(e, '請先到「我的音樂地圖」同步既有唱片櫃資料。'); }
      } catch { const e = DipMusicMap.empty(); paint(e, '暫時無法讀取地圖資料'); map.update(e, '暫時無法讀取地圖資料。'); }
    });
    paint(DipMusicMap.empty(), '讀取中…');
  </script>
</body>
</html>
